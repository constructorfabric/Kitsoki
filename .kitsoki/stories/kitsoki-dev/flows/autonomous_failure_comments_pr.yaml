# autonomous_failure_comments_pr — when autonomous PR refinement bails, dev-story
# comments on both the source issue and the PR before returning to the workbench.

test_kind: flow
app: ../app.yaml
initial_state: core.pr.ci_monitoring
initial_world:
  core__ticket_id:      "124"
  core__ticket_title:   "PR ready until CI flakes"
  core__thread:         "124"
  core__judge_mode:     "llm_then_human"
  core__pr_id:          "77"
  core__last_pr_url:    "https://github.com/constructorfabric/Kitsoki/pull/77"
  core__pr__ticket_id:  "124"
  core__pr__ticket_title: "PR ready until CI flakes"
  core__pr__thread:     "124"
  core__pr__judge_mode: "llm_then_human"
  core__pr__pr_id:      "77"
  core__pr__pr_url:     "https://github.com/constructorfabric/Kitsoki/pull/77"
  core__pr__pr_title:   "Fix issue 124"

host_handlers:
  host.gh.ticket:
    data: { ok: true, comment_id: "issue-comment-124" }
  host.git:
    data: { ok: true, state: "pending", checks: "", comments: "" }

turns:
  - intent: { name: core__pr__quit, slots: {} }
    expect_state: core.human_review_report
    expect_world:
      core__status: "abandoned"
      core__human_review_issue_comment_id: "issue-comment-124"
      core__human_review_pr_comment_ok: true
    expect_host_calls:
      - handler: host.gh.ticket.comment
        args: { id: "124" }
        times: 1
      - handler: host.git.pr_comment
        args: { pr_id: "77" }
        times: 1

  - intent: { name: core__continue, slots: {} }
    expect_state: core.landing

expect_no_errors: true
