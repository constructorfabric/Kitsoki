# pickup_autonomous_then_bail — judge_mode=llm_then_human with a
# mid-flow bail-out. The LLM-judge auto-fires `accept` from each
# merged room's on_enter (confident verdict 0.9 >= threshold 0.8),
# cascading through every room with a judge until it stops at one
# without (implementing, reviewing). A world_override later flips
# judge_mode to `human` to simulate "operator intervened because
# verdict looked dodgy"; subsequent rooms HOLD because the
# emit_intent gate closes on `judge_mode == 'human'`.
#
# Proves the autonomous loop bails cleanly to human in mid-stream
# without restart, replay, or state reload — the same exact mechanism
# kitsoki-dev uses when the autonomous variant of the dogfood loop
# from proposal §5.4 hits an uncertain verdict and needs a human ack.
#
# Story shape borrowed from stories/bugfix/flows/mixed_judge_swap.yaml
# (where it pins the bare bugfix story) and re-expressed through the
# multi-layer kitsoki-dev wrapper.

test_kind: flow
app: ../app.yaml
initial_state: core.landing
initial_world:
  core__ticket_id:      "2026-05-14T103205Z-tui-view-render-before-bind"
  core__ticket_title:   "TUI view templates render BEFORE on_enter binds"
  core__thread:         "issues/bugs/2026-05-14T103205Z-tui-view-render-before-bind.md"
  core__workdir:        ".worktrees/tui-view-render-before-bind"
  core__workspace_id:   "ws-tui-view-render"
  core__base_branch:    "main"
  core__feature_branch: "fix/tui-view-render-before-bind"
  core__bf__bugfix_mode: "full"
  # Autonomous defaults — proposal §5.2's autonomous_default_mode.
  # Seed BOTH the top-level (kitsoki-dev) AND the projected (bf, pr)
  # keys explicitly because the flow runner's initial_state set-path
  # skips the wrapper compounds' OnEnter — so the world_in: projection
  # chain doesn't fire until the operator transitions through the
  # wrappers themselves. Direct seeding sidesteps that and gets the
  # judge-mode polymorphism gate reading the right values from turn 1.
  judge_mode:                       "llm_then_human"
  judge_confidence_threshold:       0.8
  core__judge_mode:                 "llm_then_human"
  core__judge_confidence_threshold: 0.8
  core__bf__judge_mode:             "llm_then_human"
  core__bf__judge_confidence_threshold: 0.8
  core__pr__judge_mode:             "llm_then_human"
  core__pr__judge_confidence_threshold: 0.8
  core__merge_strategy:             "squash"

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "synced" }
  host.git:
    data: { ok: true, sha: "abc123", diff: "", url: "https://example/pr/103205", pr_id: "103205", state: "success", checks: "", comments: "" }
  host.local:
    data: { ok: true, log: "PASS: 12 tests", passed: 12, failed: 0, state: "success" }
  host.gh.ticket:
    data: { ok: true, tickets: "" }
  # Confident verdict — every checkpoint where judge_mode is non-human
  # will auto-fire `accept` until we flip the mode.
  host.agent.decide:
    data: &agent_stub
      ok: true
      submitted:
        summary_title:    "TUI view render before bind — autonomous walk"
        summary_markdown: "Confident artifact; the LLM auto-advances until the operator intervenes."
        bug_verified:     true
        involved_components: [{ name: "internal/tui/transcript.go" }]
        fix_description:  "Defer first view-render until on_enter binds complete."
        root_cause:       "Subscribe-notify fires before runOnEnter's bind block."
        affected_files:   ["internal/orchestrator/orchestrator.go"]
        confidence:       0.9
        reasoning:        "Trace shows the ordering trap; the fix is mechanical."
        status:           "passed"
        tests_added:      ["internal/orchestrator/orchestrator_test.go::TestRunOnEnterOrdering"]
        tests_run:        { passed: 12, failed: 0, log: "PASS: 12 tests" }
        outcome:          "pass"
        evidence:         { build: "ok" }
        lessons:
          - { category: "render-ordering", description: "Subscribe-notify ordering trap.", severity: "high" }
        verdict:    "pass"
        # NOTE: the emit_intent expression in bf's checkpoint rooms is
        # `{{ world.llm_verdict.intent }}`, rendered verbatim by the
        # runtime. After bugfix is folded under dev-story (and then
        # again under kitsoki-dev's `core`), the state's on-arc key is
        # `core__bf__accept`. As of the §W6.6 #1 fix the dispatcher
        # resolves bare emit names through the state's IntentAliases
        # map, so a live LLM-judge producing the bare `accept` works
        # end-to-end (covered by .kitsoki/stories/kitsoki-dev/flows/
        # dogfood_autonomous_smoke.yaml). This fixture keeps the
        # fully-prefixed spelling as regression coverage that
        # already-prefixed names ALSO dispatch correctly.
        intent:     "core__bf__accept"
        reason:     "Confident; advance autonomously."
        confidence_pct: 90

  # host.agent.task — bf reproducing/implementing/testing/validating
  # rooms generate their artifact via the `task` verb (judge steps use
  # `decide`). Same stub payload as decide (shared anchor); the artifact
  # schema's additionalProperties tolerates the judge fields.
  host.agent.task:
    data: *agent_stub

turns:
  # ── Phase A — autonomous walk (llm_then_human + confident) ──────────
  # core.landing → core.bf.idle. bf.idle's auto-start on_enter fires on
  # this transition (ticket is loaded, no reproduction artifact yet),
  # emit_intents `start`, and reproducing.on_enter cascades the
  # autonomous-emit chain through every room with a judge until it
  # hits one without (implementing). Net landing: core.bf.implementing.
  - intent: { name: core__go_bugfix, slots: {} }
    expect_state: core.bf.implementing

  # ── Bail-out — operator flips judge_mode to "human" ─────────────────
  # accept advances to testing. The world_override flips the mode
  # BEFORE testing.on_enter evaluates its emit_intent guard, so the
  # autonomous chain stops at testing (rather than cascading on to
  # reviewing).
  - intent: { name: core__bf__accept, slots: {} }
    world_override:
      # Flip ALL judge_mode keys (top-level + nested under core / bf
      # / pr) because the emit_intent gate at the bf checkpoint reads
      # `world.core__bf__judge_mode`. Without the prefixed override,
      # the auto-emit keeps firing using its stale projected value.
      judge_mode:           "human"
      core__judge_mode:     "human"
      core__bf__judge_mode: "human"
      core__pr__judge_mode: "human"
    expect_state: core.bf.testing

  # ── Phase B — supervised; operator drives ────────────────────────────
  # emit_intent's gate (`world.judge_mode != 'human'`) now closes, so
  # every remaining accept requires a manual operator decision.
  - intent: { name: core__bf__accept, slots: {} }
    expect_state: core.bf.reviewing
  - intent: { name: core__bf__accept, slots: {} }
    expect_state: core.bf.validating
  - intent: { name: core__bf__accept, slots: {} }
    expect_state: core.bf.done

  # done.accept → @exit:done → handoff to pr.open_pr.
  - intent: { name: core__bf__accept, slots: {} }
    expect_state: core.pr.open_pr

expect_no_errors: true
