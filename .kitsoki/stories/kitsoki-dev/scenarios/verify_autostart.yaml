# Warp basis: drop directly into the bugfix pipeline at core.bf.reproducing
# with the reproduction artifact pre-bound, so one `continue` keystroke
# verifies the merged-state advance:
#
#   1. Continue (LLM routes to core__bf__accept) →
#      reproducing.on.accept fires.
#   2. accept arc posts the artifact to transport AND transitions to
#      proposing — one keystroke, one decision, one post.
#   3. Lands at proposing in the SAME turn; proposing.on_enter kicks
#      off its agent. You should see streamed tool-use events in chat.
#
# A second `continue` from proposing repeats the pattern. And so on,
# one keystroke per merged room, until @exit:done hands off to
# pr-refinement.
#
# Why not land at core.landing and rely on auto-start through bf.idle's
# on_enter? Because Teleport (the engine warp seam) DOESN'T fire
# on_enter — it just sets state + merges world. So warping to
# core.landing and typing `bugfix` works, but adds a navigation hop
# and a real agent call before the merged-room advance under test
# kicks in. Skipping straight to reproducing with the artifact
# pre-bound is more direct for verification.
#
# The bf_autostart_attempted flag is set true here too — it means
# bf.idle's auto-create + auto-start guard would skip if you ever
# bounce back to idle. That's intentional: this scenario is for
# verifying the merged-room advance chain, not the auto-create chain.
#
# Usage from kitsoki repo root:
#
#   kitsoki run .kitsoki/stories/kitsoki-dev/app.yaml \
#       --warp scenarios/verify_autostart.yaml \
#       --no-implicit-resume \
#       --trace-pretty /tmp/kitsoki-verify.log
#
# Then type `continue` once. Expected new state after the turn:
# `core.bf.proposing`. If you instead land back at
# `core.bf.reproducing`, the accept arc didn't fire — file a bug.

name:        "verify-autostart — straight into reproducing for one-keystroke continue test"
description: "Lands at core.bf.reproducing with reproduction artifact pre-bound; type `continue` once to verify accept advances directly to proposing."

state: core.bf.reproducing

world:
  # Ticket (integration-smoke is the safest — never been driven, no
  # stale .worktrees/ dir).
  core__ticket_id:    "2026-05-17T111838Z-integration-smoke-bug-picked-up-by-dogfood"
  core__ticket_title: "integration smoke — bug picked up by dogfood"
  core__ticket_url:   "issues/bugs/2026-05-17T111838Z-integration-smoke-bug-picked-up-by-dogfood.md"
  core__ticket_type:  "bug"
  core__thread:       "issues/bugs/2026-05-17T111838Z-integration-smoke-bug-picked-up-by-dogfood.md"

  # Workspace (seeded so the bf.idle auto-create won't try to fire
  # if you bounce back to idle).
  core__bf__workspace_id:           "bf-2026-05-17T111838Z-integration-smoke-bug-picked-up-by-dogfood"
  core__bf__feature_branch:         "fix/2026-05-17T111838Z-integration-smoke-bug-picked-up-by-dogfood"
  core__bf__workdir:                ".worktrees/bf-2026-05-17T111838Z-integration-smoke-bug-picked-up-by-dogfood"
  core__bf__base_branch:            "main"
  core__bf__bf_autostart_attempted: true
  core__bf__bugfix_mode:            "full"

  # Mode pinned at every fold level (Teleport skips world_in
  # projection so we pin the post-fold keys directly).
  judge_mode:                       "human"
  judge_confidence_threshold:       0.8
  core__judge_mode:                 "human"
  core__judge_confidence_threshold: 0.8
  core__bf__judge_mode:             "human"
  core__bf__judge_confidence_threshold: 0.8

  # Reproduction artifact pre-bound so the accept arc's transport.post
  # step has a non-empty body to post, AND the view at reproducing
  # renders the artifact you're about to advance past.
  core__bf__reproduction_artifact:
    summary_title:    "integration-smoke — verify dogfood loop completes end-to-end"
    summary_markdown: |
      ## Reproduction (seeded by verify_autostart warp)

      This is a synthetic reproduction artifact pre-bound by the
      verify_autostart scenario. The real reproducing agent would
      write something specific to this bug; for verification
      purposes the body is a placeholder.

      ### Steps
      1. Pick the integration-smoke ticket.
      2. Type `bugfix`.
      3. Type `continue` at every merged room.
      4. Reach `@exit:done`.

      ### Expected
      Each `continue` posts the current artifact AND advances to
      the next phase in a single turn.
    bug_verified: true
    expected_outcome: "Pipeline walks itself to @exit:done with one keystroke per merged room."
    actual_outcome:   "Will be observed during verification."
    steps:
      - "Pick ticket"
      - "Type `bugfix`"
      - "Type `continue` repeatedly"
    evidence_paths:
      - ".kitsoki/stories/kitsoki-dev/scenarios/verify_autostart.yaml"
    involved_components:
      - name: "stories/bugfix/rooms/{reproducing,proposing,testing,validating,done}.yaml"
        reason: "merged rooms — accept arc posts the artifact and advances in one keystroke"
      - name: "internal/orchestrator/orchestrator.go::enterRedirectState"
        reason: "depth cap that backstops the auto-create loop we hit earlier"
