# gears-rust bugfix marathon — baseline bug cases
#
# Each case is a REAL merged fix in ~/code/gears-rust used as a baseline:
#   - baseline_sha = the fix's PARENT commit (`<fix>^`), where the bug is PRESENT.
#   - oracle_test  = the regression test the real fix added (the HIDDEN oracle,
#                    kept OUT of the candidate tree until independent verify).
#   - package      = the cargo package that holds the oracle test.
#   - fix_sha      = the real merged fix (the high-quality baseline PR to compare to).
#
# Selection bias: prefer focused, single-package, BEHAVIOURAL fixes with a
# deterministic regression test. Flaky-timing test fixes are excluded (bad oracle).
#
# Status: candidates pool — pinned/confirmed-RED ones are marked `confirmed_red: true`.

cases:
