# yaml-language-server: $schema=feature.schema.json
id: dev-story-prd-design
kind: story-demo
title: PRD → Design via conversational clarification
tagline: Self-targeting dev-story — author kitsoki's own PRD and design by talking them through, with multi-round clarification and brief refinement.
summary: "The dev-story hub authoring kitsoki's OWN PRD and design: discover via multi-round clarification, publish the PRD to docs/prd/, carry it into design intake seeded from the PRD, refine the brief conversationally, publish the design to docs/proposals/, and auto-mint a feature ticket at issues/features/. No engine or story change, only the dev-story defaults. The canonical conversation-driven-development golden example — kitsoki on kitsoki."
demo:
  external: true
  # The intended record path is the binary-native `kitsoki tour` renderer
  # (slice 2 of the kitsoki-as-dependency epic). The current binary renderer can
  # advance the imported PRD state, but the chat surface does not remount into
  # the imported PRD room reliably enough for Pages CI. Keep this out of the
  # record/stage loop until that renderer gap is fixed; the stub spec remains to
  # satisfy the features:check bijection + the schema's tour=>demo rule.
  spec: tests/playwright/dev-story-prd-design-video.spec.ts
  artifactDir: dev-story-prd-design
  videoBase: dev-story-prd-design
  posterStep: ds-home-intro
  story: stories/dev-story
  flow: stories/dev-story/flows/prd_to_design_full.yaml
tour:
  export: DEV_STORY_PRD_DESIGN_TOUR_STEPS
  steps:
    - id: ds-home-intro
      route: home
      title: Author your own designs
      body: "kitsoki's dev-story hub authors kitsoki's OWN PRDs and designs — kitsoki on kitsoki. This tour walks the full PRD → Design loop: discovery with iterative clarification, two docs published, and an auto-minted feature ticket, all within one session."
      placement: center
      kind: explain
      advance: next
      waitForTarget: home-view
      dwellMs: 5500
      # drive: forward-referenced to slice 2's vocabulary. The home steps need
      # no engine driving; the chat-driving begins at ds-prd-discovery.
      drive: []
    - id: ds-story-card
      route: home
      target: story-card
      title: The dev-story instance
      body: "This is kitsoki-dev itself: the dev-story hub pointed at kitsoki's own repo. PRDs land in docs/prd/<slug>.md and designs in docs/proposals/<slug>.md, slug-named — kitsoki's own flat docs tree, with a feature ticket filed on publish."
      placement: right
      kind: explain
      advance: next
      waitForTarget: story-card
      dwellMs: 5500
      drive: []
    - id: ds-new-session
      route: home
      target: new-session-btn
      title: Spin up a run
      body: Click New session to start a fresh run of the hub against kitsoki itself. It opens in the chat, on the engineer's-day landing.
      placement: right
      kind: action
      advance: route-match
      advanceRoute: interactive
      waitForTarget: new-session-btn
      dwellMs: 3500
      drive: []
    - id: ds-prd-discovery
      route: interactive
      target: chat-transcript
      title: Talk through the PRD
      body: "`prd` opens a discovery conversation, not a form. We're authoring a concrete kitsoki feature — a `kitsoki tour` subcommand — so the talk stays grounded in what it must do: the interviewer takes the pitch and sharpens it into a crisp problem statement before any questions or drafting begin."
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6000
      # Self-driving (kitsoki tour, slice 2): the data form of the spec's
      # pre-step setup — type the verb, then the pitch, revealing each turn at a
      # readable pace. Bare prd__ states (dev-story is the root app).
      drive:
        - { type: wait-state, state: landing }
        - { type: click-intent, intent: go_prd }
        - { type: wait-state, state: prd.idle }
        - { type: reveal-turn }
        - { type: type-and-send, text: I want a kitsoki tour subcommand to render demo videos from the binary }
        - { type: wait-state, state: prd.idle }
        - { type: reveal-turn }
    - id: ds-prd-search
      route: interactive
      target: chat-transcript
      title: Scan for prior art first
      body: "Before a single question, kitsoki scouts the existing PRDs and proposals for overlap — so a duplicate idea is caught up front, not after a redundant draft is written. Here the scan comes back clean: a net-new capability, no overlapping work. `confirm` carries it into the clarification round."
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6000
      drive:
        - { type: type-and-send, text: ready }
        - { type: wait-state, state: prd.search }
        - { type: reveal-turn }
    - id: ds-prd-clarify
      route: interactive
      target: chat-transcript
      title: Clarify, in rounds
      body: "Discovery isn't one-shot. A structured clarification round asks the questions that most change the PRD — actors, the success metric — and the operator answers in the chat. The brief can loop back for ANOTHER round (here, the CI constraint: headless, ffmpeg + Chrome, no Node), so each round sharpens the spec before drafting. The accumulated Q&A becomes the PRD's grounding."
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6500
      drive:
        - { type: type-and-send, text: confirm }
        - { type: wait-state, state: prd.clarifying }
        - { type: reveal-turn }
        - { type: type-and-send, text: kitsoki maintainers; the metric is demos-rendered-without-Playwright }
        - { type: wait-state, state: prd.clarifying }
        - { type: reveal-turn }
        - { type: type-and-send, text: submit }
        - { type: wait-state, state: prd.brief }
        - { type: reveal-turn }
        - { type: type-and-send, text: clarify }
        - { type: wait-state, state: prd.clarifying }
        - { type: reveal-turn }
        - { type: type-and-send, text: "Must run headless in CI; ffmpeg + headless Chrome only, no Node" }
        - { type: wait-state, state: prd.clarifying }
        - { type: reveal-turn }
    - id: ds-prd-draft
      route: interactive
      target: chat-transcript
      title: Review the drafted PRD
      body: With the clarification rounds settled and a prior-art scan done, the author writes the PRD into a per-session workspace and surfaces it right here — title, confidence, and the full draft to review. Accept publishes it.
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6000
      drive:
        - { type: type-and-send, text: submit }
        - { type: wait-state, state: prd.brief }
        - { type: reveal-turn }
        - { type: type-and-send, text: confirm }
        - { type: wait-state, state: prd.references }
        - { type: reveal-turn }
        - { type: type-and-send, text: confirm }
        - { type: wait-state, state: prd.drafting }
        - { type: reveal-turn }
    - id: ds-prd-published
      route: interactive
      target: chat-transcript
      title: Published to docs/prd/
      body: "Self-targeting made concrete: the PRD published to kitsoki's OWN docs/prd/tour-subcommand.md — slug-named, in kitsoki's flat docs tree (no external retarget). The landing offers `continue` to carry it into the design phase."
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6500
      drive:
        - { type: type-and-send, text: accept }
        - { type: wait-state, state: prd_published }
        - { type: reveal-turn }
    - id: ds-design-intake
      route: interactive
      target: chat-transcript
      title: Carry it into design
      body: "`continue` seeds the design intake with a pointer to the PRD we just published — the chat shows the design conversation opening from exactly where the PRD left off, grounded in the doc, not a blank idea."
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6000
      drive:
        - { type: type-and-send, text: continue }
        - { type: wait-state, state: design }
        - { type: reveal-turn }
    - id: ds-design-refine
      route: interactive
      target: chat-transcript
      title: Refine the design brief
      body: "Design has its own clarification loop: the intake scaffolds a brief and a refiner flags the gaps (outline the components, define the drive-action contract, allocate the NFRs). The operator re-runs the refiner to rework it, then a quality check gates the brief before the author drafts — the same iterative shaping the PRD did with questions."
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6500
      drive:
        - { type: type-and-send, text: Realize the tour-subcommand PRD as a kitsoki runtime design }
        - { type: wait-state, state: design_search }
        - { type: reveal-turn }
        - { type: click-intent, intent: confirm }
        - { type: wait-state, state: design_refine }
        - { type: reveal-turn }
        - { type: type-and-send, text: outline the renderer components and the drive-action contract }
        - { type: wait-state, state: design_refine }
        - { type: reveal-turn }
    - id: ds-design-published
      route: interactive
      target: chat-transcript
      title: Design published + feature ticket
      body: "The design author writes kitsoki's own proposal shape and the chat reports it published to docs/proposals/tour-subcommand.md. Behind the scenes a feature ticket is auto-minted at issues/features/F-<timestamp>-tour-subcommand.md, linking back to the design — the implementation pipeline can pick it up immediately. This ticket mint is the one beat the external-target (gears-rust) walk skips."
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 6500
      drive:
        - { type: click-intent, intent: ready }
        - { type: wait-state, state: design_draft }
        - { type: reveal-turn }
        - { type: click-intent, intent: accept }
        - { type: wait-state, state: design_done }
        - { type: reveal-turn }
    - id: ds-done
      route: any
      title: The self-targeting dev loop
      body: "That's kitsoki's self-targeting dev loop: from idea to PRD to design to a filed feature ticket — all in one conversation, all self-governed. The SAME flow (minus the feature-ticket mint) drives the gears-rust repo when external targets have their own issue trackers. This is conversation-driven development. Hit '?' anytime to replay this tour."
      placement: center
      kind: explain
      advance: next
      dwellMs: 5500
      drive:
        - { type: click-intent, intent: go_main }
        - { type: wait-state, state: landing }
        - { type: reveal-turn }
