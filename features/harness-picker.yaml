# yaml-language-server: $schema=feature.schema.json
id: harness-picker
kind: feature
title: The harness picker — pluggable operators, live
tagline: Switch provider, model, and reasoning effort from the run header; every call is stamped with the operator that answered it.
summary: "kitsoki treats the LLM as a swappable operator. The run header carries a provider / model / effort picker — claude-native, codex, and synthetic backends — that takes effect on the next turn (substrate semantics, not a mid-call swap). Each agent call is stamped with the exact profile, model, and effort that produced it, shown inline on the trace row. The demo asks each operator to identify itself and watches the per-call provenance change as the picker switches — same recorded input, different operator, auditable output."
promo:
  order: 35
docs:
  - docs/tracing/run-status-ui.md
related:
  - agent-actions
  - trace-features
demo:
  spec: tests/playwright/harness-picker-video.spec.ts
  artifactDir: harness-picker
  videoBase: harness-picker-demo
  story: testdata/apps/agent_probe
  flow: testdata/apps/agent_probe/flows/who_are_you.flow.yaml
  hostCassette: testdata/apps/agent_probe/flows/who_are_you.cassette.yaml
qa:
  scenarios:
    - id: provider-switch-live
      title: The provider picker switches the operator from the run header
      required: true
      steps:
        - The run header shows a provider dropdown (the harness picker)
        - Selecting a different provider changes the active profile
    - id: per-call-provenance
      title: Each agent call is stamped with the operator that answered it
      required: true
      steps:
        - After a turn the trace row shows a harness profile / model label
        - Switching the provider and asking again shows a different label and identity
