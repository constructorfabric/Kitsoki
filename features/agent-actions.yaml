# yaml-language-server: $schema=feature.schema.json
id: agent-actions
kind: feature
title: Agent action transcripts
tagline: Every agent call's full tool-use stream — captured once, replayed byte-identically.
summary: "Every agent call — task, decide, ask, converse — runs a rich native execution stream of tool calls, reasoning, and MCP submissions. kitsoki captures that stream byte-verbatim to a per-call sidecar and renders it in the observer: typed rows with full tool I/O, a latency waterfall, running token/cost accrual, the decide guardrail arc, an honest cassette-vs-live diff, and a run-wide rollup."
promo:
  order: 0
  highlight: true
docs:
  - docs/tracing/run-status-ui.md
related:
  - trace-features
  - trace-introspection
demo:
  spec: tests/playwright/agent-actions-video.spec.ts
  artifactDir: agent-actions
  videoBase: agent-actions-demo
  posterStep: aa-intro-home
  story: stories/bugfix
  flow: stories/bugfix/flows/happy_llm.yaml
  hostCassette: stories/bugfix/flows/demo.cassette.yaml
tour:
  export: AGENT_ACTIONS_TOUR_STEPS
  steps:
    - id: aa-intro-home
      route: home
      title: Start at the story library
      body: Every run begins here, in the story library — each card is a deterministic story graph kitsoki runs the same way every time. We'll demonstrate agent-action transcripts on the bug-fix pipeline.
      placement: center
      kind: explain
      advance: next
      waitForTarget: home-view
      dwellMs: 5000
    - id: aa-intro-story
      route: home
      target: story-card
      title: The bug-fix pipeline
      body: This story hands a ticket to an autofix agent that reads the repo, edits code, and runs the build, then a judge gates the result. Those agent calls run rich native execution streams — exactly what the transcript drawer captures and replays.
      placement: right
      kind: explain
      advance: next
      waitForTarget: story-card
      dwellMs: 5500
    - id: aa-intro-start
      route: home
      target: new-session-btn
      title: Spin up a run
      body: Click New session to create a fresh, independently-traced run of the pipeline.
      placement: right
      kind: action
      advance: route-match
      advanceRoute: interactive
      waitForTarget: new-session-btn
      dwellMs: 3500
    - id: aa-intro-observe
      route: interactive
      target: observe-link
      title: Switch to the observer
      body: The agent-action transcripts live in the read-only observer view, where every recorded call can be inspected and replayed. Switch to it to open this run.
      placement: bottom
      kind: action
      advance: route-match
      advanceRoute: any
      waitForTarget: observe-link
      dwellMs: 4000
    - id: aa-welcome
      route: any
      title: Agent action transcripts
      body: "Every agent call — task, decide, ask, converse — runs a rich native execution stream: tool calls, reasoning, MCP submissions. kitsoki captures that stream byte-verbatim to a per-call sidecar, renders it here, and replays it deterministically from the cassette. We lead with the one move a coding agent can't make, then walk the full per-call stream."
      placement: center
      kind: explain
      advance: next
      dwellMs: 5000
    - id: aa-decide-guardrail
      route: any
      target: guardrail-row
      title: The decide guardrail arc
      body: "Lead with the move no coding agent can make: the host overruling the model mid-call. In the decide call the model submits its verdict via mcp__validator__submit, typed as a GUARDRAIL row — accept/reject + confidence, not a generic tool call. Here the first submit is REJECTED on a schema violation: the runtime, not the model, is in charge."
      placement: right
      kind: explain
      advance: next
      waitForTarget: guardrail-row
      dwellMs: 6000
    - id: aa-nudge
      route: any
      target: nudge-row
      title: The host nudge, made visible
      body: On rejection the host injects a coaching nudge as the next turn's stdin — invisible in a raw stream-json tee, because the input prompt is never echoed back. kitsoki writes a synthetic _kitsoki row so the full submit -> reject -> NUDGE -> re-submit -> accept round-trip, with iteration boundaries, reads as one sequence.
      placement: right
      kind: explain
      advance: next
      waitForTarget: nudge-row
      dwellMs: 6000
    - id: aa-affordance
      route: any
      target: agent-actions-affordance
      title: Agent actions, per call
      body: "Beyond the guardrail, every call's full stream is here too. Take the autofix task: select it in the trace and its detail pane gains an 'Agent actions (N)' affordance — N is the captured event count, an 18-step Read / Grep / thinking / Edit / Bash arc. Click it to open the drawer."
      placement: left
      kind: action
      advance: click-target
      waitForTarget: agent-actions-affordance
      dwellMs: 4500
    - id: aa-drawer
      route: any
      target: agent-actions-drawer
      title: The execution timeline
      body: "The drawer renders the native stream as typed rows: assistant reasoning, and each tool call's full input and output — the file Read, the Grep pattern, the Edit diff, the Bash command and its stdout. Every row collapses on its header, so a long arc stays scannable."
      placement: right
      kind: explain
      advance: next
      waitForTarget: agent-actions-drawer
      dwellMs: 5500
    - id: aa-row
      route: any
      target: agent-action-row
      title: Full tool I/O, collapsible
      body: Each step is a typed row anchored on a header you can click to expand or collapse its detail. No 200-rune preview, no names-only rollup — the command that ran, the file that was edited, and the bytes that came back, exactly as captured.
      placement: right
      kind: explain
      advance: next
      waitForTarget: agent-action-row
      dwellMs: 5000
    - id: aa-waterfall-toggle
      route: any
      target: agent-actions-mode-waterfall
      title: Switch to the waterfall
      body: Toggle the drawer's waterfall mode to see per-step latency. The offsets come from a parallel .timings sidecar stamped at capture — never re-derived from replay timing, so the bars are byte-stable.
      placement: left
      kind: action
      advance: click-target
      waitForTarget: agent-actions-mode-waterfall
      dwellMs: 3500
    - id: aa-waterfall
      route: any
      target: agent-action-waterfall
      title: Where the wall-clock went
      body: Each bar's width is that step's duration. The slow Bash or the long model turn stands out at a glance — the same headline view a dedicated agent-observability tool gives you, over data we already hold.
      placement: right
      kind: explain
      advance: next
      waitForTarget: agent-action-waterfall
      dwellMs: 5000
    - id: aa-accrual
      route: any
      target: agent-actions-accrual
      title: Running token + cost accrual
      body: The header accrues input/output tokens and cost across the whole call, not just the terminal total — so 'this call retried twice before it finished' is visible in the running tally, not buried.
      placement: left
      kind: explain
      advance: next
      waitForTarget: agent-actions-accrual
      dwellMs: 4500
    - id: aa-diff
      route: any
      target: transcript-diff-control
      title: Cassette-vs-live drift
      body: Because the transcript replays byte-identically from the cassette, the drawer can diff a fresh live run against the recorded one and flag tool-path drift — a capability no external tool has, because none has deterministic replay. Under pure replay there is no live run to compare, and the control says so honestly.
      placement: right
      kind: explain
      advance: next
      waitForTarget: transcript-diff-control
      dwellMs: 5500
    - id: aa-rollup-tab
      route: any
      target: tab-actions
      title: All agent actions for the run
      body: The Actions view mode rolls every transcript-bearing call across the whole run up under its turn and room — the kitsoki analog of a session replay. Click to open it.
      placement: bottom
      kind: action
      advance: click-target
      waitForTarget: tab-actions
      dwellMs: 3500
    - id: aa-rollup
      route: any
      target: agent-actions-rollup
      title: Every call, one place
      body: Each row is one agent call — its verb, call_id, and action count — and expands into its own full drawer. The whole run's agent activity in a single grouped view, the unit an operator actually reasons about.
      placement: top
      kind: explain
      advance: next
      waitForTarget: agent-actions-rollup
      dwellMs: 5000
    - id: aa-done
      route: any
      title: That's the full picture
      body: "You've seen the complete agent-action-transcripts stack: per-call typed rows with full tool I/O, the latency waterfall, running cost accrual, the decide submit -> reject -> nudge -> accept guardrail arc, the honest cassette-vs-live diff, and the run-wide session rollup — all over data captured once and replayed deterministically. Hit '?' anytime to replay this tour."
      placement: center
      kind: explain
      advance: next
      dwellMs: 5500
qa:
  scenarios:
    - id: tour-runs
      title: The agent-actions tour overlay runs end to end
      required: true
      steps:
        - A spotlight overlay with popover is visible on the home story library
        - The tour navigates from home into a session and then the observer view
        - A closing centered popover appears near the end of the video
    - id: drawer-typed-rows
      title: The per-call drawer shows typed rows with full tool I/O
      required: true
      steps:
        - An 'Agent actions (N)' affordance is visible on an agent call's detail pane
        - A drawer lists typed rows for tool calls and assistant reasoning
        - At least one expanded row shows real tool input and output text
    - id: waterfall-and-accrual
      title: Waterfall latency view and running token/cost accrual are shown
      required: true
      steps:
        - A waterfall view with horizontal duration bars is visible
        - A header region shows token and cost figures
    - id: guardrail-arc
      title: The decide guardrail arc is legible
      required: true
      steps:
        - A guardrail-styled row shows an accept/reject verdict
        - A distinct nudge row appears between a rejection and a re-submission
    - id: session-rollup
      title: The run-wide Actions rollup lists every transcript-bearing call
      required: true
      steps:
        - An Actions view groups agent calls by turn and room
        - A rollup row expands into a full drawer
