# yaml-language-server: $schema=feature.schema.json
id: design-walkthrough
kind: story-demo
title: Design pipeline walkthrough
tagline: From idea to published design doc — one conversation.
summary: "The dev-story design pipeline end to end on a realistic idea: intake, the prior-art scout, the refined brief, the brief judge, the generated draft, and the published design document — every advancing turn visible on the interactive chat surface."
demo:
  spec: tests/playwright/design-walkthrough.spec.ts
  artifactDir: design-walkthrough
  videoBase: design-walkthrough
  posterStep: pw-intro-home
  story: stories/dev-story
  flow: stories/dev-story/flows/design_tamagotchi_demo.yaml
tour:
  export: DESIGN_WALKTHROUGH_TOUR_STEPS
  steps:
    - id: pw-intro-home
      route: home
      title: Start with an idea
      body: "Every run begins here, in the story library. We'll walk the design pipeline on the dev-story: an idea becomes a scoped, scouted, brief-reviewed, and published design doc — all as one deterministic flow."
      placement: center
      kind: explain
      advance: next
      waitForTarget: home-view
      dwellMs: 5000
    - id: pw-intro-story
      route: home
      target: story-card
      title: The dev-story pipeline
      body: "This story takes a raw idea and runs it through scout search, brief refinement, a brief judge, draft authoring, and publishing. We'll demonstrate it with a realistic idea: tamagotchi-style virtual pets in the session UI."
      placement: right
      kind: explain
      advance: next
      waitForTarget: story-card
      dwellMs: 5500
    - id: pw-intro-start
      route: home
      target: new-session-btn
      title: Spin up a run
      body: Click New session to create a fresh, independently-traced run of the design pipeline.
      placement: right
      kind: action
      advance: route-match
      advanceRoute: interactive
      waitForTarget: new-session-btn
      dwellMs: 3500
    - id: pw-intake
      route: interactive
      target: chat-section
      title: Design intake
      body: Type your idea in the chat. kitsoki will name the design, search for conflicts, scaffold a brief, and draft a full design document — each stage visible on the live trace to the right.
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-section
      dwellMs: 6000
    - id: pw-idea-input
      route: interactive
      target: text-floor-input
      title: Entering the idea
      body: "We type the idea into the chat composer: a tamagotchi-style virtual pet widget for the session UI. Submitting mints a slug and kicks off the scout search for overlapping work."
      placement: top
      kind: explain
      advance: next
      waitForTarget: text-floor-input
      dwellMs: 5500
    - id: pw-search
      route: interactive
      target: chat-section
      title: Step 1 of 4 — scout search
      body: kitsoki searched existing designs for overlap. No conflicts found — the idea is clear to proceed. The current room shows at the top, and every stage lands on the live trace.
      placement: right
      kind: explain
      advance: next
      waitForTarget: current-state
      dwellMs: 5500
    - id: pw-search-intents
      route: interactive
      target: intent-actions
      title: Confirm or rethink
      body: The room offers exactly the moves it allows as buttons. "confirm" advances to the brief editor; "quit" drops back to the main menu. Nothing invalid is possible.
      placement: top
      kind: explain
      advance: next
      waitForTarget: intent-actions
      dwellMs: 5000
    - id: pw-refine
      route: interactive
      target: chat-section
      title: Step 2 of 4 — brief refinement
      body: "The idea has been distilled into a structured brief, opened in the IDE for editing. A refiner agent read the idea and flagged the key gaps: the pet's lifetime scope, and which UI surface hosts the widget."
      placement: right
      kind: explain
      advance: next
      waitForTarget: current-state
      dwellMs: 6000
    - id: pw-refine-ready
      route: interactive
      target: intent-actions
      title: Press ready for the judge
      body: When the brief looks right, press "ready". A judge reviews it for completeness — clear why, scoped change, named kind. If it passes, the pipeline advances.
      placement: top
      kind: explain
      advance: next
      waitForTarget: intent-actions
      dwellMs: 5000
    - id: pw-judge
      route: interactive
      target: intent-actions
      title: Brief approved
      body: "The brief judge's verdict is \"continue\": clear why, scoped change, kind is story. \"advance to draft\" is now the primary action — proceed to draft authoring."
      placement: top
      kind: explain
      advance: next
      waitForTarget: intent-btn-advance_brief
      dwellMs: 5500
    - id: pw-draft
      route: interactive
      target: chat-section
      title: Step 3 of 4 — design draft
      body: "The brief was approved, so a draft author wrote the full design document: a persistent virtual-pet widget in the session header, its mood tracking the story phase, state persisted in world vars."
      placement: right
      kind: explain
      advance: next
      waitForTarget: current-state
      dwellMs: 6000
    - id: pw-draft-intents
      route: interactive
      target: intent-actions
      title: Review, then accept to publish
      body: 'Review the draft, then "accept" runs the publish script: it moves the draft from the .workspace staging area to docs/proposals/tamagotchi-pet-ui.md.'
      placement: top
      kind: explain
      advance: next
      waitForTarget: intent-actions
      dwellMs: 5000
    - id: pw-done
      route: interactive
      target: chat-section
      title: Step 4 of 4 — design published
      body: docs/proposals/tamagotchi-pet-ui.md is now part of the queue. The full pipeline — idea → scout → brief → judge → draft → published — ran as one deterministic, fully-traced flow.
      placement: right
      kind: explain
      advance: next
      waitForTarget: current-state
      dwellMs: 6000
    - id: pw-final-state
      route: interactive
      target: state-badge
      title: That's the design pipeline
      body: "You've seen the whole flow on-camera: every input, button, and room view, with the live trace recording each stage. Hit '?' anytime to replay this tour."
      placement: bottom
      kind: explain
      advance: next
      waitForTarget: state-badge
      dwellMs: 5500
