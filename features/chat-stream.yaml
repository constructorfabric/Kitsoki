# yaml-language-server: $schema=feature.schema.json
id: chat-stream
kind: feature
title: Live agent streaming in chat
tagline: Watch the agent think and act, streamed live into the conversation.
summary: While an agent turn runs, the main chat streams its reasoning and tool calls live in a thinking bubble; when the turn finishes, the same interleaved activity feed stays reviewable — collapsed inside the agent's bubble, expandable to the exact feed you watched. The meta overlay renders agent work with the same shared components.
promo:
  order: 30
related:
  - agent-actions
demo:
  spec: tests/playwright/chat-stream-video.spec.ts
  artifactDir: chat-stream
  videoBase: chat-stream-demo
  posterStep: cs-intro-home
  story: stories/bugfix
  flow: stories/bugfix/flows/happy_llm.yaml
  hostCassette: stories/bugfix/flows/demo.cassette.yaml
tour:
  export: CHAT_STREAM_TOUR_STEPS
  steps:
    - id: cs-intro-home
      route: home
      title: The live agent chat
      body: "kitsoki's main chat is where an operator drives a run and watches the agent work. This tour shows the live turn stream: the agent's thinking and tool calls arriving in real time, and how that activity stays reviewable after the turn lands. We'll use the bug-fix pipeline."
      placement: center
      kind: explain
      advance: next
      waitForTarget: home-view
      dwellMs: 5000
    - id: cs-intro-story
      route: home
      target: story-card
      title: The bug-fix pipeline
      body: This story hands a ticket to an autofix agent that reads the repo, edits code, and runs the build. While that agent works, its native execution stream — reasoning and tool calls — flows straight into the chat you're about to watch.
      placement: right
      kind: explain
      advance: next
      waitForTarget: story-card
      dwellMs: 5000
    - id: cs-new-session
      route: home
      target: new-session-btn
      title: Spin up a run
      body: Click New session to create a fresh, independently-traced run. It opens directly in the chat.
      placement: right
      kind: action
      advance: route-match
      advanceRoute: interactive
      waitForTarget: new-session-btn
      dwellMs: 3500
    - id: cs-stream-start
      route: interactive
      target: intent-btn-start
      title: Kick off the autofix turn
      body: Drive the run the way an operator does — from the chat choice widget. The submit routes through the live turn-stream path, so the agent's execution stream arrives here in flight, not only after the turn lands.
      placement: top
      kind: action
      advance: click-target
      waitForTarget: intent-btn-start
      dwellMs: 3500
    - id: cs-stream-watch
      route: interactive
      target: thinking-bubble
      title: Thinking and tools, in arrival order
      body: "While the turn is in flight the bubble streams the agent's activity exactly as it happens: each 🧠 thought stays ABOVE the tool calls it explains — Read, Grep, then the reasoned Edit and the Bash build — never re-ordered, never pushed to the bottom."
      placement: top
      kind: explain
      advance: next
      waitForTarget: thinking-bubble
      dwellMs: 5000
    - id: cs-collapsed
      route: interactive
      target: chat-activity
      title: The turn lands — the activity stays
      body: "When the final view renders, the live bubble dissolves into the agent's reply — but the activity that produced it is NOT thrown away. It collapses into a one-line summary inside the bubble: the thought and tool-call counts, one click away."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-activity
      dwellMs: 5000
    - id: cs-expand
      route: interactive
      target: chat-activity-summary
      title: Expand it anytime
      body: Click the summary to reopen the full feed.
      placement: top
      kind: action
      advance: click-target
      waitForTarget: chat-activity-summary
      dwellMs: 3000
    - id: cs-expanded
      route: interactive
      target: chat-activity-feed
      title: The same feed, preserved
      body: The expanded feed is the exact stream you watched live — same 🧠 thoughts, same tool rows, same arrival order. The agent's reasoning never disappears behind its answer; every turn keeps its own audit trail in the conversation.
      placement: right
      kind: explain
      advance: next
      waitForTarget: chat-activity-feed
      dwellMs: 5500
    - id: cs-meta-open
      route: interactive
      target: meta-button
      title: The meta chat works the same way
      body: "kitsoki has a second chat: meta mode, where you talk ABOUT the story (or kitsoki itself) instead of driving it. Its agent streams thinking and tool calls too — and renders them with the exact same presentation you just watched. Open the ✦ Meta launcher."
      placement: top
      kind: action
      advance: click-target
      waitForTarget: meta-button
      dwellMs: 4000
    - id: cs-meta-mode
      route: interactive
      target: meta-mode-story-ask
      title: Ask about the story
      body: Story Q&A is a read-only conversation with an agent that can inspect the loaded story. Pick it to open the overlay chat.
      placement: left
      kind: action
      advance: click-target
      waitForTarget: meta-mode-story-ask
      dwellMs: 3500
    - id: cs-meta-ask
      route: interactive
      target: meta-composer-send
      title: Send a question
      body: Ask the agent something about the run. The turn streams over the same kind of live channel the main chat uses.
      placement: top
      kind: action
      advance: click-target
      waitForTarget: meta-composer-input
      dwellMs: 3500
    - id: cs-meta-stream
      route: interactive
      target: meta-row-streaming
      title: Same feed, different chat
      body: "While the meta agent works, its bubble streams the identical activity feed: the 🧠 thought above the tool call it explains, then the reply text as it arrives. One shared component renders both chats, so they can never drift apart."
      placement: right
      kind: explain
      advance: next
      waitForTarget: meta-overlay
      dwellMs: 5000
    - id: cs-meta-collapsed
      route: interactive
      target: meta-activity
      title: Preserved here too
      body: When the reply lands, the activity collapses into the same one-line summary inside the assistant message — thought and tool-call counts, one click away, exactly like the main chat.
      placement: right
      kind: explain
      advance: next
      waitForTarget: meta-activity
      dwellMs: 5000
    - id: cs-meta-expand
      route: interactive
      target: meta-activity-summary
      title: Expand it anytime
      body: Click the summary to reopen the meta turn's feed.
      placement: right
      kind: action
      advance: click-target
      waitForTarget: meta-activity-summary
      dwellMs: 3000
    - id: cs-meta-expanded
      route: interactive
      target: meta-activity-feed
      title: The same audit trail
      body: "The expanded feed is the stream you just watched — same 🧠 thought, same tool row, same order. Note the reply itself is NOT duplicated into the feed: the feed holds the reasoning, the bubble holds the answer."
      placement: right
      kind: explain
      advance: next
      waitForTarget: meta-activity-feed
      dwellMs: 5500
    - id: cs-meta-close
      route: interactive
      target: meta-close
      title: Back to the run
      body: Close the overlay — the meta conversation persists and reopens right where you left it.
      placement: left
      kind: action
      advance: click-target
      waitForTarget: meta-close
      dwellMs: 3000
    - id: cs-done
      route: interactive
      title: That's both chats
      body: "You've seen the full loop twice: drive a turn, watch the agent's thinking and tool calls stream in arrival order, and review the same feed — collapsed but never lost — after the answer renders. The main chat and the meta chat share one presentation, so what you learn in one reads the same in the other. Hit '?' anytime to replay this tour."
      placement: center
      kind: explain
      advance: next
      dwellMs: 5000
