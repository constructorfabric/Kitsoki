# yaml-language-server: $schema=feature.schema.json
id: gears-bugfix
kind: story-demo
title: Fix a real bug in gears, end to end
tagline: kitsoki's bug-fix pipeline reproduces, fixes, tests and validates a real open-source bug — gears-rust #4115.
summary: "The bugfix pipeline run against the real upstream constructorfabric/gears-rust repo, fixing issue #4115 (gear config can't be overridden via env vars in Kubernetes — dashes in gear names vs the C_IDENTIFIER rule). Every room is a deterministic state-machine beat: reproduce the bug, propose a root-cause fix, implement it in an isolated worktree, run the real cargo test suite, self-review the diff, validate end to end, and close out — ready to open a PR. The content is replayed verbatim from a real LLM run; the render is no-LLM and deterministic."
narrative: "This is the first 'fixing bugs' scenario working end to end, and the high-value gears integration: kitsoki, as a dependency, pointed at a real open-source Rust monorepo. The agent genuinely reproduced #4115 from the symptom, found figment's env-mapping gap, wrote the normalization fix plus regression tests, and the targeted cargo suite went green (316/316). What you see here is that real run, replayed deterministically — same frames every time, no API cost."
docs:
  - stories/gears-bugfix/app.yaml
  - stories/bugfix/README.md
related:
  - dev-story-bugfix
  - dev-story-prd-design
demo:
  external: true
  # Binary-native render: `kitsoki tour --feature gears-bugfix`. The spec is a
  # skipped stub that satisfies the features:check spec<->feature bijection.
  # Keep this out of the Pages record/stage loop while stories/gears-bugfix is
  # skipped by app loading due to its imported @exit:not-reproducible contract.
  spec: tests/playwright/gears-bugfix-video.spec.ts
  artifactDir: gears-bugfix
  videoBase: gears-bugfix-demo
  posterStep: gb-intro-home
  story: stories/gears-bugfix
  flow: stories/gears-bugfix/flows/tour.yaml
  hostCassette: stories/gears-bugfix/cassettes/tour.cassette.yaml
tour:
  export: GEARS_BUGFIX_TOUR_STEPS
  steps:
    - id: gb-intro-home
      route: home
      title: Fix a real bug in gears
      body: "kitsoki's bug-fix pipeline, pointed at the real open-source gears-rust repo. We'll fix issue #4115 end to end: reproduce → propose → implement → test → review → validate → done. Every room is a deterministic state-machine step kitsoki runs the same way every time — this whole walk is replayed from a real LLM run, no LLM in the loop now."
      placement: center
      kind: explain
      advance: next
      waitForTarget: home-view
      dwellMs: 6000
      drive: []
    - id: gb-intro-story
      route: home
      target: story-card
      title: The bug-fix pipeline
      body: "This card is the bug-fix pipeline, bound to an external checkout — the gears-rust Rust workspace — so the agent reads and edits real gear code in an isolated git worktree, and CI runs the project's real cargo tests. The ticket is gears-rust #4115. Let's run it."
      placement: right
      kind: explain
      advance: next
      waitForTarget: story-card
      dwellMs: 5500
      drive: []
    - id: gb-intro-start
      route: home
      target: new-session-btn
      title: Spin up a run
      body: Click New session to create a fresh, independently-traced run of the bug-fix pipeline against gears issue #4115.
      placement: right
      kind: action
      advance: route-match
      advanceRoute: interactive
      waitForTarget: new-session-btn
      dwellMs: 3500
      drive: []
    - id: gb-intro-observe
      route: interactive
      target: observe-link
      title: Drive here, observe there
      body: "We're on the drive view: each operator accept advances the pipeline exactly one room, and the state badge tracks where we are. The ticket — gears-rust #4115, gear config can't be overridden via env vars in Kubernetes — is already loaded. Let's reproduce it."
      placement: bottom
      kind: explain
      advance: next
      waitForTarget: observe-link
      dwellMs: 5500
      drive: []
    - id: gb-reproduce
      route: any
      target: chat-transcript
      title: Reproduce the bug
      body: "bf.reproducing — the agent confirms the bug is real before touching code. It traces figment's `Env::prefixed(\"APP__\").split(\"__\")` layer: it lowercases and splits on `__`, but never maps `_`→`-`, so `APP__GEARS__STATIC_AUTHZ_PLUGIN__…` resolves to a `static_authz_plugin` key that misses the dashed `static-authz-plugin` gear. Override silently dropped. Accept to move on."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 8000
      drive:
        - { type: wait-state, state: bf.idle }
        - { type: click-intent, intent: bf__start }
        - { type: wait-state, state: bf.reproducing }
        - { type: reveal-turn }
    - id: gb-propose
      route: any
      target: chat-transcript
      title: Propose a root-cause fix
      body: "bf.proposing — root cause confirmed. The fix: a post-extraction normalization pass in `AppConfig::load_layered` that deep-merges the underscore-keyed env override into the dashed YAML gear entry, reusing the existing `merge_json_objects` pattern. Accept the proposal."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 7000
      drive:
        - { type: click-intent, intent: bf__accept }
        - { type: wait-state, state: bf.proposing }
        - { type: reveal-turn }
    - id: gb-implement
      route: any
      target: chat-transcript
      title: Implement the fix
      body: "bf.implementing — the agent edits `libs/toolkit/src/bootstrap/config/mod.rs` in an isolated worktree: the normalization pass, a `merge_gear_env_override` helper, and regression tests. The change is committed to the fix/gh-4115 branch. Accept to run the tests."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 7000
      drive:
        - { type: click-intent, intent: bf__accept }
        - { type: wait-state, state: bf.implementing }
        - { type: reveal-turn }
    - id: gb-test
      route: any
      target: chat-transcript
      title: Run the real cargo tests
      body: "bf.testing — CI runs the project's real suite: `cargo test -p cf-gears-toolkit --features bootstrap`. The new regression tests prove the dashed-gear env override now applies, and the full module is green — 316 passed, 0 failed. The fix is proven, not just plausible. Accept to self-review."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 7500
      drive:
        - { type: click-intent, intent: bf__accept }
        - { type: wait-state, state: bf.testing }
        - { type: reveal-turn }
    - id: gb-review
      route: any
      target: chat-transcript
      title: Self-review the diff
      body: "bf.reviewing — the agent reviews its own diff against the worktree before anyone else sees it: scope is contained to one file, the normalization is guarded to the gears branch only, and unrelated config keys are untouched. Accept to validate end to end."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 7000
      drive:
        - { type: click-intent, intent: bf__accept }
        - { type: wait-state, state: bf.reviewing }
        - { type: reveal-turn }
    - id: gb-validate
      route: any
      target: chat-transcript
      title: Validate end to end
      body: "bf.validating — a full check: the crate builds with `cargo build --features bootstrap`, the whole suite passes under parallel execution (316/316), and the originally-reported symptom is gone — a dashed gear's config is now overridable by a Kubernetes-legal env var. Outcome: pass. Accept to close out."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 7500
      drive:
        - { type: click-intent, intent: bf__accept }
        - { type: wait-state, state: bf.validating }
        - { type: reveal-turn }
    - id: gb-done
      route: any
      target: chat-transcript
      title: Close out the fix
      body: "bf.done — the pipeline has reproduced, proposed, implemented, tested, reviewed and validated the fix. The close-out artifact captures the lessons and the metrics. The branch fix/gh-4115 is ready to open a pull request against gears-rust. One more accept resolves the ticket."
      placement: top
      kind: explain
      advance: next
      waitForTarget: chat-transcript
      dwellMs: 7500
      drive:
        - { type: click-intent, intent: bf__accept }
        - { type: wait-state, state: bf.done }
        - { type: reveal-turn }
    - id: gb-resolved
      route: any
      target: state-badge
      title: Ticket resolved, PR-ready
      body: "The fix is committed to fix/gh-4115, the ticket transitions to resolved, and the run reaches its PR-ready close-out. The whole arc — a real open-source bug, reproduced to PR-ready fix — ran as one deterministic, replayable graph."
      placement: left
      kind: explain
      advance: next
      waitForTarget: state-badge
      dwellMs: 6500
      drive:
        - { type: click-intent, intent: bf__accept }
        - { type: wait-state, state: shipped }
        - { type: dwell-ms, ms: 1500 }
    - id: gb-outro
      route: any
      title: That's a real bug, fixed
      body: "You watched kitsoki's bug-fix pipeline take a real, open-source gears-rust bug from a symptom to a tested, validated, PR-ready fix — every room a deterministic, replayable state-machine step, the content drawn from a genuine LLM run. Hit '?' anytime to replay this tour."
      placement: center
      kind: explain
      advance: next
      dwellMs: 6000
