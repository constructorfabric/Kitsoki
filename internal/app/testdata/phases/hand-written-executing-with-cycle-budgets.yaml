# Fixture for the cycle-budget + hand-written `_executing` interaction.
#
# Pins the CURRENT BEHAVIOUR (see phases_test.go::TestPhases_HandWritten_
# ExecutingOverride_DropsCycleBudgets): when a phase declares both
# `cycle_budgets:` and a hand-written `_executing` state, the expander
# silently skips the cycle-budget synthesis on the hand-written state.
# No Increment effect is grafted in, no guard tightening, no error
# fall-through transition.  This is option (a) in the test-audit's
# §"Surface 4 — Kitsoki TestPhases_HandWrittenOverride" — the known
# silent-drop gap in the expander.
#
# Use case for hand-writing `_executing`: a script-driven phase that
# wants to override the on_enter (host.run vs host.agent) AND keep a
# bespoke `on:` arc that the template can't model.  Today that author
# loses cycle-budget protection silently.
#
# A fix would either:
#   (1) move the applyCycleBudgets call OUT of the override-skip branch
#       (so it runs against the hand-written instance too), or
#   (2) raise a ValidationError telling the author to either drop
#       cycle_budgets or use the template's `_executing`.

app:
  id: hand-written-exec-cycle-budgets
  version: 0.1.0
  title: "hand-written _executing + cycle_budgets fixture"

hosts:
  - host.transport.post

world:
  cycle__phase_a__on_failure: { type: int, default: 0 }
  transport:                  { type: string, default: "tui" }
  thread:                     { type: string, default: "" }

intents:
  done:
    title: "Done"
    priority: 100
  on_failure:
    title: "Failure"
    priority: 50
  retry:
    title: "Retry"
    priority: 40
  custom:
    title: "Custom (hand-written only)"
    priority: 30

root: phase_a_executing

phase_templates:
  reviewed_phase:
    parameters:
      id:    { type: string, required: true }
      title: { type: string, required: true }
    states:
      "{id}_executing":
        description: "Templated executing for {{ tpl.title }}"
        on:
          done:
            - target: "{{ tpl.id }}_awaiting_reply"
              default: true
      "{id}_awaiting_reply":
        description: "Awaiting reply for {{ tpl.title }}"
      "{id}_error":
        description: "Error in {{ tpl.title }}"
        on:
          retry:
            - target: "{{ tpl.id }}_executing"

phases:
  template: reviewed_phase
  graph:

    # Phase A: hand-written `_executing` + cycle_budgets: { on_failure: 2 }.
    # The expectation under current behaviour is that the cycle-budget
    # synthesis is DROPPED on the hand-written `_executing` body.
    phase_a:
      title: "Phase A"
      next:
        on_failure: phase_b   # retry target if the budget were applied
      cycle_budgets:
        on_failure: 2

    # Phase B: cycle_budgets but NO hand-written override.  Used as a
    # positive control — proves the synthesis still works for phases
    # that DON'T trigger the silent-drop branch.
    phase_b:
      title: "Phase B"
      next:
        on_failure: phase_a   # retry target so the success branch synthesises
      cycle_budgets:
        on_failure: 2

states:

  # Hand-written `_executing` for phase_a.  Declares its own `custom` arc
  # (which the template doesn't), to make the hand-written body
  # unambiguously identifiable in the assertions.
  phase_a_executing:
    description: "Hand-written executing for Phase A"
    on:
      custom:
        - target: terminated
          default: true

  terminated:
    terminal: true
    description: "Done"
