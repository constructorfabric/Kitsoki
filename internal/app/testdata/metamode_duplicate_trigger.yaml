app:
  id: metamode-dup
  version: 0.1.0

root: foyer

states:
  foyer:
    description: "Foyer"
    view: "You are in the foyer."

# Two modes in the same `story` group both claim trigger `meta`.
# Per-group trigger uniqueness must reject this.
meta_modes:
  story.edit:
    group: story
    trigger: meta
    default: true
    agent: story-author
  story.rival:
    group: story
    trigger: meta
    agent: kitsoki-engineer
