<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitsoki Run Status — Dev</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
      h1 { margin-bottom: 1rem; font-size: 1.25rem; color: #e2e8f0; }
      .picker { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
      .picker label { color: #94a3b8; font-size: 0.875rem; }
      select {
        padding: 0.4rem 0.6rem; border: 1px solid #475569; background: #1e293b;
        color: #e2e8f0; cursor: pointer; border-radius: 4px; font-size: 0.875rem;
      }
      button {
        padding: 0.4rem 0.8rem; border: 1px solid #475569; background: #1e293b;
        color: #e2e8f0; cursor: pointer; border-radius: 4px; font-size: 0.875rem;
      }
      button:hover { background: #334155; }
      button.active { border-color: #60a5fa; color: #60a5fa; }
      #status { color: #94a3b8; font-size: 0.875rem; margin-top: 0.5rem; min-height: 1.5rem; }
      #status.error { color: #f87171; }
      #app-container { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <h1>Kitsoki Run Status — Dev Fixture Picker</h1>

    <div class="picker">
      <label for="fixture-select">Fixture:</label>
      <select id="fixture-select">
        <option value="">— select a fixture —</option>
        <option value="bugfix" selected>bugfix (default — from real flow)</option>
        <option value="tiny">tiny (committed)</option>
        <option value="in-progress">in-progress</option>
        <option value="completed">completed</option>
        <option value="edge-cases">edge-cases</option>
        <option value="oracle-rich">oracle-rich (oracle sub-renderers)</option>
      </select>
      <button id="btn-load-fixture">Load Fixture</button>
      <button id="btn-live">Live mode (/)</button>
    </div>
    <p id="status">No fixture loaded. Select a fixture above or use Live mode.</p>

    <!-- The Vue app mounts here when loaded via fixture. -->
    <div id="app-container"></div>

    <script type="module">
      const statusEl = document.getElementById('status');
      const select = document.getElementById('fixture-select');

      function setStatus(msg, isError = false) {
        statusEl.textContent = msg;
        statusEl.className = isError ? 'error' : '';
      }

      document.getElementById('btn-load-fixture').addEventListener('click', async () => {
        const name = select.value;
        if (!name) {
          setStatus('Please select a fixture first.', true);
          return;
        }
        setStatus(`Loading fixture "${name}"…`);
        try {
          const res = await fetch(`/tests/fixtures/${name}.snapshot.json`);
          if (!res.ok) {
            if (res.status === 404) {
              setStatus(`Fixture "${name}" not found. (Fixtures are generated by a parallel agent.)`, true);
            } else {
              setStatus(`HTTP ${res.status} fetching fixture "${name}".`, true);
            }
            return;
          }
          const snap = await res.json();
          window.__KITSOKI_SNAPSHOT__ = snap;
          setStatus(`Fixture "${name}" loaded. Redirecting…`);
          // Redirect to the hash router root which will pick up the snapshot.
          location.href = '/index.html';
        } catch (e) {
          setStatus(`Error loading fixture: ${e.message}`, true);
        }
      });

      document.getElementById('btn-live').addEventListener('click', () => {
        delete window.__KITSOKI_SNAPSHOT__;
        setStatus('Launching live mode…');
        location.href = '/index.html';
      });
    </script>
  </body>
</html>
