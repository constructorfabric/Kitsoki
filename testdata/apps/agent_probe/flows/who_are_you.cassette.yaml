# Host cassette for the agent-probe "who are you" demo. Three host.agent.ask
# episodes, matched in order (replay defaults to once), each returning a
# different model's identity. The web demo asks "who are you" three times,
# switching the harness provider between each — so the answers line up with the
# selected profile (claude-native → synthetic-claude → codex-native). The trace's
# profile/model label comes from the LIVE selection (stamped at dispatch), not
# from this file, so it always matches the picker.
kind: host_cassette
app_id: agent-probe
app_version: "0.1.0"
match_on: [handler]

episodes:
  - id: who_are_you_1
    match: { handler: host.agent.ask }
    response:
      data:
        ok: true
        stdout: "I am Claude (Anthropic), reachable."
    agent:
      verb: ask
      agent: ""
      model: ""
      duration_ms: 720
      response: "I am Claude (Anthropic), reachable."

  - id: who_are_you_2
    match: { handler: host.agent.ask }
    response:
      data:
        ok: true
        stdout: "I am GLM-5.1, served via synthetic.new, reachable."
    agent:
      verb: ask
      agent: ""
      model: ""
      duration_ms: 880
      response: "I am GLM-5.1, served via synthetic.new, reachable."

  - id: who_are_you_3
    match: { handler: host.agent.ask }
    response:
      data:
        ok: true
        stdout: "I am Codex (GPT-5, OpenAI), reachable."
    agent:
      verb: ask
      agent: ""
      model: ""
      duration_ms: 810
      response: "I am Codex (GPT-5, OpenAI), reachable."
