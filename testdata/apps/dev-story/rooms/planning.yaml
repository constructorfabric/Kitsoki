# Planning Room — break down issues into actionable plans.

states:
  planning_room:
    description: "Planning Room — break down epics, design approaches, estimate effort."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Workspace: "{{ world.current_workspace }}"
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "break down epic", hint: "produce child issues" }
                - { label: "design approach", hint: "architecture / interfaces" }
                - { label: "estimate effort", hint: "story points / sprints" }
                - { label: "save plan",       hint: "attach to Jira / workspace" }
                - { label: "go back",         hint: "return to previous room" }
    relevant_world: [current_workspace]
    relevant_slots: []
    on:
      break_down_epic:
        - target: planning_breakdown

      design_approach:
        - target: planning_design

      save_plan:
        - target: planning_room
          effects:
            - say: "[stub] Plan saved to Jira issue and workspace."

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  planning_breakdown:
    description: "Breaking down the epic into child issues..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Epic breakdown: {{ slots.epic }}"
          - heading: "Child issues"
          - list:
              marker: "1."
              items:
                - { label: "PROJ-201: Set up token schema",        hint: "1 SP" }
                - { label: "PROJ-202: Implement token refresh logic", hint: "3 SP" }
                - { label: "PROJ-203: Add middleware integration", hint: "2 SP" }
                - { label: "PROJ-204: Write unit tests",           hint: "2 SP" }
                - { label: "PROJ-205: Write integration tests",    hint: "2 SP" }
          - kv:
              pairs:
                Total:    "10 story points"
                Estimate: "2 sprints"
          - prose: "Save this plan?"
    relevant_world: []
    relevant_slots: []
    on:
      save_plan:
        - target: planning_room
          effects:
            - say: "[stub] Plan saved to Jira."

      go_back:
        - target: planning_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  planning_design:
    description: "Designing the architectural approach..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Design discussion: {{ slots.task }}"
          - prose: "[stub] Architectural options:"
          - heading: "Option A: Middleware-based refresh (recommended)"
          - list:
              items:
                - { label: "Pros", hint: "transparent to route handlers, single responsibility" }
                - { label: "Cons", hint: "1 round-trip per request near token expiry" }
          - heading: "Option B: Token manager singleton"
          - list:
              items:
                - { label: "Pros", hint: "reusable across handlers" }
                - { label: "Cons", hint: "global state, harder to test" }
          - heading: "Option C: Per-request refresh check"
          - list:
              items:
                - { label: "Pros", hint: "simple" }
                - { label: "Cons", hint: "duplicates refresh logic across handlers" }
          - prose: "Recommendation: Option A — add RefreshMiddleware before your router."
    relevant_world: []
    relevant_slots: []
    on:
      save_plan:
        - target: planning_room
          effects:
            - say: "[stub] Design decision saved."

      go_back:
        - target: planning_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false
