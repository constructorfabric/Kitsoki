# Oracle Room — interactive Claude Code session that persists across turns.
#
# Each ask_question / explore_area / brainstorm invokes `host.oracle.talk`
# (backed by the `claude -p --session-id <uuid>` CLI). The session_id is
# stored in world so subsequent turns resume the same Claude session — tools,
# context, and memory all carry over. Exiting the room (go_back / go_main)
# keeps the session_id; re-entering continues where the user left off.

states:
  oracle:
    mode: conversational
    description: "Oracle Room — an interactive Claude Code session. Ask anything; the session persists."
    view: |
      Oracle Room — interactive Claude session.

      Session: {{ world.oracle_session_id }}{{ if world.oracle_session_id == "" }}(new){{ end }}
      Turns so far: {{ world.oracle_turns }}

      Ask a question, explore an area of the codebase, or brainstorm an approach.
      Your session persists — leaving and returning resumes the same Claude context.

        ask question "..."
        explore area "..."
        brainstorm "..."

      Use "back" to return to the previous room (session is preserved).
    relevant_world: [oracle_session_id, oracle_turns]
    relevant_slots: []
    on:
      ask_question:
        - target: oracle_answering
          effects:
            - set: { oracle_question: "{{ slots.question }}" }

      explore_area:
        - target: oracle_answering
          effects:
            - set: { oracle_question: "Walk me through: {{ slots.area }}" }

      brainstorm:
        - target: oracle_answering
          effects:
            - set: { oracle_question: "Let's brainstorm: {{ slots.topic }}" }

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  oracle_answering:
    mode: conversational
    description: "Oracle is working on your question..."
    view: |
      Q: {{ world.oracle_question }}

      A: {{ world.oracle_answer }}{{ if world.oracle_answer == "" }}
      [Claude is thinking...]{{ end }}

      Ask another question, or use "back" to return (session is preserved).
      Session: {{ world.oracle_session_id }}
    relevant_world: [oracle_question, oracle_answer, oracle_session_id, oracle_turns]
    relevant_slots: []
    on_enter:
      - invoke: host.oracle.talk
        with:
          question: "{{ world.oracle_question }}"
          session_id: "{{ world.oracle_session_id }}"
        bind:
          oracle_answer: "answer"
          oracle_session_id: "session_id"
        on_error: oracle_error
      - set: { oracle_turns: "{{ world.oracle_turns + 1 }}" }
    on:
      ask_question:
        - target: oracle_answering
          effects:
            - set:
                oracle_question: "{{ slots.question }}"
                oracle_answer: ""

      explore_area:
        - target: oracle_answering
          effects:
            - set:
                oracle_question: "Walk me through: {{ slots.area }}"
                oracle_answer: ""

      brainstorm:
        - target: oracle_answering
          effects:
            - set:
                oracle_question: "Let's brainstorm: {{ slots.topic }}"
                oracle_answer: ""

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  oracle_error:
    description: "Oracle call failed — Claude was unavailable or errored."
    view: |
      Oracle error: {{ world.last_error }}

      Try asking again, or use "back" to leave the room.
      Session: {{ world.oracle_session_id }} (preserved for retry)
    relevant_world: [last_error, oracle_session_id]
    relevant_slots: []
    on:
      ask_question:
        - target: oracle_answering
          effects:
            - set:
                oracle_question: "{{ slots.question }}"
                oracle_answer: ""
                last_error: ""

      retry:
        - target: oracle_answering

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main
