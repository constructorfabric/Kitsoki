# Implementation Room — build a new feature or complete a Jira task.

states:
  implementation:
    description: "Implementation Room — build a feature or complete a task."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Workspace: "{{ world.current_workspace }}"
          - prose: "Steps: review task → plan → write code → write tests → open PR"
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "review task",   hint: "load Jira issue + acceptance criteria" }
                - { label: "plan approach", hint: "break down the work" }
                - { label: "write code",    hint: "iterative edit/run/test loop" }
                - { label: "write tests",   hint: "cover uncovered paths" }
                - { label: "open pr",       hint: "hand off to PR room" }
                - { label: "go back",       hint: "return to previous room" }
    relevant_world: [current_workspace]
    relevant_slots: []
    on:
      review_task:
        - target: impl_reviewing_task

      go_planning:
        - target: planning_room
          effects:
            - set: { prev_state: "implementation" }

      write_code:
        - target: impl_writing_code

      go_test:
        - target: test_room
          effects:
            - set: { prev_state: "implementation" }

      open_pr:
        - target: pr_room
          effects:
            - set: { prev_state: "implementation" }

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  impl_reviewing_task:
    description: "Loading task details from Jira..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Task details"
          - kv:
              pairs:
                Issue:         "PROJ-101: Implement auth refresh token rotation"
                Priority:      "High"
                Assignee:      "You"
                Sprint:        "Sprint 42"
                Story Points:  "5"
          - heading: "Acceptance criteria"
          - list:
              items:
                - "Tokens must auto-refresh when within 5 minutes of expiry"
                - "Refresh must be transparent to the API consumer"
                - "Add unit tests with >80% coverage"
                - "No breaking changes to the token schema"
          - kv:
              pairs:
                Linked designs: "auth-design.confluence.io/refresh-tokens"
    relevant_world: [current_workspace]
    relevant_slots: []
    on:
      go_planning:
        - target: planning_room
          effects:
            - set: { prev_state: "implementation" }

      write_code:
        - target: impl_writing_code

      go_back:
        - target: implementation

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  impl_writing_code:
    description: "Writing code — iterative edit/run/test loop."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Code writing session — {{ world.current_workspace }}"
          - heading: "LLM-assisted coding"
          - list:
              items:
                - { label: "Editing auth/token.go",         hint: "adding RefreshIfExpiring(ctx)" }
                - { label: "Editing api/middleware.go",     hint: "adding refresh middleware" }
          - prose: "Use the terminal to run tests and see output."
          - prose: "Use go terminal to switch to the terminal room."
    relevant_world: [current_workspace]
    relevant_slots: []
    on:
      go_terminal:
        - target: terminal_idle
          effects:
            - set: { prev_state: "implementation" }

      go_test:
        - target: test_room
          effects:
            - set: { prev_state: "implementation" }

      open_pr:
        - target: pr_room
          effects:
            - set: { prev_state: "implementation" }

      go_back:
        - target: implementation

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false
