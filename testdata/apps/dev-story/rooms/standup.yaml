# Standup Room — prepare daily standups and async status updates.

states:
  standup:
    description: "Standup Room — summarize yesterday, plan today, list blockers."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Current summary: "{{ world.standup_summary|default:\"(none)\" }}"
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "summarize yesterday", hint: "aggregate commits, PRs, Jira" }
                - { label: "plan today",          hint: "surface workspaces, issues" }
                - { label: "list blockers",       hint: "stalled work" }
                - { label: "post to slack",       hint: "send the update" }
                - { label: "go back",             hint: "return to previous room" }
    relevant_world: [standup_summary]
    relevant_slots: []
    on:
      summarize_yesterday:
        - target: standup_summarizing

      plan_today:
        - target: standup_planning

      post_to_slack:
        - when: "world.standup_summary != ''"
          target: standup_posting
        - default: true
          target: standup
          guard_hint: "Generate a summary first."
          effects:
            - say: "Generate a summary first with 'summarize yesterday' or 'plan today'."

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  standup_summarizing:
    description: "Aggregating yesterday's work..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Yesterday's summary"
          - prose: "[stub] Aggregated from commits, PRs, and Jira (last 24h):"
          - heading: "Completed"
          - list:
              items:
                - { label: "Reviewed PR #38 (billing discounts)", hint: "left 2 comments" }
                - { label: "Fixed auth token refresh bug (PROJ-102)", hint: "PR #42 open" }
                - { label: "Joined incident call",                hint: "prod database slow queries" }
          - heading: "In progress"
          - list:
              items:
                - { label: "Implementing auth refresh token rotation (PROJ-101)", hint: "60%" }
                - { label: "PR #42 waiting for CI" }
          - heading: "Generated standup"
          - code: |
              "Yesterday: Fixed auth token bug, reviewed billing PR. Today: Continue
              PROJ-101, get PR #42 merged. Blockers: CI flaky on auth tests."
    relevant_world: []
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Standup: Fixed auth bug, reviewed billing PR. Continuing PROJ-101.'"
        bind:
          standup_summary: "stdout"
        on_error: standup_error
    on:
      post_to_slack:
        - target: standup_posting

      plan_today:
        - target: standup_planning

      go_back:
        - target: standup

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  standup_planning:
    description: "Planning today's work..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Today's plan"
          - prose: "[stub] Active workspaces and Jira assignments:"
          - heading: "In-progress workspaces"
          - list:
              items:
                - { label: "feature-auth-v2", hint: "60% complete, PR #42 open" }
                - { label: "hotfix-billing",  hint: "ready to merge" }
          - heading: "Assigned Jira issues"
          - list:
              items:
                - { label: "PROJ-101: Implement auth refresh",         hint: "due: tomorrow" }
                - { label: "PROJ-104: Write billing module tests",     hint: "due: this sprint" }
          - heading: "Today's focus"
          - list:
              marker: "1."
              items:
                - { label: "Merge PR #42 (auth fix)", hint: "unblock after CI passes" }
                - { label: "Continue PROJ-101",       hint: "get to 80% by EOD" }
                - { label: "Start PROJ-104",          hint: "test writing" }
    relevant_world: []
    relevant_slots: []
    on:
      post_to_slack:
        - target: standup_posting

      go_back:
        - target: standup

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  standup_posting:
    description: "Posting standup to Slack..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Standup posted to #eng-standup"
          - code: |
              [stub] Slack message sent:
                "Yesterday: {{ world.standup_summary }}
                 Today: Continue auth work, merge PR #42.
                 Blockers: CI flaky."
    relevant_world: [standup_summary]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Slack message sent to #eng-standup'"
        on_error: standup_error
    on:
      go_back:
        - target: standup

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  standup_error:
    description: "Standup operation failed."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Error: "{{ world.last_error }}"
    relevant_world: [last_error]
    relevant_slots: []
    on:
      go_back:
        - target: standup

      go_main:
        - target: main
