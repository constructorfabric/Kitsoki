# Code Review Room — review teammates' PRs.

states:
  code_review:
    description: "Code Review Room — review PRs assigned to you."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Actions"
          - list:
              items:
                - { label: "list prs to review", hint: "fetch from GitHub" }
                - { label: "review pr",          hint: "summary + diff walkthrough" }
                - { label: "approve pr",         hint: "submit approval" }
                - { label: "go back",            hint: "return to previous room" }
    relevant_world: []
    relevant_slots: []
    on:
      list_review_prs:
        - target: code_review_listing

      review_pr:
        - target: code_review_reviewing

      approve_pr:
        - target: code_review_approving

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_listing:
    description: "Fetching PRs assigned for your review..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "PRs awaiting your review"
          - list:
              marker: "1."
              items:
                - { label: "PR #38: feat/billing-discounts (alice)", hint: "12 files, +450/-120" }
                - { label: "PR #39: fix/login-redirect (bob)",       hint: "3 files, +45/-12" }
                - { label: "PR #40: docs/api-update (charlie)",      hint: "2 files, +230/-15" }
          - prose: "Review one? Use \"review pr 38\" etc."
    relevant_world: []
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo '[{\"id\":38,\"title\":\"feat/billing-discounts\",\"author\":\"alice\"},{\"id\":39,\"title\":\"fix/login-redirect\",\"author\":\"bob\"}]'"
        on_error: code_review_error
    on:
      review_pr:
        - target: code_review_reviewing

      go_back:
        - target: code_review

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_reviewing:
    description: "Reviewing the PR..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Reviewing PR #{{ slots.pr_id }}"
          - kv:
              pairs:
                PR:            "#{{ slots.pr_id }}: feat/billing-discounts"
                Author:        "alice"
                Files changed: "12"
                Diff:          "+450 / -120"
          - heading: "Summary of changes"
          - list:
              items:
                - "Added discount percentage support to billing engine"
                - "Refactored Invoice.Calculate() to support promotions"
                - { label: "Added unit tests", hint: "coverage: 82%" }
          - heading: "Suggested comments"
          - list:
              items:
                - { label: "Line 45 (billing/invoice.go)",   hint: "use Decimal instead of float64" }
                - { label: "Line 78 (billing/discount.go)",  hint: "missing edge case for 100% discount" }
          - prose: "Leave review comments, approve, or request changes."
    relevant_world: []
    relevant_slots: []
    on:
      approve_pr:
        - target: code_review_approving

      go_back:
        - target: code_review

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_approving:
    description: "Submitting review approval..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Approval submitted for PR"
          - code: |
              [stub] Review posted: APPROVED
                "LGTM! One minor suggestion about decimal types left inline."
          - prose: "PR is approved. The author can merge when CI passes."
    relevant_world: []
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'PR approved: LGTM comment posted'"
        on_error: code_review_error
    on:
      go_back:
        - target: code_review

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_error:
    description: "Code review operation failed."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Error: "{{ world.last_error }}"
    relevant_world: [last_error]
    relevant_slots: []
    on:
      go_back:
        - target: code_review

      go_main:
        - target: main
