# Refactor Room — structural changes without altering behavior.

states:
  refactor_room:
    description: "Refactor Room — propose, apply, and verify structural code changes."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Workspace: "{{ world.current_workspace }}"
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "propose refactor",  hint: "describe intent, get plan" }
                - { label: "apply refactor",    hint: "execute with test guards" }
                - { label: "verify behavior",   hint: "run tests, compare outputs" }
                - { label: "go back",           hint: "return to previous room" }
    relevant_world: [current_workspace, proposal_result]
    relevant_slots: []
    on:
      propose_refactor:
        - target: refactor_proposing

      apply_refactor:
        - target: refactor_applying

      verify_behavior:
        - target: refactor_verifying

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  refactor_proposing:
    description: "Proposing a refactor plan..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Refactor proposal"
          - kv:
              pairs:
                Intent: "{{ slots.intent }}"
          - heading: "Change plan"
          - kv:
              pairs:
                Files affected: "auth/token.go, auth/refresh.go, api/auth_handler.go"
          - heading: "Changes"
          - list:
              marker: "1."
              items:
                - "Extract TokenValidator interface from Token struct"
                - "Move refresh logic to separate RefreshService type"
                - "Inject RefreshService via dependency injection in handlers"
                - "Update all callers to use the interface"
          - kv:
              pairs:
                Risk:           "Medium (touches 3 files, 12 call sites)"
                Test coverage:  "78% → 85% expected after refactor"
          - heading: "Atomic commits"
          - list:
              items:
                - "feat: extract TokenValidator interface"
                - "feat: extract RefreshService"
                - "refactor: inject RefreshService via DI"
                - "test: update tests for new structure"
          - prose: "Apply this refactor?"
    relevant_world: []
    relevant_slots: []
    on:
      apply_refactor:
        - target: refactor_applying

      cancel:
        - target: refactor_room

      go_back:
        - target: refactor_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  refactor_applying:
    description: "Applying the refactor..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Applying refactor to {{ world.current_workspace }}"
          - heading: "Progress"
          - list:
              items:
                - { label: "[1/4] Extracting TokenValidator interface", hint: "done" }
                - { label: "[2/4] Extracting RefreshService",           hint: "done" }
                - { label: "[3/4] Updating callers to use DI",          hint: "done" }
                - { label: "[4/4] Running tests to verify",             hint: "PASS" }
          - prose: "Refactor complete. All 12 call sites updated."
    relevant_world: [current_workspace]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Refactor applied: 3 files changed, 12 call sites updated'"
        bind:
          proposal_result: "stdout"
        on_error: refactor_error
    on:
      verify_behavior:
        - target: refactor_verifying

      open_pr:
        - target: pr_room
          effects:
            - set: { prev_state: "refactor_room" }

      go_back:
        - target: refactor_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  refactor_verifying:
    description: "Verifying behavior is unchanged..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Behavior verification"
          - prose: "[stub] Running full test suite + behavior comparison:"
          - code: |
              go test ./... -count=1
                ok  auth/token_test.go (0.15s)
                ok  auth/refresh_test.go (0.18s)
                ok  api/auth_handler_test.go (0.22s)
                ok  api/billing_test.go (0.31s)

              All 24 tests pass. No behavioral changes detected.
          - prose: "Behavior verified — safe to open PR."
    relevant_world: [current_workspace]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Behavior verified: all 24 tests pass, no behavioral changes'"
        on_error: refactor_error
    on:
      open_pr:
        - target: pr_room
          effects:
            - set: { prev_state: "refactor_room" }

      go_back:
        - target: refactor_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  refactor_error:
    description: "Refactor operation failed."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Error: "{{ world.last_error }}"
    relevant_world: [last_error]
    relevant_slots: []
    on:
      go_back:
        - target: refactor_room

      go_main:
        - target: main
