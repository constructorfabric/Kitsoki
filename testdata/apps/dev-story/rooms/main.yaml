# Main Room — landing/navigation hub.
# This is the root state. Transitioning here clears history (reset point).

states:
  main:
    description: "Main Room — your daily HQ. Navigate to any area of work from here."
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Welcome to dev-story. What would you like to do today?"
          - heading: "Available areas"
          # Proposal §5.2 worked example — the hand-aligned hint column
          # becomes a typed list; lipgloss re-aligns on resize.
          - list:
              items:
                - { label: "Start a new task",          hint: "jira search" }
                - { label: "Continue existing task",    hint: "workspace manager" }
                - { label: "Consult the Oracle",        hint: "general Q&A with Claude" }
                - { label: "Review a teammate's PR",    hint: "code review" }
                - { label: "Check my inbox",            hint: "notifications, background jobs" }
                - { label: "Prep for standup",          hint: "daily summary" }
                - { label: "Triage a production issue", hint: "incident room" }
        choices:
          - kv:
              pairs:
                Inbox: "{{ world.inbox_unread }} unread"
    relevant_world: [inbox_unread]
    relevant_slots: []
    on:
      go_jira:
        - target: jira_search
          effects:
            - set: { prev_state: "main" }

      go_workspace_manager:
        - target: workspace_manager
          effects:
            - set: { prev_state: "main" }

      go_oracle:
        - target: oracle
          push_history: false
          effects:
            - set: { prev_state: "main" }

      go_code_review:
        - target: code_review
          effects:
            - set: { prev_state: "main" }

      go_inbox:
        - target: inbox
          push_history: false
          effects:
            - set: { prev_state: "main" }

      go_standup:
        - target: standup
          effects:
            - set: { prev_state: "main" }

      go_incident:
        - target: incident
          effects:
            - set: { prev_state: "main" }

      go_main:
        - target: main
          effects:
            - set: { prev_state: "main" }

      go_back:
        - target: main
