# PR Room — review and improve your own PRs.

states:
  pr_room:
    description: "PR Room — review status, fix CI, resolve comments, and merge your PRs."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Workspace: "{{ world.current_workspace }}"
                PR status: "{{ world.pr_status|default:\"(unknown)\" }}"
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "check status",        hint: "checks, reviews, mergeability" }
                - { label: "fix ci",              hint: "LLM-assisted CI repair" }
                - { label: "resolve comments",    hint: "respond to reviewers" }
                - { label: "update pr description", hint: "regenerate summary" }
                - { label: "merge pr",            hint: "land after checks pass" }
                - { label: "go back",             hint: "return to previous room" }
    relevant_world: [current_workspace, pr_status]
    relevant_slots: []
    on:
      check_pr:
        - target: pr_status_checking

      fix_ci:
        - target: pr_fix_ci

      resolve_comments:
        - target: pr_resolve_comments

      update_pr_description:
        - target: pr_update_description

      merge_pr:
        - target: pr_merging

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  pr_status_checking:
    description: "Checking PR status..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "PR status for {{ world.current_workspace }}"
          - kv:
              pairs:
                PR:           "#42: feat/auth-v2 → main"
                Status:       "OPEN"
                Checks:       "3/3 passing"
                Reviews:      "1 approved, 1 changes requested"
                Mergeable:    "No (conflicts)"
                Last checked: "just now"
    relevant_world: [current_workspace]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo '{\"pr_id\":42,\"status\":\"open\",\"checks\":\"passing\",\"reviews\":\"1 approved\"}'"
        bind:
          pr_status: "stdout"
        on_error: pr_error
    on:
      go_back:
        - target: pr_room

      merge_pr:
        - target: pr_merging

      fix_ci:
        - target: pr_fix_ci

      resolve_comments:
        - target: pr_resolve_comments

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  pr_fix_ci:
    description: "Analyzing CI failures and generating fixes..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Fixing CI for PR #42"
          - heading: "CI failures detected"
          - list:
              items:
                - { label: "TestAuthRefresh", hint: "expected 200, got 401" }
                - { label: "Lint",            hint: "unused import in auth_handler.go" }
          - heading: "Suggested fixes"
          - list:
              marker: "1."
              items:
                - "Add mock token refresh in test setup"
                - "Remove unused import `fmt` from auth_handler.go"
          - prose: "Apply these fixes?"
    relevant_world: [current_workspace]
    relevant_slots: []
    on:
      accept:
        - target: pr_room
          effects:
            - set: { pr_status: "ci_fixed" }
            - say: "CI fixes applied. Run your checks again."

      cancel:
        - target: pr_room

      go_back:
        - target: pr_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  pr_resolve_comments:
    description: "Reviewing and resolving PR comments..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Resolving comments on PR #42"
          - heading: "Unresolved comments"
          - list:
              items:
                - { label: "Line 45 (auth.go)",      hint: "use constant-time comparison" }
                - { label: "Line 12 (auth_test.go)", hint: "add expired-token test case" }
          - heading: "Suggested responses"
          - list:
              marker: "1."
              items:
                - "Applied constant-time comparison via subtle.ConstantTimeCompare"
                - "Added TestExpiredToken test case"
          - prose: "Post these responses?"
    relevant_world: [current_workspace]
    relevant_slots: []
    on:
      accept:
        - target: pr_room
          effects:
            - say: "Comments resolved and responses posted."

      cancel:
        - target: pr_room

      go_back:
        - target: pr_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  pr_update_description:
    description: "Regenerating PR description..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Updated PR description for PR #42"
          - prose: "[stub] Generated from commit range main..feat/auth-v2:"
          - code: |
              ## Summary
              - Implement auth refresh token rotation
              - Add constant-time token comparison
              - Add unit tests for token expiry

              ## Test Plan
              - [x] Unit tests for token refresh
              - [x] Integration test for auth flow
              - [ ] Manual QA on staging
          - prose: "Post this description?"
    relevant_world: [current_workspace]
    relevant_slots: []
    on:
      accept:
        - target: pr_room
          effects:
            - say: "PR description updated."

      cancel:
        - target: pr_room

      go_back:
        - target: pr_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  pr_merging:
    description: "Merging the PR..."
    view:
      extends: "base"
      blocks:
        body:
          - heading: "Merging PR #42..."
          - kv:
              pairs:
                Mode:   "Squash"
                From:   "feat/auth-v2"
                To:     "main"
                Commit: "feat: implement auth refresh token rotation (#42)"
                Status: "Merged successfully."
          - prose: "Branch feat/auth-v2 can be deleted."
    relevant_world: [current_workspace]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'PR merged: feat/auth-v2 → main (squash)'"
        on_error: pr_error
    on:
      go_back:
        - target: workspace_room

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  pr_error:
    description: "PR operation failed."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Error: "{{ world.last_error }}"
    relevant_world: [last_error]
    relevant_slots: []
    on:
      go_back:
        - target: pr_room

      go_main:
        - target: main
