# Workspace Room — hub for a specific project workspace.

states:
  workspace_room:
    description: "Workspace Room — your project hub. Run commands, check PRs, navigate to sub-rooms."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Workspace: "{{ world.current_workspace }}"
                Root:      "{{ world.workspace_root }}"
        choices:
          - heading: "Available actions"
          - list:
              items:
                - { label: "terminal",     hint: "run commands" }
                - { label: "check pr",     hint: "PR status" }
                - { label: "fix bug",      hint: "bug fix room" }
                - { label: "implement",    hint: "implementation room" }
                - { label: "debug",        hint: "debug room" }
                - { label: "test",         hint: "test room" }
                - { label: "docs",         hint: "docs room" }
                - { label: "refactor",     hint: "refactor room" }
                - { label: "plan",         hint: "planning room" }
                - { label: "deploy",       hint: "deploy room" }
                - { label: "logs",         hint: "observability room" }
                - { label: "sync",         hint: "pull latest" }
                - { label: "open vscode",  hint: "open editor" }
                - { label: "jira",         hint: "search Jira" }
    relevant_world: [current_workspace, workspace_root]
    relevant_slots: []
    on:
      go_terminal:
        - target: terminal_idle
          effects:
            - set: { prev_state: "workspace_room" }

      check_pr:
        - target: pr_room
          effects:
            - set: { prev_state: "workspace_room" }

      go_bugfix:
        - target: bugfix
          effects:
            - set: { prev_state: "workspace_room" }

      go_implement:
        - target: implementation
          effects:
            - set: { prev_state: "workspace_room" }

      go_debug:
        - target: debug_room
          effects:
            - set: { prev_state: "workspace_room" }

      go_test:
        - target: test_room
          effects:
            - set: { prev_state: "workspace_room" }

      go_docs:
        - target: docs_room
          effects:
            - set: { prev_state: "workspace_room" }

      go_refactor:
        - target: refactor_room
          effects:
            - set: { prev_state: "workspace_room" }

      go_planning:
        - target: planning_room
          effects:
            - set: { prev_state: "workspace_room" }

      go_deploy:
        - target: deploy_room
          effects:
            - set: { prev_state: "workspace_room" }

      go_observability:
        - target: observability_room
          effects:
            - set: { prev_state: "workspace_room" }

      sync_workspace:
        - target: workspace_syncing
          effects:
            - set: { prev_state: "workspace_room" }

      open_vscode:
        - target: workspace_room
          effects:
            - invoke: host.run
              with:
                cmd: "echo 'Opening VS Code in {{ world.workspace_root }}'"
            - say: "Opening VS Code in {{ world.workspace_root }}..."

      go_jira:
        - target: jira_search
          effects:
            - set: { prev_state: "workspace_room" }

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main
          effects:
            - set: { prev_state: "main" }

      go_inbox:
        - target: inbox
          push_history: false

  workspace_syncing:
    description: "Syncing workspace with remote..."
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Syncing workspace: {{ world.current_workspace }}"
          - code: |
              [stub] Running: git pull --rebase && git submodule update --init --recursive
                Already up to date.
                Submodules updated.
          - prose: "Sync complete."
    relevant_world: [current_workspace]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Sync complete: workspace up to date'"
        on_error: workspace_sync_error
    on:
      go_back:
        - target: workspace_room

      go_terminal:
        - target: terminal_idle
          effects:
            - set: { prev_state: "workspace_room" }

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  workspace_sync_error:
    description: "Sync failed."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Error: "{{ world.last_error }}"
          - prose: "Resolve conflicts manually and try again."
    relevant_world: [last_error]
    relevant_slots: []
    on:
      go_back:
        - target: workspace_room

      go_main:
        - target: main
