# Flow 4: Oracle Room — enter → ask a question → session persists → exit → history returns.
# Oracle entry uses push_history: false (stackless), so back returns to the caller.
# The host.oracle.talk on_enter invocation is a no-op under the testrunner
# (result binding is not applied in replay), so oracle_answer remains empty —
# but oracle_question and oracle_session_id are set via effects and persist.
test_kind: flow
app: ../app.yaml
initial_state: main
initial_world:
  prev_state: "main"

turns:
  # Go to the Oracle Room from main
  - intent:
      name: go_oracle
      slots: {}
    expect_state: oracle
    expect_world:
      prev_state: "main"

  # Ask a general question — question is stored in world
  - intent:
      name: ask_question
      slots:
        question: "How does the auth token refresh work?"
    expect_state: oracle_answering
    expect_world:
      oracle_question: "How does the auth token refresh work?"

  # Ask another question (staying in oracle_answering)
  - intent:
      name: ask_question
      slots:
        question: "What are the trade-offs between Option A and B?"
    expect_state: oracle_answering
    expect_world:
      oracle_question: "What are the trade-offs between Option A and B?"

  # Exit Oracle — should return to prev_state (main).
  - intent:
      name: go_back
      slots: {}
    expect_state: main

expect_no_errors: true
