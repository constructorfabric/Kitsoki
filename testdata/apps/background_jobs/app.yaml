# background_jobs — minimal demo app for the background job lifecycle.
#
# Demonstrates:
#   - on_enter: firing host.run as background: true
#   - bind: capturing last_job_id synchronously in the same turn
#   - on_complete: reading last_job_result.stdout and writing world.result
#   - answer_clarification: mid-flight clarification round-trip
#
# See cmd/kitsoki/docs/app-schema.md §Background jobs for full field documentation.

app:
  id: background-jobs-demo
  version: 0.1.0
  title: "Background Jobs Demo"

hosts:
  - host.run
  - host.jobs.answer_clarification

# Sidebar authoring conversation: /meta opens a chat with story-author
# about this demo app's YAML.
meta_modes:
  story:
    trigger: meta
    label: "improve the story"
    banner: "*** meta:story — discussing background-jobs-demo ***"
    agent: story-author
    persist: true
    return:
      intent: onpath
      message: "back on the path."

world:
  result: { type: string, default: "" }
  last_job_id: { type: string, default: "" }

intents:
  enter:
    title: "Start"
    description: "Enter the running state and kick off the background job."
    examples: ["start", "run", "go"]

  answer_clarification:
    title: "Answer question"
    description: "Provide an answer to a mid-flight background-job question."
    slots:
      job_id: { type: string, required: true }
      answer: { type: string, required: true }

root: lobby

states:
  lobby:
    description: "Lobby — press start to launch a background job."
    view: |
      Lobby. Type 'start' to kick off the job.
    on:
      enter:
        - target: running

  running:
    description: "Running — the background job is in progress."
    view: |
      Running… job id: {{ world.last_job_id }}
      Result so far: {{ world.result }}
    on_enter:
      - invoke: host.run
        when: "world.last_job_id == ''"
        with:
          cmd: "sleep 1 && echo done"
        background: true
        bind:
          last_job_id: job_id
        on_complete:
          - set:
              result: "{{ world.last_job_result.stdout }}"
          - say: "Job complete. Output: {{ world.result }}"
    on:
      # answer_clarification is wired here so that when a background job calls
      # host.RequestClarification the user can answer from the running state.
      # The TUI teleports the user back here via the action_required notification.
      answer_clarification:
        - target: running
          effects:
            - invoke: host.jobs.answer_clarification
              with:
                job_id: "{{ slots.job_id }}"
                answer: "{{ slots.answer }}"

  done:
    terminal: true
    description: "Done — job finished."
    view: |
      Done. Result: {{ world.result }}
