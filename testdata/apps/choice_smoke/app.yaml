      # Test-rig intents — flow fixtures fire these directly to seed
      # world keys before exercising templated / gated spokes when
      # driving spokes in isolation. The walkthrough itself does its
      # seeding via arc effects, so these are unused by the chain.
      seed_day:
        - target: .
          effects:
            - set: { day: "{{ slots.value }}" }
      seed_money:
        - target: .
          effects:
            - set: { money: "{{ slots.value }}" }
      seed_show_secret_field:
