# Builds cross-platform kitsoki binaries and publishes them to a GitHub
# Release. Triggered by pushing a semver tag (vX.Y.Z). The binary embeds the
# runstatus SPA, so we build the SPA once (pnpm) and then cross-compile the Go
# binary for every target — modernc.org/sqlite is pure Go, so CGO_ENABLED=0
# cross-compilation needs no per-target C toolchain.
#
# Cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags:
      - "v*"
  # Lets you dry-run the build (no Release is published) against any ref.
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  release:
    name: Build & publish binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tools/runstatus/pnpm-lock.yaml

      # make web bundles the runstatus SPA and stages it into the //go:embed
      # dir so every cross-compiled binary serves a real UI (not the .gitkeep
      # stub the test build uses). features:check fails on stale generated
      # manifests, same gate as the site build.
      - name: Build embedded SPA
        run: make web

      # github.ref_name is the tag (vX.Y.Z) on a tag push; for a manual
      # workflow_dispatch dry-run it's the branch name.
      - name: Cross-compile binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          targets="darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64"
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            name="kitsoki_${VERSION}_${os}_${arch}"
            echo "building $name"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${VERSION}" \
                -o "build/kitsoki${ext}" ./cmd/kitsoki
            if [ "$os" = "windows" ]; then
              (cd build && zip -q "../dist/${name}.zip" "kitsoki${ext}")
            else
              tar -C build -czf "dist/${name}.tar.gz" "kitsoki${ext}"
            fi
            rm -f "build/kitsoki${ext}"
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kitsoki-binaries
          path: dist/*
          retention-days: 7

      # Only publish a Release on an actual tag push, never on the dispatch
      # dry-run.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
