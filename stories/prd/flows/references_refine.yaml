# references_refine — refine vs regenerate on the references room.
#
# `refine` revises the CURRENT list in place: it re-fires the researcher
# decide with revise=true (so prompts/references.md builds on
# current_references) and budgets via references_cycle. `regenerate` does
# the same re-fire but with revise=false (fresh search). `confirm` clears
# the revise flag. Asserts the revise flag + the dispatched decide args, so
# it's the call-site behaviour under test, not just the landing state.

test_kind: flow
app: ../app.yaml
initial_state: references
initial_world:
  idea:        "A CLI for X"
  workdir:     "."
  output_path: ".artifacts/prd.md"
  judge_mode:  "human"
  references:
    items:
      - { path: "docs/auth.md",        sections: "Tokens",  rationale: "token model the PRD must honour" }
      - { path: "docs/rate-limits.md", sections: "§3.2",    rationale: "rate-limit contract" }

host_handlers:
  # references on_enter runs the optional semantic pre-seed; empty hits = no embeddings.
  host.agent.search:
    data: { hits: [] }
  host.agent.decide:
    data:
      ok: true
      submitted:
        items:
          - { path: "docs/auth.md", sections: "Tokens", rationale: "token model the PRD must honour" }
  host.artifacts_dir:
    data: { ok: true, path: ".artifacts/out.md", message_id: "out#1" }
  host.agent.task:
    data:
      ok: true
      submitted:
        title:               "PRD: Example CLI"
        summary_markdown:    "## PRD: Example CLI\n\nA sufficiently long summary body to satisfy the schema minimum length for the prd_artifact summary_markdown field, covering problem, users, goals, and metrics."
        file_path:           ".artifacts/prd.md"
        confidence:          0.84
        needs_clarification: false
        follow_up_questions: []

turns:
  # Refine: revise the current list in place. The decide re-fires with
  # revise=true (the assertion that this is an in-place edit, not a fresh
  # search) and references_cycle increments.
  - intent: { name: refine, slots: { feedback: "drop the rate-limit doc" } }
    expect_state: references
    expect_world:
      references_revise: true
      references_cycle:  1
      refine_feedback:   "drop the rate-limit doc"

  # Regenerate: fresh search — same self re-fire but references_revise=false.
  - intent: { name: regenerate, slots: {} }
    expect_state: references
    expect_world:
      references_revise: false
      references_cycle:  2

  # Confirm → drafting; the revise flag is cleared on the way out.
  - intent: { name: confirm, slots: {} }
    expect_state: drafting
    expect_world:
      references_revise: false

expect_no_errors: true
