# mining.profile.yaml — scope config for mining prd coverage from real Claude
# Code transcripts. Co-located so the story self-describes its mine.
#
# This is SCOPE CONFIGURATION, not an auto-classifier. It tells coverage_prep.py
# (1) which sessions to distill (the grep prefilter), (2) which mined intents are
# in-scope (the action tags), and (3) which rooms are CANDIDATE owners of each
# action tag — a STARTING POINT for the human/LLM map in coverage.md, never an
# assertion. The verdict (CONFORMS / DIVERGES / FIXTURE-GAP / COVERAGE-GAP /
# OUT-OF-SCOPE) is assigned by reading the room bash + the recovered outcome, not
# mechanically. See docs/stories/story-coverage-mining.md.

story: prd

scope:
  # prep.py --grep words. RECALL-ONLY prefilter: a substring scan over the whole
  # raw jsonl, so it over-matches prose ("write up the requirements", "draft a
  # doc"). It widens the net; the real scoping is the human read in the map. The
  # words track the PRD-authoring stages: discovery, prior-art scout, draft.
  grep: [prd, "requirements doc", "product requirements", "write up", "draft the", "prior art", clarif, references]
  sample: recency          # mine how we work *now*
  max: 25

  # post-filter to these action tags (vocab/tags.yaml). The pipeline scouts existing
  # docs for prior art (explore-codebase over the docs tree), interrogates the idea
  # (review-feedback on the clarify/brief gates), and writes the document
  # (write-docs / implement-from-spec for the final draft). The non_goals boundary
  # below is enforced by reading user_text, not by tag.
  action_tags: [explore-codebase, write-docs, implement-from-spec, review-feedback]

# Candidate rooms per action tag — a starting point for the human map, joined into
# the coverage.md "candidate room" column by coverage_prep.py. Room ids are the
# files under stories/prd/rooms/.
owns:
  explore-codebase:     [search, references]
  write-docs:           [brief, drafting]
  implement-from-spec:  [drafting]
  review-feedback:      [clarifying, brief, references, drafting]

# v1 non-goals (stories/prd/README.md §"Resolved design decisions"): sharing /
# posting the finished PRD is explicitly out of scope for v1; this story authors a
# DOCUMENT, so generating code or running the downstream SDLC pipeline (cypilot's
# job) is out of scope. A matching intent is OUT-OF-SCOPE, not a gap. Matched
# against the verbatim user_text, since the action tags above are too coarse to
# separate these from in-scope work.
non_goals: [share-prd, post-prd, generate-code, run-pipeline, adr-or-design, decomposition]

# Marker substrings coverage_prep.py scans the verbatim user_text for to HINT that
# an in-scope-by-tag intent is actually an OUT-OF-SCOPE non_goal. A hint that
# routes the human's attention — never an automatic verdict.
non_goal_markers: ["share the prd", "post the prd", "send the prd", "implement the", "write the code", "generate code", "the adr", "the design doc", "decompose into phases", "phase plan"]
