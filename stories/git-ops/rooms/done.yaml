# done — terminal state.

states:

  done:
    description: "git-ops session complete."
    view:
      extends: "base"
      blocks:
        body:
          - prose: "git-ops session complete. Branch: {{ world.current_branch|default:'(unknown)' }}."
          - kv:
              pairs:
                Branch:      '{{ world.current_branch|default:"(unknown)" }}'
                Integration: '{{ world.integration_branch }}'
