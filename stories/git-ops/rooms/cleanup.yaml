# cleanup — remove worktree and branch after merge.

states:

  cleanup:
    description: "Remove a linked worktree and optionally its branch."
    relevant_world: [worktree_branch_name, working_dir, worktree_path, last_op_outcome]
    view:
      - prose: "Remove the worktree for {{ world.worktree_branch_name }}. Choose whether to also delete the branch."
      - kv:
          pairs:
            Branch:          '{{ world.worktree_branch_name|default:"(unknown)" }}'
            "Worktree path": '{{ world.worktree_path|default:"(current dir)" }}'
      - prose: "Operation failed: {{ world.last_op_output }}"
        when: "world.last_op_ok == false"
      - prose: "Cleanup complete: {{ world.last_op_output }}"
        when: "world.last_op_outcome == 'cleaned'"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "remove_all"
              hint:  "git worktree remove + git branch -d + prune (recommended after merge)"
              intent: remove_all
            - label: "remove_worktree"
              hint:  "remove only the worktree, keep the branch"
              intent: remove_worktree
            - label: "back"
              hint:  "return to hub without removing anything"
              intent: back
            - label: "look"
              intent: look
    on:
      remove_all:
        - target: main_ops
          effects:
            - invoke: host.run
              id: remove_wt_and_br
              with:
                cmd: bash
                args:
                  - "-c"
                  - |
                    set -e
                    export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
                    BR="{{ world.worktree_branch_name }}"
                    WT="{{ world.worktree_path }}"
                    [ -z "$WT" ] && WT="{{ world.working_dir }}"
                    git worktree remove "$WT" 2>&1 || true
                    git branch -d "$BR" 2>&1 || true
                    git worktree prune 2>&1 || true
                    echo "Removed worktree $WT and branch $BR"
                cwd: "{{ world.main_worktree_path }}"
              bind:
                last_op_output: stdout
                last_op_ok:     ok
              on_error: cleanup
            - set:
                last_op_outcome: "cleaned"
      remove_worktree:
        - target: main_ops
          effects:
            - invoke: host.run
              id: remove_wt_only
              with:
                cmd: bash
                args:
                  - "-c"
                  - |
                    set -e
                    export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
                    WT="{{ world.worktree_path }}"
                    [ -z "$WT" ] && WT="{{ world.working_dir }}"
                    git worktree remove "$WT" 2>&1 || true
                    git worktree prune 2>&1 || true
                    echo "Removed worktree $WT (branch kept)"
                cwd: "{{ world.main_worktree_path }}"
              bind:
                last_op_output: stdout
                last_op_ok:     ok
              on_error: cleanup
            - set:
                last_op_outcome: "cleaned"
      back:
        - when: "world.on_integration == true"
          target: main_ops
        - target: branch_ops
      look:
        - target: .
