# squash — squash all branch commits into one before merging.
#
# Single-script on_enter: checks descendant + gets diff stat.
# If not a descendant → route="re_rebase_needed".
# If ok → route="look" (stay in squash for agent).
# emit_intent: "{{ world.route }}" fires post-bind.
#
# Agent.decide runs always (once: true keyed on commit_message):
# skipped when commit_message is already set; runs when empty.

states:

  squash:
    description: "Squash all branch commits into one. Agent authors the message. Requires rebase first."
    relevant_world: [staged_diff_stat, commit_message, current_branch, integration_branch,
                     squash_mode, descendant_ok]
    view:
      - kv:
          pairs:
            Branch:      '{{ world.current_branch|default:"(unknown)" }}'
            Integration: '{{ world.integration_branch }}'
      - heading: "Descendant check failed — rebase required"
        when: "world.last_op_outcome == 're_rebase_needed'"
      - prose: "HEAD is not a descendant of {{ world.integration_branch }}. Run rebase first — git reset --soft would stage the full reverse-diff on a diverged branch."
        when: "world.last_op_outcome == 're_rebase_needed'"
      - heading: "Diff stat (branch vs integration)"
        when: "world.last_op_outcome != 're_rebase_needed'"
      - template: '{{ world.staged_diff_stat|default:"(pending — gathering diff)" }}'
        when: "world.last_op_outcome != 're_rebase_needed'"
      - heading: "Proposed squash commit message"
        when: "world.last_op_outcome != 're_rebase_needed'"
      - template: '{{ world.commit_message|default:"(pending — agent is authoring)" }}'
        when: "world.last_op_outcome != 're_rebase_needed'"
      - prose: "Operation failed: {{ world.last_op_output }}"
        when: "world.last_op_ok == false && world.last_op_outcome != 're_rebase_needed'"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "accept"
              hint:  "git reset --soft + commit with this message"
              intent: accept
              when:  "world.commit_message != '' && world.descendant_ok == true"
            - label: "rebase"
              hint:  "rebase onto integration first (required)"
              intent: rebase
              when:  "world.last_op_outcome == 're_rebase_needed'"
            - label: "edit_message message=…"
              hint:  "replace the agent message"
              intent: edit_message
              when:  "world.commit_message != '' && world.descendant_ok == true"
            - label: "regenerate"
              hint:  "ask agent for a new squash message"
              intent: regenerate
              when:  "world.descendant_ok == true"
            - label: "back"
              hint:  "return to hub"
              intent: back
            - label: "look"
              intent: look
    on_enter:
      # Single script: descendant check + diff stat.
      # Returns {descendant_ok, staged_diff_stat, route, squash_mode}.
      - invoke: host.run
        id: descendant_check
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -e
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              INTEGRATION="{{ world.integration_branch }}"
              if ! git merge-base --is-ancestor "$INTEGRATION" HEAD 2>/dev/null; then
                jq -n '{descendant_ok:false,staged_diff_stat:"",route:"re_rebase_needed",squash_mode:false}'
                exit 0
              fi
              DIFF=$(git diff --stat "${INTEGRATION}..HEAD" --no-color 2>/dev/null || echo "")
              jq -n --arg diff "$DIFF" \
                '{descendant_ok:true,staged_diff_stat:$diff,route:"look",squash_mode:true}'
          cwd: "{{ world.working_dir }}"
        bind:
          descendant_ok:    "stdout_json.descendant_ok"
          staged_diff_stat: "stdout_json.staged_diff_stat"
          route:            "stdout_json.route"
          squash_mode:      "stdout_json.squash_mode"
          last_op_outcome:  "stdout_json.route"
        on_error: squash
      # Static emit target so isDecisionGate=false → staged mode doesn't block.
      # Guard FALSE with default route="look" → machine doesn't emit prematurely.
      # DispatchPostBindEmits fires "re_rebase_needed" when route="re_rebase_needed" post-bind.
      - when: "world.route == 're_rebase_needed'"
        emit_intent: re_rebase_needed
      # Agent runs when commit_message is unset. once: true skips if already set.
      # Args re-rendered by orchestrator against post-bind world (staged_diff_stat set).
      - invoke: host.agent.decide
        once: true
        id: squash_message
        with:
          prompt: prompts/commit_message.md
          schema: schemas/commit_verdict.json
          args:
            staged_diff_stat:   "{{ world.staged_diff_stat }}"
            current_branch:     "{{ world.current_branch }}"
            refactor_mode:      "{{ world.refactor_mode }}"
            squash_mode:        true
            integration_branch: "{{ world.integration_branch }}"
        bind:
          commit_message: "submitted.message"
        on_error: squash
    on:
      re_rebase_needed:
        - target: squash
      on_main:
        - target: main_ops
      look:
        - target: .
      accept:
        - when: "world.commit_message != '' && world.descendant_ok == true"
          target: .
          effects:
            - invoke: host.run
              id: git_squash_commit
              with:
                cmd: bash
                args:
                  - "-c"
                  - |
                    set -e
                    export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
                    git reset --soft "{{ world.integration_branch }}"
                    git commit -m "{{ world.commit_message }}"
                cwd: "{{ world.working_dir }}"
              bind:
                last_op_output: stdout
                last_op_ok:     ok
              on_error: squash
            - when: "world.last_op_ok == true"
              set:
                commit_message:   ""
                staged_diff_stat: ""
                squash_mode:      false
                rebase_done:      true
                route:            "look"
            - when: "world.last_op_ok == true"
              emit_intent: on_main
        - target: .
          effects:
            - say: "No commit message — use regenerate or edit_message."
      edit_message:
        - target: squash
          effects:
            - set:
                commit_message: "{{ slots.message }}"
      regenerate:
        - target: squash
          effects:
            - set:
                commit_message:   ""
                staged_diff_stat: ""
                route:            "look"
      rebase:
        - target: rebase
          effects:
            - set:
                rebase_done:     false
                last_op_outcome: ""
                descendant_ok:   false
                route:           "look"
      back:
        - when: "world.on_integration == true"
          target: main_ops
          effects:
            - set:
                squash_mode:      false
                staged_diff_stat: ""
                commit_message:   ""
                descendant_ok:    false
                last_op_outcome:  ""
                route:            "look"
        - target: branch_ops
          effects:
            - set:
                squash_mode:      false
                staged_diff_stat: ""
                commit_message:   ""
                descendant_ok:    false
                last_op_outcome:  ""
                route:            "look"
