# idle — detect branch and worktree context, route to hub.
#
# Single JSON-emitting bash script gathers all context in one trace entry,
# binds atomically. emit_intent: "{{ world.route }}" fires after bind,
# routing to main_ops or branch_ops.
#
# once: true ensures /reload does not re-detect (use look from the hub
# to refresh, which re-runs the hub's on_enter status-gather).

states:

  idle:
    description: "Detecting branch and worktree context."
    relevant_world: [current_branch, on_integration, integration_branch]
    view:
      - prose: "Detecting branch… routed to hub automatically."
      - kv:
          pairs:
            Branch:      '{{ world.current_branch|default:"(detecting…)" }}'
            Integration: '{{ world.integration_branch }}'
    on_enter:
      - invoke: host.run
        once: true
        id: detect_context
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -e
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              INTEGRATION="{{ world.integration_branch }}"
              git update-index -q --refresh 2>/dev/null || true
              BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
              if [ "$BRANCH" = "$INTEGRATION" ]; then
                ON_INTEGRATION=true
              else
                ON_INTEGRATION=false
              fi
              AHEAD=$(git rev-list --count "${INTEGRATION}..HEAD" 2>/dev/null || echo 0)
              BEHIND=$(git rev-list --count "HEAD..${INTEGRATION}" 2>/dev/null || echo 0)
              UNCOMMITTED=$(git status --porcelain 2>/dev/null | grep -c . || true)
              if [ "$UNCOMMITTED" -gt 0 ]; then HAS_UNCOMMITTED=true; else HAS_UNCOMMITTED=false; fi
              MAIN_WT=$(git worktree list --porcelain 2>/dev/null \
                | awk '/^worktree / {wt=$2} /^branch refs\/heads\/'"$INTEGRATION"'$/ {print wt}')
              [ -z "$MAIN_WT" ] && MAIN_WT="{{ world.working_dir }}"
              WORKTREES=$(git worktree list --porcelain 2>/dev/null \
                | awk 'BEGIN{RS=""; FS="\n"} {wt=""; br=""; for(i=1;i<=NF;i++){if($i~/^worktree /)wt=substr($i,10); if($i~/^branch /)br=substr($i,8);} if(wt!="")printf "%s|%s\n",wt,br}' \
                | head -20)
              GIT_DIR=$(git rev-parse --git-dir 2>/dev/null || echo ".git")
              MERGE_IN_PROGRESS=false
              if [ -f "$GIT_DIR/MERGE_HEAD" ] || [ -d "$GIT_DIR/rebase-apply" ] || [ -d "$GIT_DIR/rebase-merge" ]; then
                MERGE_IN_PROGRESS=true
              fi
              NO_COMMON=false
              if ! git merge-base HEAD "$INTEGRATION" >/dev/null 2>&1; then
                NO_COMMON=true
              fi
              if [ "$ON_INTEGRATION" = "true" ]; then ROUTE="on_main"; else ROUTE="on_branch"; fi
              jq -n \
                --arg branch    "$BRANCH" \
                --arg route     "$ROUTE" \
                --arg main_wt   "$MAIN_WT" \
                --arg worktrees "$WORKTREES" \
                --argjson on_integration    "$ON_INTEGRATION" \
                --argjson ahead             "$AHEAD" \
                --argjson behind            "$BEHIND" \
                --argjson has_uncommitted   "$HAS_UNCOMMITTED" \
                --argjson merge_in_progress "$MERGE_IN_PROGRESS" \
                --argjson no_common         "$NO_COMMON" \
                '{branch:$branch, route:$route, main_worktree_path:$main_wt,
                  worktree_list:{raw:$worktrees}, on_integration:$on_integration,
                  commits_ahead:$ahead, commits_behind:$behind,
                  has_uncommitted:$has_uncommitted, merge_in_progress:$merge_in_progress,
                  no_common_ancestor:$no_common}'
          cwd: "{{ world.working_dir }}"
        bind:
          current_branch:     "stdout_json.branch"
          route:              "stdout_json.route"
          on_integration:     "stdout_json.on_integration"
          main_worktree_path: "stdout_json.main_worktree_path"
          worktree_list:      "stdout_json.worktree_list"
          commits_ahead:      "stdout_json.commits_ahead"
          commits_behind:     "stdout_json.commits_behind"
          has_uncommitted:    "stdout_json.has_uncommitted"
          merge_in_progress:  "stdout_json.merge_in_progress"
          no_common_ancestor: "stdout_json.no_common_ancestor"
        on_error: branch_ops
      - emit_intent: "{{ world.route }}"
    on:
      on_main:
        - target: main_ops
      on_branch:
        - target: branch_ops
      look:
        - target: .
      quit:
        - target: done
