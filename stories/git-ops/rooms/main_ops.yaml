# main_ops — hub for the integration branch.
#
# on_enter refreshes context on every return (no once:) so the status
# display is current after a merge, pull, or cleanup.

states:

  main_ops:
    description: "Integration-branch hub. Manage worktrees, merge branches, pull upstream."
    relevant_world: [current_branch, integration_branch, has_uncommitted, commits_behind,
                     worktree_list, on_integration, no_common_ancestor, merge_in_progress]
    view:
      - kv:
          pairs:
            Branch:      '{{ world.current_branch|default:"(detecting…)" }}'
            Uncommitted: '{% if world.has_uncommitted %}yes{% else %}clean{% endif %}'
            Behind:      '{{ world.commits_behind }} commits behind upstream'
            Worktrees:   '{{ world.worktree_list.raw|default:"(none)" }}'
      - prose: "Last operation failed: {{ world.last_op_output|default:'(no output)' }}"
        when: "world.last_op_ok == false"
      - prose: "Post-merge build failed. Use retry to recheck or rollback to abort the merge."
        when: "world.last_op_outcome == 'post_merge_test_fail'"
      - prose: "WARNING: this branch has no common ancestor with {{ world.integration_branch }}. Merge and rebase are unavailable."
        when: "world.no_common_ancestor == true"
      - prose: "A merge or rebase is already in progress in this worktree."
        when: "world.merge_in_progress == true"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "pull"
              hint:  "git pull --rebase from upstream"
              intent: pull
            - label: "merge_branch"
              hint:  "merge a named feature branch into {{ world.integration_branch }}"
              intent: merge_branch
            - label: "worktree_create"
              hint:  "create a new linked worktree under .worktrees/"
              intent: worktree_create
            - label: "worktree_list"
              hint:  "list and classify existing worktrees"
              intent: worktree_list
            - label: "cleanup"
              hint:  "remove a worktree and its branch"
              intent: cleanup
            - label: "stage"
              hint:  "classify and stage working-tree changes"
              intent: stage
            - label: "commit"
              hint:  "agent-authored commit message"
              intent: commit
            - label: "undo"
              hint:  "undo the last commit"
              intent: undo
            - label: "checkpoint label=…"
              hint:  "save a restorable snapshot before trying something risky"
              intent: checkpoint
            - label: "restore label=…"
              hint:  "roll back to a saved checkpoint"
              intent: restore
            - label: "retry"
              hint:  "retry the post-merge build check"
              intent: retry
              when:  "world.last_op_outcome == 'post_merge_test_fail'"
            - label: "rollback"
              hint:  "abort the merge after build failure"
              intent: rollback
              when:  "world.last_op_outcome == 'post_merge_test_fail'"
            - label: "quit"
              hint:  "exit git-ops"
              intent: quit
            - label: "look"
              intent: look
    on_enter:
      - invoke: host.run
        id: refresh_main
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -e
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              git update-index -q --refresh 2>/dev/null || true
              BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
              INTEGRATION="{{ world.integration_branch }}"
              AHEAD=$(git rev-list --count "${INTEGRATION}..HEAD" 2>/dev/null || echo 0)
              BEHIND=$(git rev-list --count "HEAD..${INTEGRATION}" 2>/dev/null || echo 0)
              UNCOMMITTED=$(git status --porcelain 2>/dev/null | grep -c . || true)
              if [ "$UNCOMMITTED" -gt 0 ]; then HAS_UNCOMMITTED=true; else HAS_UNCOMMITTED=false; fi
              MAIN_WT=$(git worktree list --porcelain 2>/dev/null \
                | awk '/^worktree / {wt=$2} /^branch refs\/heads\/'"$INTEGRATION"'$/ {print wt}')
              [ -z "$MAIN_WT" ] && MAIN_WT="{{ world.working_dir }}"
              WORKTREES=$(git worktree list --porcelain 2>/dev/null \
                | awk 'BEGIN{RS=""; FS="\n"} {wt=""; br=""; for(i=1;i<=NF;i++){if($i~/^worktree /)wt=substr($i,10); if($i~/^branch /)br=substr($i,8);} if(wt!="")printf "%s|%s\n",wt,br}' \
                | head -20)
              GIT_DIR=$(git rev-parse --git-dir 2>/dev/null || echo ".git")
              MERGE_IN_PROGRESS=false
              if [ -f "$GIT_DIR/MERGE_HEAD" ] || [ -d "$GIT_DIR/rebase-apply" ] || [ -d "$GIT_DIR/rebase-merge" ]; then
                MERGE_IN_PROGRESS=true
              fi
              NO_COMMON=false
              if ! git merge-base HEAD "$INTEGRATION" >/dev/null 2>&1; then NO_COMMON=true; fi
              UPSTREAM=$(git rev-parse --abbrev-ref "@{u}" 2>/dev/null || echo "")
              if [ -n "$UPSTREAM" ]; then HAS_TRACKING=true; else HAS_TRACKING=false; fi
              jq -n \
                --arg branch "$BRANCH" \
                --arg main_wt "$MAIN_WT" \
                --arg worktrees "$WORKTREES" \
                --argjson ahead "$AHEAD" \
                --argjson behind "$BEHIND" \
                --argjson has_uncommitted "$HAS_UNCOMMITTED" \
                --argjson merge_in_progress "$MERGE_IN_PROGRESS" \
                --argjson no_common "$NO_COMMON" \
                --argjson upstream_tracking "$HAS_TRACKING" \
                '{branch:$branch, main_worktree_path:$main_wt,
                  worktree_list:{raw:$worktrees}, commits_ahead:$ahead,
                  commits_behind:$behind, has_uncommitted:$has_uncommitted,
                  merge_in_progress:$merge_in_progress,
                  no_common_ancestor:$no_common,
                  upstream_tracking:$upstream_tracking}'
          cwd: "{{ world.working_dir }}"
        bind:
          current_branch:     "stdout_json.branch"
          main_worktree_path: "stdout_json.main_worktree_path"
          worktree_list:      "stdout_json.worktree_list"
          commits_ahead:      "stdout_json.commits_ahead"
          commits_behind:     "stdout_json.commits_behind"
          has_uncommitted:    "stdout_json.has_uncommitted"
          merge_in_progress:  "stdout_json.merge_in_progress"
          no_common_ancestor: "stdout_json.no_common_ancestor"
          upstream_tracking:  "stdout_json.upstream_tracking"
        on_error: main_ops
    on:
      pull:
        - target: pull
      merge_branch:
        # Operand-as-slot: when branch= is given, skip the picker and go
        # straight to merge_exec (git-ops-smoothing task 1.2).
        - when: "slots.branch != '' && slots.branch != nil"
          target: merge_exec
          effects:
            - set:
                merge_branch_name: "{{ slots.branch }}"
        - target: merge_branch_pick
      integrate:
        - target: integrate
          effects:
            - set:
                integrate_branch: '{{ slots.branch ?? world.current_branch }}'
                force_cleanup:    "{{ slots.force }}"
                integrate_outcome: ""
                last_error:        ""
      worktree_create:
        - target: worktree_create
          effects:
            - set:
                worktree_desc: "{{ slots.desc ?? '' }}"
      worktree_list:
        - target: worktree_list
      cleanup:
        - target: cleanup
      stage:
        - target: staging
      commit:
        - target: commit
          effects:
            - set:
                amend_mode:  false
                squash_mode: false
      undo:
        - target: undo
      checkpoint:
        - target: checkpoint
          effects:
            - set:
                checkpoint_label:   "{{ slots.label }}"
                checkpoint_outcome: ""
                checkpoint_sha:     ""
      restore:
        - target: restore
          effects:
            - set:
                restore_label:   "{{ slots.label }}"
                restore_outcome: ""
      retry:
        - when: "world.last_op_outcome == 'post_merge_test_fail'"
          target: merge_into_main
      rollback:
        - when: "world.last_op_outcome == 'post_merge_test_fail'"
          target: merge_into_main
      quit:
        - target: done
      look:
        - target: .
