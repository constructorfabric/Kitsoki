# intercept — branch-agnostic command hub for pre-LLM interception.
#
# Groups every common git command (rebase, stage, commit, squash, merge,
# undo, pull, worktree ops, cleanup) in ONE room so the pre-LLM intercept
# gate — `kitsoki intercept --room intercept` (see
# docs/architecture/prompt-intercept.md) — can classify a natural phrasing
# against this room's allowed intents with no LLM and execute the resolved
# command in one shot. Unlike main_ops / branch_ops (which split commands by
# where HEAD sits), this hub allows every command regardless of branch
# position: the gate is stateless — a user types "rebase this onto main"
# without first navigating to a hub.
#
# The arcs delegate to git-ops's existing command rooms (rebase, staging,
# commit, …) so there is no duplicated git logic — this room is a thin
# grouping facade over the real command states.
#
# on_enter refreshes git context for the INTERACTIVE entry (e.g. dev-story →
# gitops → intercept). The stateless one-shot gate SKIPS on_enter — it starts
# already in this state and immediately fires the matched command — so it
# relies on the world-schema defaults (integration_branch=main, working_dir=.)
# plus each command script's own `git rev-parse` self-derivation. Commands
# that are a single git operation (rebase, pull, undo) complete in one shot;
# the multi-turn ones (stage, commit, squash, merge) route into their
# interactive flow.

states:

  intercept:
    description: "Command hub — say a git command in your own words; it runs with no LLM."
    relevant_world: [current_branch, integration_branch, rebase_done, commits_ahead,
                     commits_behind, has_uncommitted, on_integration]
    view:
      - prose: "Say a git command in your own words — it's matched and run without a model."
      - kv:
          pairs:
            Branch:      '{{ world.current_branch|default:"(detecting…)" }}'
            Integration: '{{ world.integration_branch }}'
            Uncommitted: '{% if world.has_uncommitted %}yes{% else %}clean{% endif %}'
            Ahead:       '{{ world.commits_ahead }} ahead'
            Behind:      '{{ world.commits_behind }} behind'
      - prose: "Last operation failed: {{ world.last_op_output|default:'(no output)' }}"
        when: "world.last_op_ok == false"
      - choice:
          mode: single
          prompt: "Commands"
          items:
            - { label: "rebase",          hint: "rebase onto {{ world.integration_branch }}",                  intent: rebase }
            - { label: "stage",           hint: "classify and stage working-tree changes",                    intent: stage }
            - { label: "commit",          hint: "agent-authored commit message",                             intent: commit }
            - { label: "squash",          hint: "squash branch commits into one",                             intent: squash }
            - label: "merge_into_main"
              hint:  "merge this branch into {{ world.integration_branch }} (rebase first)"
              intent: merge_into_main
            - { label: "pull",            hint: "git pull --rebase from upstream",                            intent: pull }
            - { label: "undo",            hint: "undo the last commit",                                        intent: undo }
            - { label: "worktree_create", hint: "create a linked worktree under .worktrees/",                 intent: worktree_create }
            - { label: "worktree_list",   hint: "list and classify existing worktrees",                       intent: worktree_list }
            - { label: "cleanup",         hint: "remove a worktree and its branch",                           intent: cleanup }
            - { label: "look",            intent: look }
    on_enter:
      - invoke: host.run
        id: refresh_intercept
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -e
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              git update-index -q --refresh 2>/dev/null || true
              BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
              INTEGRATION="{{ world.integration_branch }}"
              AHEAD=$(git rev-list --count "${INTEGRATION}..HEAD" 2>/dev/null || echo 0)
              BEHIND=$(git rev-list --count "HEAD..${INTEGRATION}" 2>/dev/null || echo 0)
              UNCOMMITTED=$(git status --porcelain 2>/dev/null | grep -c . || true)
              if [ "$UNCOMMITTED" -gt 0 ]; then HAS_UNCOMMITTED=true; else HAS_UNCOMMITTED=false; fi
              MAIN_WT=$(git worktree list --porcelain 2>/dev/null \
                | awk '/^worktree / {wt=$2} /^branch refs\/heads\/'"$INTEGRATION"'$/ {print wt}')
              [ -z "$MAIN_WT" ] && MAIN_WT="{{ world.working_dir }}"
              ON_INTEGRATION=false
              if [ "$BRANCH" = "$INTEGRATION" ]; then ON_INTEGRATION=true; fi
              NO_COMMON=false
              if ! git merge-base HEAD "$INTEGRATION" >/dev/null 2>&1; then NO_COMMON=true; fi
              jq -n \
                --arg branch "$BRANCH" \
                --arg main_wt "$MAIN_WT" \
                --argjson ahead "$AHEAD" \
                --argjson behind "$BEHIND" \
                --argjson has_uncommitted "$HAS_UNCOMMITTED" \
                --argjson on_integration "$ON_INTEGRATION" \
                --argjson no_common "$NO_COMMON" \
                '{branch:$branch, main_worktree_path:$main_wt,
                  commits_ahead:$ahead, commits_behind:$behind,
                  has_uncommitted:$has_uncommitted, on_integration:$on_integration,
                  no_common_ancestor:$no_common}'
          cwd: "{{ world.working_dir }}"
        bind:
          current_branch:     "stdout_json.branch"
          main_worktree_path: "stdout_json.main_worktree_path"
          commits_ahead:      "stdout_json.commits_ahead"
          commits_behind:     "stdout_json.commits_behind"
          has_uncommitted:    "stdout_json.has_uncommitted"
          on_integration:     "stdout_json.on_integration"
          no_common_ancestor: "stdout_json.no_common_ancestor"
        on_error: intercept
    on:
      rebase:
        - target: rebase
          effects:
            - set:
                rebase_done: false
      stage:
        - target: staging
      commit:
        - target: commit
          effects:
            - set:
                amend_mode:  false
                squash_mode: false
      squash:
        - target: squash
      merge_into_main:
        - when: "world.rebase_done == true"
          target: merge_into_main
        - target: intercept
          effects:
            - say: "Rebase first — rebase_done is false."
      pull:
        - target: pull
      undo:
        - target: undo
      worktree_create:
        - target: worktree_create
          effects:
            - set:
                worktree_desc: "{{ slots.desc ?? '' }}"
      worktree_list:
        - target: worktree_list
      cleanup:
        - target: cleanup
      look:
        - target: .
