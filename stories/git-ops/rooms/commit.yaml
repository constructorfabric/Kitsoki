# commit — agent-authored commit message.
#
# Single-script on_enter: runs git diff --cached --stat.
# If empty → route="nothing_staged"; otherwise route="look" (stay).
# emit_intent: "{{ world.route }}" fires post-bind so the routing is correct.
# Agent.decide is guarded separately (runs when staged_diff_stat != '' and
# commit_message == '') — uses world.staged_diff_stat set by the script bind.

states:

  commit:
    description: "Agent-authored commit message. Review, edit, or regenerate before committing."
    relevant_world: [staged_diff_stat, commit_message, current_branch, refactor_mode, squash_mode]
    view:
      - kv:
          pairs:
            Branch: '{{ world.current_branch|default:"(unknown)" }}'
            Mode:   '{% if world.squash_mode %}squash{% elif world.refactor_mode %}refactor{% else %}normal{% endif %}'
      - heading: "Diff stat"
      - template: '{{ world.staged_diff_stat|default:"(pending — gathering diff)" }}'
      - heading: "Proposed commit message"
      - template: '{{ world.commit_message|default:"(pending — agent is authoring)" }}'
      - prose: "Commit failed: {{ world.last_op_output }}"
        when: "world.last_op_ok == false"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "accept"
              hint:  "git commit with this message"
              intent: accept
              when:  "world.commit_message != ''"
            - label: "edit_message message=…"
              hint:  "replace the agent message"
              intent: edit_message
              when:  "world.commit_message != ''"
            - label: "regenerate"
              hint:  "ask the agent for a new message"
              intent: regenerate
            - label: "back"
              hint:  "return to hub without committing"
              intent: back
            - label: "look"
              intent: look
    on_enter:
      # Single script: check if anything is staged, get diff stat.
      # Sets route="nothing_staged" if nothing staged, route="look" if staged.
      - invoke: host.run
        once: true
        id: diff_stat
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -e
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              STAT=$(git diff --cached --stat --no-color 2>/dev/null || echo "")
              if [ -z "$STAT" ]; then
                echo '{"staged_diff_stat":"","route":"nothing_staged"}'
              else
                jq -n --arg stat "$STAT" '{"staged_diff_stat":$stat,"route":"look"}'
              fi
          cwd: "{{ world.working_dir }}"
        bind:
          staged_diff_stat: "stdout_json.staged_diff_stat"
          route:            "stdout_json.route"
        on_error: commit
      # Static emit target: "nothing_staged" registers in emitTargets
      # so isDecisionGate=false → staged mode doesn't block routing.
      # Guard is FALSE with default route="look" → machine doesn't emit prematurely.
      # DispatchPostBindEmits fires "nothing_staged" when route="nothing_staged" post-bind.
      - when: "world.route == 'nothing_staged'"
        emit_intent: nothing_staged
      # Agent runs when commit_message is not yet set.
      # once: true skips if commit_message is already populated (regenerate clears it).
      # With: args are re-rendered by orchestrator against post-bind world,
      # so staged_diff_stat is correctly set by the time agent.decide dispatches.
      - invoke: host.agent.decide
        once: true
        id: author_commit_message
        with:
          prompt: prompts/commit_message.md
          schema: schemas/commit_verdict.json
          args:
            staged_diff_stat:   "{{ world.staged_diff_stat }}"
            current_branch:     "{{ world.current_branch }}"
            refactor_mode:      "{{ world.refactor_mode }}"
            squash_mode:        "{{ world.squash_mode }}"
            integration_branch: "{{ world.integration_branch }}"
        bind:
          commit_message: "submitted.message"
        on_error: commit
    on:
      nothing_staged:
        - when: "world.on_integration == true"
          target: main_ops
          effects:
            - say: "Nothing staged — return to hub."
        - target: branch_ops
          effects:
            - say: "Nothing staged — return to hub."
      on_main:
        - target: main_ops
      on_branch:
        - target: branch_ops
      look:
        - target: .
      accept:
        - when: "world.commit_message != ''"
          target: .
          effects:
            - invoke: host.run
              id: git_commit
              with:
                cmd: git
                args:
                  - "commit"
                  - "-m"
                  - "{{ world.commit_message }}"
                cwd: "{{ world.working_dir }}"
              bind:
                last_op_output: stdout
                last_op_ok:     ok
              on_error: commit
            - when: "world.last_op_ok == true"
              set:
                commit_message:   ""
                staged_diff_stat: ""
                squash_mode:      false
                route:            "look"
            - when: "world.last_op_ok == true && world.on_integration == true"
              emit_intent: on_main
            - when: "world.last_op_ok == true && world.on_integration == false"
              emit_intent: on_branch
        - target: .
          effects:
            - say: "No commit message — use regenerate or edit_message."
      edit_message:
        - target: commit
          effects:
            - set:
                commit_message: "{{ slots.message }}"
      regenerate:
        - target: commit
          effects:
            - set:
                commit_message:   ""
                staged_diff_stat: ""
                route:            "look"
      back:
        - when: "world.on_integration == true"
          target: main_ops
        - target: branch_ops
