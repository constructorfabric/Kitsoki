# Traceability:
# - Source call site: stories/git-ops/rooms/conflict.yaml, host.agent.task id `resolve_conflicts`.
# - Prompt: stories/git-ops/prompts/conflict_resolve.md.
# - Schema: stories/git-ops/schemas/conflict_verdict.json.
# - Purpose: classify whether a merge/rebase conflict resolution was completed.
kind: agent_eval
app: ../app.yaml
call: resolve_conflicts
agent: conflict_resolver

task:
  goal: "Resolve or clearly reject conflicted files with a structured verdict."
  boundedness:
    max_turns: 1
    tool_policy: write-artifact
    prepared_context: true
  adherence_bar:
    min_pass_rate: 0.90
    max_p95_latency_ms: 12000
    max_avg_cost_usd: 0.004

matrix:
  profiles: [claude-native, codex-native, synthetic-claude, synthetic-codex]
  models:
    claude-native: [sonnet, opus]
    synthetic-claude: [syn:large:text]
    synthetic-codex: [syn:large:text]
    codex-native: [gpt-5-codex, gpt-5]
  effort: [medium]
  repeat: 3

comparator:
  kind: field_subset

examples:
  - name: go-sum-unresolved
    args:
      conflict_files: "go.sum"
      conflict_intent_guidance: "go.sum conflicts should be regenerated by tooling."
      current_branch: "feature"
      integration_branch: "main"
    expect:
      resolved: false
      confidence: 0.4
      unresolvable_files: ["go.sum"]
      resolution_summary: "go.sum should be regenerated by the dependency tooling rather than hand-merged."
      reason: "Generated dependency checksum conflict."
