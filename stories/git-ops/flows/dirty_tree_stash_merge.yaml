# dirty_tree_stash_merge — merge_into_main when target tree is dirty.
# Single-script merge_exec handles stash + merge.

test_kind: flow
app: ../app.yaml
initial_state: branch_ops
initial_world:
  integration_branch: main
  current_branch:     feat/x
  on_integration:     false
  working_dir:        "."
  main_worktree_path: "."
  rebase_done:        true
  rebase_base_sha:    ""
  build_check_disabled: true

host_handlers:
  host.run:
    by_call:
      refresh_branch:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             feat/x
            main_worktree_path: "."
            worktree_list:      { raw: "" }
            commits_ahead:      2
            commits_behind:     0
            has_uncommitted:    false
            no_common_ancestor: false
      merge_exec:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            outcome:           merged
            descendant_ok:     true
            merge_in_progress: false
            last_op_ok:        true
            last_op_output:    "Merge successful (stash applied)"
            stash_ref:         "stash@{0}"
            rebase_done:       false

turns:
  - intent: { name: merge_into_main, slots: {} }
    expect_state: merge_into_main
    expect_world:
      last_op_outcome: merged
      stash_ref:       "stash@{0}"

expect_no_errors: true
