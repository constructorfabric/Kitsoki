# pull_conflict — conflict with conflict_origin="pull" → auto-resolved → main_ops.
# Uses guide intent to re-enter conflict (triggers on_enter with pre-seeded world).
# The gather_conflict_files is the first unguarded on_enter effect — relies on
# the real kitsoki repo having no conflicts (empty conflict_files → goes to gosum check → skip agent).
# Asserts: conflict_origin="pull" routes back to main_ops after resolution.

test_kind: flow
app: ../app.yaml
initial_state: conflict
initial_world:
  integration_branch:       main
  current_branch:           main
  on_integration:           true
  working_dir:              "."
  main_worktree_path:       "."
  conflict_origin:          pull
  conflict_files:           "main.go "
  conflict_verdict:         { resolved: false, confidence: 0.3, resolution_summary: "could not resolve" }
  conflict_intent_guidance: ""
  build_check_cmd:          "echo 'build ok'"
  rebase_done:              false

host_handlers:
  host.run:
    by_call:
      gather_conflict_files:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            conflict_files: "main.go "
            gosum_only:     false
      rebase_continue_cmd:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            output:       "Successfully rebased."
            ok:           true
            new_conflict: false
      build_check_after_rebase:
        data:
          ok:        true
          exit_code: 0
          stdout:    "build ok"
      refresh_main:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             main
            main_worktree_path: "."
            worktree_list:      { raw: "" }
            commits_ahead:      0
            commits_behind:     0
            has_uncommitted:    false
            merge_in_progress:  false
            no_common_ancestor: false
            upstream_tracking:  false
  host.agent.task:
    data:
      ok: true
      submitted:
        resolved:           true
        confidence:         0.9
        unresolvable_files: []
        resolution_summary: "Took upstream version; re-applied local changes."
        reason:             null

turns:
  # guide re-enters conflict (fires on_enter): agent resolves → rebase_continue
  # → build ok → conflict_resolved (conflict_origin=pull) → main_ops
  - intent: { name: guide, slots: { intent: "use upstream" } }
    expect_state: main_ops
    expect_world:
      rebase_done: true

  - intent: { name: look, slots: {} }
    expect_state: main_ops

expect_no_errors: true
