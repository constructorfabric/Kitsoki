# demo_tour — the grand-tour flow for the git-ops UI demo video (no-LLM).
#
# Drives ONE long feature-branch → integration session end-to-end through the
# hub-and-spoke, visiting many rooms so the demo is extensive:
#
#   idle → branch_ops
#   stage → staging (classify; .npmrc flagged suspicious) → add_all (confirm gate)
#         → confirm_add_all → back → branch_ops
#   commit → commit (oracle message) → regenerate → accept → back → branch_ops
#   undo → undo (reset modes shown) → back → branch_ops
#   rebase → conflict auto-resolved by the oracle → branch_ops (rebase_done)
#   merge_into_main → merge (guards ok, merged) → back → main_ops
#   pull → pull (no upstream tracking) → back → main_ops
#   worktree_create → describe → worktree created → back → main_ops
#   worktree_list → list worktrees → back → main_ops
#   cleanup → remove worktree + branch → main_ops
#
# Recorded with `kitsoki web --flow <this> --mode one-shot` so the root `idle`
# router advances on a single `look` and each turn runs its full emit cascade
# (so the conflicting rebase auto-resolves in one turn). Host calls are stubbed
# here; the kitsoki-ui-demo spec submits the intents. The turns: list mirrors the
# drive order so this doubles as a CLI flow test.

test_kind: flow
app: ../app.yaml
initial_state: branch_ops
initial_world:
  integration_branch: main
  current_branch:     feat/auth
  on_integration:     false
  working_dir:        "."
  main_worktree_path: "."
  has_uncommitted:    true
  commits_ahead:      1
  commits_behind:     0
  rebase_done:        false
  rebase_base_sha:    ""
  build_check_cmd:    "echo 'build ok'"
  suspicious_confirmed: false

host_handlers:
  host.run:
    by_call:
      # idle entry (web sessions start at the story root `idle`)
      detect_context:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             feat/auth
            route:              on_branch
            main_worktree_path: "."
            worktree_list:      { raw: "" }
            on_integration:     false
            commits_ahead:      1
            commits_behind:     0
            has_uncommitted:    true
            merge_in_progress:  false
            no_common_ancestor: false

      # branch_ops hub entry (and re-entry after each feature-branch op)
      refresh_branch:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             feat/auth
            main_worktree_path: "."
            worktree_list:      { raw: ". main" }
            commits_ahead:      1
            commits_behind:     0
            has_uncommitted:    true
            no_common_ancestor: false

      # staging: classify the tree — .npmrc is flagged suspicious (the gate)
      classify_staging:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            staged:     ""
            modified:   "internal/auth/session.go"
            untracked:  ".npmrc"
            suspicious: ".npmrc "
      # add_all of a suspicious tree requires confirm_add_all first; that runs:
      git_add_all_confirmed:
        data:
          ok:        true
          exit_code: 0
          stdout:    ""

      # commit: single-script diff_stat returns staged_diff_stat + route
      diff_stat:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            staged_diff_stat: " internal/auth/session.go | 6 +++++-\n 1 file changed, 5 insertions(+), 1 deletion(-)"
            route:            "look"
            squash_mode:      false
      git_commit:
        data:
          ok:        true
          exit_code: 0
          stdout:    "[feat/auth 1a2b3c4] fix(auth): guard nil session on expiry"

      # undo: show the last commit summary (reset modes are offered, not run)
      last_commit_summary:
        data:
          ok:        true
          exit_code: 0
          stdout:    "1a2b3c4 fix(auth): guard nil session on expiry"

      # rebase: hits a conflict that the oracle auto-resolves (one-shot runs the
      # full conflict→resolve→continue cascade in one turn → branch_ops/rebase_done)
      rebase_exec:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            pre_rebase_tag:  "feat-auth-pre-rebase-backup"
            last_op_output:  "CONFLICT (content): Merge conflict in internal/auth/session.go"
            rebase_base_sha: "base5678"
            rebase_done:     false
            conflict_origin: rebase
      gather_conflict_files:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            conflict_files: "internal/auth/session.go "
            gosum_only:     false
      rebase_continue_cmd:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            output:       "Successfully rebased and updated refs/heads/feat-auth."
            ok:           true
            new_conflict: false
      build_check_after_rebase:
        data:
          ok:        true
          exit_code: 0
          stdout:    "build ok"

      # merge_into_main: guards pass, merge succeeds, build ok
      merge_exec:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            outcome:           merged
            descendant_ok:     true
            merge_in_progress: false
            last_op_ok:        true
            last_op_output:    "Merge successful"
            stash_ref:         ""
            rebase_done:       false

      # main_ops hub entry (after the merge / between integration-branch ops)
      refresh_main:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             main
            main_worktree_path: "."
            worktree_list:      { raw: ". main" }
            commits_ahead:      0
            commits_behind:     0
            has_uncommitted:    false
            merge_in_progress:  false
            no_common_ancestor: false
            upstream_tracking:  false

      # pull: no upstream tracking ref → an info message, return to hub
      check_tracking:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            has_tracking: false

      # worktree_create: create a new worktree under .worktrees/
      create_worktree:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:  add-login
            path:    .worktrees/add-login
            output:  "Preparing worktree (new branch 'add-login')"
            ok:      true
            outcome: created

      # worktree_list: enumerate worktrees (now includes the new one)
      list_worktrees:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            worktrees:
              - { path: ".", branch: "main", is_main: true }
              - { path: ".worktrees/add-login", branch: "add-login", is_main: false }

      # cleanup: remove the worktree + its branch
      remove_wt_and_br:
        data:
          ok:        true
          exit_code: 0
          stdout:    "Removed worktree .worktrees/add-login and branch add-login"

  # commit-message author (host.oracle.decide)
  host.oracle.decide:
    data:
      ok: true
      submitted:
        type:    fix
        scope:   auth
        summary: "guard nil session on expiry"
        body:    null
        message: "fix(auth): guard nil session on expiry"

  # conflict resolver (host.oracle.task) — auto-resolves the rebase conflict
  host.oracle.task:
    data:
      ok: true
      submitted:
        resolved:           true
        confidence:         0.91
        unresolvable_files: []
        resolution_summary: "Took main's session struct and re-applied the expiry guard from feat-auth."
        reason:             null

turns:
  - intent: { name: stage, slots: {} }
    expect_state: staging
  - intent: { name: add_all, slots: {} }
    expect_state: staging
    expect_world:
      last_op_outcome: confirm_suspicious
  - intent: { name: confirm_add_all, slots: {} }
    expect_state: staging
    expect_world:
      last_op_ok: true
  - intent: { name: back, slots: {} }
    expect_state: branch_ops

  - intent: { name: commit, slots: {} }
    expect_state: commit
    expect_world:
      commit_message: "fix(auth): guard nil session on expiry"
  - intent: { name: regenerate, slots: {} }
    expect_state: commit
    expect_world:
      commit_message: "fix(auth): guard nil session on expiry"
  - intent: { name: accept, slots: {} }
    expect_state: branch_ops
    expect_world:
      commit_message: ""

  - intent: { name: undo, slots: {} }
    expect_state: undo
  - intent: { name: back, slots: {} }
    expect_state: branch_ops

  - intent: { name: rebase, slots: {} }
    expect_state: branch_ops
    expect_world:
      rebase_done: true

  - intent: { name: merge_into_main, slots: {} }
    expect_state: merge_into_main
    expect_world:
      last_op_outcome: merged
  - intent: { name: back, slots: {} }
    expect_state: main_ops

# The integration-branch phase (pull → worktree_create → worktree_list → cleanup)
# is driven by the web demo spec, which flips on_integration=true via the
# runstatus.session.patch_world RPC after the merge lands on main_ops (you merged
# a feature branch, so on_integration is still false here, which would route the
# sub-rooms' `back` to branch_ops). The CLI flow has no world-patch turn, so it
# validates through the merge; the spec's stubs above cover the rest.

expect_no_errors: true
