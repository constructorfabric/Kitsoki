# intercept_hub — the pre-LLM command hub (rooms/intercept.yaml).
#
# Starting in `intercept`: `look` holds the hub (re-renders), and `rebase`
# executes git-ops's real rebase (mocked here) and routes into branch_ops —
# proving the grouped commands run from ONE room with no LLM, exactly as the
# pre-LLM intercept gate drives them. See docs/architecture/prompt-intercept.md.

test_kind: flow
app: ../app.yaml
initial_state: intercept
initial_world:
  integration_branch: main
  current_branch:     feat/x
  on_integration:     false
  working_dir:        "."
  main_worktree_path: "."
  has_uncommitted:    false
  commits_ahead:      2
  commits_behind:     0
  rebase_done:        false

host_handlers:
  host.run:
    by_call:
      refresh_intercept:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             feat/x
            main_worktree_path: "."
            commits_ahead:      2
            commits_behind:     0
            has_uncommitted:    false
            on_integration:     false
            no_common_ancestor: false
      rebase_exec:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            pre_rebase_tag:  ""
            last_op_output:  "Successfully rebased."
            rebase_base_sha: ""
            rebase_done:     true
            conflict_origin: ""
      refresh_branch:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             feat/x
            main_worktree_path: "."
            worktree_list:      { raw: "" }
            commits_ahead:      0
            commits_behind:     0
            has_uncommitted:    false
            no_common_ancestor: false

turns:
  # The hub holds: `look` re-renders the command grouping in place.
  - intent: { name: look, slots: {} }
    expect_state: intercept

  # A grouped command runs git-ops's real flow (mocked) and routes onward.
  - intent: { name: rebase, slots: {} }
    expect_state: branch_ops
    expect_world:
      rebase_done: true

expect_no_errors: true
