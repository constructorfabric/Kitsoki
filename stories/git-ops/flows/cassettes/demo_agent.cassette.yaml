kind: host_cassette
app_id: git-ops
app_version: "0.1.0"
record_mode: none
match_on:
  - handler

# Agent cassette for the git-ops UI demo (demo_real_sessions). It backs ONLY the
# two host.agent.* calls the demo exercises so they replay through the REAL agent
# dispatch — which emits agent.call.start + agent.call.complete (with token usage
# + cost + an agent-action transcript) into the trace. That is the honest, traceable
# picture the demo makes: the deterministic engine (semantic routing, every git
# command via host.run, the merge guards, the worktree lifecycle) is FREE, and the
# agent is the only surface that spends — confined by the story to exactly two
# moments (authoring a commit message, resolving a conflict).
#
# Layered over demo_real_sessions.yaml's host_handlers via `kitsoki web --flow … \
# --host-cassette …`: the cassette dispatcher Replaces the flow's host.agent.*
# stubs (which return the same `submitted` but emit NO agent.call.complete event —
# a trace gap), while git (host.run) stays on the flow's free host_handlers. The
# `submitted:` blocks below MUST stay in sync with the flow's host.agent.* stubs so
# the CLI flow test (host_handlers, no cassette) and the web demo (cassette) agree.
#
# Token counts + cost are representative of a real claude-sonnet-4-6 call of each
# shape (a short structured decide vs. a two-file Read+Edit agent task). They render
# identically to a recorded trace — the standard deterministic-replay fixture pattern.

episodes:

  # ① commit-message author. A short structured decide call: read the staged diff,
  #    emit one conventional-commit line. Small prompt, tiny output, ~1¢.
  - id: commit_message_decide
    match:
      handler: host.agent.decide
    response:
      data:
        ok: true
        submitted:
          type:    fix
          scope:   auth
          summary: "handle nil session on expiry"
          body:    null
          message: "fix(auth): handle nil session on expiry"
    agent:
      verb: decide
      agent: "git-ops"
      model: "claude-sonnet-4-6"
      duration_ms: 1700
      prompt_tokens: 1430
      response_tokens: 38
      cost_usd: 0.0121
      response: '{"type":"fix","scope":"auth","summary":"handle nil session on expiry","message":"fix(auth): handle nil session on expiry"}'
      transcript:
        format: claude-stream-json
        events:
          - '{"type":"system","subtype":"init","session_id":"sess-commit-msg","model":"claude-sonnet-4-6"}'
          - '{"type":"assistant","message":{"content":[{"type":"text","text":"The staged diff guards a nil session on expiry in the auth handler. Conventional commit:"}]}}'
          - '{"type":"assistant","message":{"content":[{"type":"tool_use","id":"toolu_msg","name":"mcp__validator__submit","input":{"type":"fix","scope":"auth","summary":"handle nil session on expiry","message":"fix(auth): handle nil session on expiry"}}]}}'
          - '{"type":"result","subtype":"success","result":"fix(auth): handle nil session on expiry","usage":{"input_tokens":1430,"output_tokens":38},"total_cost_usd":0.0121}'
        timings: [0, 900, 1400, 1700]
    replay: any

  # ② conflict resolver. A real agent task: Read both conflicted files, Edit each to
  #    take main's structs + re-apply the expiry guard, report resolved. Bigger
  #    prompt (two files in context) + more output → ~8¢, the demo's largest spend.
  - id: conflict_resolve_task
    match:
      handler: host.agent.task
    response:
      data:
        ok: true
        submitted:
          resolved:           true
          confidence:         0.91
          unresolvable_files: []
          resolution_summary: "Took main's session/token structs and re-applied feat-auth's expiry guard across session.go and token.go."
          reason:             null
    agent:
      verb: task
      agent: "conflict_resolver"
      model: "claude-sonnet-4-6"
      duration_ms: 6400
      prompt_tokens: 9240
      response_tokens: 712
      cost_usd: 0.0834
      response: '{"resolved":true,"confidence":0.91,"unresolvable_files":[],"resolution_summary":"Took main''s session/token structs and re-applied feat-auth''s expiry guard across session.go and token.go."}'
      transcript:
        format: claude-stream-json
        events:
          - '{"type":"system","subtype":"init","session_id":"sess-conflict","model":"claude-sonnet-4-6"}'
          - '{"type":"assistant","message":{"content":[{"type":"text","text":"Two source files conflict: internal/auth/session.go and internal/auth/token.go. Reading both."}]}}'
          - '{"type":"assistant","message":{"content":[{"type":"tool_use","id":"toolu_r1","name":"Read","input":{"file_path":"internal/auth/session.go"}}]}}'
          - '{"type":"user","message":{"content":[{"type":"tool_result","tool_use_id":"toolu_r1","content":"<<<<<<< HEAD\ntype Session struct { ID string; User string }\n=======\ntype Session struct { ID string; User string; ExpiresAt time.Time }\n>>>>>>> feat/auth"}]}}'
          - '{"type":"assistant","message":{"content":[{"type":"tool_use","id":"toolu_r2","name":"Read","input":{"file_path":"internal/auth/token.go"}}]}}'
          - '{"type":"user","message":{"content":[{"type":"tool_result","tool_use_id":"toolu_r2","content":"<<<<<<< HEAD\nfunc Validate(s *Session) error { ... }\n=======\nfunc Validate(s *Session) error { if s == nil { return ErrNoSession }; ... }\n>>>>>>> feat/auth"}]}}'
          - '{"type":"assistant","message":{"content":[{"type":"thinking","thinking":"Take main''s struct shape as the base and re-apply feat-auth''s expiry field + nil guard. No git commands — the story drives those."}]}}'
          - '{"type":"assistant","message":{"content":[{"type":"tool_use","id":"toolu_e1","name":"Edit","input":{"file_path":"internal/auth/session.go","old_string":"<<<<<<< HEAD","new_string":"type Session struct { ID string; User string; ExpiresAt time.Time }"}}]}}'
          - '{"type":"user","message":{"content":[{"type":"tool_result","tool_use_id":"toolu_e1","content":"edited"}]}}'
          - '{"type":"assistant","message":{"content":[{"type":"tool_use","id":"toolu_e2","name":"Edit","input":{"file_path":"internal/auth/token.go","old_string":"<<<<<<< HEAD","new_string":"func Validate(s *Session) error { if s == nil { return ErrNoSession }; ... }"}}]}}'
          - '{"type":"user","message":{"content":[{"type":"tool_result","tool_use_id":"toolu_e2","content":"edited"}]}}'
          - '{"type":"assistant","message":{"content":[{"type":"text","text":"Both files resolved; conflict markers removed."}]}}'
          - '{"type":"result","subtype":"success","result":"resolved both files","usage":{"input_tokens":9240,"output_tokens":712},"total_cost_usd":0.0834}'
        timings: [0, 600, 900, 1300, 1700, 2400, 3200, 4200, 4600, 5200, 5600, 6000, 6400]
    replay: any
