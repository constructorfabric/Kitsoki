# merge_descendant_guard — HEAD is NOT a descendant of integration.
# Asserts: re_rebase_needed shown; --no-ff merge never attempted.

test_kind: flow
app: ../app.yaml
initial_state: branch_ops
initial_world:
  integration_branch: main
  current_branch:     feat/x
  on_integration:     false
  working_dir:        "."
  main_worktree_path: "."
  rebase_done:        true
  rebase_base_sha:    "abc1234"

host_handlers:
  host.run:
    by_call:
      refresh_branch:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             feat/x
            main_worktree_path: "."
            worktree_list:      { raw: "" }
            commits_ahead:      2
            commits_behind:     5
            has_uncommitted:    false
            no_common_ancestor: false
      merge_exec:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            outcome:           re_rebase_needed
            descendant_ok:     false
            merge_in_progress: false
            last_op_ok:        false
            last_op_output:    "HEAD is not a descendant of integration"
            stash_ref:         ""
            rebase_done:       false

turns:
  - intent: { name: merge_into_main, slots: {} }
    expect_state: merge_into_main
    expect_world:
      last_op_outcome: re_rebase_needed
      descendant_ok:   false

expect_no_errors: true
