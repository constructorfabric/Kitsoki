# test — phase 3 of the implementation pipeline. Runs the workspace
# tests via iface.ci.run_tests, captures the log, and the LLM produces
# a `test_artifact` (schemas/test_artifact.json) summarising the run.
# The checkpoint gates pass/fail: accept → review; refine → write_code
# with the failing-test feedback so the code-write loop closes around
# CI failures.
#
# Flattened away from `extends: "base"` (choice-widget proposal §4.5 /
# §8): a `choice:` element cannot live inside `blocks:`. The base.pongo
# status line is inlined as the leading prose element.

states:

  test_executing:
    description: "Running tests for the applied code change."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.workdir|default:"(no workspace)" }}  ·  {{ world.feature_branch|default:"(no branch)" }}  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "Running tests"
      - kv:
          pairs:
            Ticket:     "{{ world.ticket_id }} — {{ world.ticket_title }}"
            Summary:    '{{ world.test_artifact.summary_title|default:"(pending)" }}'
            "CI state": '{{ world.ci_state|default:"(pending)" }}'
      - heading: "Artifact"
      - code: '{{ world.test_artifact.summary_markdown|default:"(pending — oracle has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "proceed", intent: proceed, hint: "deliver the test artifact to the checkpoint" }
            - label:  "restart_from"
              intent: restart_from
              hint:   "bounce back to an earlier stage"
              param:
                slot:        stage
                type:        string
                placeholder: "e.g. review_task"
            - { label: "quit", intent: quit, hint: "abandon the pipeline" }
            - { label: "look", intent: look, hint: "re-render" }
    relevant_world: [ticket_id, ticket_title, test_artifact, code_artifact, cycle, ci_state]
    on_enter:
      - invoke: iface.ci.run_tests
        with:
          workdir: "{{ world.workdir }}"
          target:  "{{ world.code_artifact.summary_title }}"
        bind:
          ci_log:   log
          ci_state: state
        on_error: idle
      # once: skip the regenerate when test_artifact is already bound
      # (reload / self-re-entry safe). Every arc that re-enters
      # test_executing for a FRESH run clears the bind below.
      - invoke: host.oracle.decide
        once: true
        with:
          prompt: prompts/judge_test.md
          schema: schemas/test_artifact.json
          args:
            ticket_id:    "{{ world.ticket_id }}"
            ticket_title: "{{ world.ticket_title }}"
            code_summary: "{{ world.code_artifact.summary_markdown }}"
            ci_log:       "{{ world.ci_log }}"
            ci_state:     "{{ world.ci_state }}"
        bind:
          test_artifact: submitted
        on_error: idle
    on:
      proceed:
        - target: test_awaiting_reply
      restart_from:
        - target: review_task_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'review_task' }}"
                cycle:              0
                # Re-entering review_task_executing for a fresh run — clear
                # its once: cache so the task summary regenerates.
                task_summary_artifact: {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  # Canonical §6 checkpoint shape.
  test_awaiting_reply:
    description: "Test results posted; awaiting verdict."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.workdir|default:"(no workspace)" }}  ·  {{ world.feature_branch|default:"(no branch)" }}  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "Tests — awaiting verdict"
      - kv:
          pairs:
            Ticket:     "{{ world.ticket_id }} — {{ world.ticket_title }}"
            "CI state": '{{ world.ci_state|default:"(unknown)" }}'
            Verdict:    '{{ world.llm_verdict.verdict|default:"(no LLM verdict)" }}'
            Confidence: '{{ world.llm_verdict.confidence|default:"(n/a)" }}'
            Reason:     '{{ world.llm_verdict.reason|default:"(none)" }}'
      - heading: "Artifact"
      - code: '{{ world.test_artifact.summary_markdown|default:"(pending — oracle has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "accept", intent: accept, hint: "advance to review" }
            - label:  "refine"
              intent: refine
              hint:   "bounce back to write_code with failing-test feedback"
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
            - label:  "restart_from"
              intent: restart_from
              hint:   "bounce back to an earlier stage"
              param:
                slot:        stage
                type:        string
                placeholder: "e.g. review_task"
            - { label: "quit", intent: quit, hint: "abandon the pipeline" }
            - { label: "look", intent: look, hint: "re-render" }
    relevant_world: [judge_mode, ticket_id, test_artifact, ci_state, llm_verdict, cycle]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:    "{{ world.thread }}"
          title:     "Tests: {{ world.ticket_id }}"
          body:      "{{ world.test_artifact.summary_markdown }}"
          phase_id:  "test_{{ world.ticket_id }}_{{ world.cycle }}"
      - invoke: host.inbox.add
        with:
          kind:    checkpoint
          title:   "Tests: {{ world.ticket_id }}"
          thread:  "{{ world.thread }}"
          state:   test_awaiting_reply
          body:    "{{ world.test_artifact.summary_markdown }}"
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.oracle.decide
        with:
          prompt: prompts/judge_test.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_title:  "{{ world.test_artifact.summary_title }}"
            artifact_body:   "{{ world.test_artifact.summary_markdown }}"
            ci_state:        "{{ world.ci_state }}"
        bind:
          llm_verdict: submitted
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        - target: review_executing
          effects:
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0
                # Advancing to review_executing for a fresh run — clear its
                # once: cache so the review artifact regenerates.
                review_artifact:   {}
      # CI failure path: refine bounces back to write_code with the
      # failing-test feedback so the code-write loop closes around CI.
      refine:
        - target: write_code_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:           "{{ world.cycle + 1 }}"
                # Clear the once: cache so the code artifact regenerates.
                code_artifact:   {}
      restart_from:
        - target: review_task_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'review_task' }}"
                cycle:              0
                # Re-entering review_task_executing for a fresh run — clear
                # its once: cache so the task summary regenerates.
                task_summary_artifact: {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
