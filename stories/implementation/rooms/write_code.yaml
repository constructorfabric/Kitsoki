# write_code — phase 2 of the implementation pipeline. The LLM produces
# a concrete `code_artifact` (schemas/code_artifact.json) describing
# the edits to apply: affected files, the patch summary, the rationale.
# iface.vcs.commit lands the change in the workspace; the checkpoint
# gates whether the edits are ready for testing.
#
# Flattened away from `extends: "base"` (choice-widget proposal §4.5 /
# §8): a `choice:` element cannot live inside `blocks:`. The base.pongo
# status line is inlined as the leading prose element.

states:

  write_code_executing:
    description: "Drafting the code change for the task."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.workdir|default:"(no workspace)" }}  ·  {{ world.feature_branch|default:"(no branch)" }}  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "Drafting the code change"
      - kv:
          pairs:
            Ticket:     "{{ world.ticket_id }} — {{ world.ticket_title }}"
            Summary:    '{{ world.code_artifact.summary_title|default:"(pending)" }}'
            Files:      '{{ world.code_artifact.affected_files|join:", "|default:"(pending)" }}'
            Confidence: '{% if world.code_artifact.confidence %}{{ world.code_artifact.confidence|floatformat:2 }}{% else %}(pending){% endif %}'
      - heading: "Artifact"
      - code: '{{ world.code_artifact.summary_markdown|default:"(pending — agent has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "proceed", intent: proceed, hint: "deliver the code-artifact to the checkpoint" }
            - label:  "restart_from"
              intent: restart_from
              hint:   "bounce back to review_task"
              param:
                slot:        stage
                type:        string
                placeholder: "e.g. review_task"
            - { label: "quit", intent: quit, hint: "abandon the pipeline" }
            - { label: "look", intent: look, hint: "re-render" }
    relevant_world: [ticket_id, ticket_title, code_artifact, task_summary_artifact, cycle, refine_feedback]
    on_enter:
      # once: skip the regenerate when code_artifact is already bound
      # (reload / self-re-entry safe). Every arc that re-enters
      # write_code_executing for a FRESH run clears the bind below.
      - invoke: host.agent.decide
        once: true
        with:
          prompt: prompts/write_code_executing.md
          schema: schemas/code_artifact.json
          args:
            ticket_id:           "{{ world.ticket_id }}"
            ticket_title:        "{{ world.ticket_title }}"
            workdir:             "{{ world.workdir }}"
            task_summary:        "{{ world.task_summary_artifact.summary_markdown }}"
            acceptance_criteria: "{{ world.task_summary_artifact.acceptance_criteria }}"
            refine_feedback:     "{{ world.refine_feedback }}"
            cycle:               "{{ world.cycle }}"
        bind:
          code_artifact: submitted
        on_error: idle
      # Commit the change so subsequent rooms (test / review) see it
      # in the workspace. iface.vcs.commit binds the sha but we don't
      # need it here — the test room re-binds the diff via iface.vcs.diff.
      # `stage_all: true` runs `git add -A` so files the agent CREATED
      # that aren't enumerated in affected_files (a new test, a helper)
      # are captured too — a named `files:` list misses untracked work,
      # which is the lost-work split. stage_all takes precedence; the
      # handoff room's clean-tree guard is the backstop.
      - invoke: iface.vcs.commit
        with:
          workdir:   "{{ world.workdir }}"
          message:   "{{ world.code_artifact.summary_title }}"
          stage_all: true
        on_error: idle
    on:
      proceed:
        - target: write_code_awaiting_reply
      restart_from:
        - target: review_task_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'review_task' }}"
                cycle: 0
                # Re-entering review_task_executing for a fresh run — clear
                # its once: cache so the task summary regenerates.
                task_summary_artifact: {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  # Canonical §6 checkpoint shape.
  write_code_awaiting_reply:
    description: "Code change posted; awaiting verdict."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.workdir|default:"(no workspace)" }}  ·  {{ world.feature_branch|default:"(no branch)" }}  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "Code change — awaiting verdict"
      - kv:
          pairs:
            Ticket:     "{{ world.ticket_id }} — {{ world.ticket_title }}"
      - when: "(world.llm_verdict.verdict ?? '') != ''"
        kv:
          pairs:
            Verdict:    '{{ world.llm_verdict.verdict }}'
            Confidence: '{{ world.llm_verdict.confidence|floatformat:2 }}'
            Reason:     '{{ world.llm_verdict.reason }}'
      - heading: "Artifact"
      - code: '{{ world.code_artifact.summary_markdown|default:"(pending — agent has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "accept", intent: accept, hint: "advance to test" }
            - label:  "refine"
              intent: refine
              hint:   "re-draft the code change with feedback"
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
            - label:  "restart_from"
              intent: restart_from
              hint:   "bounce back to review_task"
              param:
                slot:        stage
                type:        string
                placeholder: "e.g. review_task"
            - { label: "quit", intent: quit, hint: "abandon the pipeline" }
            - { label: "look", intent: look, hint: "re-render" }
    relevant_world: [judge_mode, ticket_id, code_artifact, llm_verdict, cycle]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:    "{{ world.thread }}"
          title:     "Code change: {{ world.ticket_id }}"
          body:      "{{ world.code_artifact.summary_markdown }}"
          phase_id:  "write_code_{{ world.ticket_id }}_{{ world.cycle }}"
      - invoke: host.inbox.add
        with:
          kind:    checkpoint
          title:   "Code change: {{ world.ticket_id }}"
          thread:  "{{ world.thread }}"
          state:   write_code_awaiting_reply
          body:    "{{ world.code_artifact.summary_markdown }}"
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        with:
          prompt: prompts/judge_write_code.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_title:  "{{ world.code_artifact.summary_title }}"
            artifact_body:   "{{ world.code_artifact.summary_markdown }}"
        bind:
          llm_verdict: submitted
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        - target: test_executing
          effects:
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0
                # Advancing to test_executing for a fresh run — clear its
                # once: cache so the test artifact regenerates.
                test_artifact:     {}
      refine:
        - target: write_code_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:           "{{ world.cycle + 1 }}"
                # Clear the once: cache so the code artifact regenerates.
                code_artifact:   {}
      restart_from:
        - target: review_task_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'review_task' }}"
                cycle:              0
                # Re-entering review_task_executing for a fresh run — clear
                # its once: cache so the task summary regenerates.
                task_summary_artifact: {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
