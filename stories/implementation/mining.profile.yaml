# mining.profile.yaml — scope config for mining implementation coverage from real
# Claude Code transcripts. Co-located so the story self-describes its mine.
#
# This is SCOPE CONFIGURATION, not an auto-classifier. It tells coverage_prep.py
# (1) which sessions to distill (the grep prefilter), (2) which mined intents are
# in-scope (the action tags), and (3) which rooms are CANDIDATE owners of each
# action tag — a STARTING POINT for the human/LLM map in coverage.md, never an
# assertion. The verdict (CONFORMS / DIVERGES / FIXTURE-GAP / COVERAGE-GAP /
# OUT-OF-SCOPE) is assigned by reading the room bash + the recovered outcome, not
# mechanically. See docs/stories/story-coverage-mining.md.

story: implementation

scope:
  # prep.py --grep words. RECALL-ONLY prefilter: a substring scan over the whole
  # raw jsonl, so it over-matches prose ("implement the idea", "write up the
  # notes"). It widens the net; the real scoping is the human read in the map.
  grep: [implement, "write code", "the test", "go test", review, handoff, "small task", "the ticket"]
  sample: recency          # mine how we work *now*
  max: 25

  # post-filter to these action tags (vocab/tags.yaml). The implementation
  # pipeline is write_code → test → review → handoff, so the in-scope tags are
  # the small-task impl loop: spec-driven coding, running tests, fixing reds,
  # adding coverage, and the review/handoff tail.
  action_tags: [implement-from-spec, fix-failing-tests, add-test-coverage, verify-by-running, review-feedback, commit-or-pr]

# Candidate rooms per action tag — a starting point for the human map, joined into
# the coverage.md "candidate room" column by coverage_prep.py. Room ids are the
# files under stories/implementation/rooms/.
owns:
  implement-from-spec:   [review_task, write_code]
  fix-failing-tests:     [test, write_code]
  add-test-coverage:     [test]
  verify-by-running:     [test]
  review-feedback:       [review, write_code]
  commit-or-pr:          [handoff]

# Non-goals. A matching intent is OUT-OF-SCOPE, not a gap. Matched against the
# verbatim user_text, since the action tags above are too coarse to separate
# these from in-scope work. Implementation is the LIGHT task pipeline: no
# reproduction phase (that's bugfix), no separate security review, no PR-open /
# merge plumbing (that drills into the imported pr-refinement tail), no feature
# PRD / spec-decomposition (that's the heavier feature stories).
non_goals: [reproduce-bug, security-review, pr-open-merge-plumbing, feature-prd-decomposition]

# Marker substrings coverage_prep.py scans the verbatim user_text for to HINT that
# an in-scope-by-tag intent is actually an OUT-OF-SCOPE non_goal. A hint that
# routes the human's attention — never an automatic verdict.
non_goal_markers: ["reproduce the bug", "reproduction", "repro the", "security review", "open a pr", "create a pr", "pull request", "merge the pr", "feature prd", "decompose the", "spec it out"]
