# review_rejects_refine — judge_mode=llm_then_human. The LLM-judge
# at review_awaiting_reply returns `fail` + `refine` with feedback
# (low confidence so it doesn't auto-fire; user steers). The operator
# fires `refine` and the flow bounces to write_code_executing.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  ticket_id:        "TKT-T-004"
  ticket_title:    "Tighten the rate-limit window"
  thread:          "TKT-T-004"
  workspace_id:    "ws-tkt-t-004"
  workdir:         ".worktrees/tkt-t-004"
  base_branch:     "main"
  feature_branch:  "task/tkt-t-004-ratelimit"
  judge_mode:      "human"   # human mode so we control the refine call.
  judge_confidence_threshold: 0.8

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "" }
  host.git:
    data: { ok: true, sha: "abc123", diff: "diff --git a/x b/x", url: "", pr_id: "" }
  host.local:
    data: { ok: true, log: "PASS", state: "success", passed: 2, failed: 0 }
  host.local_files.ticket:
    data:
      ok: true
      body: "Lower the rate-limit window from 60s to 10s."
      title: "Tighten the rate-limit window"
      url:  "issues/tasks/tkt-t-004.md"
  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "Lower rate-limit window"
        summary_markdown: "Change the rate-limit window from 60s to 10s; update test fixture."
        scope:            "Single constant; one test."
        acceptance_criteria: ["Window is 10s in the default config."]
        affected_files:   ["internal/ratelimit/window.go"]
        confidence:       0.78
        reasoning:        "Mechanical constant change."
        status:           "approved"
        tests_run:        { passed: 2, failed: 0, log: "PASS" }
        nits:             []
        blockers:         []
        verdict:    "pass"
        intent:     "accept"
        reason:     "stub"

turns:
  - intent: { name: start, slots: {} }
    expect_state: review_task_executing
  - intent: { name: proceed, slots: {} }
    expect_state: review_task_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: write_code_executing
  - intent: { name: proceed, slots: {} }
    expect_state: write_code_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: test_executing
  - intent: { name: proceed, slots: {} }
    expect_state: test_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: review_executing
  - intent: { name: proceed, slots: {} }
    expect_state: review_awaiting_reply

  # User refines the review. Arc:
  #   target: write_code_executing
  #   effects: refine_feedback, cycle++
  - intent:
      name: refine
      slots: { feedback: "Missing test coverage for the 60s→10s transition window." }
    expect_state: write_code_executing
    expect_world:
      cycle:           1
      refine_feedback: "Missing test coverage for the 60s→10s transition window."

  # Re-walk write_code → test → review → accept → handoff.
  - intent: { name: proceed, slots: {} }
    expect_state: write_code_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: test_executing
    expect_world:
      cycle:           0
      refine_feedback: ""
  - intent: { name: proceed, slots: {} }
    expect_state: test_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: review_executing
  - intent: { name: proceed, slots: {} }
    expect_state: review_awaiting_reply

  # Bail at the second review to keep the flow narrow.
  - intent: { name: quit, slots: {} }
    expect_state: __exit__abandoned

expect_terminal: true
expect_no_errors: true
