# implementation — small-task pipeline. See docs/case-studies/bug-fix.md.
#
# Triggered when a ticket's type is `task` (a small, well-scoped piece of
# work; not a bug, not a feature_prd). The pipeline is **lighter than
# bugfix**: there is no reproduction phase (the task is described, not
# detected) and no separate security-review pass. Five visible rooms:
#
#   idle → review_task → write_code → test → review → handoff
#
# `handoff` imports `pr-refinement` as the shared tail and consumes the
# `merged` / `abandoned` exits. Each `_awaiting_reply` follows the
# canonical §6 checkpoint shape from
# `docs/proposals/notes/dev-story-implementation-contract.md` — same
# post + inbox + LLM-judge + emit_intent rhythm as bugfix; only the
# artifact key + judge prompt vary.
#
# # Why no reproduction phase?
#
# A task is described by the ticket body; there is nothing to reproduce.
# `review_task` is the analogue: it fetches the ticket via
# `iface.ticket.get`, normalises the body into a task summary, and the
# operator confirms the understanding.
#
# # Standalone-runnable.
#
#   kitsoki run stories/implementation/app.yaml --warp scenarios/tkt_900.yaml
#
# # Imported.
#
# Parent stories (dev-story, kitsoki-dev) import implementation as one
# import edge per child; the `done` exit hands off to pr-refinement.
#
# # Judge polymorphism — same shape as stories/bugfix/.
#
# Every `_awaiting_reply` runs the same on_enter chain in all three
# judge modes (`human`, `llm`, `llm_then_human`); `world.judge_mode`
# flips one host call.

app:
  id: implementation
  version: 0.1.0
  title: "Implementation pipeline (small task)"
  author: "Kitsoki"
  license: "CC0"

# Host allow-list. iface defaults register implicitly via
# resolveAllInterfaces; bare host.inbox.add and host.agent.decide
# are listed explicitly because they are not wrapped by an iface.
hosts:
  - host.inbox.add
  - host.agent.decide
  # host.run — the handoff room's lost-work clean-tree check shells out to
  # `git status --porcelain` before the pr-refinement handoff.
  - host.run

# Five host_interfaces — same provider-neutral surfaces as bugfix; one
# fewer (no separate workspace because implementation doesn't create
# new worktrees, it works inside an existing one).
host_interfaces:

  ticket:
    description: "Issue tracker abstraction (file / GitHub Issues / Jira)."
    operations:
      search:
        input:  { query: string, limit: int }
        output: { tickets: list }
      get:
        input:  { id: string }
        output: { id: string, title: string, body: string, status: string,
                  priority: string, assignee: string, url: string, comments: list }
      comment:
        input:  { id: string, body: string, thread: string }
        output: { ok: bool, comment_id: string }
      transition:
        input:  { id: string, to: string }
        output: { ok: bool }
      list_mine:
        input:  { filter: string }
        output: { tickets: list }
    default: host.local_files.ticket

  vcs:
    description: "Branch / commit / PR abstraction (git / GitHub / Bitbucket)."
    operations:
      branch:
        input:  { workdir: string, name: string, base: string }
        output: { ok: bool, branch: string }
      diff:
        input:  { workdir: string }
        output: { diff: string, files: list }
      commit:
        # stage_all: when true the handler runs `git add -A` first, so NEW
        # untracked files (e.g. a test the agent wrote) AND deletions are
        # captured — `files:` and the `-a` fallback both miss untracked.
        # The write_code + test rooms set this so a mutation can never be
        # stranded uncommitted (the lost-work split). See git_vcs.go.
        input:  { workdir: string, message: string, files: list, stage_all: bool }
        output: { ok: bool, sha: string }
      push:
        input:  { workdir: string, remote: string }
        output: { ok: bool, url: string }
      open_pr:
        input:  { workdir: string, title: string, body: string, base: string }
        output: { ok: bool, url: string, pr_id: string }
      pr_status:
        input:  { pr_id: string }
        output: { state: string, checks: list, comments: list }
      pr_comment:
        input:  { pr_id: string, body: string }
        output: { ok: bool }
      merge:
        input:  { pr_id: string, strategy: string }
        output: { ok: bool, sha: string }
    default: host.git

  ci:
    description: "Build/test runner."
    operations:
      run_tests:
        input:  { workdir: string, target: string }
        output: { ok: bool, passed: int, failed: int, log: string, junit: string }
      build:
        input:  { workdir: string, target: string }
        output: { ok: bool, log: string }
      remote_status:
        input:  { pr_id: string }
        output: { state: string, checks: list }
    default: host.local

  workspace:
    description: "Working-copy manager. Local: git worktree."
    operations:
      list:
        input:  {}
        output: { workspaces: list }
      get:
        input:  { id: string }
        output: { id: string, path: string, branch: string, dirty: bool }
      create:
        # `id` is the workspace identity (pins the on-disk .worktrees/<id>
        # dir basename); `name` is the branch; `base` is the branch to
        # root from. Matches host.git_worktree's worktreeCreate, which
        # reads id/name/base — every caller (bf.idle, impl.idle) passes
        # `id:` from world.workspace_id. The earlier `ticket_id` label
        # was stale: no caller passed it and the handler never read it.
        input:  { id: string, name: string, base: string }
        output: { ok: bool, path: string }
      sync:
        input:  { id: string }
        output: { ok: bool, log: string }
    default: host.git_worktree

  transport:
    description: "Out-of-band channel for posting proposals, checkpoints, status."
    operations:
      post:
        input:  { thread: string, body: string }
        output: { ok: bool, message_id: string }
    default: host.append_to_file

# World — Wave 3 keys. Reuses the bugfix-family lingua franca (ticket_id,
# workdir, judge_mode, …) so parent stories project keys once for both.
world:
  # ── Identity / ticket ──────────────────────────────────────────────
  ticket_id:        { type: string, default: "" }
  ticket_title:     { type: string, default: "" }
  ticket_status:    { type: string, default: "" }
  ticket_url:       { type: string, default: "" }
  ticket_body:      { type: string, default: "" }
  thread:           { type: string, default: "" }
  allowed_authors:  { type: string, default: "" }

  # ── Workspace ─────────────────────────────────────────────────────
  workspace_id:     { type: string, default: "" }
  workdir:          { type: string, default: "" }
  base_branch:      { type: string, default: "main" }
  feature_branch:   { type: string, default: "" }
  # Gates idle.on_enter's worktree-provisioning chain so it fires
  # exactly once per session per ticket — mirrors bugfix's
  # bf_autostart_attempted. Without provisioning, an entry path that
  # does NOT pre-seed workdir (dev-story's `drive` / `go_implementation`
  # / design_done `implement`) ran the pipeline against an empty
  # workdir; only the flow fixtures papered over it via initial_world.
  impl_provision_attempted: { type: bool, default: false }

  # ── Pipeline control ──────────────────────────────────────────────
  judge_mode:                  { type: string, default: "human" }
  judge_confidence_threshold:  { type: float,  default: 0.8 }
  cycle:                       { type: int,    default: 0 }
  last_reply_author:           { type: string, default: "" }
  refine_feedback:              { type: string, default: "" }
  jump_to:                     { type: string, default: "" }
  restart_from_stage:          { type: string, default: "" }

  # ── Per-room artifacts ────────────────────────────────────────────
  task_summary_artifact:  { type: object, default: {} }
  code_artifact:          { type: object, default: {} }
  test_artifact:          { type: object, default: {} }
  review_artifact:        { type: object, default: {} }

  # ── CI scratch (test_executing populates this) ─────────────────────
  ci_log:           { type: string, default: "" }
  ci_state:         { type: string, default: "" }     # success | failure

  # ── Judge state ───────────────────────────────────────────────────
  llm_verdict:      { type: object, default: {} }

  # ── PR handoff (populated by the pr-refinement import) ─────────────
  pr_id:            { type: string, default: "" }
  pr_url:           { type: string, default: "" }
  pr_title:         { type: string, default: "" }
  pr_body:          { type: string, default: "" }
  merge_strategy:   { type: string, default: "squash" }
  last_pr_url:      { type: string, default: "" }

  # ── Carry-fields for the handoff into pr-refinement ────────────────
  done_artifact:    { type: object, default: {} }   # synthesised on @exit:done

  # ── Story-level "done" sink for standalone runs ──────────────────
  status:           { type: string, default: "open" }   # open | done | merged | abandoned

  # ── Lost-work guard (clean-tree invariant) ───────────────────────
  # The maker rooms mutate the worktree (write_code applies the change,
  # test may repair files in place). Every such edit MUST land in a
  # commit before the handoff — `git rebase`/`merge` move only committed
  # content, so an uncommitted/untracked file would ship an empty or
  # partial shell while the working tree (which the gates read) looks
  # green. The `handoff` room re-reads `git status --porcelain` and
  # routes a dirty tree away from the pr-refinement merge — the
  # pr-refinement analogue of the direct-ship integrate room's guard
  # (delivery-tail/rooms/integrate.yaml). implementation has no
  # @exit:needs-human, so the dirty arc routes to @exit:abandoned with
  # last_error set (the safest existing escape).
  worktree_dirty:        { type: bool,   default: false }  # handoff's git-status check found uncommitted/untracked work
  worktree_dirty_files:  { type: string, default: "" }     # the porcelain listing (carried into last_error)

# Intent vocabulary.
intents:
  start:
    description: "Begin the pipeline from idle."
    examples: [start, "begin", "kick off"]
    priority: 90
  proceed:
    description: "Advance from an _executing room to its _awaiting_reply checkpoint."
    examples: [proceed, "next", "deliver"]
    priority: 85
  accept:
    description: "Accept the current checkpoint artifact; advance."
    examples: [accept, "approve", "lgtm", "ship it"]
    priority: 80
  refine:
    description: "Refine the current checkpoint; re-execute with feedback."
    examples: [refine, "rework", "redo"]
    priority: 70
    slots:
      feedback: { type: string, required: false }
  restart_from:
    description: "Restart from a named prior stage."
    examples: [restart_from, "restart"]
    priority: 60
    slots:
      stage: { type: string, required: false }
  quit:
    description: "Abandon the pipeline."
    examples: [quit, "abort", "bail"]
    priority: 50
  look:
    description: "Re-render the current view."
    examples: [look, "what now?"]
    priority: 10

# Intents exposed to importing parent stories.
exports:
  intents: [start, proceed, accept, refine, restart_from, quit, look]

# Named return points. A parent story (dev-story / kitsoki-dev) maps
# each to one of its own states. Standalone load synthesises
# `__exit__done` and `__exit__abandoned` terminals.
exits:
  done:
    description: "Pipeline succeeded; PR was opened + merged via pr-refinement."
    requires: [code_artifact]
  abandoned:
    description: "User or LLM bailed."

# Root state — the operator-controlled entry point.
root: idle

# Imports — pr-refinement is the shared tail. The `handoff` room
# enters the `pr` import compound; its `merged` exit projects back
# into our `@exit:done`, and `abandoned` projects into `@exit:abandoned`.
imports:
  pr:
    source: ../pr-refinement
    entry: open_pr

    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      pr_title:        "{{ world.pr_title }}"
      pr_body:         "{{ world.pr_body }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      merge_strategy:  "{{ world.merge_strategy }}"

    intents:
      import: [open, monitor, retry, resolve, merge_now]

    exits:
      merged:
        to: "@exit:done"
        set:
          status:        "merged"
          last_pr_url:   "{{ world.pr__pr_url }}"
          # Re-pin code_artifact on the @exit:done arc so the static
          # `requires: [code_artifact]` check sees it on the transition.
          code_artifact: "{{ world.code_artifact }}"
          done_artifact: "{{ world.code_artifact }}"
      abandoned:
        to: "@exit:abandoned"
        set:
          status: "abandoned"
      pushback_resolved:
        to: handoff

# Rooms live in rooms/*.yaml.
include:
  - rooms/*.yaml
