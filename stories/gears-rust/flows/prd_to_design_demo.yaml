# prd_to_design_demo — the gears PRD walk used by the VS Code extension demo
# video. A sibling of prd_to_design_full.yaml that, unlike it, leaves host.ide.*
# AND host.artifacts_dir UNSTUBBED so that under `kitsoki web` inside the
# extension (IDE connected) the brief/PRD are written to REAL files and opened in
# the real editor, and a refine shows a REAL native diff with an accept/reject
# verdict. workdir is "." (self-contained .artifacts) instead of ../gears-rust so
# the real writes land somewhere that exists in the recording sandbox. Under
# `kitsoki test flows` (no IDE) host.ide.* return connected:false, host.artifacts_dir
# writes gitignored files, and the refine takes the plain arc — still a valid
# deterministic flow. The recording drives the SAME rooms through the UI (the
# native gears-prd-design web tour's proven core__ sequence).

test_kind: flow
app: ../app.yaml
initial_state: core.main
initial_world:
  judge_mode: "human"
  core__workdir:               "."
  core__publish_durable_path:  "docs/prd"
  core__prd_doc_filename:      "PRD"
  core__design_durable_path:   "docs/proposals"
  core__design_doc_filename:   "DESIGN"
  core__design_template_dir:   "stories/gears-rust/templates"
  core__design_ticket_dir:     ""

host_handlers:
  # NOTE: host.ide.* and host.artifacts_dir are intentionally NOT stubbed.
  host.chat.resolve:
    data: { ok: true, chat_id: "chat-1", title: "PRD idea discovery", is_new: true }
  host.agent.converse:
    data: { ok: true, answer: "A notes service so every note ties to the work it belongs to.", chat_id: "chat-1", claude_session_id: "sess-1" }
  host.agent.search:
    data: { hits: [], top: null }
  host.agent.decide:
    data:
      ok: true
      submitted:
        questions:
          - { id: "q1", question: "Who is the primary actor?", why: "scopes the persona" }
          - { id: "q2", question: "What is the single most important success metric?", why: "defines done" }
    by_call:
      match_answer:
        data:
          ok: true
          submitted:
            answers_block:       "Q1: platform engineers\nQ2: notes-saved-per-session\n"
            answered_ids_append: "|1||2|"
            matched_count:       2
      name_slug:
        data:
          ok: true
          submitted: { slug: "notes-service", rationale: "the gear the design is authored for" }
      existing_scan:
        data:
          ok: true
          submitted: { overlaps: [], roadmap_fit: "A net-new gear; no overlap with existing gears." }
      references_research:
        data:
          ok: true
          submitted:
            items:
              - { path: "docs/prd/notes-service.md", sections: "§5", rationale: "the PRD this design realizes" }
      brief_check:
        data:
          ok: true
          submitted: { verdict: "continue", reason: "Crisp why, clear metric, IDs threaded.", questions: [] }
  host.agent.task:
    by_call:
      # PRD first draft (drafting on_enter, id: prd_author) — the full PRD body.
      prd_author:
        data:
          ok: true
          submitted:
            title: "PRD: Notes Service"
            summary_markdown: |
              # PRD: Notes Service

              ## Problem & Context
              Teams capture notes across scattered tools; nothing ties a note to
              the work it belongs to, so context is lost between sessions.

              ## Target Users
              Platform engineers and their teams who already live in the kitsoki
              workspace.

              ## Goals
              - A first-class notes surface attached to sessions and tickets.
              - Fast capture and retrieval with zero context switch.

              ## Requirements
              - Functional: create, edit, link, and search notes from any room.
              - Non-functional: notes-saved-per-session is the headline metric.

              ## Open Questions
              - Should a note be private by default or shared with the room?
            file_path:           ".artifacts/prd/notes-service/004-prd.md"
            confidence:          0.84
            needs_clarification: false
            follow_up_questions: []
      # PRD refine re-draft (drafting refine, id: prd_author_refine) — v2 adds a
      # Non-Goals section + a tenant-isolation requirement so the diff is clear.
      prd_author_refine:
        data:
          ok: true
          submitted:
            title: "PRD: Notes Service"
            summary_markdown: |
              # PRD: Notes Service

              ## Problem & Context
              Teams capture notes across scattered tools; nothing ties a note to
              the work it belongs to, so context is lost between sessions.

              ## Target Users
              Platform engineers and their teams who already live in the kitsoki
              workspace.

              ## Goals
              - A first-class notes surface attached to sessions and tickets.
              - Fast capture and retrieval with zero context switch.

              ## Non-Goals
              - Not a general-purpose wiki; notes are scoped to sessions and tickets.

              ## Requirements
              - Functional: create, edit, link, and search notes from any room.
              - Non-functional: notes-saved-per-session is the headline metric.
              - Security: tenant isolation is mandatory; admins see only aggregate metrics.

              ## Open Questions
              - Should a note be private by default or shared with the room?
            file_path:           ".artifacts/prd/notes-service/004-prd-next.md"
            confidence:          0.88
            needs_clarification: false
            follow_up_questions: []
  host.run:
    by_call:
      mint_workspace:
        data:
          ok: true
          exit_code: 0
          stdout_json: { slug: "notes-service", workspace: ".artifacts/prd/notes-service" }
      uniquify:
        data:
          ok: true
          exit_code: 0
          stdout_json: { slug: "notes-service", workspace: ".artifacts/design/notes-service" }
      publish:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            prd_file:     "docs/prd/notes-service.md"
            design_file:  "docs/proposals/notes-service.md"
            ticket_id:    ""
            ticket_path:  ""
            ticket_title: "Technical Design — Notes Service"

turns:
  # The deterministic (no-IDE) PRD-half walk for `kitsoki test flows`. The
  # recording drives the SAME rooms through the UI; with the IDE connected the
  # refine shows a diff and gates on the verdict (the plain arc here).
  - intent: { name: core__go_prd, slots: {} }
    expect_state: core.prd.idle
  - intent: { name: core__prd__discuss, slots: { message: "I want a notes-service gear" } }
    expect_state: core.prd.idle
  - intent: { name: core__prd__start, slots: {} }
    expect_state: core.prd.search
  - intent: { name: core__prd__confirm, slots: {} }
    expect_state: core.prd.clarifying
  - intent: { name: core__prd__answer, slots: { text: "platform engineers, metric is notes-saved-per-session" } }
    expect_state: core.prd.clarifying
  - intent: { name: core__prd__submit_answers, slots: {} }
    expect_state: core.prd.brief
  - intent: { name: core__prd__confirm, slots: {} }
    expect_state: core.prd.references
  - intent: { name: core__prd__confirm, slots: {} }
    expect_state: core.prd.drafting
  - intent: { name: core__prd__refine, slots: { feedback: "add a non-goals section and require tenant isolation" } }
    expect_state: core.prd.drafting
  - intent: { name: core__prd__accept, slots: {} }
    expect_state: core.prd_published

expect_no_errors: true
