# scoring — DETERMINISTIC (no LLM). Aggregate the per-cell results into a summary
# by calling the harness's FREE aggregate.py (no LLM, no cost — the skill's
# "Aggregation + offline regeneration" step). The committed cells/*.json the
# manual run produced are merged into results/summary.json + the rollup.
#
# We call the script — we never reimplement scoring/pricing (the harness is the
# single source of truth). `--generated-at` is REQUIRED (the build bans implicit
# wall-clock timestamps); we pass world.generated_at.
#
# `once: true` keyed on its own bind (summary) → reload-safe.

states:

  scoring:
    description: "Aggregating the cell results into a summary (deterministic, host.run → aggregate.py)."
    relevant_world: [summary, summary_path, generated_at, harness_dir]
    view:
      - heading: "Bake-off · scoring"
      - kv:
          pairs:
            Summary: '{{ world.summary_path|default:"(aggregating…)" }}'
            Cells:   "{{ world.summary.cells|length }}"
      - prose: "aggregate.py rolls the per-cell results up into a summary (by_treatment / by_candidate / by_cell_key). Deterministic — no LLM."
    on_enter:
      - invoke: host.run
        id: aggregate
        once: true
        with:
          cmd: python3
          args:
            - "aggregate.py"
            - "--generated-at"
            - "{{ world.generated_at }}"
          cwd: "{{ world.harness_dir }}"
        bind:
          summary:      stdout_json
          summary_path: stdout_json.summary_path
        on_error: running
      - when: "world.summary.generated_at != nil && world.summary.generated_at != ''"
        emit_intent: accept
    on:
      accept:
        - target: reporting
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
