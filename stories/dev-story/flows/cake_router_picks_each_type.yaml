app: ../app.yaml
initial_state: main
initial_world:
  ticket_id: ""
  judge_mode: "human"

host_handlers:
  host.local_files.ticket:
    data: { tickets: [] }
  host.append_to_file:
    data: { ok: true, message_id: "msg-0" }
  host.inbox.add:
    data: { ok: true, id: "ib-0" }

turns:
  - intent: { name: go_ticket_search, slots: {} }
    expect_state: ticket_search

  - intent: { name: pick_ticket, slots: { id: "F-2026-05-18-export-csv", type: "feature" } }
    expect_state: ticket_search
    expect_world:
      ticket_type: "feature"

  - intent: { name: go_main, slots: {} }
    expect_state: main

  - intent: { name: drive, slots: {} }
    expect_state: impl.idle
    expect_world:
      impl__ticket_id: "F-2026-05-18-export-csv"

expect_no_errors: true
expect_no_host_calls:
  - host.cypilot_artifacts

