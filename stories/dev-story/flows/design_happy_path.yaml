# design_happy_path — the full proposal pipeline, intent-only (no LLM).
#
# intake → design_search (scout ONLY fires on entry — the early gate) →
# confirm (no overlap) → design_materialize (folder + references fire on
# entry, then auto-advance) → design_refine (brief scaffold + refiner fire
# on entry; judge guarded until `ready`) → ready → design_draft (author
# fires on entry) → accept → design_done (publish in arc) → go_main → main.
#
# The intake `discuss` mints only the candidate SLUG — the workspace folder is
# created later, in design_materialize, AFTER the scout gate clears.
# The search `confirm` action has a guard that only allows advancing when
# the overlap list is empty; it lands in design_materialize, whose final
# on_enter step emits `materialized` to cascade straight to design_refine.
# The refine `ready` action increments design_brief_cycle (arms the judge)
# and re-enters with a FULL target; the judge fires on on_enter and a
# `continue` verdict auto-advances via the post-bind emit_intent.
# The draft accept arc runs the publish script inline; the result lands in
# design_done (was design_publish in the prior 6-stage pipeline).
#
# Decide calls are stubbed by their invoke `id:` (existing_scan,
# references_research, brief_check); host.run sites (name_slug, uniquify,
# publish) likewise; the task sites split by_call (refine_brief) vs the
# default (draft author).

test_kind: flow
app: ../app.yaml
initial_state: design
initial_world:
  judge_mode: "human"

host_handlers:
  host.ide.open_file:
    data: { ok: true, connected: true }
  host.agent.decide:
    by_call:
      existing_scan:
        data:
          ok: true
          submitted: { overlaps: [], roadmap_fit: "A net-new runtime primitive; no overlap with the current queue." }
      references_research:
        data:
          ok: true
          submitted:
            items:
              - { path: "docs/proposals/process-design.md", sections: "§4.3", rationale: "names the first-class workdir as a future runtime slice" }
      brief_check:
        data:
          ok: true
          submitted: { verdict: "continue", reason: "Crisp why, one-screen change, kind named.", questions: [] }
  # Semantic reference search pre-seeds the researcher (design_materialize).
  host.agent.search:
    data: { hits: [], top: null }
  host.artifacts_dir:
    data: { ok: true, path: "docs/proposals/.workspace/first-class-working-folder/001-brief.md", message_id: "out#1" }
  host.agent.task:
    by_call:
      refine_brief:
        data:
          ok: true
          submitted:
            summary: "Idea is clear; Why and What-changes need detail."
            gaps:    ["Specify which engine seam establishes the workdir", "Document cleanup on session end"]
    data:
      # The un-id'd draft author task (design_draft.on_enter).
      ok: true
      submitted:
        title:               "Runtime: first-class per-session working folder"
        kind:                "runtime"
        summary_markdown:    "## Runtime: first-class per-session working folder\n\nThe engine establishes a gitignored, session-keyed working folder at session start, exposed as a reserved world.workdir, and cleans it up on exit."
        file_path:           "docs/proposals/.workspace/first-class-working-folder/004-proposal.md"
        confidence:          0.82
        needs_clarification: false
        follow_up_questions: []
  host.run:
    by_call:
      name_slug:
        data:
          ok: true
          exit_code: 0
          stdout: '{"slug":"first-class-working-folder","workspace":"docs/proposals/.workspace/first-class-working-folder"}'
          stdout_json: { slug: "first-class-working-folder", workspace: "docs/proposals/.workspace/first-class-working-folder" }
      uniquify:
        data:
          ok: true
          exit_code: 0
          stdout: '{"slug":"first-class-working-folder","workspace":"docs/proposals/.workspace/first-class-working-folder"}'
          stdout_json: { slug: "first-class-working-folder", workspace: "docs/proposals/.workspace/first-class-working-folder" }
      publish:
        data:
          ok: true
          exit_code: 0
          stdout: '{"design_file":"docs/proposals/first-class-working-folder.md","ticket_id":"F-2026-06-11T120000Z-first-class-working-folder","ticket_path":"issues/features/F-2026-06-11T120000Z-first-class-working-folder.md","ticket_title":"First-class working folder","ticket_url":"docs/proposals/first-class-working-folder.md"}'
          stdout_json:
            design_file: "docs/proposals/first-class-working-folder.md"
            ticket_id:     "F-2026-06-11T120000Z-first-class-working-folder"
            ticket_path:   "issues/features/F-2026-06-11T120000Z-first-class-working-folder.md"
            ticket_title:  "First-class working folder"
            ticket_url:    "docs/proposals/first-class-working-folder.md"

turns:
  # Stage 1: Intake — one message mints the candidate SLUG (no folder yet) and
  # advances to search. The scout fires on entry to design_search (the early
  # gate). No workspace, no 002, no references at this point.
  - intent: { name: discuss, slots: { message: "I want a per-session working folder primitive" } }
    expect_state: design_search
    expect_world:
      design_slug: "first-class-working-folder"
      design_idea: "I want a per-session working folder primitive"
      # No overlap folder minted yet.
      design_workspace: ""
      design_existing_state:
        overlaps:     []
        roadmap_fit:  "A net-new runtime primitive; no overlap with the current queue."
    expect_host_calls:
      - handler: host.run
        args: { call: "name_slug" }
      # Stage 2 on_enter — the scout only. No folder, no references here.
      - handler: host.agent.decide
        args: { call: "existing_scan" }
    # The folder + reference work is deferred behind the gate.
    expect_no_host_calls: [host.agent.search, host.artifacts_dir]

  # Stage 2: Search — no overlap → confirm → design_materialize → (auto-
  # advance via emit_intent) → design_refine, all in one turn.
  #   materialize on_enter: uniquify (folder) + 002 persist + references + 003
  #     persist (the 003 write emits `materialized`).
  #   refine on_enter: scaffold 001-brief + open IDE + refiner. The judge is
  #     GUARDED (brief_cycle == 0) so it does NOT fire on first entry.
  - intent: { name: confirm, slots: {} }
    expect_state: design_refine
    expect_world:
      design_overlap_decision: "new"
      # The folder is finally minted here, behind the gate.
      design_workspace: "docs/proposals/.workspace/first-class-working-folder"
      design_existing_state:
        overlaps:     []
        roadmap_fit:  "A net-new runtime primitive; no overlap with the current queue."
      design_references:
        items:
          - { path: "docs/proposals/process-design.md", sections: "§4.3", rationale: "names the first-class workdir as a future runtime slice" }
      design_brief_path: "docs/proposals/.workspace/first-class-working-folder/001-brief.md"
      design_brief_cycle: 0
    expect_host_calls:
      # Materialize: folder + persisted scout report + references + persisted refs.
      - handler: host.run
        args: { call: "uniquify" }
      - handler: host.artifacts_dir
        args: { thread: "002-existing-state" }
      - handler: host.agent.decide
        args: { call: "references_research" }
      - handler: host.artifacts_dir
        args: { thread: "003-references.json" }
      # Refine on_enter (reached via the materialized emit_intent).
      - handler: host.artifacts_dir
        args: { thread: "001-brief" }
      - handler: host.ide.open_file
        args: { path: "docs/proposals/.workspace/first-class-working-folder/001-brief.md" }
      - handler: host.agent.task
        args: { call: "refine_brief" }

  # Stage 3: ready — increment cycle (arms the judge) and re-enter.
  # Judge fires on on_enter (brief_cycle == 1 > 0), verdict = continue →
  # post-bind emit_intent advance_brief → auto-advance to design_draft.
  # Stage 4 on_enter: draft author fires.
  - intent: { name: ready, slots: {} }
    expect_state: design_draft
    expect_world:
      design_brief_cycle:    1
      design_brief_decision:
        verdict:   "continue"
        reason:    "Crisp why, one-screen change, kind named."
        questions: []
      design_kind: "runtime"
    expect_host_calls:
      - handler: host.agent.decide
        args: { call: "brief_check" }
    # The draft room surfaces the target path as a discrete "Draft" kv (the
    # golden-example view change).
    expect_view_matches: "Draft.*004-proposal\\.md"

  # Stage 4: accept — publish inline (no separate design_publish room).
  - intent: { name: accept, slots: {} }
    expect_state: design_done
    expect_world:
      design_file: "docs/proposals/first-class-working-folder.md"
      # Publish also minted a feature ticket and pinned the routing keys so the
      # done room can drive straight into the impl pipeline.
      design_ticket_path: "issues/features/F-2026-06-11T120000Z-first-class-working-folder.md"
      ticket_id:   "F-2026-06-11T120000Z-first-class-working-folder"
      ticket_type: "feature"
      ticket_url:  "docs/proposals/first-class-working-folder.md"
    expect_host_calls:
      - handler: host.run
        args: { call: "publish" }
    # The done room surfaces the published path as a discrete "Published" kv.
    expect_view_matches: "Published.*first-class-working-folder\\.md"

  # Back to the day landing.
  - intent: { name: go_main, slots: {} }
    expect_state: landing

expect_no_errors: true
