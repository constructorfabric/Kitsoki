# cake_bugfix_walk — pick the cake demo bug, drive through the
# (merged-room) bugfix pipeline and the pr-refinement tail back to
# dev-story main with status="merged".
#
# Post-bugfix-room-merge shape (commit ea52331): each phase is one
# state per room; bf__accept advances from one phase to the next.
# bf.idle auto-starts on entry from go_bugfix so the operator drops
# straight into reproducing.
#
# Cake-specific value over stories/dev-story/flows/bugfix_to_pr.yaml:
#   - workdir is testdata/projects/cake (real demo project).
#   - HostStub.by_op routes iface.ticket.list_mine vs transition vs
#     search to distinct envelopes under one local-files stub.
#   - expect_host_calls pins iface.ticket.transition fired exactly
#     once with to:"resolved" on the done.accept arc — the close-out
#     side effect that lives on the bugfix → pr seam.
#   - fixture-level expect_no_host_calls guard on cypilot's artifact
#     provider so a regression that re-routed bugfix through cyp
#     would fail loudly.

test_kind: flow
app: ../app.yaml
initial_state: landing
initial_world:
  ticket_id:      "B-2026-05-18-list-broken"
  ticket_title:   "Note list disappears after creating a second note"
  ticket_type:    "bug"
  ticket_url:     "issues/bugs/B-2026-05-18-list-broken.md"
  thread:         "B-2026-05-18-list-broken"
  workdir:        "testdata/projects/cake"
  workspace_id:   "ws-cake-bug"
  base_branch:    "main"
  feature_branch: "fix/B-2026-05-18-list-broken"
  judge_mode:     "human"
  judge_confidence_threshold: 0.8
  merge_strategy: "squash"

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }

  # Workspace iface — one stub satisfies create / sync / get / list.
  host.git_worktree:
    data: { ok: true, log: "synced", path: "testdata/projects/cake" }

  # VCS iface — host.git serves vcs.{branch,commit,push,open_pr,
  # pr_status,merge} via prefix-fallback.
  host.git:
    data:
      ok:     true
      sha:    "deadbeef"
      diff:   ""
      url:    "https://example/pr/B-2026-05-18-list-broken"
      pr_id:  "200"
      state:  "success"
      checks: ""
      comments: ""
      branch: "fix/B-2026-05-18-list-broken"

  host.local:
    data: { ok: true, state: "success", log: "PASS", passed: 4, failed: 0 }

  # iface.ticket.* — the local-files provider against the cake project.
  # by_op serves a populated list_mine and a successful transition
  # without one envelope clobbering the other (transition would
  # otherwise return tickets:[…] which is meaningless for transition).
  host.local_files.ticket:
    by_op:
      list_mine:
        data:
          ok: true
          tickets:
            - id:       "B-2026-05-18-list-broken"
              title:    "Note list disappears after creating a second note"
              type:     "bug"
              status:   "open"
              priority: "P2"
              assignee: "brad"
      search:
        data:
          ok: true
          tickets:
            - id:       "B-2026-05-18-list-broken"
              title:    "Note list disappears after creating a second note"
              type:     "bug"
              status:   "open"
              priority: "P2"
              assignee: "brad"
      transition:
        data: { ok: true }

  host.oracle.task:
    data:
      ok: true
      submitted:
        summary_title:    "Note list disappears — defer state mutation"
        summary_markdown: "Stub bugfix artifact body; deterministic across rooms."
        bug_verified:     true
        steps:            ["create alpha", "create beta", "list re-renders empty"]
        involved_components:
          - { name: "frontend/src/NotesList.tsx", reason: "list state mutation" }
        environment_check:
          frontend_running: true
          backend_running:  true
          dataset_ready:    true
        fix_description:  "Replace the in-place splice with a new array on add."
        root_cause:       "The list re-render reuses the same array reference, so React's diff bails out."
        affected_files:   ["frontend/src/NotesList.tsx"]
        confidence:       0.85
        reasoning:        "Trace shows the array identity unchanged; React's diff bails out."
        status:           "passed"
        tests_added:      ["frontend/src/NotesList.test.tsx"]
        tests_run:        { passed: 4, failed: 0, log: "PASS 4 tests" }
        outcome:          "pass"
        evidence:         { build: "ok", api: "n/a", ui: "list shows both notes" }
        lessons:
          - { category: "react", description: "Always return new array references when notifying state changes.", severity: "high" }
        verdict:    "pass"
        intent:     "accept"
        reason:     "Stub artifact passes the schema."

  host.oracle.ask:
    data:
      ok: true
      submitted:
        summary_title:    "Note list disappears — defer state mutation"
        summary_markdown: "Stub bugfix artifact body; deterministic across rooms."
        bug_verified:     true
        steps:            ["create alpha", "create beta", "list re-renders empty"]
        involved_components:
          - { name: "frontend/src/NotesList.tsx", reason: "list state mutation" }
        environment_check:
          frontend_running: true
          backend_running:  true
          dataset_ready:    true
        fix_description:  "Replace the in-place splice with a new array on add."
        root_cause:       "The list re-render reuses the same array reference, so React's diff bails out."
        affected_files:   ["frontend/src/NotesList.tsx"]
        confidence:       0.85
        reasoning:        "Trace shows the array identity unchanged; React's diff bails out."
        status:           "passed"
        tests_added:      ["frontend/src/NotesList.test.tsx"]
        tests_run:        { passed: 4, failed: 0, log: "PASS 4 tests" }
        outcome:          "pass"
        evidence:         { build: "ok", api: "n/a", ui: "list shows both notes" }
        lessons:
          - { category: "react", description: "Always return new array references when notifying state changes.", severity: "high" }
        verdict:    "pass"
        intent:     "accept"
        reason:     "Stub artifact passes the schema."

  host.oracle.decide:
    data:
      ok: true
      submitted:
        summary_title:    "Note list disappears — defer state mutation"
        summary_markdown: "Stub bugfix artifact body; deterministic across rooms."
        bug_verified:     true
        steps:            ["create alpha", "create beta", "list re-renders empty"]
        involved_components:
          - { name: "frontend/src/NotesList.tsx", reason: "list state mutation" }
        environment_check:
          frontend_running: true
          backend_running:  true
          dataset_ready:    true
        fix_description:  "Replace the in-place splice with a new array on add."
        root_cause:       "The list re-render reuses the same array reference, so React's diff bails out."
        affected_files:   ["frontend/src/NotesList.tsx"]
        confidence:       0.85
        reasoning:        "Trace shows the array identity unchanged; React's diff bails out."
        status:           "passed"
        tests_added:      ["frontend/src/NotesList.test.tsx"]
        tests_run:        { passed: 4, failed: 0, log: "PASS 4 tests" }
        outcome:          "pass"
        evidence:         { build: "ok", api: "n/a", ui: "list shows both notes" }
        lessons:
          - { category: "react", description: "Always return new array references when notifying state changes.", severity: "high" }
        verdict:    "pass"
        intent:     "accept"
        reason:     "Stub artifact passes the schema."

turns:
  # main → bf.reproducing. bf.idle's on_enter auto-fires `start` when
  # entered with a ticket loaded (see stories/bugfix/rooms/idle.yaml's
  # on_enter comment), so we skip directly past idle.
  - intent: { name: go_bugfix, slots: {} }
    expect_state: bf.reproducing
    expect_world:
      bf__ticket_id: "B-2026-05-18-list-broken"

  # The reproduction artifact carries the optional environment_check
  # block. Asserting both that the artifact landed AND that the
  # environment_check sub-object plumbs through verifies the
  # schemas/reproducing_artifact.json change AND the bind: round-
  # trip from the oracle stub.
  - intent: { name: bf__accept, slots: {} }
    expect_state: bf.proposing
    expect_world:
      bf__reproduction_artifact:
        summary_title:    "Note list disappears — defer state mutation"
        summary_markdown: "Stub bugfix artifact body; deterministic across rooms."
        bug_verified:     true
        steps:            ["create alpha", "create beta", "list re-renders empty"]
        involved_components:
          - { name: "frontend/src/NotesList.tsx", reason: "list state mutation" }
        environment_check:
          frontend_running: true
          backend_running:  true
          dataset_ready:    true
        fix_description:  "Replace the in-place splice with a new array on add."
        root_cause:       "The list re-render reuses the same array reference, so React's diff bails out."
        affected_files:   ["frontend/src/NotesList.tsx"]
        confidence:       0.85
        reasoning:        "Trace shows the array identity unchanged; React's diff bails out."
        status:           "passed"
        tests_added:      ["frontend/src/NotesList.test.tsx"]
        tests_run:        { passed: 4, failed: 0, log: "PASS 4 tests" }
        outcome:          "pass"
        evidence:         { build: "ok", api: "n/a", ui: "list shows both notes" }
        lessons:
          - { category: "react", description: "Always return new array references when notifying state changes.", severity: "high" }
        verdict:    "pass"
        intent:     "accept"
        reason:     "Stub artifact passes the schema."

  - intent: { name: bf__accept, slots: {} }
    expect_state: bf.implementing
  - intent: { name: bf__accept, slots: {} }
    expect_state: bf.testing
  - intent: { name: bf__accept, slots: {} }
    expect_state: bf.reviewing
  - intent: { name: bf__accept, slots: {} }
    expect_state: bf.validating
  - intent: { name: bf__accept, slots: {} }
    expect_state: bf.done

  # bf.done.accept fires three effects: transport.post (the artifact
  # body), iface.ticket.transition (to: resolved), and the @exit:done
  # transition. dev-story projects @exit:done into pr.open_pr.
  - intent: { name: bf__accept, slots: {} }
    expect_state: pr.open_pr
    expect_world:
      pr_title:           "Note list disappears — defer state mutation"
      pr__ticket_id:      "B-2026-05-18-list-broken"
      pr__pr_title:       "Note list disappears — defer state mutation"
      pr__workdir:        "testdata/projects/cake"
    expect_host_calls:
      - handler: host.local_files.ticket.transition
        args: { id: "B-2026-05-18-list-broken", to: "resolved" }
        times: 1

  # pr.open_pr.on_enter ran iface.vcs.open_pr → pr_id / pr_url bind.
  - intent: { name: pr__proceed, slots: {} }
    expect_state: pr.ci_monitoring
    expect_world:
      pr__pr_id:  "200"
      pr__pr_url: "https://example/pr/B-2026-05-18-list-broken"

  - intent: { name: pr__proceed, slots: {} }
    expect_state: pr.merge_executing
  - intent: { name: pr__proceed, slots: {} }
    expect_state: pr.merge_awaiting_reply

  # accept → @exit:merged → main with status="merged".
  - intent: { name: pr__accept, slots: {} }
    expect_state: landing
    expect_world:
      status:      "merged"
      last_pr_url: "https://example/pr/B-2026-05-18-list-broken"

expect_no_errors: true

# Cypilot's artifact provider must NEVER fire on a bug walk — a
# regression that wired bugfix through cyp would now fail this guard.
expect_no_host_calls:
  - host.cypilot_artifacts
