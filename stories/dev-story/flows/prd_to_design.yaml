# prd_to_design — the PRD → Design walk through dev-story.
#
# Proves the composition seam this story adds: from main, `go_prd` enters
# the imported `prd` discovery pipeline; walking it to @exit:done lands in
# the parent `prd_published` landing room with world.prd_file lifted from
# the child (imports.prd.exits.done); `continue` then carries that PRD
# into the design intake (`proposal` room), seeding design_seed_idea
# with a pointer to the published file so the design author reads it as
# prior art.
#
# Intent-only (no LLM): the prd discovery rooms' on_enter agent calls are
# served by the same stubbed hosts as stories/prd/flows/happy_path.yaml.
# prd's intents are typed PREFIXED (`prd__discuss` …) because the import
# lifts none to bare (imports.prd.intents.import: []). judge_mode=human so
# no judge runs. prd standalone-done is covered by prd's own happy_path.

test_kind: flow
app: ../app.yaml
initial_state: landing
initial_world:
  workdir:    "."
  judge_mode: "human"

host_handlers:
  host.ide.open_file:
    data: { ok: true, connected: true }
  host.chat.resolve:
    data: { ok: true, chat_id: "chat-1", title: "PRD idea discovery", is_new: true }
  host.agent.converse:
    data: { ok: true, answer: "A CLI for X that helps developers do Y.", chat_id: "chat-1", claude_session_id: "sess-1" }
  host.agent.search:
    data: { hits: [] }
  host.agent.decide:
    data:
      ok: true
      submitted:
        questions:
          - { id: "q1", question: "Who is the primary user?", why: "scopes the persona" }
          - { id: "q2", question: "What is the single most important success metric?", why: "defines done" }
    by_call:
      match_answer:
        data:
          ok: true
          submitted:
            answers_block:       "Q1: developers\nQ2: time-to-first-success\n"
            answered_ids_append: "|1||2|"
            matched_count:       2
  host.artifacts_dir:
    data: { ok: true, path: ".artifacts/prd/example-cli/001-brief.md", message_id: "001-brief#1" }
  host.run:
    by_call:
      mint_workspace:
        data:
          ok: true
          exit_code: 0
          stdout_json: { slug: "example-cli", workspace: ".artifacts/prd/example-cli" }
      publish:
        data:
          ok: true
          exit_code: 0
          stdout_json: { prd_file: "docs/prd/example-cli.md" }
  host.agent.task:
    data:
      ok: true
      submitted:
        title:               "PRD: Example CLI"
        summary_markdown:    "## PRD: Example CLI\n\nA sufficiently long summary body to satisfy the schema minimum length for the prd_artifact summary_markdown field, covering problem, users, goals, and metrics."
        file_path:           ".artifacts/prd/example-cli/004-prd.md"
        confidence:          0.84
        needs_clarification: false
        follow_up_questions: []

turns:
  # main → prd discovery. world_in projects workdir / judge_mode into the
  # prd child (prd__workdir …); on_enter resolves the discovery chat.
  - intent: { name: go_prd, slots: {} }
    expect_state: prd.idle
    expect_world:
      prd__workdir: "."

  # Walk the prd pipeline (prefixed intents), mirroring prd's happy_path.
  - intent: { name: prd__discuss, slots: { message: "I want a CLI for X" } }
    expect_state: prd.idle
  - intent: { name: prd__start, slots: {} }
    expect_state: prd.search
    expect_world:
      prd__idea: "A CLI for X that helps developers do Y."
  - intent: { name: prd__confirm, slots: {} }
    expect_state: prd.clarifying
  - intent: { name: prd__answer, slots: { text: "developers, and the metric is time-to-first-success" } }
    expect_state: prd.clarifying
  - intent: { name: prd__submit_answers, slots: {} }
    expect_state: prd.brief
  - intent: { name: prd__confirm, slots: {} }
    expect_state: prd.references
  - intent: { name: prd__confirm, slots: {} }
    expect_state: prd.drafting

  # Accept the PRD → prd @exit:done → the prd_published landing room.
  # prd_file is a host bind (post-dispatch), so it lives in the flat world
  # under prd__prd_file; the landing room reads it directly.
  - intent: { name: prd__accept, slots: {} }
    expect_state: prd_published
    expect_world:
      prd__prd_file: "docs/prd/example-cli.md"

  # continue → the design intake, seeded with a pointer to the published
  # PRD. This is the PRD → Design baton.
  - intent: { name: continue, slots: {} }
    expect_state: design
    expect_world:
      design_seed_idea: "Author a design from the PRD at docs/prd/example-cli.md"

expect_no_errors: true
