# proposal_brief_clarify_loop — the brief quality gate's clarify loop.
#
# In the merged discovery+brief room, `ready` (begin_proposal) runs the judge
# against 001-brief.md every time. A `clarify` verdict re-renders here with the
# specific gaps and increments proposal_brief_cycle WITHOUT advancing — the
# gate out of discovery IS a passing brief, so a non-passing brief keeps the
# operator in discovery to address the questions (or edit the brief directly).
# The `continue` verdict that auto-advances is covered by proposal_happy_path.
#
# The brief already exists on disk (proposal_brief_path set), so `ready` skips
# the first-message mint and goes straight to the judge.

test_kind: flow
app: ../app.yaml
initial_state: proposal
initial_world:
  judge_mode:          "human"
  proposal_idea:       "Add a per-session working folder primitive."
  proposal_slug:       "wf"
  proposal_workspace:  "docs/proposals/.workspace/wf"
  # Non-empty ⇒ `ready` runs the judge instead of the first-message mint.
  proposal_brief_path: "docs/proposals/.workspace/wf/001-brief.md"

host_handlers:
  host.oracle.decide:
    by_call:
      brief_check:
        data:
          ok: true
          submitted:
            verdict:   "clarify"
            reason:    "The What-changes is vague and no kind is named."
            questions: ["Which engine seam does this touch?", "What does the operator do differently?"]

turns:
  # ready → judge says clarify → stay in discovery, cycle 0→1, verdict shown.
  - intent: { name: begin_proposal, slots: {} }
    expect_state: proposal
    expect_world:
      proposal_brief_cycle: 1
      proposal_brief_path:  "docs/proposals/.workspace/wf/001-brief.md"
      proposal_brief_decision:
        verdict:   "clarify"
        reason:    "The What-changes is vague and no kind is named."
        questions: ["Which engine seam does this touch?", "What does the operator do differently?"]
    expect_host_calls:
      - handler: host.oracle.decide
        args: { call: "brief_check" }

  # Edited the brief / talked more, ready again → still clarify → cycle 1→2,
  # no advance: the brief still hasn't passed review.
  - intent: { name: begin_proposal, slots: {} }
    expect_state: proposal
    expect_world:
      proposal_brief_cycle: 2

expect_no_errors: true
