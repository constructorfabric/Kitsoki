# main — engineer's-day landing. Oregon-trail-shaped: a narrative
# situation report up top, a Status block, a live "tickets in your
# queue" list pulled via iface.ticket.list_mine on enter, then a
# Choose block whose items appear/grey-out via available() /
# blocked_reason() guards on the bound intents.
#
# Pipeline routing: `drive` is the one intent the operator picks
# once a ticket is selected. It branches on world.ticket_type —
# bug → bf, feature → impl — so the operator never picks the
# pipeline directly. The legacy `go_bugfix` / `go_implementation`
# / `go_pr_refinement` intents stay as escape hatches but are now
# guarded on the relevant prerequisite.

states:

  main:
    description: "dev-story — Independence, Missouri for the engineer's day."
    relevant_world: [ticket_id, ticket_title, ticket_type, last_pr_url, status, inbox_unread, workdir, feature_branch]

    # Flattened view (no extends/blocks) — `choice:` cannot live
    # inside a `blocks:` map (typed metadata is lost through the
    # inheritance pipeline; see docs/stories/choice-widget.md §3.1). The
    # standalone path loses the inherited status / heading chrome
    # from views/base.pongo; the data plane is preserved as
    # sibling typed elements.
    view:
      - prose: "{{ world.last_error }}"
        when: "world.last_error != ''"
      - prose: >
          You drive tickets through their pipeline from here. Pick a
          ticket first, then drive it. Bug tickets route through the
          bugfix pipeline; feature tickets route through the
          implementation pipeline — the ticket's type chooses, you
          don't pick the pipeline yourself.
        when: "world.last_error == ''"
      # The `drive` / `pr` rows use the two-rows-same-intent pattern
      # (cookbook §2.2) so the operator sees *why* an action is
      # unavailable. The per-item `when:` guards mirror what the
      # underlying `on:` arcs already enforce — the dispatch result
      # stays in sync with the affordability hint.
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "tickets",    intent: go_ticket_search,     hint: "search for a ticket to pick" }
            - { label: "workspaces", intent: go_workspace_manager, hint: "resume a workspace you already started" }
            - label: "drive"
              intent: drive
              hint:   "push the picked ticket through its pipeline"
              when:   "available('drive')"
            - label: "✗ drive — {{ blocked_reason('drive') }}"
              intent: drive
              when:   "!available('drive')"
            - label: "pr"
              intent: go_pr_refinement
              hint:   "hand the picked workspace's PR to pr-refinement"
              when:   "available('go_pr_refinement')"
            - label: "✗ pr — {{ blocked_reason('go_pr_refinement') }}"
              intent: go_pr_refinement
              when:   "!available('go_pr_refinement')"
            - { label: "idea",           intent: go_idea,          hint: "draft an ad hoc proposal — no ticket needed" }
            - { label: "code review",    intent: go_code_review,   hint: "review a teammate's PR" }
            - { label: "inbox",          intent: go_inbox,         hint: "read notifications ({{ world.inbox_unread }} unread)" }
            - { label: "oracle",         intent: go_oracle,        hint: "ask the LLM a one-shot question" }
            - { label: "standup",        intent: go_standup,       hint: "prep today's standup summary" }
            - { label: "deploy",         intent: go_deploy,        hint: "stub (Wave 3)" }
            - { label: "observability",  intent: go_observability, hint: "stub (Wave 3)" }
            - { label: "incident",       intent: go_incident,      hint: "stub (Wave 3)" }
            - { label: "docs",           intent: go_docs,          hint: "stub (Wave 3)" }
            - { label: "look",           intent: look,             hint: "re-render the room" }

    on:
      go_ticket_search:
        - target: ticket_search
          effects:
            - set: { prev_state: "main" }
            - set: { last_error: "" }
      go_workspace_manager:
        - target: workspace_manager
          effects:
            - set: { prev_state: "main" }
      go_inbox:
        - target: inbox
          push_history: false
          effects:
            - set: { prev_state: "main" }
      go_oracle:
        - target: oracle
          effects:
            - set: { prev_state: "main" }
      go_standup:
        - target: standup
          effects:
            - set: { prev_state: "main" }
      go_idea:
        - target: proposal
          effects:
            - set: { prev_state: "main" }
      go_code_review:
        - target: code_review
          effects:
            - set: { prev_state: "main" }
      go_deploy:
        - target: deploy
          effects:
            - set: { prev_state: "main" }
      go_observability:
        - target: observability
          effects:
            - set: { prev_state: "main" }
      go_incident:
        - target: incident
          effects:
            - set: { prev_state: "main" }
      go_docs:
        - target: docs
          effects:
            - set: { prev_state: "main" }

      # Auto-routing one-shot: ticket_type chooses the pipeline. The
      # local-files provider scans issues/{bugs,features,epics}/ and
      # tags every row with its source kind, so picks land with
      # ticket_type set and the drive arc routes deterministically.
      # bf.idle's on_enter auto-emits `start` when a ticket is loaded
      # and no reproduction artifact exists yet (see
      # stories/bugfix/rooms/idle.yaml), so the operator types `drive`
      # ONCE and lands inside the pipeline.
      drive:
        - when: "world.ticket_id != '' && world.ticket_type == 'bug'"
          target: bf
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id != '' && world.ticket_type == 'feature'"
          target: impl
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id != '' && world.ticket_type == 'epic'"
          target: cyp
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id == ''"
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
        - default: true
          target: main
          guard_hint: "Ticket has no type set — re-pick from `tickets` so its type is recorded."
          effects:
            - set:
                last_error: |
                  The picked ticket has no type — the pipeline router can't determine which pipeline to use.

                  Suggestions:
                  - `tickets` — re-search and re-pick the ticket (type is recorded at pick time)

      # Escape hatches — same destinations as drive, but with
      # explicit names some flows / scenarios reference. All three
      # pipeline hatches require a picked ticket.
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the bugfix pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
      go_implementation:
        - when: "world.ticket_id != ''"
          target: impl
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the implementation pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
      go_cypilot:
        - when: "world.ticket_id != ''"
          target: cyp
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the cypilot pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace

      # PR refinement needs an open PR (or at least a feature branch
      # that's been pushed); blocking it from a cold main is the
      # whole point of the prerequisite story.
      go_pr_refinement:
        - when: "world.last_pr_url != '' || world.feature_branch != ''"
          target: pr
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "No open PR yet — drive a ticket through the pipeline first."
          effects:
            - set:
                last_error: |
                  No open PR yet — you need an active workspace with a pushed branch.

                  Suggestions:
                  - Pick a bug or feature ticket and `drive` it through the pipeline to the PR stage

      go_code_review_story:
        - target: rev
      go_main:
        - target: main
      go_back:
        - target: main
      look:
        - target: .
