# main — engineer's-day landing. Free-form-first: a short prose
# invitation to "say what you want", then a discoverable catalog of
# action verbs grouped under headings. The operator types natural
# language (or a short verb) and the semantic router dispatches it
# against the bound `on:` arcs — there is no arrow-key picker. The
# catalog rows are pure documentation of the routable vocabulary; the
# `drive` / `pr` rows still appear/grey-out via available() /
# blocked_reason() guards on the bound intents.
#
# Pipeline routing: `drive` is the one intent the operator picks
# once a ticket is selected. It branches on world.ticket_type —
# bug → bf, feature → impl — so the operator never picks the
# pipeline directly. The legacy `go_bugfix` / `go_implementation`
# / `go_pr_refinement` intents stay as escape hatches but are now
# guarded on the relevant prerequisite.

states:

  main:
    description: "dev-story — Independence, Missouri for the engineer's day."
    relevant_world: [ticket_id, ticket_title, ticket_type, last_pr_url, status, inbox_unread, workdir, feature_branch]

    # Oracle off-ramp (docs/stories/state-machine.md §11). The hub is the
    # free-form-first front door — "say what you want, in your own words."
    # Most utterances route to a bound `on:` arc, but a question the menu
    # genuinely can't act on (e.g. "how does the semantic router pick an
    # intent?") would otherwise dead-end in "I didn't catch that." The
    # off-ramp catches that no-match and hands the original text to a
    # read-only converse turn — the room stays put, the catalog above is
    # still there next turn. We voice it with the same `oracle_qa` persona
    # the dedicated `oracle` room uses, so an answered question reads the
    # same whether the operator typed `oracle` first or just asked.
    oracle_off_ramp:
      agent: oracle_qa

    # Free-form-first landing. Per docs/stories/choice-widget.md §1, a
    # hub whose actions are orthogonal navigation (not a ranked choice)
    # converts AWAY from the `choice:` picker: the primary affordance is
    # "say what you want" routed by the semantic router, and the action
    # vocabulary is shown as a discoverable catalog (heading + list)
    # rather than an arrow-key menu. This foregrounds the intent routing
    # that is the whole point of the flagship hub — every label below is
    # just one phrase the router already understands (see each intent's
    # `examples:` in app.yaml); operators are free to type a full
    # sentence instead.
    #
    # Flattened view (no extends/blocks) deliberately retained: the
    # base.pongo status line is the pipeline read-out (ticket · PR · ci ·
    # cycle · judge), which is noise on the hub landing where no pipeline
    # is active.
    view:
      - prose: "{{ world.last_error }}"
        when: "world.last_error != ''"
      - prose: >
          Say what you want to do, in your own words — name a ticket,
          describe a bug, resume a workspace, ask a question. The router
          reads your intent and drops you into the right room, pipeline,
          or story. There's no menu to arrow through; just type.
        when: "world.last_error == ''"
      - prose: >
          Try: "fix the login crash", "pick TKT-014 and drive it",
          "resume my auth workspace", "review PR-38", "what should I work
          on?", or "ask claude how imports resolve". Or use one of the
          short verbs below.
        when: "world.last_error == ''"

      - heading: "Work a ticket"
      # The `drive` / `pr` rows use the two-rows-same-label pattern
      # (cookbook §2.2) so the operator sees *why* an action is
      # unavailable. The per-item `when:` guards mirror what the
      # underlying `on:` arcs already enforce.
      - list:
          items:
            - { label: "tickets",    hint: "search and pick a ticket — \"find auth bugs\", \"sprint tickets\"" }
            - label: "drive"
              hint:  "push the picked ticket through its pipeline"
              when:  "available('drive')"
            - label: "✗ drive — {{ blocked_reason('drive') }}"
              when:  "!available('drive')"
            - { label: "workspaces", hint: "resume a workspace you already started" }
            - label: "pr"
              hint:  "hand the picked workspace's PR to pr-refinement"
              when:  "available('go_pr_refinement')"
            - label: "✗ pr — {{ blocked_reason('go_pr_refinement') }}"
              when:  "!available('go_pr_refinement')"

      - heading: "Propose & plan"
      - list:
          items:
            - { label: "prd",   hint: "author a PRD, then carry it into design" }
            - { label: "idea",  hint: "draft an ad hoc proposal — no ticket needed" }
            - { label: "ideas", hint: "reconcile the backlog / pick something to propose" }

      - heading: "Review & report"
      - list:
          items:
            - { label: "code review", hint: "review a teammate's PR" }
            - { label: "standup",     hint: "prep today's standup summary" }
            - { label: "inbox",       hint: "read notifications ({{ world.inbox_unread }} unread)" }
            - { label: "oracle",      hint: "ask the LLM a one-shot question" }

      - heading: "Ops (Wave 3 stubs)"
      - list:
          items:
            - { label: "deploy",        hint: "stub (Wave 3)" }
            - { label: "observability", hint: "stub (Wave 3)" }
            - { label: "incident",      hint: "stub (Wave 3)" }
            - { label: "docs",          hint: "stub (Wave 3)" }

      - prose: "Type a request or any verb above. `look` re-renders; `back` / `main` navigate."
        when: "world.last_error == ''"

    on:
      go_ticket_search:
        - target: ticket_search
          effects:
            - set: { prev_state: "main" }
            - set: { last_error: "" }
      go_workspace_manager:
        - target: workspace_manager
          effects:
            - set: { prev_state: "main" }
      go_inbox:
        - target: inbox
          push_history: false
          effects:
            - set: { prev_state: "main" }
      go_oracle:
        - target: oracle
          effects:
            - set: { prev_state: "main" }
      go_gitops:
        - target: gitops
          effects:
            - set: { prev_state: "main" }
      go_standup:
        - target: standup
          effects:
            - set: { prev_state: "main" }
      go_prd:
        - target: prd
          effects:
            - set: { prev_state: "main", last_error: "" }
      go_idea:
        - target: design
          effects:
            - set: { prev_state: "main", design_seed_idea: "" }
      go_ideas:
        - target: ideas
          effects:
            - set: { prev_state: "main" }
            - set: { last_error: "" }
      go_code_review:
        - target: code_review
          effects:
            - set: { prev_state: "main" }
      go_deploy:
        - target: deploy
          effects:
            - set: { prev_state: "main" }
      go_observability:
        - target: observability
          effects:
            - set: { prev_state: "main" }
      go_incident:
        - target: incident
          effects:
            - set: { prev_state: "main" }
      go_docs:
        - target: docs
          effects:
            - set: { prev_state: "main" }

      # Auto-routing one-shot: ticket_type chooses the pipeline. The
      # local-files provider scans issues/{bugs,features,epics}/ and
      # tags every row with its source kind, so picks land with
      # ticket_type set and the drive arc routes deterministically.
      # bf.idle's on_enter auto-emits `start` when a ticket is loaded
      # and no reproduction artifact exists yet (see
      # stories/bugfix/rooms/idle.yaml), so the operator types `drive`
      # ONCE and lands inside the pipeline.
      drive:
        - when: "world.ticket_id != '' && world.ticket_type == 'bug'"
          target: bf
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id != '' && world.ticket_type == 'feature'"
          target: impl
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id != '' && world.ticket_type == 'epic'"
          target: cyp
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id == ''"
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
        - default: true
          target: main
          guard_hint: "Ticket has no type set — re-pick from `tickets` so its type is recorded."
          effects:
            - set:
                last_error: |
                  The picked ticket has no type — the pipeline router can't determine which pipeline to use.

                  Suggestions:
                  - `tickets` — re-search and re-pick the ticket (type is recorded at pick time)

      # Escape hatches — same destinations as drive, but with
      # explicit names some flows / scenarios reference. All three
      # pipeline hatches require a picked ticket.
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the bugfix pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
      go_implementation:
        - when: "world.ticket_id != ''"
          target: impl
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the implementation pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
      go_cypilot:
        - when: "world.ticket_id != ''"
          target: cyp
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the cypilot pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace

      # PR refinement needs an open PR (or at least a feature branch
      # that's been pushed); blocking it from a cold main is the
      # whole point of the prerequisite story.
      go_pr_refinement:
        - when: "world.last_pr_url != '' || world.feature_branch != ''"
          target: pr
          effects:
            - set: { last_error: "" }
        - default: true
          target: main
          guard_hint: "No open PR yet — drive a ticket through the pipeline first."
          effects:
            - set:
                last_error: |
                  No open PR yet — you need an active workspace with a pushed branch.

                  Suggestions:
                  - Pick a bug or feature ticket and `drive` it through the pipeline to the PR stage

      go_code_review_story:
        - target: rev
      go_main:
        - target: main
      go_back:
        - target: main
      look:
        - target: .
