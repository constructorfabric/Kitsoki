# main — engineer's-day landing. Oregon-trail-shaped: a narrative
# situation report up top, a Status block, a live "tickets in your
# queue" list pulled via iface.ticket.list_mine on enter, then a
# Choose block whose items appear/grey-out via available() /
# blocked_reason() guards on the bound intents.
#
# Pipeline routing: `drive` is the one intent the operator picks
# once a ticket is selected. It branches on world.ticket_type —
# bug → bf, feature → impl — so the operator never picks the
# pipeline directly. The legacy `go_bugfix` / `go_implementation`
# / `go_pr_refinement` intents stay as escape hatches but are now
# guarded on the relevant prerequisite.

states:

  main:
    description: "dev-story — Independence, Missouri for the engineer's day."
    relevant_world: [inbox_unread]

    view:
      - heading: "dev-story — engineer's day"
      - prose: >
          You drive tickets through their pipeline from here. Pick a
          ticket first, then `drive` it. Bug tickets route through
          the bugfix pipeline; feature tickets route through the
          implementation pipeline — the ticket's type chooses, you
          don't pick the pipeline yourself.

      - heading: "Status"
      - kv:
          pairs:
            "Inbox unread":   "{{ world.inbox_unread }}"

      - heading: "Choose"
      - list:
          items:
            - "`tickets` — search for a ticket to pick"
            - "`workspaces` — resume a workspace you already started"
            - label: "`drive` — push the picked ticket through its pipeline"
              when:  "available('drive')"
            - label: "`drive` ✗ — {{ blocked_reason('drive') }}"
              when:  "!available('drive')"
            - label: "`pr` — hand the picked workspace's PR to pr-refinement"
              when:  "available('go_pr_refinement')"
            - label: "`pr` ✗ — {{ blocked_reason('go_pr_refinement') }}"
              when:  "!available('go_pr_refinement')"
            - "`code review` — review a teammate's PR"
            - "`inbox` — read notifications ({{ world.inbox_unread }} unread)"
            - "`oracle` — ask the LLM a one-shot question"
            - "`standup` — prep today's standup summary"
            - "`deploy` · `observability` · `incident` · `docs` — stubs"

    on:
      go_ticket_search:
        - target: ticket_search
          effects:
            - set: { prev_state: "main" }
      go_workspace_manager:
        - target: workspace_manager
          effects:
            - set: { prev_state: "main" }
      go_inbox:
        - target: inbox
          push_history: false
          effects:
            - set: { prev_state: "main" }
      go_oracle:
        - target: oracle
          effects:
            - set: { prev_state: "main" }
      go_standup:
        - target: standup
          effects:
            - set: { prev_state: "main" }
      go_code_review:
        - target: code_review
          effects:
            - set: { prev_state: "main" }
      go_deploy:
        - target: deploy
          effects:
            - set: { prev_state: "main" }
      go_observability:
        - target: observability
          effects:
            - set: { prev_state: "main" }
      go_incident:
        - target: incident
          effects:
            - set: { prev_state: "main" }
      go_docs:
        - target: docs
          effects:
            - set: { prev_state: "main" }

      # Auto-routing one-shot: ticket_type chooses the pipeline. The
      # local-files provider scans issues/{bugs,features,epics}/ and
      # tags every row with its source kind, so picks land with
      # ticket_type set and the drive arc routes deterministically.
      # bf.idle's on_enter auto-emits `start` when a ticket is loaded
      # and no reproduction artifact exists yet (see
      # stories/bugfix/rooms/idle.yaml), so the operator types `drive`
      # ONCE and lands inside the pipeline.
      drive:
        - when: "world.ticket_id != '' && world.ticket_type == 'bug'"
          target: bf
        - when: "world.ticket_id != '' && world.ticket_type == 'feature'"
          target: impl
        - when: "world.ticket_id != '' && world.ticket_type == 'epic'"
          target: cyp
        - when: "world.ticket_id == ''"
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
        - default: true
          target: main
          guard_hint: "Ticket has no type set — re-pick from `tickets` so its type is recorded."

      # Escape hatches — same destinations as drive, but with
      # explicit names some flows / scenarios reference. All three
      # pipeline hatches require a picked ticket.
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
      go_implementation:
        - when: "world.ticket_id != ''"
          target: impl
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."
      go_cypilot:
        - when: "world.ticket_id != ''"
          target: cyp
        - default: true
          target: main
          guard_hint: "Pick a ticket first — type `tickets`."

      # PR refinement needs an open PR (or at least a feature branch
      # that's been pushed); blocking it from a cold main is the
      # whole point of the prerequisite story.
      go_pr_refinement:
        - when: "world.last_pr_url != '' || world.feature_branch != ''"
          target: pr
        - default: true
          target: main
          guard_hint: "No open PR yet — drive a ticket through the pipeline first."

      go_code_review_story:
        - target: rev
      go_main:
        - target: main
      go_back:
        - target: main
      look:
        - target: .
