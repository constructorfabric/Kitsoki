# code_review — STUB room for Wave 3's code-review sub-story. Wave 2
# ships a placeholder that routes back to main; Wave 3 imports a real
# `stories/code-review/` here.

states:

  code_review:
    description: "Code review — review teammates' open PRs (Wave 3 stub)."
    # Flattened view (no extends/blocks) — `choice:` cannot live inside a
    # `blocks:` map (typed metadata is lost through the inheritance
    # pipeline; see docs/stories/choice-widget.md §3.1).
    view:
      - prose: "Code review (Wave 3 stub)."
      - prose: >
          In Wave 3 this room imports stories/code-review/ which
          lists PRs assigned to me via iface.vcs.pr_status /
          iface.ticket.list_mine, walks through each diff, and posts
          review comments.
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "go_back", intent: go_back, hint: "return to the previous room" }
            - { label: "go_main", intent: go_main, hint: "back to the engineer's day landing" }
            - { label: "look",    intent: look,    hint: "re-render" }
    relevant_world: []
    on:
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: main
      look:
        - target: .
