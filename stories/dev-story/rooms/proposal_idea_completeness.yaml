# proposal_idea_completeness — is the idea complete enough to draft?
#
# on_enter runs the `proposal_completeness_judge` (host.oracle.decide):
# does the brief answer what problem it solves, why kitsoki is the right
# tool, and how an operator will use it? The verdict + the judge's reading
# is persisted to 003-idea-completeness.md. Advisory with a human floor
# (process-design.md §3): when the judge flags gaps the view steers the
# operator back to the brief; `confirm` stays available so the human can
# override.

states:

  proposal_idea_completeness:
    description: "Confirm the idea answers problem / why-kitsoki / usage before drafting."
    view:
      - banner:
          text:     "COMPLETENESS"
          subtitle: "Problem · why kitsoki · how it's used"
          color:    "#F59E0B"
      - prose: 'Completeness check saved to  {{ world.proposal_completeness_path|default:"(checking…)" }}'
      # The judge's reading — shown whole as wrapping prose, never truncated.
      - prose: '**Problem** — {{ world.proposal_completeness.problem|default:"(pending)" }}'
      - prose: '**Why kitsoki** — {{ world.proposal_completeness.why_kitsoki|default:"(pending)" }}'
      - prose: '**Usage** — {{ world.proposal_completeness.usage|default:"(pending)" }}'
      - prose: '✓ The idea reads as complete — **confirm** to gather references.'
        when:  "world.proposal_completeness.complete"
      - prose: '⚠ The idea has gaps — **clarify** to revise the brief, or **confirm** to draft anyway.'
        when:  "!world.proposal_completeness.complete"
      - heading: "Gaps"
        when: "!world.proposal_completeness.complete"
      - code: |
          {% for g in world.proposal_completeness.gaps %}- {{ g }}
          {% empty %}(no gaps){% endfor %}
        when: "!world.proposal_completeness.complete"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "confirm"
              hint:   "the idea is solid — gather the references"
              intent: confirm
            - label:  "clarify"
              hint:   "step back to revise the brief"
              intent: clarify
            - label:  "quit"
              hint:   "abandon this proposal"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [proposal_idea, proposal_workspace, proposal_brief_path, proposal_existing_state, proposal_completeness, proposal_completeness_path]
    on_enter:
      # `once: true` for reload-safety: keyed off its own bind
      # (proposal_completeness), so /reload skips the LLM and re-renders the
      # stored verdict. A `clarify` back-edge clears proposal_completeness to
      # re-arm it.
      - invoke: host.oracle.decide
        once: true
        id: completeness_check
        with:
          agent: proposal_completeness_judge
          prompt_path: prompts/proposal_completeness.md
          schema: schemas/idea-completeness.json
          working_dir: "{{ world.proposal_workspace }}"
          args:
            idea:           "{{ world.proposal_idea }}"
            brief_path:     "001-brief.md"
            existing_state: "{{ world.proposal_existing_state }}"
        bind:
          proposal_completeness: submitted
        on_error: proposal

      # Host-call `with:` args are expr-lang (no pongo loops); a BARE typed
      # object pretty-prints as JSON (same as references). No title ⇒ no
      # injected header. `once: true` keyed off its bind
      # (proposal_completeness_path).
      - invoke: host.artifacts_dir
        once: true
        with:
          artifacts_root: "{{ world.proposal_workspace }}"
          thread:         "003-idea-completeness"
          mode:           "replace"
          body:           "{{ world.proposal_completeness }}"
        bind:
          proposal_completeness_path: "path"
    on:
      confirm:
        - target: proposal_references

      # Step back to revise the brief (keeps the workspace + slug). Reset the
      # downstream results so the revised brief re-runs the forward pipeline
      # fresh. Each `once:` invoke keys off ITS OWN bind, so clear BOTH the
      # decide-object (proposal_existing_state / proposal_completeness) AND the
      # write-path (…_path) — clearing only the path would leave the upstream
      # decide's once: armed and it would skip on re-entry.
      clarify:
        - target: proposal
          effects:
            - set:
                # A clarify sentinel (NOT {}): landing back in the merged
                # discovery+brief room must NOT re-arm + auto-run the once: brief
                # judge — an empty decision would, and a still-passing brief
                # would immediately round-trip forward before the operator can
                # revise. The sentinel keeps the judge disarmed so they rest in
                # discovery; `ready` clears it and re-runs the check.
                proposal_brief_decision:
                  verdict: "clarify"
                  reason:  "Stepped back from a later gate — revise the brief (edit it or keep talking), then say ready to re-run the check."
                  questions: []
                proposal_existing_state:    {}
                proposal_existing_path:     ""
                proposal_overlap_decision:  ""
                proposal_change_target:     ""
                proposal_completeness:      {}
                proposal_completeness_path: ""

      quit:
        - target: main
          effects:
            - set:
                last_error: "proposal abandoned at completeness"
                prev_state: "main"
      look:
        - target: .
