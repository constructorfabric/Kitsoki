# proposal — ad hoc idea capture and proposal drafting.
#
# The operator arrives here without a ticket. They describe their idea
# via `capture_idea` (free-form text); oracle structures it into a
# formatted proposal draft. They can iterate via `refine_idea` until
# satisfied, then return to main or navigate elsewhere.
#
# After drafting, the content is written to docs/proposals/<slug>.md and
# world.proposal_file holds the path. On refine, the file is overwritten
# with the updated draft.

states:

  proposal:
    mode: conversational
    description: "Ad hoc proposal room — capture and structure an idea without a ticket."
    relevant_world: [proposal_idea, proposal_file]
    view:
      - prose: "Describe your idea and the oracle will structure it into a proposal draft."
        when: "world.proposal_file == ''"
      - prose: "Draft saved to `{{ world.proposal_file }}`."
        when: "world.proposal_file != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "capture"
              intent: capture_idea
              hint:   "describe your idea — oracle will draft a proposal"
            - label: "refine"
              intent: refine_idea
              hint:   "give feedback to improve the draft"
              when:   "available('refine_idea')"
            - label: "✗ refine — {{ blocked_reason('refine_idea') }}"
              intent: refine_idea
              when:   "!available('refine_idea')"
            - { label: "go_main", intent: go_main, hint: "return to the engineer's day landing" }
            - { label: "look",    intent: look,    hint: "re-render" }
    on:
      capture_idea:
        - target: proposal_drafting
          effects:
            - set:
                proposal_idea:  "{{ slots.idea }}"
                proposal_draft: ""
                proposal_file:  ""
      refine_idea:
        - when: "world.proposal_draft != ''"
          target: proposal_drafting
          effects:
            - set:
                proposal_idea: "{{ world.proposal_idea }}\n\nOperator feedback: {{ slots.feedback }}"
                proposal_file: ""
        - default: true
          target: proposal
          guard_hint: "draft a proposal first — describe your idea with `capture`"
      go_main:
        - target: main
      look:
        - target: .

  proposal_drafting:
    description: "Structuring the idea into a proposal draft via oracle."
    relevant_world: [proposal_idea, proposal_draft, proposal_file]
    view:
      - kv:
          pairs:
            Idea: "{{ world.proposal_idea }}"
            File: '{{ world.proposal_file|default:"(pending — oracle structuring your idea)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "save"
              intent: save_proposal
              hint: "write draft to docs/proposals/"
              when: "world.proposal_draft != '' && world.proposal_file == ''"
            - { label: "go_back", intent: go_back, hint: "return to proposal" }
            - { label: "look",    intent: look,    hint: "re-render" }
    on_enter:
      - invoke: host.oracle.ask
        with:
          agent: oracle_qa
          prompt: prompts/proposal_draft.md
          args:
            idea:           "{{ world.proposal_idea }}"
        bind:
          proposal_draft: stdout
        on_error: proposal
      - invoke: host.run
        with:
          cmd: python3
          args:
            - "stories/dev-story/scripts/save_proposal.py"
            - "{{ world.proposal_idea }}"
            - "{{ world.proposal_draft }}"
        bind:
          proposal_file: stdout
        on_error: proposal
    on:
      save_proposal:
        - when: "world.proposal_draft != ''"
          target: .
          effects:
            - invoke: host.run
              with:
                cmd: python3
                args:
                  - "stories/dev-story/scripts/save_proposal.py"
                  - "{{ world.proposal_idea }}"
                  - "{{ world.proposal_draft }}"
              bind:
                proposal_file: stdout
              on_error: proposal
        - default: true
          target: .
      go_back:
        - target: proposal
      look:
        - target: .
