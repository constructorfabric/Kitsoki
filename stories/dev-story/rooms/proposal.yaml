# proposal — proposal-authoring intake. A discovery conversation.
#
# Entry room of the proposal pipeline (reached from main via go_idea).
# A free-form idea is awkward to type into one field, so intake is a chat:
# the operator talks, the `proposal_interviewer` replies and helps sharpen
# the idea (problem / why-kitsoki / usage / which layer), and
# `begin_proposal` distills the conversation into world.proposal_idea, mints
# a slug + per-session workspace, and advances to the brief.
#
# mode: conversational, no `choice:` selector — the operator is dropped
# straight into the conversation and just types (the prd/idle.yaml shape).
# Free text routes through the LLM router; the closing prose names
# `ready` / `quit` so the semantic router catches those verbs.
#
# on_enter ONLY get-or-creates the persistent chat (host.chat.resolve, NOT
# host.chat.create — resolve is idempotent across on_enter re-fires like
# /reload; create would orphan the conversation each reload). The greeting
# is the static prose in the view, so no LLM call fires until the operator
# speaks. The `discuss` self-loop uses `target: .` so on_enter does NOT
# re-fire (which would re-create the chat); the converse lives in the arc.

states:

  proposal:
    mode: conversational
    # Free-text sink: plain prose that matches no command intent
    # (begin_proposal/capture_existing/quit/…) routes straight to `discuss`
    # with the whole utterance as slots.message — deterministically, no
    # main-turn LLM classification that could mis-pick a near-miss command.
    default_intent: discuss
    description: "Describe the change you want to propose — talk it through; I'll help shape it."
    view:
      - heading: "Proposal discovery"
      - prose: "Two ways to start, whichever fits your idea:\n\n- **Point me at a doc** that already captures it — say `see docs/…` and I'll read it.\n- **Describe it free-form** — just type the change you want to propose for kitsoki, in your own words.\n\nEither way, I'll ask focused questions to sharpen the problem, why kitsoki fits, and how an operator would use it."
        when: "world.proposal_idea_turns == 0"
      - prose: "Discovery in progress — keep sharpening the idea with me."
        when: "world.proposal_idea_turns > 0"
      - kv:
          pairs:
            Existing docs: '{{ world.proposal_existing_paths|default:"(none — say `see docs/…` to point me at some)" }}'
            Turns:         "{{ world.proposal_idea_turns }}"
      - prose: '{{ world.proposal_idea_answer }}'
        when: "world.proposal_idea_answer"
      - prose: "Say **ready** when it's clear enough and I'll move on to the brief, or **quit** to drop it."
    relevant_world: [proposal_existing_paths, proposal_idea, proposal_idea_message, proposal_idea_answer, proposal_chat_id, proposal_chat_title, proposal_idea_turns]
    on_enter:
      # Get-or-create the discovery chat. resolve (not create) so a /reload
      # re-fire returns the SAME thread rather than spawning a fresh empty
      # one. scope_key keeps one discovery thread per session.
      - invoke: host.chat.resolve
        with:
          app:       "dev-story"
          room:      "proposal"
          scope_key: "proposal"
          title:     "Proposal idea discovery"
        bind:
          proposal_chat_id:    "chat_id"
          proposal_chat_title: "title"
    on:
      # Self-loop. `target: .` skips on_enter (so the chat is not re-created);
      # the converse call below is the only LLM call. idea_answer is cleared
      # up front so a failure doesn't pair a stale reply with the new message.
      discuss:
        - target: .
          effects:
            - set:
                proposal_idea_message: "{{ slots.message }}"
                proposal_idea_answer:  ""
            - increment: { proposal_idea_turns: 1 }
            - invoke: host.oracle.converse
              with:
                chat_id:     "{{ world.proposal_chat_id }}"
                agent:       proposal_interviewer
                working_dir: "."
                question:    "{{ slots.message }}"
              bind:
                proposal_idea_answer: "answer"
                proposal_chat_id:     "chat_id"

      # Record the docs the operator pointed at (read by the scout /
      # researcher / author downstream). Stays on the chat screen.
      capture_existing:
        - target: .
          effects:
            - set:
                proposal_existing_paths: "{{ slots.paths }}"

      # Distill the conversation into a crisp idea, mint a slug + workspace,
      # and advance to the brief. The slugify host.run is deterministic so a
      # flow fixture can stub it by id (`slugify`).
      begin_proposal:
        - target: proposal_brief
          effects:
            - invoke: host.oracle.converse
              with:
                chat_id:     "{{ world.proposal_chat_id }}"
                agent:       proposal_interviewer
                working_dir: "."
                question:    "The discovery conversation is complete. Write a single, crisp problem/idea statement (1-4 sentences) capturing what this proposal should be about, synthesising everything we discussed. Output ONLY that statement — no preamble, no questions."
              bind:
                proposal_idea: "answer"
            # Name the proposal — an interpretive decision, so oracle.decide
            # (a raw-sentence slug is terrible). The schema enforces a short
            # kebab slug; the namer avoids obviously-taken names.
            - invoke: host.oracle.decide
              id: name_slug
              with:
                agent: proposal_namer
                prompt_path: prompts/proposal_slug.md
                schema: schemas/slug.json
                working_dir: "."
                args:
                  idea: "{{ world.proposal_idea }}"
              bind:
                proposal_slug: "submitted.slug"
              on_error: proposal
            # Deterministic uniqueness check (completes the validation
            # sandwich): collide-proofs the slug against accepted proposals +
            # in-progress workspaces, appending -N, and returns the workspace
            # path. Reads the slug the decide just bound (a later invoke's
            # with: args see earlier binds); binds both keys so no `set:`
            # reads a same-list bind.
            - invoke: host.run
              id: uniquify
              with:
                cmd: python3
                args:
                  - "stories/dev-story/scripts/proposal_workspace.py"
                  - "{{ world.proposal_slug }}"
              bind:
                proposal_slug:      "stdout_json.slug"
                proposal_workspace: "stdout_json.workspace"
              on_error: proposal

      quit:
        - target: main
          effects:
            - set:
                last_error: "proposal abandoned at intake"
                prev_state: "main"
      look:
        - target: .
