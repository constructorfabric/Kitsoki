# proposal_draft — generate the proposal, then publish it.
#
# Stage 4 (final) of the 4-stage proposal pipeline. on_enter runs the
# `proposal_author` (host.oracle.task) which classifies the kind, copies
# the matching docs/proposals/templates/<kind>.md, fills the Why / What
# changes / Impact spine, and writes 004-proposal.md into the workspace —
# OR, when the overlap gate chose change_existing, amends
# proposal_change_target in place. working_dir is the repo root so both the
# workspace write and an amend of docs/proposals/<file>.md resolve.
#
# On `accept`: publish_proposal.py moves 004-proposal.md from the workspace
# to docs/proposals/<slug>.md (collision-safe) and the room transitions to
# proposal_done (a confirmation view, inline in this file) without going
# through a separate room. The prior proposal_publish room is gone.
#
# Checkpoint exits: accept → publish → proposal_done;
#                   refine → re-draft (budget-capped);
#                   clarify → proposal_refine (keep search results, redo brief).

states:

  proposal_draft:
    description: "Draft the proposal; review and accept, refine, or step back."
    view:
      - banner:
          text:     "DRAFTING"
          subtitle: "Fill the template, review, publish"
          color:    "#8B5CF6"
      - prose: "proposal cycle {{ world.proposal_cycle }} · draft attempt {{ world.proposal_draft_cycle }}/{{ world.proposal_draft_budget }}"
      - kv:
          pairs:
            Draft: '{{ world.proposal_artifact.file_path|default:"(drafting — writes 004-proposal.md)" }}'
      - kv:
          pairs:
            Amending: '{{ world.proposal_change_target }}'
        when: "world.proposal_change_target"
      - kv:
          pairs:
            Title:      '{{ world.proposal_artifact.title|default:"(pending)" }}'
            Kind:       '{{ world.proposal_artifact.kind|default:"(pending)" }}'
            Confidence: '{{ world.proposal_artifact.confidence|default:"(pending)" }}'
      - prose: "⚠ The author flagged that more input is needed — see the follow-ups, then use clarify to revise the brief."
        when:  "world.proposal_artifact.needs_clarification"
      - code: |
          {% for q in world.proposal_artifact.follow_up_questions %}- {{ q }}
          {% empty %}(no follow-ups){% endfor %}
        when: "world.proposal_artifact.needs_clarification"
      - heading: "Proposal"
      - code: '{{ world.proposal_artifact.summary_markdown|default:"(pending — oracle has not returned yet; the full proposal is written to the output file)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "publish — the proposal is ready"
              intent: accept
            - label:  "refine"
              hint:   "re-draft with feedback (same inputs)"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
                required:    false
            - label:  "clarify"
              hint:   "the inputs were incomplete — step back to revise the brief"
              intent: clarify
            - label:  "quit"
              hint:   "abandon this proposal"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [proposal_idea, proposal_kind, proposal_workspace, proposal_brief_path, proposal_existing_state, proposal_change_target, proposal_references, proposal_artifact, proposal_refine_feedback, proposal_cycle, proposal_draft_cycle, proposal_draft_budget]
    on_enter:
      # `once: true` for reload-safety (the agentic author is the most
      # expensive call in the pipeline): keyed off its binds (proposal_artifact
      # + proposal_kind — both unset on first entry, both set after). /reload
      # re-renders the stored draft; `refine`/`clarify` clear proposal_artifact
      # (an unset bind ⇒ once: re-arms) to force a re-draft.
      - invoke: host.oracle.task
        once: true
        with:
          agent: proposal_author
          working_dir: "."
          acceptance:
            schema: schemas/proposal-artifact.json
          context:
            prompt: prompts/proposal_draft.md
            args:
              idea:            "{{ world.proposal_idea }}"
              kind:            "{{ world.proposal_kind }}"
              workdir:         "{{ world.proposal_workspace }}"
              brief_path:      "{{ world.proposal_brief_path }}"
              existing_state:  "{{ world.proposal_existing_state }}"
              change_target:   "{{ world.proposal_change_target }}"
              references:      "{{ world.proposal_references }}"
              output_path:     "{{ world.proposal_workspace }}/004-proposal.md"
              refine_feedback: "{{ world.proposal_refine_feedback }}"
              cycle:           "{{ world.proposal_cycle }}"
        bind:
          proposal_artifact: submitted
          proposal_kind:     "submitted.kind"
        on_error: proposal_refine
    on:
      # Accept: publish the proposal (move it from workspace to docs/proposals/).
      # publish_proposal.py handles collision-proofing and archive.
      accept:
        - target: proposal_done
          effects:
            - invoke: host.run
              id: publish
              with:
                cmd: python3
                args:
                  - "stories/dev-story/scripts/publish_proposal.py"
                  - "{{ world.proposal_workspace }}"
                  - "{{ world.proposal_slug }}"
                  - "{{ world.proposal_change_target }}"
              bind:
                proposal_file: stdout
              on_error: proposal_draft

      # Same inputs, revise the prose. Budget gate → main.
      refine:
        - when: "world.proposal_draft_cycle >= world.proposal_draft_budget"
          target: main
          effects:
            - set:
                last_error: "proposal abandoned — draft budget exhausted"
                prev_state: "main"
        - target: proposal_draft
          effects:
            - set:
                proposal_artifact:        {}
                proposal_refine_feedback: "{{ slots.feedback ?? '' }}"
                proposal_draft_cycle:     "{{ world.proposal_draft_cycle + 1 }}"
                proposal_cycle:           "{{ world.proposal_cycle + 1 }}"

      # Inputs were incomplete — step back to refine the brief.
      # Keep search results (proposal_existing_state, proposal_references) since
      # the search is already done; just re-do the brief. The clarify sentinel on
      # proposal_brief_decision prevents the judge from auto-advancing on re-entry
      # to proposal_refine (clearing it via `ready` re-arms the judge).
      clarify:
        - target: proposal_refine
          effects:
            - set:
                proposal_brief_decision:
                  verdict: "clarify"
                  reason:  "Stepped back from draft — revise the brief (edit it or keep talking), then say ready to re-run the check."
                  questions: []
                proposal_refine_analysis: {}
                proposal_artifact:        {}

      quit:
        - target: main
          effects:
            - set:
                last_error: "proposal abandoned at draft"
                prev_state: "main"
      look:
        - target: .

  # Post-publish confirmation view (was proposal_publish.yaml, now inline).
  # Entered from the accept arc after publish_proposal.py has bound proposal_file.
  # on_enter is empty — publish already happened in the accept arc's effects.
  proposal_done:
    description: "Proposal published — review the file and return to your day."
    view:
      - banner:
          text:     "PUBLISHED"
          subtitle: "Proposal moved into the queue"
          color:    "#10B981"
      - kv:
          pairs:
            Published: '{{ world.proposal_file|default:"(publishing…)" }}'
      - prose: 'Checks archived under  {{ world.proposal_workspace }}/'
      - kv:
          pairs:
            Title: '{{ world.proposal_artifact.title|default:"(n/a)" }}'
            Kind:  '{{ world.proposal_artifact.kind|default:"(n/a)" }}'
      - prose: "Open the published proposal to review or trim it. **main** returns to your day."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "main"
              hint:   "back to the engineer's day landing"
              intent: go_main
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [proposal_workspace, proposal_slug, proposal_change_target, proposal_artifact, proposal_file]
    on:
      go_main:
        - target: main
          effects:
            - set:
                last_error: ""
                prev_state: "main"
      look:
        - target: .
