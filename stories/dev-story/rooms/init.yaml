# init -- deterministic project onboarding.
#
# The flow is deliberately boring and auditable:
#   landing -> init_discover -> init(review) -> init_apply -> init_done
#
# Discovery and apply are host.run scripts that emit JSON. Flow fixtures stub
# both calls, so this remains no-LLM and cost-free in tests. The review room is
# the operator checkpoint: no files are written until confirm_init enters the
# apply room.

states:

  init_discover:
    description: "Discover a project profile from the target checkout before any writes happen."
    relevant_world:
      - init_request
      - init_target_path
      - init_profile_status
      - init_run_output
      - workdir
      - repo_root
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "discovering profile"
          color:    "#14B8A6"
      - kv:
          pairs:
            Request: "{{ world.init_request|default:'(current project)' }}"
            Target:  "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Status:  "{{ world.init_profile_status }}"
      - prose: "Inspecting local project files to infer commands, stack, and the Kitsoki instance shape."
        when: "world.init_project_id == ''"
      - kv:
          pairs:
            Project: "{{ world.init_project_title }}"
            ID:      "{{ world.init_project_id }}"
            Stack:   "{{ world.init_stack }}"
        when: "world.init_project_id != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "review the discovered profile"
              intent: init_discovered
              when:   "world.init_project_id != ''"
            - label:  "retry"
              hint:   "rerun deterministic discovery"
              intent: init_discovered
              when:   "world.init_project_id == ''"
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: discover
        with:
          cmd: bash
          args:
            - "-lc"
            - 'python3 "$KITSOKI_APP_DIR/scripts/init_discover.py" "$@"'
            - "init_discover"
            - "{{ world.init_request }}"
            - "{{ world.workdir }}"
            - "{{ world.repo_root }}"
        bind:
          init_run_ok:        "ok"
          init_run_output:    "stdout"
          init_discovery:     "stdout_json"
          init_target_path:   "stdout_json.target_path"
          init_project_id:    "stdout_json.project_id"
          init_project_title: "stdout_json.project_title"
          init_stack:         "stdout_json.stack"
          init_dev_command:   "stdout_json.dev_command"
          init_test_command:  "stdout_json.test_command"
          init_build_command: "stdout_json.build_command"
          init_conventions:   "stdout_json.conventions"
          init_tracker:       "stdout_json.tracker"
        on_error: init_discover_failed
    on:
      init_discovered:
        - when: "world.init_project_id != ''"
          target: init
          effects:
            - set:
                init_profile_status: "draft"
                last_error: ""
        - default: true
          target: init_discover_failed
          effects:
            - set:
                init_profile_status: "discovery-failed"
                last_error: "project discovery failed"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_discover"
      look:
        - target: .

  init_discover_failed:
    description: "Project discovery failed before a reviewable profile was available."
    relevant_world:
      - init_request
      - init_target_path
      - init_profile_status
      - init_run_output
      - workdir
      - repo_root
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "discovery failed"
          color:    "#EF4444"
      - prose: "Discovery did not produce a usable project profile. No files were written."
      - kv:
          pairs:
            Request: "{{ world.init_request|default:'(current project)' }}"
            Target:  "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Status:  "{{ world.init_profile_status }}"
      - heading: "Output"
        when: "world.init_run_output != ''"
      - code: "{{ world.init_run_output }}"
        when: "world.init_run_output != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "retry"
              hint:   "rerun deterministic discovery"
              intent: init_discovered
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      init_discovered:
        - target: init_discover
          effects:
            - set:
                init_discovery: {}
                init_run_ok: false
                init_run_output: ""
                init_profile_status: "discovering"
                last_error: ""
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_discover_failed"
      look:
        - target: .

  init:
    description: "Review the discovered project onboarding profile before applying local setup files."
    default_intent: revise_init
    relevant_world:
      - init_request
      - init_discovery
      - init_target_path
      - init_project_id
      - init_project_title
      - init_stack
      - init_dev_command
      - init_test_command
      - init_build_command
      - init_conventions
      - init_tracker
      - init_profile_status
      - init_feedback
      - workdir
      - repo_root

    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "review profile before writes"
          color:    "#14B8A6"
      - prose: >
          Review the project profile Kitsoki discovered. Accepting writes the
          local Kitsoki config, project profile, and story instance into the
          target checkout; feedback is recorded before another discovery pass.
      - kv:
          pairs:
            Target:      "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Project:     "{{ world.init_project_title|default:'(not yet inferred)' }}"
            ID:          "{{ world.init_project_id|default:'(not yet inferred)' }}"
            Stack:       "{{ world.init_stack|default:'(not yet inferred)' }}"
            Status:      "{{ world.init_profile_status }}"
      - heading: "Commands"
      - kv:
          pairs:
            Dev server:  "{{ world.init_dev_command|default:'(not yet inferred)' }}"
            Test:        "{{ world.init_test_command|default:'(not yet inferred)' }}"
            Build:       "{{ world.init_build_command|default:'(not yet inferred)' }}"
      - heading: "Setup"
      - kv:
          pairs:
            Conventions: "{{ world.init_conventions }}"
            Tracker:     "{{ world.init_tracker }}"
            Writes:      ".kitsoki.yaml, .kitsoki/project-profile.yaml, .kitsoki/stories/{{ world.init_project_id }}-dev/app.yaml"
            Mode:        "{{ world.init_profile_mode }}"
      - heading: "Profile Validation"
        when: "world.init_profile_validation.ok"
      - kv:
          pairs:
            Schema:   "passed"
            Semantic: "passed"
            Warnings: "{{ world.init_profile_validation.warnings|default:'[]' }}"
        when: "world.init_profile_validation.ok"
      - heading: "Feedback"
        when: "world.init_feedback != ''"
      - prose: "{{ world.init_feedback }}"
        when: "world.init_feedback != ''"
      - heading: "Actions"
      - prose: "Type feedback in your own words to revise the draft, or use an action below."
      - choice:
          mode: single
          prompt: ""
          items:
            - label:  "accept"
              hint:   "write the local Kitsoki onboarding files"
              intent: confirm_init
            - label:  "LLM draft"
              hint:   "draft a richer project profile, then validate schema + semantics"
              intent: draft_profile
            - label:  "revise"
              hint:   "record feedback for the next profile draft"
              intent: revise_init
              param:
                slot:        feedback
                type:        string
                placeholder: "what should change"
                required:    true
            - label:  "rediscover"
              hint:   "rerun deterministic discovery"
              intent: init_discovered
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look

    on:
      confirm_init:
        - when: "world.init_project_id == ''"
          target: .
          guard_hint: "Discovery has not produced a project profile yet."
          effects:
            - set:
                last_error: "Cannot apply onboarding until discovery produces a project id."
        - target: init_apply
          effects:
            - set:
                init_profile_status: "applying"
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                last_error: ""
      revise_init:
        - target: .
          effects:
            - set:
                init_profile_status: "needs-revision"
                init_feedback: "{{ slots.feedback }}"
            - say: "Onboarding feedback recorded."
      draft_profile:
        - when: "world.init_project_id == ''"
          target: .
          guard_hint: "Discovery has not produced a project profile yet."
          effects:
            - set:
                last_error: "Cannot draft an LLM profile until deterministic discovery produces a project id."
        - target: init_profile_draft
          effects:
            - set:
                init_profile_status: "drafting-with-llm"
                init_profile_mode: "llm-draft"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
      init_discovered:
        - target: init_discover
          effects:
            - set:
                init_discovery: {}
                init_run_ok: false
                init_run_output: ""
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                init_profile_mode: "deterministic"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                init_profile_status: "discovering"
                last_error: ""
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init"
      look:
        - target: .

  init_profile_draft:
    description: "Ask an LLM for a richer project-profile/v1 candidate before validation."
    relevant_world:
      - init_discovery
      - init_profile_draft
      - init_target_path
      - init_project_id
      - init_feedback
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "LLM profile draft"
          color:    "#8B5CF6"
      - kv:
          pairs:
            Target:  "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Status:  "{{ world.init_profile_status }}"
      - prose: "Drafting a project-profile/v1 candidate from deterministic discovery and repository evidence."
        when: "world.init_profile_draft.schema == ''"
      - kv:
          pairs:
            Draft: "{{ world.init_profile_draft.id|default:'(pending)' }}"
            Path:  "{{ world.init_profile_draft.kitsoki.instance.path|default:'(pending)' }}"
        when: "world.init_profile_draft.schema != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "validate"
              hint: "run JSON Schema and semantic validation"
              intent: profile_drafted
              when: "world.init_profile_draft.schema != ''"
            - label: "retry"
              hint: "discard this draft and ask again"
              intent: draft_profile
            - label: "back"
              hint: "return to deterministic profile review"
              intent: quit
            - label: "look"
              hint: "re-render"
              intent: look
    on_enter:
      - invoke: host.agent.decide
        id: draft_profile
        once: true
        with:
          prompt: prompts/init_profile_draft.md
          schema: schemas/project-profile.json
          agent: profile_drafter
          args:
            discovery:   "{{ world.init_discovery }}"
            feedback:    "{{ world.init_feedback }}"
            target_path: "{{ world.init_target_path }}"
        bind:
          init_profile_draft: submitted
        on_error: init
    on:
      profile_drafted:
        - when: "world.init_profile_draft.schema != ''"
          target: init_profile_validate
          effects:
            - set:
                init_profile_status: "validating-profile"
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
        - default: true
          target: .
          effects:
            - set:
                last_error: "Profile draft is not ready yet."
      draft_profile:
        - target: .
          effects:
            - set:
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
      quit:
        - target: init
          effects:
            - set:
                init_profile_status: "draft"
                init_profile_mode: "deterministic"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
      look:
        - target: .

  init_profile_validate:
    description: "Validate an LLM-drafted project profile before it can be applied."
    relevant_world:
      - init_profile_draft
      - init_profile_validation
      - init_target_path
      - init_project_id
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "schema + semantic validation"
          color:    "#0EA5E9"
      - kv:
          pairs:
            Target: "{{ world.init_target_path }}"
            Draft:  "{{ world.init_profile_draft.id|default:'(pending)' }}"
            Status: "{{ world.init_profile_status }}"
      - prose: "The draft must pass the embedded project-profile JSON Schema and Kitsoki semantic checks before apply can use it."
      - kv:
          pairs:
            OK:       "{{ world.init_profile_validation.ok|default:false }}"
            Schema:   "{{ world.init_profile_validation.schema|default:'[]' }}"
            Semantic: "{{ world.init_profile_validation.semantic|default:'[]' }}"
            Warnings: "{{ world.init_profile_validation.warnings|default:'[]' }}"
        when: "world.init_profile_validation != {}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "use draft"
              hint: "return to review with this validated profile selected"
              intent: profile_validated
              when: "world.init_profile_validation.ok"
            - label: "revise draft"
              hint: "ask the LLM for a corrected profile"
              intent: draft_profile
            - label: "back"
              hint: "return to deterministic profile review"
              intent: quit
            - label: "look"
              hint: "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: validate_profile
        with:
          cmd: bash
          args:
            - "-lc"
            - 'python3 "$KITSOKI_APP_DIR/scripts/init_validate_profile.py" "$@"'
            - "init_validate_profile"
            - "{{ world.init_target_path }}"
            - "{{ world.init_profile_draft }}"
        bind:
          init_profile_validation: "stdout_json"
          init_profile_json: "stdout_json.profile_json"
        on_error: init_profile_validate
    on:
      profile_validated:
        - when: "world.init_profile_validation.ok"
          target: init
          effects:
            - set:
                init_profile_status: "draft"
                init_profile_mode: "llm-validated"
                last_error: ""
        - default: true
          target: .
          effects:
            - set:
                last_error: "Profile validation has not passed."
      draft_profile:
        - target: init_profile_draft
          effects:
            - set:
                init_profile_status: "drafting-with-llm"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
      quit:
        - target: init
          effects:
            - set:
                init_profile_status: "draft"
                init_profile_mode: "deterministic"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
      look:
        - target: .

  init_apply:
    description: "Apply the reviewed onboarding files to the target checkout."
    relevant_world:
      - init_discovery
      - init_apply_result
      - init_target_path
      - init_project_id
      - init_project_title
      - init_profile_status
      - init_apply_output
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "applying local setup"
          color:    "#14B8A6"
      - kv:
          pairs:
            Target:  "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Status:  "{{ world.init_profile_status }}"
      - prose: "Writing local Kitsoki onboarding files. No agents or project tests run in this step."
        when: "world.init_apply_result.status != 'applied'"
      - kv:
          pairs:
            Config:   "{{ world.init_apply_result.config_path|default:'' }}"
            Profile:  "{{ world.init_apply_result.profile_path|default:'' }}"
            Instance: "{{ world.init_apply_result.instance_path|default:'' }}"
        when: "world.init_apply_result.status == 'applied'"
      - prose: "Installed the kitsoki agent toolkit (skills + subagents) and registered the studio MCP."
        when: "world.init_tools_ok"
      - kv:
          pairs:
            MCP: "{{ world.init_tools_result.mcp_path|default:'(pending)' }}"
        when: "world.init_tools_ok"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "show the applied onboarding result"
              intent: init_applied
              when:   "world.init_apply_result.status == 'applied'"
            - label:  "retry"
              hint:   "rerun apply"
              intent: init_applied
              when:   "world.init_apply_result.status != 'applied'"
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: apply
        with:
          cmd: bash
          args:
            - "-lc"
            - 'python3 "$KITSOKI_APP_DIR/scripts/init_apply.py" "$@"'
            - "init_apply"
            - "{{ world.init_target_path }}"
            - "{{ world.init_project_id }}"
            - "{{ world.init_project_title }}"
            - "{{ world.init_stack }}"
            - "{{ world.init_dev_command }}"
            - "{{ world.init_test_command }}"
            - "{{ world.init_build_command }}"
            - "{{ world.init_conventions }}"
            - "{{ world.init_tracker }}"
            - "{{ world.init_profile_json }}"
        bind:
          init_apply_ok: "ok"
          init_apply_output: "stdout"
          init_apply_result: "stdout_json"
        on_error: init_apply_failed
      # Install the kitsoki agent toolkit (skills + shared subagents) and
      # register the studio MCP into the target checkout, so an onboarded
      # project is a fully working kitsoki environment (not just config files).
      # This is load-bearing: a failed install (e.g. the toolkit was not staged
      # into the binary, or the command errored) must NOT silently pass as
      # "applied" — `fail_on_error: true` makes a non-zero exit set the host
      # error, and `on_error` routes to a loud read-out the operator can retry.
      # `kitsoki` resolves via host.run's kitsoki-bin-on-PATH (the running
      # binary), independent of the operator's login PATH.
      - invoke: host.run
        once: true
        id: install_tools
        with:
          cmd: kitsoki
          args:
            - "project-tools"
            - "install"
            - "--json"
            - "--target"
            - "{{ world.init_target_path }}"
          fail_on_error: true
        bind:
          init_tools_ok: "ok"
          init_tools_output: "stdout"
          init_tools_result: "stdout_json"
        on_error: init_tools_failed
    on:
      init_applied:
        - when: "world.init_apply_result.status == 'applied'"
          target: init_done
          effects:
            - set:
                init_profile_status: "{{ world.init_apply_result.status ?? 'applied' }}"
                last_error: ""
            - say: "Project onboarding files applied."
        - default: true
          target: init_apply_failed
          effects:
            - set:
                init_profile_status: "apply-failed"
                last_error: "project onboarding apply failed"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_apply"
      look:
        - target: .

  init_apply_failed:
    description: "Project onboarding apply failed before all files were written."
    relevant_world:
      - init_apply_result
      - init_apply_output
      - init_target_path
      - init_project_id
      - init_project_title
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "apply failed"
          color:    "#EF4444"
      - prose: "Apply did not complete successfully. Review the output, then retry or return to the profile review."
      - kv:
          pairs:
            Target:  "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Status:  "{{ world.init_profile_status }}"
      - heading: "Output"
        when: "world.init_apply_output != ''"
      - code: "{{ world.init_apply_output }}"
        when: "world.init_apply_output != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "retry"
              hint:   "rerun apply"
              intent: confirm_init
            - label:  "review"
              hint:   "return to the profile review"
              intent: revise_init
              slots:
                feedback: "review after apply failure"
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      confirm_init:
        - target: init_apply
          effects:
            - set:
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                init_profile_status: "applying"
                last_error: ""
      revise_init:
        - target: init
          effects:
            - set:
                init_feedback: "{{ slots.feedback }}"
                init_profile_status: "needs-revision"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_apply_failed"
      look:
        - target: .

  init_tools_failed:
    description: "Config + instance were written, but the toolkit + studio MCP install failed."
    relevant_world:
      - init_target_path
      - init_project_title
      - init_apply_result
      - init_tools_output
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "toolkit + MCP install failed"
          color:    "#EF4444"
      - prose: >-
          The onboarding files were written, but installing the kitsoki agent
          toolkit (skills + subagents) and registering the studio MCP did not
          complete. Without it this checkout has config but cannot drive kitsoki
          (no .mcp.json, no skills/agents). If the binary reports the toolkit was
          not staged, rebuild with `make embed-skills` (wired into `make
          install`). You can retry, or continue and install it later by hand with
          `kitsoki project-tools install --target {{ world.init_target_path }}`.
      - kv:
          pairs:
            Target:   "{{ world.init_target_path }}"
            Project:  "{{ world.init_project_title }}"
            Config:   "{{ world.init_apply_result.config_path|default:'' }}"
            Instance: "{{ world.init_apply_result.instance_path|default:'' }}"
      - heading: "Output"
        when: "world.init_tools_output != ''"
      - code: "{{ world.init_tools_output }}"
        when: "world.init_tools_output != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "retry"
              hint:   "rerun apply + toolkit/MCP install"
              intent: confirm_init
            - label:  "continue"
              hint:   "proceed without the toolkit (install it by hand later)"
              intent: init_applied
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      confirm_init:
        - target: init_apply
          effects:
            - set:
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                init_tools_result: {}
                init_tools_ok: false
                init_tools_output: ""
                init_profile_status: "applying"
                last_error: ""
      init_applied:
        - target: init_done
          effects:
            - set:
                init_profile_status: "applied-no-tools"
                last_error: "onboarding applied; toolkit + MCP install skipped (run `kitsoki project-tools install` to finish)"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_tools_failed"
      look:
        - target: .

  init_done:
    description: "Show the applied project onboarding result."
    relevant_world:
      - init_apply_result
      - init_target_path
      - init_project_id
      - init_project_title
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "applied"
          color:    "#22C55E"
      - kv:
          pairs:
            Target:        "{{ world.init_target_path }}"
            Project:       "{{ world.init_project_title }}"
            Status:        "{{ world.init_profile_status }}"
            Config:        "{{ world.init_apply_result.config_path|default:'' }}"
            Profile:       "{{ world.init_apply_result.profile_path|default:'' }}"
            Instance:      "{{ world.init_apply_result.instance_path|default:'' }}"
            Gitignore:     "{{ world.init_apply_result.gitignore_path|default:'' }}"
      - heading: "Writes"
        when: "world.init_apply_result.writes"
      - template: |
          {% for path in world.init_apply_result.writes %}- {{ path }}
          {% endfor %}
        when: "world.init_apply_result.writes"
      - heading: "Actions"
      - choice:
          mode: single
          prompt: ""
          items:
            - label:  "workbench"
              hint:   "return to the dev-story workbench"
              intent: go_main
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      go_main:
        - target: landing
          effects:
            - set:
                prev_state: "init_done"
                last_error: "project onboarding complete"
      look:
        - target: .
