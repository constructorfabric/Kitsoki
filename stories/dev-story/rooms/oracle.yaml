# oracle — Q&A surface against the oracle host. Minimal Wave 2 shape:
# a single ask_question intent that fires host.oracle.ask_with_mcp and
# binds the answer. The existing pattern (testdata/apps/dev-story/
# rooms/oracle.yaml) has multi-turn chat surfaces; Wave 3 ports those.

states:

  oracle:
    description: "Oracle — Q&A with Claude."
    view: |
      Oracle.

      Last question: {{ world.oracle_question|default:"(none)" }}
      Last answer:   {{ world.oracle_answer|default:"(none)" }}

      Intents: ask_question, go_back, go_main.
    relevant_world: [oracle_question, oracle_answer]
    on:
      ask_question:
        - target: oracle_asking
          effects:
            - set: { oracle_question: "{{ slots.question }}" }
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: main
      look:
        - target: .

  oracle_asking:
    description: "Querying the Oracle."
    view: |
      Oracle (querying).

      Question: {{ world.oracle_question }}
      Answer:   {{ world.oracle_answer|default:"(pending)" }}
    relevant_world: [oracle_question, oracle_answer]
    on_enter:
      - invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/oracle_ask.md
          args:
            question: "{{ world.oracle_question }}"
        bind:
          oracle_answer: stdout
        on_error: oracle
    on:
      go_back:
        - target: oracle
      go_main:
        - target: main
      look:
        - target: .
