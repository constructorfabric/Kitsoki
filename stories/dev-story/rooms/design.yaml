# proposal — single free-form intake.
#
# Stage 1 of the 4-stage proposal pipeline:
#   intake → design_search → design_refine → design_draft (+ publish)
#
# One message captures the idea and mints a candidate slug, then advances to
# design_search. The workspace folder is NOT created here — the scout runs
# first so a duplicate idea is redirected to its existing draft before any
# new folder lands on disk (the folder is minted in design_materialize,
# behind the overlap gate). There is no multi-turn loop here — discovery and
# brief-writing happen AFTER search, in design_refine.
#
# The `design_seed_idea` ternary is evaluated BEFORE any set: takes effect
# (effects evaluate against the start-of-turn world), so both the set: and
# the invoke.args.idea: use the same expression against the same snapshot.
#
# Optionally, the operator can point at existing docs before sending the idea:
# `capture_existing` records them in design_existing_paths, which the search
# room passes to the scout.

states:

  design:
    mode: conversational
    default_intent: discuss
    description: "Describe your proposal idea — one message starts the search."
    view:
      - banner:
          text:     "INTAKE"
          subtitle: "Describe your idea — search runs next"
          color:    "#10B981"
      - template: "⚠ **Could not prepare a proposal name.** Send the idea again{{ world.design_idea != '' ? ': **' + world.design_idea + '**' : '' }}."
        when: "world.last_error != ''"
      - prose: 'Seeded from your ideas backlog: **{{ world.design_seed_idea }}** — describe or expand it to start the search.'
        when: "world.design_seed_idea != ''"
      - prose: "Describe the change you want to propose — as rough or specific as you like. One message starts the pipeline: I'll search for prior art and relevant docs before we shape the brief.\n\nOptionally, point me at existing docs first with `see docs/…` — they'll be passed to the search."
        when: "world.design_seed_idea == ''"
      - kv:
          pairs:
            Existing docs: '{{ world.design_existing_paths }}'
        when: "world.design_existing_paths != ''"
    on:
      # Capture the idea → mint candidate slug → advance to search (the scout
      # gate). No workspace folder is created here.
      discuss:
        - target: design_search
          effects:
            - set:
                design_idea: "{{ world.design_seed_idea != '' ? world.design_seed_idea + ' — ' + slots.message : slots.message }}"
                design_seed_idea: ""
                last_error: ""
            - invoke: host.run
              id: name_slug
              with:
                cmd: python3
                args:
                  - "stories/dev-story/scripts/design_workspace.py"
                  - "{{ world.design_seed_idea != '' ? world.design_seed_idea + ' — ' + slots.message : slots.message }}"
              bind:
                design_slug: "stdout_json.slug"
              on_error: design
            # NB: the workspace folder is deliberately NOT minted here. The
            # scout (design_search.on_enter) runs FIRST, so an idea that
            # duplicates an in-flight draft can be redirected to the existing
            # case BEFORE any new folder is created on disk. Folder creation
            # (uniquify) now lives in design_materialize, behind the
            # overlap gate. Intake only mints the candidate slug.

      # Record existing docs the operator points at; search uses design_existing_paths.
      capture_existing:
        - target: .
          effects:
            - set:
                design_existing_paths: "{{ slots.paths }}"

      quit:
        - target: landing
          effects:
            - set:
                last_error:         "design abandoned at intake"
                prev_state:         "landing"
                design_seed_idea: ""
      look:
        - target: .
