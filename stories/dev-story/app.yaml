# dev-story — engineer's-day hub. See docs/case-studies/bug-fix.md and
# docs/stories/imports.md.
#
# This is the GENERAL-PURPOSE app: it imports the bugfix and
# pr-refinement sub-stories and routes between them via the
# day-level rooms (main, inbox, ticket_search, workspace_manager,
# standup, code_review, oracle, …). It does NOT bind providers —
# concrete bindings happen at the INSTANCE level (kitsoki-dev,
# cyber-repo/devstory). The `default:` values in `host_interfaces:`
# are the fallback for standalone runs.
#
# Provider-neutral world: no `jira_*` keys. `ticket_query` /
# `ticket_results` replace the legacy `jira_query` / `jira_results`
# from `testdata/apps/dev-story/`.
#
# # Composition (proposal §5.1)
#
#   dev-story
#     ├── imports bf  (../bugfix)        — reproduce → propose → … → done
#     │     done    → pr (open_pr)        — handoff into PR refinement
#     │     abandoned → main
#     └── imports pr  (../pr-refinement)  — open → CI → merge
#           merged    → main (status="merged", last_pr_url=…)
#           abandoned → main
#
# A bugfix completing fires `@exit:done` in the bf child. The exit
# projection (set: pr_title, pr_body, …) writes parent world keys;
# the next state `pr` is the pr-refinement import compound, whose
# OnEnter world_in: fires and projects those parent keys into the
# pr child's private world. The full bf → pr chain is one import
# edge per child.
#
# # Wave 3 / Phase 6 additions
#
#   - `stories/implementation/` import alias `impl` — small-task pipeline.
#   - `stories/code-review/` import alias `rev` — teammate PR review.
#   - `inbox.yaml` `pick_review` arc routes a selected review-request
#     notification into `rev` via initial_world seeded from the
#     notification payload.
#
# # What is NOT here (later waves)
#
#   - `stories/cypilot/` import — Wave 4.
#   - LLM-driven `deploy`, `incident`, `observability`, `docs` rooms —
#     Wave 2 ships these as STUBS that route back to main; their real
#     content lands in later waves.

app:
  id: dev-story
  version: 0.1.0
  title: "dev-story — Engineer's Day"
  author: "Kitsoki"
  license: "CC0"
  # Layer-2 project context: prepended (under the kitsoki grounding) to every
  # oracle call and the intent router so each operator shares this app's domain.
  # See docs/architecture/system-prompt.md.
  context: |
    This app is an engineer's daily-workflow hub. It routes a developer
    through real software-engineering tasks over a live code repository —
    triaging an inbox, searching and picking up tickets, fixing bugs,
    refining pull requests, running standups and code reviews — by composing
    sub-stories. Judgments here are technical and consequential: they decide
    what work is picked up, whether a change is acceptable, and what gets
    reported to a team. Favor precision; cite concrete files, symbols, and
    commands; and prefer the smallest change that satisfies the task. This is
    also the story kitsoki uses to improve itself, so correctness and clear,
    auditable reasoning matter more than speed.

# Local model for cheap, offline slug naming. Qwen2.5-1.5B-Instruct at Q4_K_M;
# grammar: true enables constrained decoding so the JSON schema is satisfied on
# the first decode without retries.
oracle_plugins:
  oracle.local_llm:
    plugin: builtin.local_llm
    model: qwen2.5-1.5b-instruct
    grammar: true

# Hosts that the day-level rooms call directly. Iface-resolved hosts
# are unioned implicitly at fold time via resolveAllInterfaces.
hosts:
  - host.inbox.add
  - host.oracle.ask
  - host.run
  # ── Proposal-authoring pipeline (rooms/proposal*.yaml) ────────────
  # 4-stage pipeline: intake → search (decide ×2) → refine (task + decide) →
  # draft+publish (task + run). The brief is scaffolded in the refine room via
  # host.artifacts_dir so search results can inform it; host.ide.open_file
  # opens it in the editor on first scaffold. An instance importing dev-story
  # with `hosts: declared` must list all four in its own allow-list.
  - host.oracle.decide
  - host.oracle.task
  - host.oracle.search
  - host.artifacts_dir
  - host.ide.open_file

# Persona table (oracle-split proposal §3.5).
#
# The dev-story hub's own oracle room makes one-shot prose Q&A
# calls — read-only inspection, no schema. The verb is ask.
#
#   oracle_qa    ask   one-shot prose Q&A (oracle_asking room)
agents:
  oracle_qa:
    system_prompt: "You are an engineering assistant. Answer the operator's question clearly and concisely based on your knowledge and any context provided."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    bash_profile: read-only

  # ── Proposal-authoring personas (rooms/proposal*.yaml) ────────────
  # One persona per pipeline step so the trace attributes model + token
  # usage per phase, the same discipline as stories/prd/. All are
  # read-only except the refiner and author, which write into the
  # per-session workspace.
  proposal_namer:
    system_prompt: "You name kitsoki proposals. Turn an idea into a short, meaningful 2-5 word kebab-case slug (like an existing docs/proposals/<slug>.md filename) — never a raw sentence. Glance at the existing proposals + in-progress workspace to match the house style and avoid an already-taken name."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  proposal_brief_judge:
    system_prompt: "You are a proposal reviewer sanity-checking a brief an operator has just filled in. Read the brief from disk and decide whether it has enough signal to proceed (a crisp Why, a one-screen What-changes, and a named kind) or whether it needs clarification. When it needs work, return the smallest set of specific clarifying questions."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  proposal_scout:
    system_prompt: "You are a kitsoki maintainer checking whether a proposed idea overlaps with work already in flight. Search the proposals workspace (docs/proposals/.workspace/), the accepted proposals (docs/proposals/*.md), and the feature/bug docs for anything the idea duplicates, extends, or conflicts with. When you find an overlap, recommend AMENDING the existing proposal rather than creating a new one. Report where the idea fits on the roadmap."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  proposal_refiner:
    # ⛔ This agent MAINTAINS THE BRIEF — it must NEVER implement the idea.
    # working_dir is the per-session workspace, NOT a write jail — the constraint
    # is this instruction. It writes EXACTLY ONE file: the brief at the given path.
    system_prompt: "You are a kitsoki maintainer maintaining a proposal BRIEF markdown file, using search results (prior-art overlaps and curated references) to fill and sharpen it. You write EXACTLY ONE file — the brief at the given path — and nothing else. You MUST NOT implement the idea or touch any source code, test, config, story YAML, or other repository file; doing so is a hard failure. Read the brief, fold in search context and any operator message, fill the Why / What changes / Impact / Why-kitsoki / How-it's-used spine where you now have signal, and leave honest `<…>` placeholders where you don't. Keep it skim-in-two-minutes."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Write, Edit]
    external_side_effect: false

  proposal_researcher:
    system_prompt: "You are a kitsoki maintainer curating the reference materials a proposal must build on. Read the idea and the brief, then search the repo's DOCUMENTATION, rules, and guidelines — docs/, READMEs, gold-standard stories, the proposal templates and skill — for prior art, constraints, and conventions the proposal must honour. For each reference give the path, the specific section(s) / line range that matter, and a one-line rationale. Prefer a short, high-signal list."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  proposal_author:
    # ⛔ This agent AUTHORS A PROPOSAL DOCUMENT — it must NEVER implement the
    # idea. The hard rule is repeated in prompts/proposal_draft.md. It has
    # Write/Edit ONLY to produce the proposal markdown (working_dir is not a
    # write jail — the constraint is the instruction, so it is emphatic).
    system_prompt: "You are a kitsoki maintainer authoring a PROPOSAL DOCUMENT — a design write-up, NOT an implementation. You write exactly ONE file: the proposal markdown at the given output path (or, when amending, the named existing proposal). You MUST NOT implement the idea: do NOT create, edit, or modify any source code, test, config, story YAML, or any other repository file. Reading the codebase (Read/Grep/Glob) to ground the proposal is expected; writing anything other than the single proposal markdown is a hard failure. Classify the change kind, copy the matching template under docs/proposals/templates/, and fill the Why / What changes / Impact spine, grounding every claim in the cited references."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Write, Edit]
    external_side_effect: false

  # ── Ideas reviewer (rooms/ideas.yaml) ─────────────────────────────
  # Reconciles the hand-maintained ideas backlog against shipped work. READ-ONLY:
  # it only PROPOSES section moves (the deterministic ideas_reconcile.py script
  # does the rewrite). Bash under the read-only profile is for `git log` /
  # `git show` (the proven combo used by stories/bugfix + stories/docs-review).
  ideas_reviewer:
    system_prompt: "You are a kitsoki maintainer reconciling a hand-maintained ideas backlog against work that has actually shipped. Read the backlog file, scan the commit history (git log — read-only Bash), the proposals (docs/proposals/), and the docs (docs/) for concrete evidence that an item has shipped or partially shipped. Be conservative: only propose a section move when you can cite real evidence (a commit, a proposal, a doc); leave ambiguous items alone. Also surface a few high-value items still in the Ideas section worth proposing next. You PROPOSE moves only — you never edit the backlog yourself."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Bash]
    bash_profile: read-only
    external_side_effect: false

# Six host_interfaces — same provider-neutral surfaces declared by the
# imported stories. Declaring them here too lets the dev-story hub
# call iface.ticket.search / iface.ticket.list_mine from its own
# rooms (ticket_search, standup) and lets a parent INSTANCE rebind
# them at one place via `imports.core.host_bindings`.
host_interfaces:

  ticket:
    description: "Issue tracker abstraction (file / GitHub Issues / Jira)."
    operations:
      search:
        input:  { query: string, limit: int }
        output: { tickets: list }
      get:
        input:  { id: string }
        output: { id: string, title: string, body: string, status: string,
                  priority: string, assignee: string, url: string, comments: list }
      comment:
        input:  { id: string, body: string, thread: string }
        output: { ok: bool, comment_id: string }
      transition:
        input:  { id: string, to: string }
        output: { ok: bool }
      list_mine:
        input:  { filter: string }
        output: { tickets: list }
    default: host.local_files.ticket

  vcs:
    description: "Branch / commit / PR abstraction (git / GitHub / Bitbucket)."
    operations:
      branch:
        input:  { workdir: string, name: string, base: string }
        output: { ok: bool, branch: string }
      diff:
        input:  { workdir: string }
        output: { diff: string, files: list }
      commit:
        input:  { workdir: string, message: string, files: list }
        output: { ok: bool, sha: string }
      push:
        input:  { workdir: string, remote: string }
        output: { ok: bool, url: string }
      open_pr:
        input:  { workdir: string, title: string, body: string, base: string }
        output: { ok: bool, url: string, pr_id: string }
      pr_status:
        input:  { pr_id: string }
        output: { state: string, checks: list, comments: list }
      pr_comment:
        input:  { pr_id: string, body: string }
        output: { ok: bool }
      merge:
        input:  { pr_id: string, strategy: string }
        output: { ok: bool, sha: string }
    default: host.git

  ci:
    description: "Build/test runner."
    operations:
      run_tests:
        input:  { workdir: string, target: string }
        output: { ok: bool, passed: int, failed: int, log: string, junit: string }
      build:
        input:  { workdir: string, target: string }
        output: { ok: bool, log: string }
      remote_status:
        input:  { pr_id: string }
        output: { state: string, checks: list }
    default: host.local

  workspace:
    description: "Working-copy manager. Local: git worktree."
    operations:
      list:
        input:  {}
        output: { workspaces: list }
      get:
        input:  { id: string }
        output: { id: string, path: string, branch: string, dirty: bool }
      create:
        input:  { name: string, ticket_id: string, base: string }
        output: { ok: bool, path: string }
      sync:
        input:  { id: string }
        output: { ok: bool, log: string }
    default: host.git_worktree

  transport:
    description: "Out-of-band channel for posting proposals, checkpoints, status."
    operations:
      post:
        input:  { thread: string, body: string }
        output: { ok: bool, message_id: string }
    default: host.append_to_file

# World — provider-neutral. Strips Jira-flavoured keys
# (`jira_query` / `jira_results` → `ticket_query` / `ticket_results`)
# and adds the keys the bf / pr imports project across (ticket_id,
# workdir, feature_branch, base_branch, judge_mode, pr_title, pr_body).
world:
  # ── Hub navigation ────────────────────────────────────────────────
  prev_state:          { type: string, default: "main" }
  inbox_unread:        { type: int,    default: 0 }
  last_error:          { type: string, default: "" }

  # ── Ticket search / pickup ────────────────────────────────────────
  ticket_query:        { type: string, default: "" }
  ticket_results:      { type: string, default: "" }
  ticket_id:           { type: string, default: "" }
  ticket_title:        { type: string, default: "" }
  ticket_url:          { type: string, default: "" }
  # ticket_type is how `drive` chooses a pipeline (bug → bf,
  # feature → impl, epic → cyp). Set by pick_ticket from its `type:`
  # slot (or carried through from a prior pick when the slot is
  # omitted). The local-files provider scans issues/{bugs,features,
  # epics}/ and tags every row with its source kind, so picks land
  # with the right value when the slot is fed in.
  ticket_type:         { type: string, default: "" }
  # The main room calls iface.ticket.list_mine on enter and stashes
  # the result here so the view can render a "tickets in your queue"
  # block without the operator having to type `tickets`.
  my_tickets:          { type: list,   default: [] }
  thread:              { type: string, default: "" }

  # ── Workspace ─────────────────────────────────────────────────────
  current_workspace:   { type: string, default: "" }
  workspace_id:        { type: string, default: "" }
  workdir:             { type: string, default: "" }
  base_branch:         { type: string, default: "main" }
  feature_branch:      { type: string, default: "" }

  # ── Pipeline control (shared with bf / pr imports) ────────────────
  judge_mode:                  { type: string, default: "human" }
  judge_confidence_threshold:  { type: float,  default: 0.8 }
  bugfix_mode:                 { type: string, default: "full" }
  merge_strategy:              { type: string, default: "squash" }

  # ── Standup / oracle / code-review scratch ────────────────────────
  standup_summary:     { type: string, default: "" }
  oracle_question:     { type: string, default: "" }
  oracle_answer:       { type: string, default: "" }

  # ── Proposal-authoring pipeline (rooms/proposal*.yaml) ────────────
  # 4-stage pipeline: intake → search → refine → draft+publish.
  # Per-session scratch dir is `proposal_workspace` — NOT world.workdir
  # (that is the bf/pr worktree). See docs/proposals/process-design.md §4.
  proposal_slug:           { type: string, default: "" }   # meaningful slug; seeds the workspace dir + final filename
  proposal_workspace:      { type: string, default: "" }   # docs/proposals/.workspace/<slug> — gitignored scratch
  proposal_idea:           { type: string, default: "" }   # raw idea text from intake
  proposal_kind:           { type: string, default: "" }   # story | runtime | tui | tracing | epic (chosen by the author)
  proposal_existing_paths: { type: string, default: "" }   # operator-named existing docs passed to search

  # search (002-existing-state.md + 003-references.json)
  proposal_existing_state:   { type: object, default: {} } # { overlaps: [{path, kind, summary, recommendation}], roadmap_fit }
  proposal_existing_path:    { type: string, default: "" } # path 002-existing-state.md was written to
  proposal_overlap_decision: { type: string, default: "" } # "" | new | change_existing
  proposal_change_target:    { type: string, default: "" } # path of the proposal to amend when change_existing
  proposal_reference_hits:   { type: object, default: {} } # raw hits from host.oracle.search: { hits: [{path, chunk_id, text, score}], top }
  proposal_references:       { type: object, default: {} } # { items: [{ path, sections, rationale }] }
  proposal_references_path:  { type: string, default: "" } # path 003-references.json was written to

  # refine (001-brief.md + refinement analysis)
  proposal_brief_path:      { type: string, default: "" }  # path of the operator-editable 001-brief.md
  proposal_brief_decision:  { type: object, default: {} }  # decide verdict: { verdict: continue|clarify, questions: [...], reason }
  proposal_refine_analysis: { type: object, default: {} }  # refiner output: { gaps: [...], summary }
  proposal_last_refine_message: { type: string, default: "" }  # operator's last refine instruction, echoed in the brief view

  # draft (004-proposal.md) + publish
  proposal_artifact:       { type: object, default: {} }   # task result: { title, summary_markdown, file_path, kind, confidence, needs_clarification, follow_up_questions }
  proposal_file:           { type: string, default: "" }   # final published path docs/proposals/<slug>.md

  # feedback + per-phase cycle budgets
  proposal_refine_feedback:   { type: string, default: "" }
  proposal_cycle:             { type: int, default: 0 }    # global audit counter for the proposal flow
  proposal_brief_cycle:       { type: int, default: 0 }
  proposal_brief_budget:      { type: int, default: 5 }
  proposal_draft_cycle:       { type: int, default: 0 }
  proposal_draft_budget:      { type: int, default: 5 }

  # ── Ideas reviewer (rooms/ideas.yaml) ─────────────────────────────
  # The backlog reconciler: reads world.ideas_path, the commit history, and the
  # docs, proposes section moves (ideas_review), and rewrites the file
  # deterministically on `apply`. `pick` seeds proposal_seed_idea (consumed by
  # the proposal intake) so a blocked author flows straight into authoring.
  ideas_path:            { type: string, default: "ideas.md" } # backlog file (repo-relative); per-story files work by overriding this
  ideas_review:          { type: object, default: {} }          # decide report: { reclassifications: [...], candidates: [...], summary }
  ideas_review_path:     { type: string, default: "" }          # path the report JSON was written to (fed to the reconcile script)
  ideas_review_feedback: { type: string, default: "" }          # optional operator steering for a re-scan
  ideas_apply_result:    { type: object, default: {} }          # reconcile script result: { moved, not_found, sections }
  proposal_seed_idea:    { type: string, default: "" }          # candidate text handed from the ideas room into the proposal intake

  # ── PR handoff (lifted from `pr` import's exits.merged.set) ───────
  last_pr_url:         { type: string, default: "" }
  status:              { type: string, default: "open" }   # open | merged | abandoned

  # ── Carry-fields for the bf → pr handoff projection ───────────────
  # bf's @exit:done writes done_artifact via `set:` (per the
  # `requires: [done_artifact]` enforcement). The dev-story `bf` import
  # exits projection reads `world.bf__done_artifact.summary_title` and
  # `world.bf__done_artifact.summary_markdown` (the artifact's stable
  # presentation surface) into pr_title / pr_body so the pr-refinement
  # entry's world_in: can pick them up.
  pr_title:            { type: string, default: "" }
  pr_body:             { type: string, default: "" }

  # ── Inbox-routed review request payload (rev import) ──────────────
  # The inbox `pick_review` intent populates these from a notification
  # payload, then `target: rev` enters the code-review compound.
  pr_id:               { type: string, default: "" }
  pr_author:           { type: string, default: "" }

# Intent vocabulary. Day-level rooms only; bf / pr's intents are lifted
# via `imports.<alias>.intents.import` and re-exported into this table
# at the bare names (start, proceed, accept, refine, restart_from, quit).
intents:
  # Day-level navigation
  go_main:
    title: "Home"
    description: "Go to the main room."
    examples: [main, "home", "go home", "go to main"]
    priority: 10
  go_back:
    title: "Back"
    description: "Return to the previous room."
    examples: [back, "return"]
    priority: 15
  go_inbox:
    title: "Inbox"
    description: "Open the inbox."
    examples: [inbox, "check inbox"]
    priority: 20
  go_oracle:
    title: "Ask Oracle"
    description: "Open the Oracle room for Q&A."
    examples: [oracle, "ask claude", "ask a question", "i have a question", "ask claude how X works"]
    priority: 18
  go_ticket_search:
    title: "Tickets"
    description: "Open ticket search (provider-neutral)."
    examples: ["tickets", "ticket search", "find ticket"]
    priority: 40
  go_workspace_manager:
    title: "Workspaces"
    description: "Open workspace manager."
    examples: [workspaces, "workspace manager", "list workspaces", "resume", "resume my workspace", "continue where I left off", "pick up where I left off"]
    priority: 30
  go_standup:
    title: "Standup"
    description: "Prep for standup."
    examples: [standup, "daily", "prep standup"]
    priority: 35
  go_idea:
    title: "New Idea"
    description: "Start an ad hoc idea or proposal — no ticket required."
    examples: ["idea", "new idea", "propose", "proposal", "ad hoc", "draft proposal", "i have an idea", "work on a proposal", "new proposal", "write a proposal"]
    priority: 32
  go_code_review:
    title: "Code Review"
    description: "Review a teammate's PR."
    examples: ["code review", "review prs"]
    priority: 33
  go_ideas:
    title: "Ideas Backlog"
    description: "Open the ideas reviewer — reconcile the backlog and pick something to propose."
    examples: ["ideas", "review ideas", "idea backlog", "reconcile ideas", "what should I work on", "writer's block"]
    priority: 31
  go_deploy:
    title: "Deploy"
    description: "Open the deploy room."
    examples: [deploy, "ship it"]
    priority: 28
  go_observability:
    title: "Observability"
    description: "Open the observability room."
    examples: [logs, metrics, observability]
    priority: 27
  go_incident:
    title: "Incident"
    description: "Open the incident room."
    examples: [incident, "on call"]
    priority: 26
  go_docs:
    title: "Docs"
    description: "Open the docs room."
    examples: [docs, "update docs"]
    priority: 25

  # Ticket search slots
  search_tickets:
    title: "Search Tickets"
    description: "Search tickets across the configured provider."
    examples: ["search for auth bugs", "find sprint tickets"]
    priority: 100
    slots:
      query:
        type: string
        required: true
        description: "Search query (provider-neutral)."
  pick_ticket:
    title: "Pick Ticket"
    description: "Pick a ticket from the current results and start working on it."
    examples: ["pick TKT-001", "select 1", "pick 2", "open this ticket"]
    priority: 95
    slots:
      id:
        type: string
        # NOT required at the intent level — the room offers two
        # picking shapes (id=<filename> or n=<index>) via two
        # separate `choice:` items, each with its own `required:`
        # param. The room's `pick_ticket` arc resolves slots.n →
        # world.ticket_results[n-1].id when id is absent; an
        # out-of-range / both-missing call falls through to a
        # guarded no-op (see ticket_search.yaml).
        required: false
        description: "Ticket id to pick (60-char filename slug). Mutually exclusive with `n`."
      n:
        type: int
        required: false
        description: "1-based index into world.ticket_results (the currently displayed list). Resolves to ticket_results[n-1].id at dispatch time. Mutually exclusive with `id`."
      type:
        type: string
        required: false
        description: "Optional ticket-type override (bug / feature / epic). Wins over the row-lookup derivation; useful for fixtures + operators who already know the routing target."

  # Pipeline-launching navigation (dispatches into bf / pr / impl /
  # rev imports). `go_bugfix` targets the `bf` import compound; the
  # import's entry (idle) handles the rest.
  continue:
    title: "Continue"
    description: "Advance to the next step. Each room defines its own continue: arc (typically: pick → bugfix, draft → review, etc.)."
    examples: ["continue", "proceed", "next", "ok", "go ahead"]
    priority: 65
  drive:
    title: "Drive"
    description: "Drive the picked ticket through its pipeline. Routes by ticket_type: bug → bf, feature → impl, epic → cyp."
    examples: ["drive", "go", "push", "start", "drive it", "run the pipeline", "take it through", "drive the ticket"]
    priority: 60
  go_bugfix:
    title: "Fix Bug"
    description: "Hand off to the bugfix sub-story for the picked ticket."
    examples: ["fix bug", "bugfix", "work on bug"]
    priority: 55
  go_pr_refinement:
    title: "PR Refinement"
    description: "Hand off to the pr-refinement sub-story for an open PR."
    examples: ["pr refinement", "monitor pr", "pr"]
    priority: 50
  go_implementation:
    title: "Implement"
    description: "Hand off to the implementation sub-story for the picked task."
    examples: ["implement task", "implementation", "work on task"]
    priority: 55
  go_cypilot:
    title: "Cypilot"
    description: "Hand off to the cypilot sub-story (SDLC waterfall) for the picked epic."
    examples: ["cypilot", "drive epic", "waterfall"]
    priority: 55
  go_code_review_story:
    title: "Review PR"
    description: "Hand off to the code-review sub-story (teammate PR review)."
    examples: ["review teammate pr", "code review story", "rev"]
    priority: 33

  # Inbox-routed review-request pickup. Selects a "PR awaiting your
  # review" inbox item and projects its payload (pr_id, pr_title,
  # pr_author) into the rev import via world_in:. The inbox.yaml
  # arc fires this intent with the slots populated by the operator
  # (or by the inbox subsystem in autonomous mode).
  pick_review:
    title: "Pick Review"
    description: "Pick a 'PR awaiting your review' notification from the inbox and enter the code-review story."
    examples: ["pick PR-38", "review notification", "pick review"]
    priority: 90
    slots:
      pr_id:    { type: string, required: true }
      pr_title: { type: string, required: false }
      pr_author: { type: string, required: false }

  # Inbox / oracle bare actions (kept minimal for Wave 2).
  ask_question:
    title: "Ask a Question"
    description: "Ask the Oracle a question."
    examples: ["how does X work", "what is Y"]
    priority: 80
    slots:
      question:
        type: string
        required: true

  # ── Proposal-authoring pipeline vocabulary ────────────────────────
  # 4-stage pipeline: intake (one discuss message) → search → refine → draft.
  # `discuss` captures the idea (intake) or folds a message into the brief
  # (refine). `ready` runs the brief judge in the refine room. `advance_brief`
  # is synthetic (fired by the post-bind emit_intent when the brief passes).
  discuss:
    title: "Discuss"
    description: "In intake: describe your proposal idea (one message advances to search). In refine: fold a message into the brief."
    examples: ["i want to build", "the idea is", "it's for", "tell me more", "here's what i'm thinking"]
    priority: 85
    slots:
      # required forces the semantic router to fall through to the LLM
      # router so the operator's free-text message is captured whole.
      message: { type: string, required: true }
  ready:
    title: "Check Brief"
    description: "Run the brief quality check — if the brief passes, advance to draft; otherwise show what's missing."
    examples: ["ready", "check the brief", "review it", "is it good?", "done discussing", "let's go"]
    priority: 90
  advance_brief:
    description: "Internal: fired by the brief check when the brief passes review, to advance to draft."
    examples: []
    priority: 1
  materialized:
    description: "Internal: fired once the proposal workspace + references are prepared, to advance to brief authoring."
    examples: []
    priority: 1
  capture_existing:
    title: "Reference Docs"
    description: "Point the proposal pipeline at existing docs to read."
    examples: ["see docs/foo.md", "based on the auth spec", "read these docs"]
    priority: 78
    slots:
      paths: { type: string, required: true, description: "Space/comma-separated files or dirs." }
  confirm:
    title: "Confirm"
    description: "Confirm the current review step (brief, completeness, references) and move on."
    examples: ["confirm", "proceed", "looks right", "the brief is good", "continue to the next step"]
    priority: 82
  recheck:
    title: "Recheck"
    description: "Re-run the sanity check against the brief you just edited on disk."
    examples: ["recheck", "check again", "re-run the check", "i edited it"]
    priority: 66
  clarify:
    title: "Revise Brief"
    description: "Step back to revise the brief before continuing."
    examples: [clarify, "more detail", "let me revise", "back to the brief"]
    priority: 68
  regenerate:
    title: "Regenerate"
    description: "Re-generate the current step's machine output, optionally with feedback."
    examples: [regenerate, "search again", "redo the references", "rewrite the brief"]
    priority: 65
    slots:
      feedback: { type: string, required: false }
  refine:
    title: "Refine"
    description: "Refine the current artifact with feedback, building on it (NOT a fresh start)."
    examples: [refine, rework, revise, "add a reference", "drop that doc", "re-scope that section"]
    priority: 70
    slots:
      feedback: { type: string, required: true }
  accept:
    title: "Accept & Publish"
    description: "Accept the proposal draft and publish it."
    examples: ["accept", "approve", "looks good", "lgtm", "publish it"]
    priority: 85
  proceed_new:
    title: "Create New"
    description: "No meaningful overlap — create a brand-new proposal."
    examples: ["proceed", "create new", "it's new", "no overlap"]
    priority: 64
  change_existing:
    title: "Amend Existing"
    description: "Amend an existing overlapping proposal instead of creating a new one."
    examples: ["amend the existing one", "change that proposal", "fold into", "extend"]
    priority: 67
    slots:
      target: { type: string, required: true, description: "Path of the existing proposal to amend." }
  override_new:
    title: "Create Anyway"
    description: "Create a new proposal despite the detected overlap (recorded for audit)."
    examples: ["new anyway", "ignore the overlap", "still create new"]
    priority: 58

  # ── Ideas reviewer vocabulary (rooms/ideas.yaml) ──────────────────
  apply:
    title: "Apply Moves"
    description: "Apply the proposed ideas-backlog section moves — rewrite the file."
    examples: ["apply", "apply the moves", "update the backlog", "make the changes"]
    priority: 64
  pick:
    title: "Pick Idea"
    description: "Start a proposal from one of the suggested ideas candidates."
    examples: ["pick 1", "pick candidate 2", "start on 1", "propose 2"]
    priority: 88
    slots:
      n: { type: int, required: true, description: "1-based index into the displayed candidates list." }

  # Standup / generic ack
  summarize_day:
    title: "Summarise Day"
    description: "Summarise today's work for standup."
    examples: [summarize, "summarise day", "what did I do"]
    priority: 70

  proceed:
    title: "Proceed"
    description: "Advance the current room (used by workspace_manager and other one-shot rooms)."
    examples: [proceed, "next"]
    priority: 60

  quit:
    title: "Quit"
    description: "Quit the running pipeline / room."
    examples: [quit, "abort"]
    priority: 5

  look:
    title: "Look"
    description: "Re-render the current view."
    examples: [look, "what now?"]
    priority: 10

# Root state — the engineer's-day landing.
root: main

# Imports (proposal §5.1). bf and pr both project from / into the
# day-level world. The bf → pr chain is one import-exit edge; the
# operator never sees a separate "handoff" room — when bf fires
# @exit:done, the runtime transitions straight into the pr
# compound's entry state.
imports:
  bf:
    source: ../bugfix
    entry: idle

    # Project day-level world → bugfix's private world. Evaluated in
    # dev-story's scope; the LHS keys name child world keys.
    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      ticket_url:      "{{ world.ticket_url }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      bugfix_mode:     "{{ world.bugfix_mode }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"

    # Lift bf-unique intents into the parent's bare intent table.
    # Overlapping names (accept, refine, restart_from, quit, look,
    # proceed) stay prefixed because they collide with pr's exports
    # and / or with dev-story's own `quit` / `look`. The operator
    # types `bf__accept` inside bf and `pr__accept` inside pr; `start`
    # is bf-only and lifts cleanly to bare.
    intents:
      import: [start, change_ticket]

    # Exit projections. bf's @exit:done writes done_artifact via the
    # `set:` block on done_awaiting_reply.on.accept; we lift that
    # artifact's presentation fields into the parent's pr_title /
    # pr_body, then transition into the `pr` import (which projects
    # those parent keys into the pr child's world via world_in:).
    exits:
      done:
        to: pr
        set:
          pr_title: "{{ world.bf__done_artifact.summary_title }}"
          pr_body:  "{{ world.bf__done_artifact.summary_markdown }}"
      abandoned:
        to: main
        set:
          status: "abandoned"
      # `change_ticket` on bf.idle fires this. Land in ticket_search
      # so the operator can search/pick; `go_bugfix` re-enters bf with
      # the new ticket_id projected via world_in:.
      pick_ticket:
        to: ticket_search
        set:
          prev_state: "main"

  pr:
    source: ../pr-refinement
    entry: open_pr   # bypass the standalone idle state — handoff goes
                     # straight to open_pr.on_enter so the PR opens
                     # immediately on entry.

    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      pr_title:        "{{ world.pr_title }}"
      pr_body:         "{{ world.pr_body }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      merge_strategy:  "{{ world.merge_strategy }}"

    # Lift pr-unique intents into the parent's bare intent table.
    # Same logic as bf above — only names that don't collide with
    # parent's `quit` / `look` / `proceed` and don't collide with
    # bf's imported `start` make it up.
    intents:
      import: [open, monitor, retry, resolve, merge_now]

    exits:
      merged:
        to: main
        set:
          status:      "merged"
          last_pr_url: "{{ world.pr__pr_url }}"
      abandoned:
        to: main
        set:
          status: "abandoned"
      # pushback_resolved is declared by pr-refinement but Wave 2 does
      # not exercise it (Wave 3 may use it for re-review loops). Map to
      # main as a safety landing so the loader is happy.
      pushback_resolved:
        to: main

  # Wave 3 / Phase 6 — small-task pipeline. Same projection shape as bf.
  # impl's @exit:done routes to main with status="merged" and the
  # last_pr_url projected from the pr-refinement merge that ran INSIDE
  # impl's handoff room. impl is self-contained — it imports
  # pr-refinement internally and projects @exit:done up to here.
  impl:
    source: ../implementation
    entry: idle

    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      ticket_url:      "{{ world.ticket_url }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      merge_strategy:  "{{ world.merge_strategy }}"

    # `start` already lifts to bare via the bf import; the operator
    # types the prefixed `impl__start` inside impl. proceed / accept /
    # refine / quit / look stay prefixed because they collide with
    # parent intents.
    intents:
      import: []

    exits:
      done:
        to: main
        set:
          status:      "merged"
          last_pr_url: "{{ world.impl__last_pr_url }}"
      abandoned:
        to: main
        set:
          status: "abandoned"

  # Wave 4 — cypilot SDLC waterfall for epic-track tickets. Routed
  # from main when the picked ticket's type is "epic". cypilot is
  # autonomous-by-default; the parent's day-level judge_mode +
  # threshold pass through and the imports.cyp world projection keeps
  # the prd / adr / design / decomposition / feature / code rooms
  # in lockstep with the rest of dev-story's pipeline imports.
  cyp:
    source: ../cypilot
    entry: idle

    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      ticket_url:      "{{ world.ticket_url }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"

    # cypilot intents that don't collide with parent / sibling
    # imports lift to bare. `begin` boots cypilot from idle; the
    # remaining checkpoint vocabulary (accept/refine/proceed/quit/
    # look) stays prefixed to avoid colliding with parent/bf/pr.
    intents:
      import: [begin, next_feature]

    exits:
      code_ready:
        to: main
        set:
          status: "code_ready"
          last_pr_url: "{{ world.cyp__pr_url }}"
      abandoned:
        to: main
        set:
          status: "abandoned"
      validation_failed:
        to: main
        set:
          status: "validation_failed"

  # Wave 3 / Phase 6 — teammate-PR review. Triggered from the inbox
  # `pick_review` arc. The review-request payload is projected into
  # the rev child via world_in:.
  rev:
    source: ../code-review
    entry: idle

    world_in:
      pr_id:      "{{ world.pr_id }}"
      pr_title:   "{{ world.pr_title }}"
      pr_author:  "{{ world.pr_author }}"
      thread:     "{{ world.thread }}"
      judge_mode: "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"

    # `start` already lifts to bare via the bf import; pick_pr,
    # approve, request_changes, dismiss are code-review-unique so
    # they lift cleanly. The operator types `rev__start` to boot.
    intents:
      import: [pick_pr, approve, request_changes, dismiss]

    exits:
      reviewed:
        to: main
        set:
          status: "reviewed"
      dismissed:
        to: main
        set:
          status: "dismissed"
      abandoned:
        to: main
        set:
          status: "abandoned"

# Day-level rooms live in rooms/*.yaml.
include:
  - rooms/*.yaml
