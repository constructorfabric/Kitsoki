# Root state — the engineer's-day free-form workbench (rooms/landing.yaml).
# Replaces the former `main` catalog as the landing. `main` is RETAINED as a
# reachable "show me everything" hub (sibling rooms' go_main arcs still resolve
# to it) but is no longer the root or any pipeline's return target.
root: landing

# Imports (proposal §5.1). bf and pr both project from / into the
# day-level world. The bf → pr chain is one import-exit edge; the
# operator never sees a separate "handoff" room — when bf fires
# @exit:done, the runtime transitions straight into the pr
# compound's entry state.
imports:
  # git-ops command hub. Entered at its `intercept` room — the branch-agnostic
  # grouping of every common git command — so dev-story surfaces the same room
  # the pre-LLM intercept gate binds to (docs/architecture/prompt-intercept.md).
  # No intents.import: the commands stay inside the compound (handled there once
  # entered); no world_in: git-ops's own world defaults (integration_branch=main,
  # working_dir=.) seed it. The gate reaches it as room `gitops.intercept`.
  gitops:
    source: ../git-ops
    entry: intercept

  bf:
    source: ../bugfix
    entry: idle

    # Project day-level world → bugfix's private world. Evaluated in
    # dev-story's scope; the LHS keys name child world keys.
    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      ticket_url:      "{{ world.ticket_url }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      bugfix_mode:     "{{ world.bugfix_mode }}"
      # Project the project's real build/test commands into bf so its
      # testing/validating gates use the right toolchain (empty ⇒ Go defaults).
      build_cmd:       "{{ world.build_cmd }}"
      test_cmd:        "{{ world.test_cmd }}"
      # The picked bug's repro_command (bound by ticket_search.pick_ticket).
      # bf's `reproducing` room runs it RED-first; empty ⇒ LLM-only reproducer.
      gate_command:    "{{ world.gate_command }}"
      # Destination is parent-controlled:
      #   local-merge    -> bf's direct-ship tail (local base_branch merge)
      #   open-pr        -> bf done -> pr-refinement
      #   leave-worktree -> bf done -> landing, preserving workdir
      bugfix_exit:     "{% if world.bugfix_destination == 'local-merge' %}direct-ship{% else %}open-PR{% endif %}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"

    # Lift bf-unique intents into the parent's bare intent table.
    # Overlapping names (accept, refine, restart_from, quit, look,
    # proceed) stay prefixed because they collide with pr's exports
    # and / or with dev-story's own `quit` / `look`. The operator
    # types `bf__accept` inside bf and `pr__accept` inside pr; `start`
    # is bf-only and lifts cleanly to bare.
    intents:
      import: [start, change_ticket]

    # Exit projections. bf's @exit:done writes done_artifact via the
    # `set:` block on done_awaiting_reply.on.accept. The parent chooses the
    # destination: open-pr enters `pr`; leave-worktree lands back at the
    # workbench with the local worktree preserved.
    exits:
      done:
        to: bugfix_done_router
        set:
          pr_title: "{{ world.bf__done_artifact.summary_title }}"
          pr_body:  "{{ world.bf__done_artifact.summary_markdown }}"
          status:   "fixed"
      abandoned:
        to: human_review_report
        set:
          status: "abandoned"
          human_review_reason: "{{ world.bf__abandon_reason }}"
      # slice 4 added bf's direct-ship terminals (shipped / needs-human). The
      # local-merge destination reaches shipped after bugfix's shared ship-it
      # tail integrates into base_branch and verifies the merged commit.
      shipped:
        to: landing
        set:
          status: "local-merged"
      needs-human:
        to: human_review_report
        set:
          status: "needs-human"
          last_error: "{{ world.bf__last_error }}"
          human_review_reason: "{{ world.bf__last_error }}"
      # bf's repro RED-gate GREEN branch (bugfix-repro-gate slice): the bug's
      # repro_command passed on the unchanged worktree, so it does not currently
      # reproduce. Land back at the workbench carrying the gate output; a human
      # decides wontfix / cannot-reproduce or supplies a sharper repro.
      not-reproducible:
        to: human_review_report
        set:
          status:     "not-reproducible"
          last_error: "{{ world.bf__last_error }}"
          human_review_reason: "{{ world.bf__last_error }}"
      # bf's triage-only mode (bugfix_mode: triage) ends here: a standardized
      # verdict was produced without attempting a fix. This hub runs bf in
      # full/open-PR mode so triaged never fires in practice, but the loader
      # requires every child exit be mapped. Land back at landing carrying the
      # verdict; a human picks the next move (fix it for real, or close).
      triaged:
        to: landing
        set:
          status: "triaged"
      # `change_ticket` on bf.idle fires this. Land in ticket_search
      # so the operator can search/pick; `go_bugfix` re-enters bf with
      # the new ticket_id projected via world_in:.
      pick_ticket:
        to: ticket_search
        set:
          prev_state: "landing"

  pr:
    source: ../pr-refinement
    entry: open_pr   # bypass the standalone idle state — handoff goes
                     # straight to open_pr.on_enter so the PR opens
                     # immediately on entry.

    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      pr_title:        "{{ world.pr_title }}"
      pr_body:         "{{ world.pr_body }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      merge_strategy:  "{{ world.merge_strategy }}"

    # Lift pr-unique intents into the parent's bare intent table.
    # Same logic as bf above — only names that don't collide with
    # parent's `quit` / `look` / `proceed` and don't collide with
    # bf's imported `start` make it up.
    intents:
      import: [open, monitor, retry, resolve, merge_now]

    exits:
      merged:
        to: landing
        set:
          status:      "merged"
          last_pr_url: "{{ world.pr__pr_url }}"
      abandoned:
        to: human_review_report
        set:
          status: "abandoned"
          pr_id: "{{ world.pr__pr_id != '' ? world.pr__pr_id : world.pr_id }}"
          last_pr_url: "{{ world.pr__pr_url != '' ? world.pr__pr_url : world.last_pr_url }}"
          human_review_reason: "{{ world.pr__refine_feedback }}"
      # pushback_resolved is declared by pr-refinement but Wave 2 does
      # not exercise it (Wave 3 may use it for re-review loops). Map to
      # main as a safety landing so the loader is happy.
      pushback_resolved:
        to: landing

  # Wave 3 / Phase 6 — small-task pipeline. Same projection shape as bf.
  # impl's @exit:done routes to main with status="merged" and the
  # last_pr_url projected from the pr-refinement merge that ran INSIDE
  # impl's handoff room. impl is self-contained — it imports
  # pr-refinement internally and projects @exit:done up to here.
  impl:
    source: ../implementation
    entry: idle

    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      ticket_url:      "{{ world.ticket_url }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      merge_strategy:  "{{ world.merge_strategy }}"

    # `start` already lifts to bare via the bf import; the operator
    # types the prefixed `impl__start` inside impl. proceed / accept /
    # refine / quit / look stay prefixed because they collide with
    # parent intents.
    intents:
      import: []

    exits:
      done:
        to: landing
        set:
          status:      "merged"
          last_pr_url: "{{ world.impl__last_pr_url }}"
      abandoned:
        to: landing
        set:
          status: "abandoned"

  # Wave 4 — cypilot SDLC waterfall for epic-track tickets. Routed
  # from main when the picked ticket's type is "epic". cypilot is
  # autonomous-by-default; the parent's day-level judge_mode +
  # threshold pass through and the imports.cyp world projection keeps
  # the prd / adr / design / decomposition / feature / code rooms
  # in lockstep with the rest of dev-story's pipeline imports.
  cyp:
    source: ../cypilot
    entry: idle

    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      ticket_url:      "{{ world.ticket_url }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"

    # cypilot intents that don't collide with parent / sibling
    # imports lift to bare. `begin` boots cypilot from idle; the
    # remaining checkpoint vocabulary (accept/refine/proceed/quit/
    # look) stays prefixed to avoid colliding with parent/bf/pr.
    intents:
      import: [begin, next_feature]

    exits:
      code_ready:
        to: landing
        set:
          status: "code_ready"
          last_pr_url: "{{ world.cyp__pr_url }}"
      abandoned:
        to: landing
        set:
          status: "abandoned"
      validation_failed:
        to: landing
        set:
          status: "validation_failed"

  # Wave 3 / Phase 6 — teammate-PR review. Triggered from the inbox
  # `pick_review` arc. The review-request payload is projected into
  # the rev child via world_in:.
  rev:
    source: ../code-review
    entry: idle

    world_in:
      pr_id:      "{{ world.pr_id }}"
      pr_title:   "{{ world.pr_title }}"
      pr_author:  "{{ world.pr_author }}"
      thread:     "{{ world.thread }}"
      judge_mode: "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"

    # `start` already lifts to bare via the bf import; pick_pr,
    # approve, request_changes, dismiss are code-review-unique so
    # they lift cleanly. The operator types `rev__start` to boot.
    intents:
      import: [pick_pr, approve, request_changes, dismiss]

    exits:
      reviewed:
        to: landing
        set:
          status: "reviewed"
      dismissed:
        to: landing
        set:
          status: "dismissed"
      abandoned:
        to: landing
        set:
          status: "abandoned"

  # PRD discovery — the front of the PRD → Design walk. Reached from main
  # via `go_prd`. prd runs discovery → clarifying → brief → references →
  # drafting and publishes a PRD to docs/prd/<slug>.md (prd_publish.py
  # returns prd_file). On @exit:done we lift prd_file into the parent and
  # land in `prd_published` (rooms/prd_published.yaml), which tells the
  # operator the PRD shipped and offers `continue` (into the design
  # intake, seeded with the PRD path) or `go_main`. prd stays runnable
  # standalone — this redirect lives only in dev-story's composition.
  prd:
    source: ../prd
    entry: idle

    world_in:
      # Project the hub's workdir, falling back to "." (the cwd — prd's own
      # standalone default) when the hub leaves it empty (its default). The bare
      # hub default is "" because the bf/impl pipelines branch on workdir==''
      # (impl provisions a worktree only when empty); the imported prd instead
      # composes filesystem paths as "{{workdir}}/{{prd_workspace}}", so an empty
      # workdir yields "/.artifacts/<slug>" — an mkdir at the filesystem root.
      # Flow tests masked this by seeding workdir via initial_world; a real or
      # web-driven run (which does not seed initial_world) exposed it. This is
      # the same `workdir=='' ? '.'` guard the design_* rooms already use,
      # applied at the import seam so a real instance's workdir passes through.
      workdir:    "{{ world.workdir == '' ? '.' : world.workdir }}"
      judge_mode: "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      # Doc-profile passthrough: an importing instance overrides these on the
      # hub so the imported prd publishes into that project's target tree and
      # filename convention. Defaults keep prd's own docs/prd/<slug>.md
      # behaviour for kitsoki-dev.
      publish_durable_path: "{{ world.publish_durable_path }}"
      prd_doc_filename:     "{{ world.prd_doc_filename }}"

    # prd's checkpoint vocabulary (discuss/ready/confirm/accept/refine/
    # clarify/regenerate/quit/look …) collides wholesale with the design
    # pipeline's intents, so nothing lifts to bare: the operator types the
    # prefixed `prd__accept` etc. while inside prd (the discovery rooms are
    # conversational, so free-text still routes to the child's default).
    intents:
      import: []

    exits:
      # No `set:` projection for prd_file: it is a host BIND in prd's
      # drafting accept arc (prd_publish.py stdout), so it commits
      # post-dispatch — AFTER an exit `set:` (a synchronous effect) would
      # read it. The flat world keeps prd__prd_file once the turn settles,
      # so the prd_published landing room reads world.prd__prd_file
      # directly (settled by render time). Contrast bf → pr, whose carried
      # value (done_artifact) is a synchronous `set:`, so the projection
      # works there.
      done:
        to: prd_published
      abandoned:
        to: landing
        set:
          status: "abandoned"

  model_eval:
    source: ../model-harness-eval
    entry: idle

  # Demo-video loop — the autonomous maker→QA loop that produces (or
  # refreshes) a tour-driven demo video for a feature and gates it with the
  # kitsoki-ui-qa vision review. Reached from landing via `make_demo`. The
  # loop is self-driving (no operator prodding): its `generating` root
  # on_enter authors the video + qa inputs and runs the deterministic video
  # gate, `qa` runs qa.sh; a QA failure with budget left loops the report
  # back to the maker. See stories/demo-video-loop/README.md.
  demovid:
    source: ../demo-video-loop
    entry: generating

    # Project the hub's worktree + base + the demo input keys into the
    # loop's private world. worktree_path ← workdir (the hub's working copy;
    # the same key the bf/impl pipelines use); base_ref ← base_branch (the
    # parent/base to diff against). The remaining keys are the demo input
    # contract added to the hub's world: block above.
    world_in:
      worktree_path:     "{{ world.workdir }}"
      base_ref:          "{{ world.base_branch }}"
      proposal_path:     "{{ world.proposal_path }}"
      feature_slug:      "{{ world.feature_slug }}"
      video_expectation: "{{ world.video_expectation }}"
      iteration_budget:  "{{ world.iteration_budget }}"
      cost_budget_usd:   "{{ world.cost_budget_usd }}"

    # The loop's vocabulary (to_qa / mark_* / loop_again / retry / abort /
    # look) is internal-routing + self-driving, and abort/retry/look collide
    # with parent intents — so nothing lifts to bare. The operator enters via
    # `make_demo` and the loop runs itself to a terminal.
    intents:
      import: []

    # Map ALL THREE child exits → landing with a status: set (the loader
    # requires every child exit be mapped). The loop terminates on QA pass
    # (achieved), a budget ceiling (exhausted), or operator abort (abandoned).
    exits:
      achieved:
        to: landing
        set:
          status: "demo-achieved"
      exhausted:
        to: landing
        set:
          status: "demo-exhausted"
      abandoned:
        to: landing
        set:
          status: "abandoned"

# Day-level rooms live in rooms/*.yaml.
include:
  - rooms/*.yaml
