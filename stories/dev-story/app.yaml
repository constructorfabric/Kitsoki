# dev-story — engineer's-day hub. See docs/case-studies/bug-fix.md and
# docs/stories/imports.md.
#
# This is the GENERAL-PURPOSE app: it imports the bugfix and
# pr-refinement sub-stories and routes between them via the
# day-level rooms (main, inbox, ticket_search, workspace_manager,
# standup, code_review, agent, …). It does NOT bind providers —
# concrete bindings happen at the INSTANCE level (kitsoki-dev,
# cyber-repo/devstory). The `default:` values in `host_interfaces:`
# are the fallback for standalone runs.
#
# Provider-neutral world: no `jira_*` keys. `ticket_query` /
# `ticket_results` replace the legacy `jira_query` / `jira_results`
# from `testdata/apps/dev-story/`.
#
# # Composition (proposal §5.1)
#
#   dev-story
#     ├── imports bf  (../bugfix)        — reproduce → propose → … → done
#     │     done    → pr (open_pr)        — handoff into PR refinement
#     │     abandoned → main
#     └── imports pr  (../pr-refinement)  — open → CI → merge
#           merged    → main (status="merged", last_pr_url=…)
#           abandoned → main
#
# A bugfix completing fires `@exit:done` in the bf child. The exit
# projection (set: pr_title, pr_body, …) writes parent world keys;
# the next state `pr` is the pr-refinement import compound, whose
# OnEnter world_in: fires and projects those parent keys into the
# pr child's private world. The full bf → pr chain is one import
# edge per child.
#
# # Wave 3 / Phase 6 additions
#
#   - `stories/implementation/` import alias `impl` — small-task pipeline.
#   - `stories/code-review/` import alias `rev` — teammate PR review.
#   - `inbox.yaml` `pick_review` arc routes a selected review-request
#     notification into `rev` via initial_world seeded from the
#     notification payload.
#
# # What is NOT here (later waves)
#
#   - `stories/cypilot/` import — Wave 4.
#
# # Wave 3 room loops (filled — formerly stubs)
#
#   The `incident` / `deploy` / `observability` / `docs` rooms are now real
#   multi-room loops (see rooms/{incident,deploy,observability,docs}.yaml):
#     - incident:      alert → triage → mitigate|escalate|monitor → postmortem
#     - deploy:        target → preflight gate → ship → verify|rollback
#     - observability: signal → query → triage → alert|annotate|clear
#     - docs:          target → draft → review → publish|revise
#   Each reuses only EXISTING hosts (host.run / host.agent.decide /
#   host.agent.task / host.inbox.add / iface.transport.post) so the whole set
#   stays no-LLM-gateable; flow fixtures stub the agent calls and assert the
#   deterministic routing.

app:
  id: dev-story
  version: 0.1.0
  title: "dev-story — Engineer's Day"
  author: "Kitsoki"
  license: "CC0"
  # Layer-2 project context: prepended (under the kitsoki grounding) to every
  # agent call and the intent router so each operator shares this app's domain.
  # See docs/architecture/system-prompt.md.
  context: |
    This app is an engineer's daily-workflow hub. It routes a developer
    through real software-engineering tasks over a live code repository —
    triaging an inbox, searching and picking up tickets, fixing bugs,
    refining pull requests, running standups and code reviews — by composing
    sub-stories. Judgments here are technical and consequential: they decide
    what work is picked up, whether a change is acceptable, and what gets
    reported to a team. Favor precision; cite concrete files, symbols, and
    commands; and prefer the smallest change that satisfies the task. This is
    also the story kitsoki uses to improve itself, so correctness and clear,
    auditable reasoning matter more than speed.

# Local model for cheap, offline slug naming. Qwen2.5-1.5B-Instruct at Q4_K_M;
# grammar: true enables constrained decoding so the JSON schema is satisfied on
# the first decode without retries.
agent_plugins:
  agent.local_llm:
    plugin: builtin.local_llm
    model: qwen2.5-1.5b-instruct
    grammar: true

# Hosts that the day-level rooms call directly. Iface-resolved hosts
# are unioned implicitly at fold time via resolveAllInterfaces.
hosts:
  - host.inbox.add
  - host.agent.ask
  - host.run
  # ── Design pipeline (rooms/design*.yaml) ───────────────────────
  # 4-stage pipeline: intake → search (decide ×2) → refine (task + decide) →
  # draft+publish (task + run). The brief is scaffolded in the refine room via
  # host.artifacts_dir so search results can inform it; host.ide.open_file
  # opens it in the editor on first scaffold. An instance importing dev-story
  # with `hosts: declared` must list all four in its own allow-list.
  - host.agent.decide
  - host.agent.task
  - host.agent.search
  - host.artifacts_dir
  - host.ide.open_file
  - host.ide.open_diff
  # ── PRD discovery (imported `prd`, stories/prd/) ──────────────────
  # The PRD pipeline is a conversational discovery (host.agent.converse +
  # a persistent chat via host.chat.resolve) that decide/task-gates into a
  # published PRD. Its decide/task/search/artifacts_dir/ide.open_file/run
  # needs are already covered above; converse + chat.resolve are unique to
  # it. An instance importing dev-story with `hosts: declared` must list
  # both in its own allow-list (see .kitsoki/stories/kitsoki-dev/app.yaml).
  - host.agent.converse
  - host.chat.resolve
  # ── Ad-hoc structured plan (rooms/landing|applying|verifying.yaml) ─────
  # The verify gate runs a sandboxed, recordable Starlark script
  # (host.starlark.run) with the read-only inspection surface (ctx.fs /
  # ctx.probe). host.agent.decide (above) doubles as the agent/hybrid verify
  # gate, reusing the gate_reviewer persona + gate_verdict schema.
  - host.starlark.run

# Persona table (agent-split proposal §3.5).
#
# The dev-story hub's own agent room makes one-shot prose Q&A
# calls — read-only inspection, no schema. The verb is ask.
#
#   agent_qa    ask   one-shot prose Q&A (agent_asking room)
agents:
  agent_qa:
    system_prompt: "You are an engineering assistant. Answer the operator's question clearly and concisely based on your knowledge and any context provided."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    bash_profile: read-only

  # ── Free-form workbench persona (rooms/landing.yaml) ──────────────
  # A general-purpose, Claude-Code-like engineering agent — the resting
  # surface of dev-story's landing. It carries the FULL toolbox so it can
  # do real work, but boots READ-ONLY: bash_profile: read-only +
  # external_side_effect: false set the read-only floor, and the landing
  # room's write_mode: read_only gates every mutating tool call (Edit /
  # Write / side-effecting Bash) behind an operator opt-in
  # (internal/host/write_mode_gate.go). The static (external_side_effect:
  # false) and runtime (write_mode: read_only) postures must agree — the
  # loader rejects a contradiction — so this persona generalizes the
  # read-only posture dev-story's task personas already carry.
  landing_agent:
    system_prompt: "You are a general-purpose engineering agent working in this repository, like Claude Code. Explore freely with read-only tools (Read/Grep/Glob, read-only Bash); when the work needs a change — an edit, a write, a side-effecting command — attempt it and the runtime will surface the proposed change to the operator for a write-mode grant before it lands. If write mode is declined or you are headless, stay read-only and describe precisely what you would change instead."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Edit, Write, Bash]   # full toolbox; gated read-only by the room's write_mode: read_only
    bash_profile: read-only                         # the read-only floor
    external_side_effect: false                     # static posture must agree with write_mode: read_only

  # ── Ad-hoc plan verify gate (rooms/verifying.yaml) ────────────────
  # The agent / hybrid verify mode reuses cherny-loop's adversarial gate
  # reviewer verbatim (prompts/gate_review.md + schemas/gate_verdict.json,
  # both copied into this story). Read-only: it judges whether the accepted
  # plan's goal is met, it never makes the change.
  gate_reviewer:
    system_prompt: "You are an adversarial quality gate. Judge the goal artifact against the stated goal. Default to pass=false unless the goal is clearly, fully met. When you fail it, give a specific, actionable reason the next iteration can act on."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    bash_profile: read-only
    external_side_effect: false

  profile_drafter:
    system_prompt: "You draft Kitsoki project-profile/v1 JSON for a target repository. Use the deterministic discovery as the floor, improve it only when the repository evidence supports the change, and preserve the architecture: the project owns .kitsoki/project-profile.yaml and .kitsoki/stories/<id>-dev/app.yaml, while the instance imports @kitsoki/dev-story. Return only schema-valid JSON through the submit tool."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    bash_profile: read-only
    external_side_effect: false

  # ── Design-pipeline personas (rooms/design*.yaml) ──────────────
  # One persona per pipeline step so the trace attributes model + token
  # usage per phase, the same discipline as stories/prd/. All are
  # read-only except the refiner and author, which write into the
  # per-session workspace.
  design_namer:
    system_prompt: "You name kitsoki proposals. Turn an idea into a short, meaningful 2-5 word kebab-case slug (like an existing docs/proposals/<slug>.md filename) — never a raw sentence. Glance at the existing proposals + in-progress workspace to match the house style and avoid an already-taken name."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  design_brief_judge:
    system_prompt: "You are a proposal reviewer sanity-checking a brief an operator has just filled in. Read the brief from disk and decide whether it has enough signal to proceed (a crisp Why, a one-screen What-changes, and a named kind) or whether it needs clarification. When it needs work, return the smallest set of specific clarifying questions."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  design_scout:
    system_prompt: "You are a kitsoki maintainer checking whether a proposed idea overlaps with work already in flight. Search the proposals workspace (docs/proposals/.workspace/), the accepted proposals (docs/proposals/*.md), and the feature/bug docs for anything the idea duplicates, extends, or conflicts with. When you find an overlap, recommend AMENDING the existing proposal rather than creating a new one. Report where the idea fits on the roadmap."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  design_refiner:
    # ⛔ This agent MAINTAINS THE BRIEF — it must NEVER implement the idea.
    # working_dir is the per-session workspace, NOT a write jail — the constraint
    # is this instruction. It writes EXACTLY ONE file: the brief at the given path.
    system_prompt: "You are a kitsoki maintainer maintaining a proposal BRIEF markdown file, using search results (prior-art overlaps and curated references) to fill and sharpen it. You write EXACTLY ONE file — the brief at the given path — and nothing else. You MUST NOT implement the idea or touch any source code, test, config, story YAML, or other repository file; doing so is a hard failure. Read the brief, fold in search context and any operator message, fill the Why / What changes / Impact / Why-kitsoki / How-it's-used spine where you now have signal, and leave honest `<…>` placeholders where you don't. Keep it skim-in-two-minutes."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Write, Edit]
    external_side_effect: false

  design_researcher:
    system_prompt: "You are a kitsoki maintainer curating the reference materials a proposal must build on. Read the idea and the brief, then search the repo's DOCUMENTATION, rules, and guidelines — docs/, READMEs, gold-standard stories, the proposal templates and skill — for prior art, constraints, and conventions the proposal must honour. For each reference give the path, the specific section(s) / line range that matter, and a one-line rationale. Prefer a short, high-signal list."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob]
    external_side_effect: false

  design_author:
    # ⛔ This agent AUTHORS A PROPOSAL DOCUMENT — it must NEVER implement the
    # idea. The hard rule is repeated in prompts/design_draft.md. It has
    # Write/Edit ONLY to produce the proposal markdown (working_dir is not a
    # write jail — the constraint is the instruction, so it is emphatic).
    system_prompt: "You are a kitsoki maintainer authoring a PROPOSAL DOCUMENT — a design write-up, NOT an implementation. You write exactly ONE file: the proposal markdown at the given output path (or, when amending, the named existing proposal). You MUST NOT implement the idea: do NOT create, edit, or modify any source code, test, config, story YAML, or any other repository file. Reading the codebase (Read/Grep/Glob) to ground the proposal is expected; writing anything other than the single proposal markdown is a hard failure. Classify the change kind, copy the matching template under docs/proposals/templates/, and fill the Why / What changes / Impact spine, grounding every claim in the cited references."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Write, Edit]
    external_side_effect: false

  # ── Ideas reviewer (rooms/ideas.yaml) ─────────────────────────────
  # Reconciles the hand-maintained ideas backlog against shipped work. READ-ONLY:
  # it only PROPOSES section moves (the deterministic ideas_reconcile.py script
  # does the rewrite). Bash under the read-only profile is for `git log` /
  # `git show` (the proven combo used by stories/bugfix + stories/docs-review).
  ideas_reviewer:
    system_prompt: "You are a kitsoki maintainer reconciling a hand-maintained ideas backlog against work that has actually shipped. Read the backlog file, scan the commit history (git log — read-only Bash), the proposals (docs/proposals/), and the docs (docs/) for concrete evidence that an item has shipped or partially shipped. Be conservative: only propose a section move when you can cite real evidence (a commit, a proposal, a doc); leave ambiguous items alone. Also surface a few high-value items still in the Ideas section worth proposing next. You PROPOSE moves only — you never edit the backlog yourself."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Bash]
    bash_profile: read-only
    external_side_effect: false

# Six host_interfaces — same provider-neutral surfaces declared by the
# imported stories. Declaring them here too lets the dev-story hub
# call iface.ticket.search / iface.ticket.list_mine from its own
# rooms (ticket_search, standup) and lets a parent INSTANCE rebind
# them at one place via `imports.core.host_bindings`.
host_interfaces:

  ticket:
    description: "Issue tracker abstraction (file / GitHub Issues / Jira)."
    operations:
      search:
        input:  { query: string, limit: int }
        output: { tickets: list }
      get:
        input:  { id: string }
        output: { id: string, title: string, body: string, status: string,
                  priority: string, assignee: string, url: string, comments: list }
      comment:
        input:  { id: string, body: string, thread: string }
        output: { ok: bool, comment_id: string }
      transition:
        input:  { id: string, to: string }
        output: { ok: bool }
      list_mine:
        input:  { filter: string }
        output: { tickets: list }
    default: host.local_files.ticket

  vcs:
    description: "Branch / commit / PR abstraction (git / GitHub / Bitbucket)."
    operations:
      branch:
        input:  { workdir: string, name: string, base: string }
        output: { ok: bool, branch: string }
      diff:
        input:  { workdir: string }
        output: { diff: string, files: list }
      commit:
        input:  { workdir: string, message: string, files: list }
        output: { ok: bool, sha: string }
      push:
        input:  { workdir: string, remote: string }
        output: { ok: bool, url: string }
      open_pr:
        input:  { workdir: string, title: string, body: string, base: string }
        output: { ok: bool, url: string, pr_id: string }
      pr_status:
        input:  { pr_id: string }
        output: { state: string, checks: list, comments: list }
      pr_comment:
        input:  { pr_id: string, body: string }
        output: { ok: bool }
      merge:
        input:  { pr_id: string, strategy: string }
        output: { ok: bool, sha: string }
    default: host.git

  ci:
    description: "Build/test runner."
    operations:
      run_tests:
        input:  { workdir: string, target: string }
        output: { ok: bool, passed: int, failed: int, log: string, junit: string }
      build:
        input:  { workdir: string, target: string }
        output: { ok: bool, log: string }
      remote_status:
        input:  { pr_id: string }
        output: { state: string, checks: list }
    default: host.local

  workspace:
    description: "Working-copy manager. Local: git worktree."
    operations:
      list:
        input:  {}
        output: { workspaces: list }
      get:
        input:  { id: string }
        output: { id: string, path: string, branch: string, dirty: bool }
      create:
        # `id` is the workspace identity (pins the on-disk .worktrees/<id>
        # dir basename); `name` is the branch; `base` is the branch to
        # root from. Matches host.git_worktree's worktreeCreate, which
        # reads id/name/base — every caller (bf.idle, impl.idle) passes
        # `id:` from world.workspace_id. The earlier `ticket_id` label
        # was stale: no caller passed it and the handler never read it.
        input:  { id: string, name: string, base: string }
        output: { ok: bool, path: string }
      sync:
        input:  { id: string }
        output: { ok: bool, log: string }
      cleanup_scan:
        input:  { base: string, exclude: string, protected: string }
        output: { ok: bool, base: string, exclude: string, candidates: list, recommended_count: int }
      cleanup_apply:
        input:  { candidates: list }
        output: { ok: bool, deleted: list, skipped: list, errors: list }
    default: host.git_worktree

  transport:
    description: "Out-of-band channel for posting proposals, checkpoints, status."
    operations:
      post:
        input:  { thread: string, body: string }
        output: { ok: bool, message_id: string }
    default: host.append_to_file

# World — provider-neutral. Strips Jira-flavoured keys
# (`jira_query` / `jira_results` → `ticket_query` / `ticket_results`)
# and adds the keys the bf / pr imports project across (ticket_id,
# workdir, feature_branch, base_branch, judge_mode, pr_title, pr_body).
world:
  # ── Hub navigation ────────────────────────────────────────────────
  prev_state:          { type: string, default: "landing" }
  inbox_unread:        { type: int,    default: 0 }
  last_error:          { type: string, default: "" }

  # ── Free-form workbench (rooms/landing.yaml) ──────────────────────
  # captured: proposals accepted this session — drives the "free-form
  #   shrinking" view. Rendered read-only here; INCREMENTED by the
  #   slice-3 mining apply path (mining-proposal-loop.md), not by this
  #   story.
  # landing_request: the operator's current free-form work request,
  #   captured by the `work` intent; fed to the on_enter landing_agent.
  # landing_note: the landing_agent's close-out note (schemas/landing-note.json).
  # landing_started: first-start banner sentinel (on_enter once: guard).
  captured:            { type: int,    default: 0 }
  landing_request:     { type: string, default: "" }
  landing_note:        { type: object, default: {} }
  landing_started:     { type: bool,   default: false }
  # Thread continuity: the prior turn's note, preserved across the `work`
  # arc's landing_note clear so the next agent dispatch can build on what
  # it last reported (so "ok go ahead" continues the thread instead of a
  # blank one-shot on the literal words). Strings, not the object, because
  # set: renders an object reference to JSON text — summary/details are all
  # the prompt needs. See .context/landing-onpath-offpath-bail.md slice C.
  landing_prior_summary: { type: string, default: "" }
  landing_prior_details: { type: string, default: "" }

  # ── Ad-hoc structured plan (rooms/landing|applying|verifying.yaml) ─────
  # The planner may emit a structured `plan` in its landing-note (schemas/plan.json):
  # one goal, one run-then-verify step. The operator accepts it (accept_plan /
  # apply) — freezing accepted_plan and entering `applying` — or refines it by
  # typing an adjustment (the work sink re-dispatches the planner with the prior
  # plan as context). `applying` carries the accepted step out; `verifying` runs
  # the verify gate and binds verify_ok.
  #
  # accepted_plan:    the plan frozen at accept (schemas/plan.json shape).
  # verify_ok:        tri-state "" | true | false — bound by the verify gate; the
  #                   "" default keeps the post-bind routing emits (which compare
  #                   == true / == false) from firing pre-bind, deferring them to
  #                   the post-bind pass (the cherny decision-emit discipline).
  # verify_reason:    the gate's pass/fail rationale → last_error on a red verify.
  # landing_plan_prior: the prior plan, preserved across the work-sink clear so a
  #                   refine re-dispatch builds on it (mirrors landing_prior_*).
  # plan_decision:    "" | accepted — the recorded PlanDecided signal (world.update).
  # issue_source:     origin | upstream | combined — which repo the verify probes.
  accepted_plan:       { type: object, default: {} }
  verify_ok:           { type: string, default: "" }
  verify_reason:       { type: string, default: "" }
  landing_plan_prior:  { type: object, default: {} }
  plan_decision:       { type: string, default: "" }
  # apply_note: the apply step's close-out note. Bound by applying.yaml's
  # host.agent.task — DISTINCT from landing_note (which holds the proposed plan)
  # so the apply step's once: re-arms per attempt instead of being skipped as
  # cached. (See rooms/applying.yaml.)
  apply_note:          { type: object, default: {} }
  # issue_source selects WHICH repo the verify gate probes; origin_repo /
  # upstream_repo are the concrete owner/repo each resolves to (configurable per
  # instance — kitsoki-dev pins its fork as origin and constructorfabric/Kitsoki
  # as upstream). combined probes both (v1: the verifying room resolves the
  # concrete repo and the .star sums/probes; combined falls back to origin_repo
  # for the single-probe v1 script). Default origin.
  issue_source:        { type: string, default: "origin" }
  origin_repo:         { type: string, default: "bsacrobatix/Kitsoki" }
  upstream_repo:       { type: string, default: "constructorfabric/Kitsoki" }

  # ── Ticket search / pickup ────────────────────────────────────────
  ticket_query:        { type: string, default: "" }
  ticket_results:      { type: string, default: "" }
  ticket_id:           { type: string, default: "" }
  ticket_title:        { type: string, default: "" }
  ticket_url:          { type: string, default: "" }
  # ticket_type is how `drive` chooses a pipeline (bug → bf,
  # feature → impl, epic → cyp). Set by pick_ticket from its `type:`
  # slot (or carried through from a prior pick when the slot is
  # omitted). The local-files provider scans issues/{bugs,features,
  # epics}/ and tags every row with its source kind, so picks land
  # with the right value when the slot is fed in.
  ticket_type:         { type: string, default: "" }
  # gate_command — the picked ticket's `repro_command:` frontmatter, bound by
  # ticket_search.pick_ticket from iface.ticket.get and projected into the bf
  # import's world (world.gate_command) so the bugfix `reproducing` room can
  # run it RED-first. Empty (no repro_command on the ticket) ⇒ bf falls through
  # to the LLM-only reproducer. See stories/bugfix (bugfix-repro-gate slice).
  gate_command:        { type: string, default: "" }
  # ── Ticket source / identity (P5) ─────────────────────────────────
  # Surfaced by ticket_search so a GitHub-Issue-backed ticket reveals its
  # origin and its original local-bug-file id (the local↔issue mapping an
  # operator otherwise has to eyeball-match by title). Both are bound from
  # iface.ticket.get at pick time; host.gh.ticket emits `source: github`
  # on every row and lifts `legacy_id` out of the ```kitsoki metadata block
  # (see internal/host/github.go). The local-files provider leaves them ""
  # (its id IS the local id), so the identity line only shows for GitHub.
  ticket_source:       { type: string, default: "" }
  ticket_legacy_id:    { type: string, default: "" }
  # The main room calls iface.ticket.list_mine on enter and stashes
  # the result here so the view can render a "tickets in your queue"
  # block without the operator having to type `tickets`.
  my_tickets:          { type: list,   default: [] }
  thread:              { type: string, default: "" }

  # ── Workspace ─────────────────────────────────────────────────────
  current_workspace:   { type: string, default: "" }
  workspace_id:        { type: string, default: "" }
  workdir:             { type: string, default: "" }
  base_branch:         { type: string, default: "main" }
  feature_branch:      { type: string, default: "" }
  workspace_list:      { type: list,   default: [] }
  cleanup_candidates:  { type: list,   default: [] }
  cleanup_deleted:     { type: list,   default: [] }
  cleanup_skipped:     { type: list,   default: [] }
  cleanup_errors:      { type: list,   default: [] }
  cleanup_recommended: { type: int,    default: 0 }
  cleanup_filter:      { type: string, default: "" }
  cleanup_base:        { type: string, default: "main" }
  cleanup_status:      { type: string, default: "" }

  # ── Pipeline control (shared with bf / pr imports) ────────────────
  judge_mode:                  { type: string, default: "human" }
  judge_confidence_threshold:  { type: float,  default: 0.8 }
  bugfix_mode:                 { type: string, default: "full" }
  # bugfix_destination selects the post-fix landing:
  #   open-pr        — hand the finished fix to pr-refinement and open a PR
  #   leave-worktree — stop after the validated bugfix, preserving the worktree
  #   local-merge    — use bugfix's direct-ship tail to merge into base_branch
  bugfix_destination:          { type: string, default: "open-pr" }
  merge_strategy:              { type: string, default: "squash" }
  # build_cmd / test_cmd — the project's REAL build + test commands, projected
  # into the bf import so the bugfix testing/validating gates run them instead of
  # the `go build ./...` / `go test ./...` defaults baked into host.local
  # (internal/host/local_ci.go). Empty ⇒ the Go defaults (back-compat for a Go
  # target). An INSTANCE targeting a non-Go repo sets these from its project
  # profile so an onboarded repo's fixes are gated by its own toolchain with NO
  # per-session override. See stories/bugfix
  # (world.build_cmd / world.test_cmd, consumed by validating.yaml / testing.yaml).
  build_cmd:                   { type: string, default: "" }
  test_cmd:                    { type: string, default: "" }

  # ── Standup / agent / code-review scratch ────────────────────────
  standup_summary:     { type: string, default: "" }
  agent_question:     { type: string, default: "" }
  agent_answer:       { type: string, default: "" }

  # ── Incident response / on-call loop (rooms/incident.yaml) ─────────
  # The alert → triage → mitigate|escalate|monitor → postmortem loop. The
  # operator pastes a production alert; the on-call agent classifies it
  # (severity + recommended action) via host.agent.decide; the loop routes
  # on the recommendation. mitigate runs a recorded mitigation action and
  # writes a blameless postmortem; escalate pages the owning team (a
  # transport post + inbox mirror) and writes the postmortem; monitor parks
  # the alert. Every host the loop touches is already in the allow-list
  # (host.agent.decide / host.agent.task / host.run / host.transport.post /
  # host.inbox.add), so flow fixtures stub the agent calls and assert the
  # deterministic routing with no LLM.
  #
  # incident_alert:   the operator's pasted alert text (the `report_incident`
  #                   slot, captured on entry to the triage step).
  # incident_triage:  the decide verdict — { severity, summary, recommendation,
  #                   suspected_cause, mitigation }. recommendation is the
  #                   tri-state "" until bound, so the post-bind routing emits
  #                   (which compare == 'mitigate' / 'escalate' / 'monitor')
  #                   defer to the post-bind pass (the cherny decision-emit
  #                   discipline). schemas/incident-triage.json.
  # incident_action:  the recorded mitigation / escalation action result
  #                   (host.run stdout), shown in the read-out.
  # incident_postmortem: the writer's close-out note — { summary, file_path,
  #                   follow_ups }. schemas/incident-postmortem.json.
  # incident_status:  "" | mitigated | escalated | monitoring | resolved — the
  #                   loop's terminal disposition, surfaced in the read-out.
  # incident_path:    the postmortem markdown path (relative to workdir).
  incident_alert:       { type: string, default: "" }
  incident_triage:      { type: object, default: {} }
  incident_action:      { type: string, default: "" }
  incident_postmortem:  { type: object, default: {} }
  incident_status:      { type: string, default: "" }
  incident_path:        { type: string, default: "docs/incidents" }

  # ── Deploy loop (rooms/deploy.yaml) ────────────────────────────────
  # The select → preflight → go/no-go gate → ship → verify | rollback loop.
  # The operator names a deploy target; the loop runs preflight checks
  # (host.run), gates them (host.agent.decide → go|no_go), and on ship
  # deploys (host.run), verifies the new release (host.run +
  # host.agent.decide → healthy?), and rolls back deterministically on a red
  # probe. Every host the loop touches is already in the allow-list
  # (host.run / host.agent.decide), so flow fixtures stub the decides + the
  # host.run steps and assert the deterministic routing with no LLM.
  #
  # deploy_target:    the operator's named target environment (the
  #                   `start_deploy` slot, captured on entry to preflight).
  # deploy_preflight: the recorded preflight check output (host.run stdout),
  #                   fed into the gate decide.
  # deploy_gate:      the gate verdict — { verdict (go|no_go), summary,
  #                   blocking }. verdict is the tri-state "" until bound, so
  #                   the post-bind routing emits (which compare == 'go' /
  #                   'no_go') defer to the post-bind pass (the cherny
  #                   decision-emit discipline). schemas/deploy-gate.json.
  # deploy_action:    the recorded ship / rollback action result (host.run
  #                   stdout), shown in the read-out.
  # deploy_probe:     the recorded verification probe output (host.run
  #                   stdout), fed into the health decide.
  # deploy_health:    the post-deploy health verdict — { verdict
  #                   (healthy|unhealthy), summary }. verdict is unset until the
  #                   decide binds, so the post-bind routing emits defer to the
  #                   post-bind pass. schemas/deploy-health.json.
  # deploy_status:    "" | cancelled | shipped | succeeded | rolled_back — the
  #                   loop's disposition, surfaced in the read-out.
  deploy_target:        { type: string, default: "" }
  deploy_preflight:     { type: string, default: "" }
  deploy_gate:          { type: object, default: {} }
  deploy_action:        { type: string, default: "" }
  deploy_probe:         { type: string, default: "" }
  deploy_health:        { type: object, default: {} }
  deploy_status:        { type: string, default: "" }

  # ── Observability loop (rooms/observability.yaml) ──────────────────
  # The pick signal → query → triage → alert | annotate | clear loop. The
  # operator picks a signal/dashboard; the loop queries it (host.run), an
  # agent triages the query result (host.agent.decide → alert|annotate|clear),
  # and the loop routes on the verdict — alert posts out-of-band
  # (iface.transport.post) + mirrors to the inbox (host.inbox.add), annotate
  # records a dashboard note (host.run), clear parks the signal. Every host is
  # already in the allow-list, so flow fixtures stub the decide + host.run
  # steps and assert the deterministic routing with no LLM.
  #
  # obs_signal:    the operator's picked signal / dashboard (the `query_signal`
  #                slot, captured on entry to the query step).
  # obs_query:     the recorded query result (host.run stdout), fed into the
  #                triage decide.
  # obs_triage:    the triage verdict — { disposition (alert|annotate|clear),
  #                summary, detail }. disposition is the tri-state "" until
  #                bound (the cherny decision-emit discipline).
  #                schemas/obs-triage.json.
  # obs_action:    the recorded alert / annotation action result (the
  #                transport message id, or the host.run annotation stdout).
  # obs_status:    "" | alerted | annotated | clear — the loop's disposition.
  obs_signal:           { type: string, default: "" }
  obs_query:            { type: string, default: "" }
  obs_triage:           { type: object, default: {} }
  obs_action:           { type: string, default: "" }
  obs_status:           { type: string, default: "" }

  # ── Docs loop (rooms/docs.yaml) ────────────────────────────────────
  # The pick target → draft → review → publish | revise loop. The operator
  # names a doc target; the writer drafts it (host.agent.task, under the
  # read-only → write-mode opt-in posture); the operator reviews the close-out
  # note and publishes (announces it out-of-band via iface.transport.post) or
  # revises (re-drafts). Every host is already in the allow-list / an iface
  # default, so flow fixtures stub the writer task and assert the deterministic
  # routing with no LLM.
  #
  # docs_target:  the operator's named doc target (the `draft_doc` slot,
  #               captured on entry to drafting).
  # docs_draft:   the writer's close-out note — { summary, file_path, headings }.
  #               schemas/docs-draft.json.
  # docs_action:  the publish announcement result (the transport message id).
  # docs_status:  "" | drafted | revising | published — the loop's disposition.
  # docs_path:    the doc markdown path the writer targets (relative to workdir).
  docs_target:          { type: string, default: "" }
  docs_draft:           { type: object, default: {} }
  docs_action:          { type: string, default: "" }
  docs_status:          { type: string, default: "" }
  docs_path:            { type: string, default: "docs" }

  # ── Project onboarding (rooms/init.yaml) ──────────────────────────
  # Deterministic no-LLM project init: discover a target repo, render the
  # profile for review, then apply the config only after explicit accept.
  init_request:          { type: string, default: "" }
  init_discovery:        { type: object, default: {} }
  init_run_ok:           { type: bool, default: false }
  init_run_output:       { type: string, default: "" }
  init_target_path:      { type: string, default: "" }
  init_project_id:       { type: string, default: "" }
  init_project_title:    { type: string, default: "" }
  init_stack:            { type: string, default: "" }
  init_dev_command:      { type: string, default: "" }
  init_test_command:     { type: string, default: "" }
  init_build_command:    { type: string, default: "" }
  init_conventions:      { type: string, default: "hybrid" }
  init_tracker:          { type: string, default: "none" }
  init_profile_status:   { type: string, default: "draft" }
  init_feedback:         { type: string, default: "" }
  init_apply_result:     { type: object, default: {} }
  init_apply_ok:         { type: bool, default: false }
  init_apply_output:     { type: string, default: "" }
  init_tools_result:     { type: object, default: {} }
  init_tools_ok:         { type: bool, default: false }
  init_tools_output:     { type: string, default: "" }
  init_profile_mode:     { type: string, default: "deterministic" }
  init_profile_draft:    { type: object, default: {} }
  init_profile_validation: { type: object, default: {} }
  init_profile_json:     { type: string, default: "" }

  # ── Design pipeline (rooms/design*.yaml) ───────────────────────
  # 4-stage pipeline: intake → search → refine → draft+publish.
  # Per-session scratch dir is `design_workspace` — NOT world.workdir
  # (that is the bf/pr worktree). See docs/proposals/process-design.md §4.
  design_slug:           { type: string, default: "" }   # meaningful slug; seeds the workspace dir + final filename
  design_workspace:      { type: string, default: "" }   # docs/proposals/.workspace/<slug> — gitignored scratch
  design_idea:           { type: string, default: "" }   # raw idea text from intake
  design_kind:           { type: string, default: "" }   # story | runtime | tui | tracing | epic (chosen by the author)
  design_existing_paths: { type: string, default: "" }   # operator-named existing docs passed to search

  # search (002-existing-state.md + 003-references.json)
  design_existing_state:   { type: object, default: {} } # { overlaps: [{path, kind, summary, recommendation}], roadmap_fit }
  design_existing_path:    { type: string, default: "" } # path 002-existing-state.md was written to
  design_overlap_decision: { type: string, default: "" } # "" | new | change_existing
  design_change_target:    { type: string, default: "" } # path of the proposal to amend when change_existing
  design_reference_hits:   { type: object, default: {} } # raw hits from host.agent.search: { hits: [{path, chunk_id, text, score}], top }
  design_references:       { type: object, default: {} } # { items: [{ path, sections, rationale }] }
  design_references_path:  { type: string, default: "" } # path 003-references.json was written to

  # refine (001-brief.md + refinement analysis)
  design_brief_path:      { type: string, default: "" }  # path of the operator-editable 001-brief.md
  design_brief_decision:  { type: object, default: {} }  # decide verdict: { verdict: continue|clarify, questions: [...], reason }
  design_refine_analysis: { type: object, default: {} }  # refiner output: { gaps: [...], summary }
  design_last_refine_message: { type: string, default: "" }  # operator's last refine instruction, echoed in the brief view

  # draft (004-proposal.md) + publish
  design_artifact:       { type: object, default: {} }   # task result: { title, summary_markdown, file_path, kind, confidence, needs_clarification, follow_up_questions }
  # IDE editor-mirror state (rooms/design_draft.yaml) — declared so a machine-time
  # template resolves to nil gracefully before the binding host call runs.
  design_draft_doc:      { type: string, default: "" }   # absolute path of the proposal file (host.ide.open_file)
  design_stage_doc:      { type: string, default: "" }   # absolute path of the staged refine proposal (open_diff new_text_path)
  design_stage_artifact: { type: object, default: {} }   # refine re-draft, promoted to design_artifact on accept
  design_diff_verdict:   { type: string, default: "" }   # accepted|rejected from the in-editor diff gate
  design_file:           { type: string, default: "" }   # final published path docs/proposals/<slug>.md
  design_ticket_path:    { type: string, default: "" }   # feature ticket minted at publish, links back to design_file

  # feedback + per-phase cycle budgets
  design_refine_feedback:   { type: string, default: "" }
  design_cycle:             { type: int, default: 0 }    # global audit counter for the proposal flow
  design_brief_cycle:       { type: int, default: 0 }
  design_brief_budget:      { type: int, default: 5 }
  design_draft_cycle:       { type: int, default: 0 }
  design_draft_budget:      { type: int, default: 5 }

  # ── External-target profile (doc shape + placement) ───────────────
  # Defaults reproduce kitsoki's own behaviour exactly (flat docs/proposals
  # + docs/prd, slug-named files, a feature ticket on publish). An importing
  # project instance can retarget the PRD → Design walk by overriding these:
  # publish into <workdir>/<durable>, choose fixed filenames, read the target's
  # own doc templates, and choose local ticket, GitHub ticket, or no-ticket
  # follow-up. See the "doc profile" section of the dev-story README.
  repo_root:             { type: string, default: "" }                        # external checkout root (forward-compat; ticket passthrough is the deferred gh-adapter slice)
  publish_durable_path:  { type: string, default: "docs/prd" }                # prd publish home (projected into the prd import)
  prd_doc_filename:      { type: string, default: "" }                        # fixed PRD filename for an external target (e.g. "PRD"); "" ⇒ slug-named
  design_template_dir:   { type: string, default: "docs/proposals/templates" } # where the design author reads its doc templates
  design_durable_path:   { type: string, default: "docs/proposals" }          # design publish home
  design_doc_filename:   { type: string, default: "" }                        # fixed DESIGN filename for an external target (e.g. "DESIGN"); "" ⇒ slug-named
  design_ticket_dir:     { type: string, default: "issues/features" }         # where the linking feature ticket is minted; "" ⇒ skip (external target)
  ticket_repo:           { type: string, default: "" }                        # owner/repo for GitHub-issue tickets; non-empty ⇒ feature publish mints a GitHub issue instead of a local file (slice #3). kitsoki-dev pins constructorfabric/Kitsoki.

  # ── Ideas reviewer (rooms/ideas.yaml) ─────────────────────────────
  # The backlog reconciler: reads world.ideas_path, the commit history, and the
  # docs, proposes section moves (ideas_review), and rewrites the file
  # deterministically on `apply`. `pick` seeds design_seed_idea (consumed by
  # the proposal intake) so a blocked author flows straight into authoring.
  ideas_path:            { type: string, default: "ideas.md" } # backlog file (repo-relative); per-story files work by overriding this
  ideas_review:          { type: object, default: {} }          # decide report: { reclassifications: [...], candidates: [...], summary }
  ideas_review_path:     { type: string, default: "" }          # path the report JSON was written to (fed to the reconcile script)
  ideas_review_feedback: { type: string, default: "" }          # optional operator steering for a re-scan
  ideas_apply_result:    { type: object, default: {} }          # reconcile script result: { moved, not_found, sections }
  design_seed_idea:    { type: string, default: "" }          # candidate text handed from the ideas room into the proposal intake

  # ── PR handoff (lifted from `pr` import's exits.merged.set) ───────
  last_pr_url:         { type: string, default: "" }
  status:              { type: string, default: "open" }   # open | merged | abandoned
  human_review_reason: { type: string, default: "" }        # concise reason posted when autonomy needs a human
  human_review_issue_comment_id: { type: string, default: "" }
  human_review_pr_comment_ok:    { type: bool,   default: false }

  # ── Carry-fields for the bf → pr handoff projection ───────────────
  # bf's @exit:done writes done_artifact via `set:` (per the
  # `requires: [done_artifact]` enforcement). The dev-story `bf` import
  # exits projection reads `world.bf__done_artifact.summary_title` and
  # `world.bf__done_artifact.summary_markdown` (the artifact's stable
  # presentation surface) into pr_title / pr_body so the pr-refinement
  # entry's world_in: can pick them up.
  pr_title:            { type: string, default: "" }
  pr_body:             { type: string, default: "" }

  # ── Inbox-routed review request payload (rev import) ──────────────
  # The inbox `pick_review` intent populates these from a notification
  # payload, then `target: rev` enters the code-review compound.
  pr_id:               { type: string, default: "" }
  pr_author:           { type: string, default: "" }

  # ── Demo-video loop (imported `demovid`, stories/demo-video-loop/) ──
  # The autonomous maker→QA loop that PRODUCES (or refreshes) a tour-driven
  # demo video for a feature and gates it with the kitsoki-ui-qa vision
  # review. Reached from landing via `make_demo`. The loop operates on the
  # hub's existing worktree (world.workdir → child worktree_path) and diffs
  # against world.base_branch (→ child base_ref); these keys are reused, not
  # re-declared. The keys below are NEW — the loop's input contract that has
  # no dev-story analogue yet (see stories/demo-video-loop/README.md §input
  # contract). All carry the child's own defaults so a bare `make_demo`
  # (no slots) enters the loop in its standalone-default posture.
  #
  # proposal_path:     path (relative to workdir) to the proposal / change
  #                    summary md the maker reads to learn WHICH feature to demo.
  # feature_slug:      names the spec / manifest / video / qa artifacts.
  # video_expectation: new | update | auto (update if a canonical mp4 exists).
  # iteration_budget:  cycle ceiling for the loop.
  # cost_budget_usd:   $ ceiling; 0 = disabled (opt-in).
  proposal_path:       { type: string, default: "" }
  feature_slug:        { type: string, default: "demo-video" }
  video_expectation:   { type: string, default: "auto" }
  iteration_budget:    { type: int,    default: 5 }
  cost_budget_usd:     { type: number, default: 0 }

# Intent vocabulary. Day-level rooms only; bf / pr's intents are lifted
# via `imports.<alias>.intents.import` and re-exported into this table
# at the bare names (start, proceed, accept, refine, restart_from, quit).
intents:
  # Day-level navigation
  go_main:
    title: "Home"
    description: "Go to the main room."
    examples: [main, "home", "go home", "go to main"]
    priority: 10
  go_back:
    title: "Back"
    description: "Return to the previous room."
    examples: [back, "return"]
    priority: 15
  go_inbox:
    title: "Inbox"
    description: "Open the inbox."
    examples: [inbox, "check inbox"]
    priority: 20
  go_gitops:
    title: "Git commands"
    description: "Open the git command hub — rebase, commit, merge, worktrees."
    examples: [git, "git ops", "git commands", "version control"]
    priority: 20
  go_agent:
    title: "Ask Agent"
    description: "Open the Agent room for Q&A."
    examples: [agent, "ask claude", "ask a question", "i have a question", "ask claude how X works"]
    priority: 18
  go_ticket_search:
    title: "Tickets"
    description: "Open ticket search when the operator asks to list, search, choose, or find tickets. Do not use for requests to fix bugs directly."
    examples: ["tickets", "ticket search", "find ticket", "show tickets", "what's a good ticket to work on?"]
    priority: 40
  go_workspace_manager:
    title: "Workspaces"
    description: "Open workspace manager."
    examples: [workspaces, "workspace manager", "list workspaces", "cleanup worktrees", "clean up merged branches", "resume", "resume my workspace", "continue where I left off", "pick up where I left off"]
    priority: 30
  go_standup:
    title: "Standup"
    description: "Prep for standup."
    examples: [standup, "daily", "prep standup"]
    priority: 35
  go_idea:
    title: "New Idea"
    description: "Start or amend an ad hoc design/proposal — draft, review, clarify decisions, resolve proposal questions, or make a proposal ready for human review. No ticket required."
    examples: ["idea", "new idea", "propose", "proposal", "ad hoc", "draft proposal", "i have an idea", "work on a proposal", "new proposal", "write a proposal", "design proposal", "start a design", "use the design workflow", "amend existing proposal", "proposal ready for review", "human review proposal", "resolve proposal questions", "tighten proposal narration", "audit this proposal", "fold decisions back into the design", "make this proposal terse and clear"]
    priority: 50
  go_code_review:
    title: "Code Review"
    description: "Review a teammate's PR."
    examples: ["code review", "review prs"]
    priority: 33
  go_ideas:
    title: "Ideas Backlog"
    description: "Open the ideas reviewer — reconcile the backlog and pick something to propose."
    examples: ["ideas", "review ideas", "idea backlog", "reconcile ideas", "what should I work on", "writer's block"]
    priority: 31
  go_model_eval:
    title: "Model Harness Eval"
    description: "Prepare model/harness evaluation reports from local evidence."
    examples: ["model eval", "harness eval", "compare models", "evaluate harnesses", "model harness report"]
    priority: 31
  go_init:
    title: "Project Onboarding"
    description: "Discover a project profile and review it before onboarding writes happen."
    examples: ["onboard this project", "project onboarding", "init project", "set up kitsoki for this repo"]
    priority: 31
  go_deploy:
    title: "Deploy"
    description: "Open the deploy room."
    examples: [deploy, "ship it"]
    priority: 28
  go_observability:
    title: "Observability"
    description: "Open the observability room."
    examples: [logs, metrics, observability]
    priority: 27
  go_incident:
    title: "Incident"
    description: "Open the incident room — triage a production alert."
    examples: [incident, "on call", "we have an outage", "production is down", "page received"]
    priority: 26

  # ── Incident response / on-call loop (rooms/incident.yaml) ─────────
  # report_incident captures the pasted alert and enters triage. mitigate /
  # escalate / monitor are BUTTON-ONLY (examples: [] ⇒ the semantic router
  # never binds them from free text) — the operator picks the disposition
  # from the triaged read-out, or the post-bind guarded emit auto-routes on
  # the agent's recommendation. write_postmortem closes the loop.
  report_incident:
    title: "Report Incident"
    description: "Paste a production alert to triage — severity, blast radius, recommended action."
    examples: ["disk full on db-primary", "5xx spiking in checkout", "alert: queue backed up", "report an incident", "triage this alert"]
    priority: 84
    slots:
      alert: { type: string, required: true, description: "The alert text / page to triage." }
  mitigate:
    title: "Mitigate"
    description: "Apply the recommended mitigation now (a known fix — rollback, restart, flag flip)."
    examples: []
    priority: 50
  escalate:
    title: "Escalate"
    description: "Page the owning team / human on-call — the loop can't safely mitigate."
    examples: []
    priority: 50
  watch:
    title: "Monitor"
    description: "Park the alert and watch — no action warranted yet."
    examples: []
    priority: 50
  write_postmortem:
    title: "Write Postmortem"
    description: "Write a short, blameless postmortem now the incident is resolved."
    examples: []
    priority: 50
  # Internal routing intents — fired by the triage room's post-bind guarded
  # emits once the recommendation binds (the cherny decision-emit discipline).
  triage_mitigate:
    description: "(internal) triage recommended mitigate — route to the mitigation step."
    examples: []
    priority: 1
  triage_escalate:
    description: "(internal) triage recommended escalate — route to the escalation step."
    examples: []
    priority: 1
  triage_monitor:
    description: "(internal) triage recommended monitor — park the alert."
    examples: []
    priority: 1

  # ── Deploy loop (rooms/deploy.yaml) ────────────────────────────────
  # start_deploy captures the target and enters preflight. ship / cancel_deploy
  # are BUTTON-ONLY (examples: [] ⇒ the semantic router never binds them from
  # free text) — the operator picks the disposition from the gated read-out, or
  # the post-bind guarded emit auto-routes on the agent's verdict.
  start_deploy:
    title: "Start Deploy"
    description: "Name a deploy target to run preflight and ship a release."
    examples: ["deploy to staging", "ship to prod", "release to prod-us-east", "deploy staging"]
    priority: 84
    slots:
      target: { type: string, required: true, description: "The deploy target environment." }
  ship:
    title: "Ship"
    description: "Deploy to the target now — preflight is clean."
    examples: []
    priority: 50
  cancel_deploy:
    title: "Cancel Deploy"
    description: "Park the deploy — don't ship."
    examples: []
    priority: 50
  # Internal routing intents — fired by the preflight / verify rooms' post-bind
  # guarded emits once the verdict binds (the cherny decision-emit discipline).
  gate_go:
    description: "(internal) preflight gate said go — route to the ship choice."
    examples: []
    priority: 1
  gate_block:
    description: "(internal) preflight gate said no_go — route to the blocked read-out."
    examples: []
    priority: 1
  run_verify_deploy:
    description: "(internal) the deploy landed — run the health verification."
    examples: []
