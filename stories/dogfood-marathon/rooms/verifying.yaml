# verifying — INDEPENDENT verify of the deliverable the inner pipeline produced.
# The non-negotiable honesty control of the whole method: grade on the operator's
# OWN oracle run against the produced worktree/commit, NOT on the maker's return.
#
# DELEGATION: under a live drive the operator (via kitsoki-mcp-driver) runs the
# hidden oracle / targeted tests themselves on the produced worktree and checks
# deliverable existence (the files + the key edit are present), then journals the
# result here. This room models that as a deterministic host.starlark.run
# (verify_case.star) that takes the drive_result + the case's repro/oracle and
# returns {status: solved|partial|failed, how}. Under flow tests it's stubbed by
# id. The script NEVER invents a pass — a missing/empty deliverable is failed.

states:

  verifying:
    description: "Independently verifying the deliverable (oracle-gated, not the maker's word)."
    relevant_world: [current_case, drive_result, verify_result]
    view:
      - heading: "Dogfood marathon · verifying"
      - kv:
          pairs:
            Case:   '{{ world.current_case.id }}'
            Drive:  '{{ world.drive_result.exit }}'
            Verify: '{{ world.verify_result.status|default:"(verifying…)" }}'
      - prose: "Running the operator's own oracle on the produced worktree and checking deliverable existence. This is the grade — the maker's self-report is ignored."
    on_enter:
      - invoke: host.starlark.run
        id: verify_case
        with:
          script: scripts/verify_case.star
          inputs:
            case:         "{{ world.current_case }}"
            drive_result: "{{ world.drive_result }}"
        bind:
          verify_result: verify_result
        on_error: recording   # even a verify error is recorded honestly (status carries the error)
      - when: "world.verify_result.status != ''"
        emit_intent: verify_done
    on:
      verify_done:
        - target: recording
      look:
        - target: .
