# gears-bugfix — the bugfix pipeline pointed at a real external repo (demo instance).
#
# A thin instance of the provider-neutral `bugfix` story, pre-bound to the real
# upstream constructorfabric/gears-rust checkout and seeded with the gh-4115
# ticket. It exists so the tour-driven demo (features/gears-bugfix.yaml) starts
# with the bug context already in world — ticket_id / workdir / cargo CI commands
# baked into the instance's world DEFAULTS (which machine.WorldFromSchema applies
# on session start, so the implementer's `when: workdir != ''` guard fires and the
# implementing room shows the real applied fix). bf_autostart_attempted defaults
# true so bf.idle stays parked and the tour drives `start` explicitly.
#
# The content shown is replayed verbatim from a real LLM run (see the demo's
# flow + cassette); no engine or bugfix-room change is needed to retarget — the
# seam is config, exactly like the gears-rust PRD→Design instance.

app:
  id: gears-bugfix
  version: 0.1.0
  title: "Fix a real bug in gears (#4115) — the bugfix pipeline, end to end"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.local_files.ticket
  - host.git
  - host.local
  - host.git_worktree
  - host.append_to_file
  - host.inbox.add
  - host.agent.ask
  - host.agent.decide
  - host.agent.task
  - host.diff.open
  # slice 4: bugfix now declares host.run + host.artifacts_dir (its shipped tail
  # import). `hosts: declared` on the bf import requires the parent list them.
  - host.run
  - host.artifacts_dir

imports:
  bf:
    source: ../bugfix
    entry: idle
    hosts: declared
    host_bindings:
      ticket:    host.local_files.ticket
      vcs:       host.git
      ci:        host.local
      workspace: host.git_worktree
      transport: host.append_to_file
    # Project the instance profile into bugfix's private world.
    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      ticket_url:      "{{ world.ticket_url }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      bugfix_mode:     "{{ world.bugfix_mode }}"
      # PR-handoff tail: this demo ends at the PR-ready close-out (@exit:done),
      # not slice 4's direct-ship-to-local-main tail. Pin open-PR.
      bugfix_exit:     "open-PR"
      judge_mode:      "{{ world.judge_mode }}"
      test_cmd:        "{{ world.test_cmd }}"
      build_cmd:       "{{ world.build_cmd }}"
      # Pre-pinned true so bf.idle.on_enter skips its auto-derive + auto-start
      # chain: workdir is already set (below), and the tour drives `start`.
      bf_autostart_attempted: "{{ world.bf_autostart_attempted }}"
    # bf's exits all land in the instance's terminal close-out state. (The full
    # PR-open tail is dev-story's job; this demo ends at the PR-ready close-out.)
    exits:
      done:        { to: shipped }
      abandoned:   { to: shipped }
      pick_ticket: { to: shipped }
      # slice 4: bf's direct-ship terminals. This demo pins bugfix_exit: open-PR
      # so neither fires; the loader requires every child exit be mapped. Both
      # land in the demo's close-out read-out.
      shipped:          { to: shipped }
      needs-human:      { to: shipped }
      not-reproducible: { to: shipped }
      # bf triage-only mode terminal (unreachable here — full mode — but the
      # loader requires every child exit be mapped).
      triaged:          { to: shipped }

# Instance world — the gh-4115 / gears-rust profile (the demo's pre-set context).
world:
  ticket_id:       { type: string, default: "gh-4115" }
  ticket_title:    { type: string, default: "Gear/plugin config can't be overridden via env vars in Kubernetes (dash in gear name vs C_IDENTIFIER)" }
  ticket_url:      { type: string, default: "https://github.com/constructorfabric/gears-rust/issues/4115" }
  thread:          { type: string, default: "gh-4115" }
  workspace_id:    { type: string, default: "bf-gh-4115" }
  workdir:         { type: string, default: ".worktrees/bf-gh-4115" }
  base_branch:     { type: string, default: "main" }
  feature_branch:  { type: string, default: "fix/gh-4115" }
  bugfix_mode:     { type: string, default: "full" }
  judge_mode:      { type: string, default: "human" }
  test_cmd:        { type: string, default: "cargo test -p cf-gears-toolkit --features bootstrap --lib bootstrap::config" }
  build_cmd:       { type: string, default: "cargo build -p cf-gears-toolkit --features bootstrap" }
  bf_autostart_attempted: { type: bool, default: true }

states:
  # Terminal close-out — bf's @exit:done lands here. PR-ready: the fix is on the
  # fix/gh-4115 branch and the ticket is resolved.
  shipped:
    description: "Fix landed on fix/gh-4115 — PR-ready, ticket resolved."
    view:
      - banner:
          text:     "PR-READY"
          subtitle: "gh-4115 fixed — branch fix/gh-4115 ready to open a pull request against gears-rust"
          color:    "#22C55E"
      - prose: "The bug-fix pipeline reproduced, proposed, implemented, tested, reviewed and validated the fix for the real gears-rust bug. The branch is ready for a PR; the ticket is resolved."
    relevant_world: [ticket_id, ticket_title, feature_branch]

root: bf
