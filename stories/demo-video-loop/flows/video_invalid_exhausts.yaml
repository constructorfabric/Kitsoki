# video_invalid_exhausts — the video gate fails AND there is no budget left, so the
# loop ends without ever reaching QA. iteration_budget 1: the maker's first cut is
# rejected by the deterministic gate (validate-1 ok:false) and, with iteration 1 >=
# budget 1, the iteration guard fires → @exit:exhausted (terminal_reason
# iteration_budget). qa.sh never runs (qa-1 times:0).
test_kind: flow
app: ../app.yaml
initial_state: generating
initial_world:
  worktree_path:    ".worktrees/demo"
  feature_slug:     "agent-actions"
  iteration_budget: 1

host_handlers:
  host.run:
    by_call:
      compute-diff: { data: { ok: true,  exit_code: 0, stdout: "+ feature diff" } }
      stamp-epoch:  { data: { ok: true,  exit_code: 0, stdout: "1750000000" } }
      validate-1:   { data: { ok: false, exit_code: 1, stdout: "ffprobe duration 6s < 25s minimum" } }
      demo-report:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            report_path: ".artifacts/demo-video-loop/test/report.md"
            summary_path: ".artifacts/demo-video-loop/test/summary.json"
            deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
  host.agent.task:
    by_call:
      maker-1: { data: { submitted: { summary: "short cut", video_path: ".artifacts/tour/aa.SHORT-6s.mp4", frames_dir: ".artifacts/tour/frames", chapters_path: ".artifacts/tour/aa.chapters.json", feature_md_path: ".artifacts/ui-qa/feature.md", scenarios_path: ".artifacts/ui-qa/scenarios.yaml" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent: { name: retry, slots: {} }
    expect_state: __exit__exhausted
    expect_world:
      terminal_reason: "iteration_budget"
      iteration:       1
      video_valid:     false
      video_validate_reason: "ffprobe duration 6s < 25s minimum"
      deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
    expect_host_calls:
      - handler: host.agent.task
        args: { call: maker-1 }
        times: 1
      - handler: host.run
        args: { call: validate-1 }
        times: 1
      - handler: host.run
        args: { call: qa-1 }
        times: 0

expect_terminal: true
expect_no_errors: true
