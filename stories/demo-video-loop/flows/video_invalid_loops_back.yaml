# video_invalid_loops_back — the DETERMINISTIC video gate (not QA) drives a
# loop-back. validate-1 returns ok:false (e.g. the maker shipped a *.fast.mp4 / an
# under-dwelled cut) with budget remaining, so generating emits loop_again carrying
# video_validate_reason as the maker's feedback — the run never reaches QA on
# iteration 1. The 2nd maker turn fixes it: validate-2 (ok) → to_qa → qa-2 (PASS) →
# @exit:achieved. Proves the gate cannot be talked past and that its reason loops back.
test_kind: flow
app: ../app.yaml
initial_state: generating
initial_world:
  worktree_path:    ".worktrees/demo"
  feature_slug:     "agent-actions"
  iteration_budget: 5

host_handlers:
  host.run:
    by_call:
      compute-diff: { data: { ok: true, exit_code: 0, stdout: "+ feature diff" } }
      stamp-epoch:  { data: { ok: true, exit_code: 0, stdout: "1750000000" } }
      validate-1:   { data: { ok: false, exit_code: 1, stdout: "video is *.fast.mp4 (under-dwelled); canonical mp4 absent" } }
      validate-2:   { data: { ok: true,  exit_code: 0, stdout: "" } }
      qa-2:         { data: { ok: true,  exit_code: 0, stdout: "PASS" } }
      read-qa-report: { data: { ok: true, exit_code: 0, stdout: "(no failures)" } }
      demo-report:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            report_path: ".artifacts/demo-video-loop/test/report.md"
            summary_path: ".artifacts/demo-video-loop/test/summary.json"
            deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
  host.agent.task:
    by_call:
      maker-1: { data: { submitted: { summary: "fast cut (no good)", video_path: ".artifacts/tour/aa.fast.mp4", frames_dir: ".artifacts/tour/frames", chapters_path: ".artifacts/tour/aa.chapters.json", feature_md_path: ".artifacts/ui-qa/feature.md", scenarios_path: ".artifacts/ui-qa/scenarios.yaml" } } }
      maker-2: { data: { submitted: { summary: "watch-speed cut", video_path: ".artifacts/tour/aa.mp4", frames_dir: ".artifacts/tour/frames", chapters_path: ".artifacts/tour/aa.chapters.json", feature_md_path: ".artifacts/ui-qa/feature.md", scenarios_path: ".artifacts/ui-qa/scenarios.yaml" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent: { name: retry, slots: {} }
    expect_state: __exit__achieved
    expect_world:
      terminal_reason: "achieved"
      iteration:       2
      video_valid:     true
      qa_ok:           true
      maker_summary:   "watch-speed cut"
      deck_path:       ".artifacts/demo-video-loop/test/deck.slidey.json"
    expect_host_calls:
      - handler: host.agent.task
        args: { call: maker-1 }
        times: 1
      - handler: host.run
        args: { call: validate-1 }
        times: 1
      - handler: host.agent.task
        args: { call: maker-2 }
        times: 1
      - handler: host.run
        args: { call: validate-2 }
        times: 1
      - handler: host.run
        args: { call: qa-2 }
        times: 1
      # The video gate failed iteration 1, so QA never ran that turn (no qa-1).
      - handler: host.run
        args: { call: qa-1 }
        times: 0

expect_terminal: true
expect_no_errors: true
