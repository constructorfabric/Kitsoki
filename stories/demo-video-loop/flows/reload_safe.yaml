# reload_safe — re-entering generating does NOT re-run the once: setup. compute-diff
# and read-proposal carry once: true, so when their bind targets (added_diff /
# proposal_text) are already populated — as they are after a /reload, an on_error
# re-entry, or (here) a seeded resume — the engine skips them. We seed added_diff +
# proposal_text (already computed) and a last_error (so the prior turn bounced into
# the guarded error view); `retry` clears the error and re-fires on_enter. The once:
# calls are skipped (compute-diff / read-proposal times:0) while the rest of the
# turn runs fresh to a clean finish.
test_kind: flow
app: ../app.yaml
initial_state: generating
initial_world:
  worktree_path: ".worktrees/demo"
  proposal_path: "PROPOSAL.md"
  feature_slug:  "agent-actions"
  added_diff:    "+ already-computed feature diff"
  proposal_text: "Already-read proposal body."
  last_error:    "host.agent.task: transient failure on the prior turn"

host_handlers:
  host.run:
    by_call:
      # compute-diff / read-proposal are NOT stubbed: once: means they must not fire
      # (their binds are already set). stamp-epoch / validate-1 / qa-1 run fresh.
      stamp-epoch: { data: { ok: true, exit_code: 0, stdout: "1750000000" } }
      validate-1:  { data: { ok: true, exit_code: 0, stdout: "" } }
      qa-1:        { data: { ok: true, exit_code: 0, stdout: "PASS" } }
      read-qa-report: { data: { ok: true, exit_code: 0, stdout: "(no failures)" } }
      demo-report:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            report_path: ".artifacts/demo-video-loop/test/report.md"
            summary_path: ".artifacts/demo-video-loop/test/summary.json"
            deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
  host.agent.task:
    by_call:
      maker-1: { data: { submitted: { summary: "resumed cut", video_path: ".artifacts/tour/aa.mp4", frames_dir: ".artifacts/tour/frames", chapters_path: ".artifacts/tour/aa.chapters.json", feature_md_path: ".artifacts/ui-qa/feature.md", scenarios_path: ".artifacts/ui-qa/scenarios.yaml" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent: { name: retry, slots: {} }
    expect_state: __exit__achieved
    expect_world:
      terminal_reason: "achieved"
      iteration:       1
      added_diff:      "+ already-computed feature diff"
      proposal_text:   "Already-read proposal body."
      deck_path:       ".artifacts/demo-video-loop/test/deck.slidey.json"
    expect_host_calls:
      - handler: host.run
        args: { call: compute-diff }
        times: 0
      - handler: host.run
        args: { call: read-proposal }
        times: 0
      - handler: host.run
        args: { call: stamp-epoch }
        times: 1
      - handler: host.agent.task
        args: { call: maker-1 }
        times: 1
      - handler: host.run
        args: { call: validate-1 }
        times: 1
      - handler: host.run
        args: { call: qa-1 }
        times: 1

expect_terminal: true
expect_no_errors: true
