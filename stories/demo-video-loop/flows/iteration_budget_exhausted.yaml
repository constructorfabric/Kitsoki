# iteration_budget_exhausted — QA never passes, so the loop iterates to the ceiling
# (iteration_budget 2) and stops rather than running forever. The video gate passes
# each turn (validate-N ok) but the kitsoki-ui-qa gate blocks every time; on the 2nd
# iteration the budget guard wins → @exit:exhausted (terminal_reason iteration_budget).
test_kind: flow
app: ../app.yaml
initial_state: generating
initial_world:
  worktree_path:    ".worktrees/demo"
  feature_slug:     "agent-actions"
  iteration_budget: 2

host_handlers:
  host.run:
    by_call:
      compute-diff:   { data: { ok: true, exit_code: 0, stdout: "+ feature diff" } }
      stamp-epoch:    { data: { ok: true, exit_code: 0, stdout: "1750000000" } }
      validate-1:     { data: { ok: true, exit_code: 0, stdout: "" } }
      validate-2:     { data: { ok: true, exit_code: 0, stdout: "" } }
      qa-1:           { data: { ok: false, exit_code: 1, stdout: "BLOCK: still failing" } }
      qa-2:           { data: { ok: false, exit_code: 1, stdout: "BLOCK: still failing" } }
      read-qa-report: { data: { ok: true, exit_code: 0, stdout: "QA FAIL: scenario not shown." } }
      demo-report:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            report_path: ".artifacts/demo-video-loop/test/report.md"
            summary_path: ".artifacts/demo-video-loop/test/summary.json"
            deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
  host.agent.task:
    by_call:
      maker-1: { data: { submitted: { summary: "cut 1", video_path: ".artifacts/tour/aa.mp4", frames_dir: ".artifacts/tour/frames", chapters_path: ".artifacts/tour/aa.chapters.json", feature_md_path: ".artifacts/ui-qa/feature.md", scenarios_path: ".artifacts/ui-qa/scenarios.yaml" } } }
      maker-2: { data: { submitted: { summary: "cut 2", video_path: ".artifacts/tour/aa.mp4", frames_dir: ".artifacts/tour/frames", chapters_path: ".artifacts/tour/aa.chapters.json", feature_md_path: ".artifacts/ui-qa/feature.md", scenarios_path: ".artifacts/ui-qa/scenarios.yaml" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent: { name: retry, slots: {} }
    expect_state: __exit__exhausted
    expect_world:
      terminal_reason: "iteration_budget"
      iteration:       2
      deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
    expect_host_calls:
      - handler: host.agent.task
        args: { call: maker-1 }
        times: 1
      - handler: host.agent.task
        args: { call: maker-2 }
        times: 1
      - handler: host.run
        args: { call: qa-1 }
        times: 1
      - handler: host.run
        args: { call: qa-2 }
        times: 1

expect_terminal: true
expect_no_errors: true
