# cost_budget_exhausted — QA fails and the $ ceiling is breached, so the cost guard
# wins over the iteration ceiling on the first iteration. session_cost_usd (0.60 —
# the reserved engine-maintained spend, seeded to simulate prior cost; foldAgentCost
# ACCUMULATES, so the stub maker's zero-cost call leaves it intact) >= cost_budget_usd
# (0.50), so the loop stops on iteration 1 even though iteration_budget (10) is
# nowhere near hit → @exit:exhausted (terminal_reason cost_budget).
test_kind: flow
app: ../app.yaml
initial_state: generating
initial_world:
  worktree_path:    ".worktrees/demo"
  feature_slug:     "agent-actions"
  iteration_budget: 10
  cost_budget_usd:  0.50
  session_cost_usd: 0.60

host_handlers:
  host.run:
    by_call:
      compute-diff:   { data: { ok: true, exit_code: 0, stdout: "+ feature diff" } }
      stamp-epoch:    { data: { ok: true, exit_code: 0, stdout: "1750000000" } }
      validate-1:     { data: { ok: true, exit_code: 0, stdout: "" } }
      qa-1:           { data: { ok: false, exit_code: 1, stdout: "BLOCK: failing" } }
      read-qa-report: { data: { ok: true, exit_code: 0, stdout: "QA FAIL: scenario not shown." } }
      demo-report:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            report_path: ".artifacts/demo-video-loop/test/report.md"
            summary_path: ".artifacts/demo-video-loop/test/summary.json"
            deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
  host.agent.task:
    by_call:
      maker-1: { data: { submitted: { summary: "expensive cut", video_path: ".artifacts/tour/aa.mp4", frames_dir: ".artifacts/tour/frames", chapters_path: ".artifacts/tour/aa.chapters.json", feature_md_path: ".artifacts/ui-qa/feature.md", scenarios_path: ".artifacts/ui-qa/scenarios.yaml" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent: { name: retry, slots: {} }
    expect_state: __exit__exhausted
    expect_world:
      terminal_reason: "cost_budget"
      iteration:       1
      deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
    expect_host_calls:
      - handler: host.agent.task
        args: { call: maker-1 }
        times: 1
      - handler: host.run
        args: { call: validate-1 }
        times: 1
      - handler: host.run
        args: { call: qa-1 }
        times: 1
    expect_no_host_calls: []

expect_terminal: true
expect_no_errors: true
