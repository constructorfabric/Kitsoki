# happy_path — one clean loop step: the maker authors the demo, the deterministic
# video gate passes (validate-1 ok:true), to_qa auto-emits, the kitsoki-ui-qa gate
# passes (qa-1 ok:true), and the loop terminates with the goal met. One entry, no
# operator prodding — the loop advances itself. proposal_path is set so read-proposal
# runs; compute-diff + stamp-epoch run once at the top of the turn.
test_kind: flow
app: ../app.yaml
initial_state: generating
initial_world:
  worktree_path: ".worktrees/demo"
  base_ref:      "main"
  proposal_path: "PROPOSAL.md"
  feature_slug:  "agent-actions"

host_handlers:
  host.run:
    by_call:
      compute-diff:  { data: { ok: true, exit_code: 0, stdout: "+ added line of the feature diff" } }
      read-proposal: { data: { ok: true, exit_code: 0, stdout: "Demo the agent-actions drawer." } }
      stamp-epoch:   { data: { ok: true, exit_code: 0, stdout: "1750000000" } }
      validate-1:    { data: { ok: true, exit_code: 0, stdout: "" } }
      qa-1:          { data: { ok: true, exit_code: 0, stdout: "PASS" } }
      # read-qa-report is unguarded (it fires every QA turn — see qa.yaml note);
      # on a PASS its output binds qa_report but is never consumed.
      read-qa-report: { data: { ok: true, exit_code: 0, stdout: "(no failures)" } }
      demo-report:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            report_path: ".artifacts/demo-video-loop/test/report.md"
            summary_path: ".artifacts/demo-video-loop/test/summary.json"
            deck_path: ".artifacts/demo-video-loop/test/deck.slidey.json"
  host.agent.task:
    by_call:
      maker-1:
        data:
          submitted:
            summary:         "Recorded the agent-actions tour at watch-speed."
            video_path:      ".artifacts/tour/agent-actions.mp4"
            frames_dir:      ".artifacts/tour/frames"
            chapters_path:   ".artifacts/tour/agent-actions.chapters.json"
            feature_md_path: ".artifacts/ui-qa/feature.md"
            scenarios_path:  ".artifacts/ui-qa/scenarios.yaml"
  host.artifacts_dir: { data: { ok: true } }

turns:
  # The flow harness seeds the initial state with a synthetic transition that does
  # NOT fire on_enter (a render-only `look` re-renders from cache). A non-look
  # self-target into the root re-fires on_enter — `retry` is that kick (it clears
  # last_error, already empty here, harmless) and the whole autonomous loop runs in
  # one turn: compute-diff/read-proposal/stamp-epoch → maker-1 → validate-1 (ok) →
  # to_qa → qa-1 (ok) → mark_achieved → @exit:achieved.
  - intent: { name: retry, slots: {} }
    expect_state: __exit__achieved
    expect_world:
      terminal_reason: "achieved"
      iteration:       1
      video_valid:     true
      qa_ok:           true
      maker_summary:   "Recorded the agent-actions tour at watch-speed."
      video_path:      ".artifacts/tour/agent-actions.mp4"
      deck_path:       ".artifacts/demo-video-loop/test/deck.slidey.json"
    expect_host_calls:
      - handler: host.run
        args: { call: compute-diff }
        times: 1
      - handler: host.run
        args: { call: read-proposal }
        times: 1
      - handler: host.run
        args: { call: stamp-epoch }
        times: 1
      - handler: host.agent.task
        args: { call: maker-1 }
        times: 1
      - handler: host.run
        args: { call: validate-1 }
        times: 1
      - handler: host.artifacts_dir
        args: { thread: iteration-1 }
        times: 1
      - handler: host.run
        args: { call: qa-1 }
        times: 1
      - handler: host.run
        args: { call: demo-report }
        times: 1

expect_terminal: true
expect_no_errors: true
