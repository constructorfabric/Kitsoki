# merge — final merge once CI is green and review comments are resolved.
# Two substates:
#
#   merge_executing       — calls iface.vcs.merge to land the PR; binds
#                           merge_sha + sets status: "merged".
#   merge_awaiting_reply  — canonical §6 checkpoint shape; the LLM-judge
#                           gets a chance to bail on a borderline merge
#                           (e.g. last-minute review comments). Accept
#                           fires @exit:merged.
#
# This is the room that closes the loop. After @exit:merged the parent
# story typically transitions to a `done` state and possibly closes the
# upstream ticket via iface.ticket.transition.

states:

  merge_executing:
    description: "Merging the PR; proceed to advance to close-out."
    # Flattened view (choice-widget proposal §4.5).
    view:
      - kv:
          pairs:
            PR:        "{{ world.pr_id }} — {{ world.pr_title }}"
            Strategy:  "{{ world.merge_strategy }}"
            SHA:       '{{ world.merge_sha|default:"(pending)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "proceed"
              hint:   "land the merge and advance to checkpoint"
              intent: proceed
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
    relevant_world: [pr_id, pr_title, merge_strategy, merge_sha]
    on_enter:
      # once: true — merging is the most destructive external side-effect in
      # the pipeline; a /reload of merge_executing would attempt a second
      # merge. Skipped once merge_sha is bound. No re-run re-enters here.
      - invoke: iface.vcs.merge
        once: true
        with:
          pr_id:    "{{ world.pr_id }}"
          strategy: "{{ world.merge_strategy }}"
        bind:
          merge_sha: sha
        on_error: ci_monitoring
      - set:
          status: "merged"
    on:
      proceed:
        - target: merge_awaiting_reply
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  # Final checkpoint — canonical §6 shape. The LLM-judge here is
  # specifically about "did the merge actually land cleanly?", with
  # auto-fire on a high-confidence verdict. The accept arc is the
  # @exit:merged arc that closes the pipeline.
  merge_awaiting_reply:
    description: "Merge landed; awaiting close-out."
    # Flattened view (choice-widget proposal §4.5).
    view:
      - kv:
          pairs:
            PR:           "{{ world.pr_id }}"
            "Merge SHA":  '{{ world.merge_sha|default:"(unknown)" }}'
            "PR url":     '{{ world.pr_url|default:"(unknown)" }}'
            Report:       '{{ world.report_path|default:"(pending)" }}'
            Deck:         '{{ world.deck_path|default:"(pending)" }}'
      - when: "(world.llm_verdict.verdict ?? '') != ''"
        kv:
          pairs:
            Verdict:      '{{ world.llm_verdict.verdict }}'
            Confidence:   '{{ world.llm_verdict.confidence|floatformat:2 }}'
            Reason:       '{{ world.llm_verdict.reason }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "close out and exit merged"
              intent: accept
            - label:  "refine"
              hint:   "back to ci_monitoring with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what needs another pass"
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
    relevant_world: [judge_mode, pr_id, pr_url, merge_sha, llm_verdict, report_path, deck_path]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:    "{{ world.thread }}"
          title:     "PR merged: {{ world.pr_id }}"
          body:      "PR {{ world.pr_id }} merged at {{ world.merge_sha }} ({{ world.pr_url }})."
          phase_id:  "merge_{{ world.pr_id }}"
      - invoke: host.inbox.add
        with:
          kind:    checkpoint
          title:   "PR merged: {{ world.pr_id }}"
          thread:  "{{ world.thread }}"
          state:   merge_awaiting_reply
          body:    "PR {{ world.pr_id }} merged at {{ world.merge_sha }}."
      - invoke: host.run
        id: pr_refinement_report
        with:
          cmd: python3
          args:
            - "stories/pr-refinement/scripts/pr_report.py"
            - "--ticket-id"
            - "{{ world.ticket_id }}"
            - "--ticket-title"
            - "{{ world.ticket_title }}"
            - "--feature-branch"
            - "{{ world.feature_branch }}"
            - "--pr-id"
            - "{{ world.pr_id }}"
            - "--pr-url"
            - "{{ world.pr_url }}"
            - "--ci-state"
            - "{{ world.ci_state }}"
            - "--ci-failed-checks"
            - "{{ world.ci_failed_checks }}"
            - "--pr-comments"
            - "{{ world.pr_comments }}"
            - "--pending-comments"
            - "{{ world.pending_comments }}"
            - "--diagnose-artifact"
            - "{{ world.diagnose_artifact }}"
            - "--merge-sha"
            - "{{ world.merge_sha }}"
        bind:
          report_path:  "stdout_json.report_path"
          summary_path: "stdout_json.summary_path"
          deck_path:    "stdout_json.deck_path"
        on_error: merge_awaiting_reply
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        id: merge_judge
        with:
          agent: judge
          prompt: prompts/judge_merge.md
          schema: schemas/judge_verdict.json
          args:
            pr_id:      "{{ world.pr_id }}"
            merge_sha:  "{{ world.merge_sha }}"
            pr_url:     "{{ world.pr_url }}"
        bind:
          llm_verdict: submitted
        selection:
          profile: synthetic-codex
          model: syn:small:text
          effort: low
          evidence: evals/reports/merge_judge/latest.json
          fallback_profile: claude
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        # @exit:merged.requires: [pr_url] — must be set on this arc.
        # pr_url was bound in open_pr.on_enter; we re-pin it here so the
        # static check sees the requires: key on the @exit transition.
        - target: "@exit:merged"
          effects:
            - set:
                status: "merged"
                pr_url: "{{ world.pr_url }}"
      refine:
        - target: ci_monitoring
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:           "{{ world.cycle + 1 }}"
                ci_state:        "pending"
                ci_attempts:     0
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
