# diagnose — CI failure analysis. Two substates:
#
#   diagnose_executing       — runs host.oracle.ask_with_mcp with the
#                              ci_log + failed_checks; binds the
#                              diagnose_artifact (root cause + fix
#                              proposal).
#   diagnose_awaiting_reply  — canonical §6 checkpoint shape; LLM-judge
#                              may auto-accept; otherwise human reviews.
#
# Accept advances to `re_push` (apply the suggested fix). Refine
# re-executes diagnose with feedback. Quit bails.

states:

  diagnose_executing:
    description: "Diagnosing the CI failure via the oracle."
    view: |
      Diagnosing CI failure for PR {{ world.pr_id }} — {{ world.pr_title }}

      Failing checks:  {{ world.ci_failed_checks|default:"(unknown)" }}
      Last CI log:     {{ world.ci_log|default:"(none)" }}

      Diagnosis:       {{ world.diagnose_artifact.summary_title|default:"(pending)" }}
      Confidence:      {{ world.diagnose_artifact.confidence|default:0 }}

      Type `proceed` to deliver the diagnosis, `refine` to re-run,
      or `quit` to abandon.
    relevant_world: [pr_id, pr_title, ci_failed_checks, ci_log, diagnose_artifact, cycle]
    on_enter:
      - invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/diagnose_executing.md
          schema: schemas/diagnose_artifact.json
          args:
            pr_id:           "{{ world.pr_id }}"
            pr_title:        "{{ world.pr_title }}"
            failed_checks:   "{{ world.ci_failed_checks }}"
            ci_log:          "{{ world.ci_log }}"
            refine_feedback: "{{ world.refine_feedback }}"
            cycle:           "{{ world.cycle }}"
        bind:
          diagnose_artifact: submitted
        on_error: ci_monitoring
    on:
      proceed:
        - target: diagnose_awaiting_reply
      refine:
        - target: diagnose_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback }}"
                cycle:           "{{ world.cycle + 1 }}"
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  # Checkpoint — identical shape to a bugfix _awaiting_reply (contract §6).
  diagnose_awaiting_reply:
    description: "Diagnosis posted; awaiting verdict."
    view: |
      Diagnosis checkpoint — PR {{ world.pr_id }}

      {{ world.diagnose_artifact.summary_markdown|default:"(artifact pending)" }}

      Verdict slot: {{ world.llm_verdict.verdict|default:"(no LLM verdict)" }}  (confidence {{ world.llm_verdict.confidence|default:0 }})
      Reason:       {{ world.llm_verdict.reason|default:"" }}

      Reply: accept (apply fix → re_push) | refine [feedback=...] | quit
    relevant_world: [judge_mode, pr_id, diagnose_artifact, llm_verdict, cycle]
    on_enter:
      # 1. Always: post the artifact to whichever transport is bound.
      - invoke: iface.transport.post
        with:
          thread:    "{{ world.thread }}"
          title:     "CI failure diagnosis: PR {{ world.pr_id }}"
          body:      "{{ world.diagnose_artifact.summary_markdown }}"
          phase_id:  "diagnose_{{ world.pr_id }}_{{ world.cycle }}"

      # 2. Always: mirror the artifact into the local inbox.
      - invoke: host.inbox.add
        with:
          kind:    checkpoint
          title:   "CI failure diagnosis: PR {{ world.pr_id }}"
          thread:  "{{ world.thread }}"
          state:   diagnose_awaiting_reply
          body:    "{{ world.diagnose_artifact.summary_markdown }}"

      # 3. Conditionally: ask an LLM-judge.
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/judge_diagnose.md
          schema: schemas/judge_verdict.json
          args:
            pr_id:           "{{ world.pr_id }}"
            artifact_title:  "{{ world.diagnose_artifact.summary_title }}"
            artifact_body:   "{{ world.diagnose_artifact.summary_markdown }}"
        bind:
          llm_verdict: submitted

      # 4. Auto-fire the LLM's verdict above the confidence floor.
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        - target: re_push
          effects:
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0
      refine:
        - target: diagnose_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:           "{{ world.cycle + 1 }}"
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
