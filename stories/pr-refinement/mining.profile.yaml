# mining.profile.yaml — scope config for mining pr-refinement coverage from real
# Claude Code transcripts. Co-located so the story self-describes its mine.
#
# This is SCOPE CONFIGURATION, not an auto-classifier. It tells coverage_prep.py
# (1) which sessions to distill (the grep prefilter), (2) which mined intents are
# in-scope (the action tags), and (3) which rooms are CANDIDATE owners of each
# action tag — a STARTING POINT for the human/LLM map in coverage.md, never an
# assertion. The verdict (CONFORMS / DIVERGES / FIXTURE-GAP / COVERAGE-GAP /
# OUT-OF-SCOPE) is assigned by reading the room bash + the recovered outcome, not
# mechanically. See docs/stories/story-coverage-mining.md.
#
# pr-refinement is the AUTHOR-SIDE pipeline for YOUR OWN PR: open the PR, monitor
# CI, diagnose failures, resolve review comments, re-push, merge. Walks
# open_pr → ci_monitoring → diagnose → resolve_comments → re_push → merge.

story: pr-refinement

scope:
  # prep.py --grep words. RECALL-ONLY prefilter: a substring scan over the whole
  # raw jsonl, so it over-matches prose ("open up the design", "monitor progress").
  # It widens the net; the real scoping is the human read in the map.
  grep: ["open a pr", "open the pr", gh pr create, "ci failing", "ci is red", "ci passed", "checks failing", "resolve comments", "re-push", "merge the pr", "gh pr merge", "monitor ci"]
  sample: recency          # mine how we refine PRs *now*
  max: 25

  # post-filter to these action tags (vocab/tags.yaml). COARSE: commit-or-pr covers
  # opening / merging the PR and re-pushing; verify-by-running covers polling CI;
  # debug-from-error-or-trace covers diagnosing a CI failure; review-feedback covers
  # resolving review comments. They cannot separate "address MY PR" from "review a
  # teammate's PR" — the non_goals boundary below is enforced by user_text, not tag.
  action_tags: [commit-or-pr, verify-by-running, debug-from-error-or-trace, review-feedback]

# Candidate rooms per action tag — a starting point for the human map, joined into
# the coverage.md "candidate room" column by coverage_prep.py. Room ids are the
# files under stories/pr-refinement/rooms/.
owns:
  commit-or-pr:               [open_pr, re_push, merge]
  verify-by-running:          [ci_monitoring]
  debug-from-error-or-trace:  [diagnose]
  review-feedback:            [resolve_comments]

# Non-goals (stories/pr-refinement/README.md — this is author-side refinement of
# YOUR PR; it does NOT review a teammate's PR, set up the worktree/branch, or write
# the fix from scratch — the working tree is already established on entry). A
# matching intent is OUT-OF-SCOPE, not a gap. Matched against verbatim user_text,
# since the action tags above are too coarse to separate these from in-scope work.
non_goals: [review-teammate-pr, branch-or-worktree-setup, implement-feature, write-tests-from-scratch, cherry-pick, rebase-interactive]

# Marker substrings coverage_prep.py scans the verbatim user_text for to HINT that
# an in-scope-by-tag intent is actually an OUT-OF-SCOPE non_goal. A hint that
# routes the human's attention — never an automatic verdict.
non_goal_markers: ["review their pr", "review the teammate", "approve their", "request changes on", "create a worktree", "new branch", "set up a branch", "cherry-pick", "cherry pick", "rebase -i", "interactive rebase", "write the implementation"]
