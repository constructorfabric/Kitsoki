- id: propose_host_agent_decide_3
  match:
    handler: host.agent.decide
  response:
    data:
      claude_session_id: 34947afe-c2d5-4d4a-807d-510f6cb80001
      exit_code: 0.0
      ok: true
      rationale: "Submitted. Root cause: the grid-cards estimator (timing.js:330) sums `T['cards_item_'+i] ?? 30` over an unbounded card count, but the TIMING table only defines cards_item_0..5. The renderer's setState (renderer.js:129) holds `?? 20` for those un-keyed reveals. So every card beyond the 6th is estimated 10 frames too long, drifting narration. Fix: change the estimator fallback from 30 to 20 to match the renderer. Single line, plus a regression test. Confidence 0.95."
      submitted:
        affected_files:
        - src/timing.js
        - test/timing.test.js
        alternative_approaches:
        - "Add cards_item_6 / cards_item_7 (and more) keys to the TIMING table at 30 each AND change the renderer's generic fallback to 30. Keeps a per-item dwell of 30 but is a wider change touching the renderer's default and the table, and still leaves an unbounded tail (a 20-card grid would re-drift). Aligning the single fallback is minimal and bound-safe."
        - "Clamp the grid reveal count to 6 in both the estimator and the renderer. Changes visible behaviour (later cards would never get their own reveal step), so rejected."
        confidence: 0.95
        fix_description: "In `estimateScene` (src/timing.js, ~line 330), change the grid-cards per-item fallback from `?? 30` to `?? 20`:\n\n```js\n// Items beyond cards_item_5 have no table key; the renderer's setState\n// holds the generic fallback (20 frames, see renderer.js), so the estimate\n// must use the same 20 to stay in lock-step with the real reveal sequence.\nfor (let i = 0; i < n; i++) f += T[`cards_item_${i}`] ?? 20;\n```\n\nAdd a regression test in `test/timing.test.js` asserting `estimateScene` for an 8-item grid equals the renderer-true total."
        reasoning: "The estimator and renderer share an explicit lock-step contract (the NOTE above estimateScene). The renderer's per-step hold is `TIMING[stepName] ?? 20`; the only place the estimator disagrees is the grid-cards fallback `?? 30`. Aligning it to 20 makes the two agree for any card count, is a one-line change, and cannot regress the in-table path (cards_item_0..5 keep their table values)."
        root_cause: "`estimateScene` sums per-item reveal frames as `T['cards_item_'+i] ?? 30` for grid `cards`, but the TIMING table only defines cards_item_0..cards_item_5. For items 6+ the 30-frame fallback is used. The renderer holds `TIMING[stepName] ?? 20` (renderer.js:129) for those same un-keyed reveals, so each over-the-table card is estimated 10 frames too long and narration drifts."
        summary_markdown: "## Bug\n\nGrid `cards` scenes with more than 6 items desync their narration: the frame estimator over-counts each card beyond `cards_item_5` by 10 frames (uses a 30-frame fallback where the renderer holds 20).\n\n## Root Cause\n\n`src/timing.js:330` — `T['cards_item_'+i] ?? 30` disagrees with the renderer's `TIMING[stepName] ?? 20` (`src/renderer.js:129`) for items the TIMING table doesn't key (cards_item_6+).\n\n## Fix\n\nChange the estimator's grid-cards fallback from `?? 30` to `?? 20` so it matches the renderer for any card count. Add a regression test computing the renderer-true total for an 8-item grid.\n\n## Files\n\n- `src/timing.js` — one-line fallback change + comment\n- `test/timing.test.js` — regression test\n\n## Confidence\n\n0.95 — the disagreement is unambiguous and the fix is the minimal reconciliation of two fallbacks that share a documented lock-step contract."
        summary_title: 'Fix slidey-128: align grid cards estimator fallback (30→20) with the renderer per-item hold'
- id: done_host_agent_decide_33
  match:
    handler: host.agent.decide
  response:
    data:
      claude_session_id: b81feed0-7a77-4ae4-a155-60d5dfb00005
      exit_code: 0.0
      ok: true
      rationale: "Done. The done_artifact captures: the bug was a fallback mismatch between the frame estimator (??30) and the renderer (??20) for grid cards beyond cards_item_5, silently drifting narration on >6-item grids. The fix aligns the single fallback to 20 and adds an 8-item regression test. 0 refinement cycles."
      submitted:
        lessons:
        - category: failure-patterns
          description: "When two code paths must produce identical numbers (an estimator and the thing it estimates), every shared default/fallback value must be literally identical — not just 'close'. A divergent fallback (30 vs 20) is invisible until the input range that exercises the un-keyed tail (here, >6 grid cards) appears in a real deck."
          phase: reproducing
          severity: high
        - category: test-patterns
          description: "Lock-step invariants between two modules should be tested by computing one side's result FROM the other side's rule, not by hard-coding an expected constant. The regression derives the renderer-true total via `TIMING['cards_item_'+i] ?? 20` and asserts the estimator matches — so it stays correct even if the table grows."
          phase: testing
          severity: medium
        - category: api-patterns
          description: "An unbounded index into a sparse lookup table (cards_item_0..5 but n = card count) is a latent drift source. Prefer either a bounded reveal count or a single shared fallback so the over-the-table tail is well-defined on both sides."
          phase: proposing
          severity: medium
        metrics:
          checkpoint_comments: 0.0
          cycles: 0.0
        summary_markdown: "## Bug\n\nslidey lays narration audio against the per-scene frame boundaries produced by `estimateScene` (`src/timing.js`). For a grid `cards` scene the estimator sums `T['cards_item_'+i] ?? 30` over every card, but the TIMING table only defines `cards_item_0`…`cards_item_5`. The renderer holds `TIMING[stepName] ?? 20` (`src/renderer.js:129`) for those same un-keyed reveals. So every card beyond the 6th was estimated 10 frames too long, and a deck with a 7+ item grid drifted its narration out of sync.\n\n## Fix\n\nCommit `19c8798` changes the estimator's grid-cards fallback from `?? 30` to `?? 20`, matching the renderer for any card count. In-table grids (≤6 cards) and every other scene type are untouched.\n\n## Test coverage added\n\n- **`cards grid item reveals match the renderer per-item hold beyond the table`** — primary regression: for an 8-item grid, asserts `estimateScene` equals the renderer-true total (one `cards_item_<i>` reveal per card, each `?? 20`). RED before (484 vs 464), GREEN after.\n\n## Outcome\n\nWhole suite: 94 passed, 0 failed, 3 skipped (pre-existing). The targeted timing suite is 19/19. Zero refinement cycles — correct on the first attempt."
        summary_title: 'slidey-128: grid cards narration drift fixed via estimator/renderer fallback alignment'
