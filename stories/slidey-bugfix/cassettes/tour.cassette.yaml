- id: reproduce_host_agent_task_1
  match:
    handler: host.agent.task
  response:
    data:
      files_changed:
      - test/timing.test.js
      final_diff: "diff --git a/test/timing.test.js b/test/timing.test.js\nindex 5363cc8..79dc093 100644\n--- a/test/timing.test.js\n+++ b/test/timing.test.js\n@@ -91,6 +91,22 @@ test('cards grid variant reveals one item per card', () => {\n     + TIMING.cards_hold + TIMING.inter_scene);\n });\n \n+// Regression: the estimator's per-item reveal cost MUST match what the renderer\n+// actually holds (renderer.js setState: `TIMING[stepName] ?? 20`). A grid cards\n+// scene with more items than the table has `cards_item_N` keys (0..5) used to\n+// drift — the renderer held the generic fallback (20 frames) for cards_item_6+,\n+// while the estimator counted 30. estimateScene must stay in lock-step with the\n+// real reveal sequence, so narration timing for >6-item grids stays exact.\n+test('cards grid item reveals match the renderer per-item hold beyond the table', () => {\n+  const eight = [{}, {}, {}, {}, {}, {}, {}, {}];\n+  const f = estimateScene({ type: 'cards', cards: eight });\n+  // Mirror the renderer: one cards_item_<i> setState per card, each holding\n+  // TIMING['cards_item_'+i] ?? 20 frames (the renderer's generic fallback).\n+  let reveal = 0;\n+  for (let i = 0; i < eight.length; i++) reveal += TIMING[`cards_item_${i}`] ?? 20;\n+  assert.equal(f, reveal + TIMING.cards_hold + TIMING.inter_scene);\n+});\n+\n test('table clamps revealed rows to MAX_ROWS (8)', () => {\n"
      replay_mode: file_diff
      submitted:
        actual_outcome: "For a grid `cards` scene with 8 items, estimateScene() returns 484 frames while the renderer actually emits 464. The renderer's setState holds TIMING[stepName] ?? 20 (renderer.js:129) for the un-keyed cards_item_6 / cards_item_7 reveals; the estimator (timing.js:330) used ?? 30. The 20-frame overcount per >6-item grid silently desyncs narration audio against the rendered frames."
        bug_verified: true
        environment_check:
          notes: "Reproduction is a pure unit test against the timing estimator; no Puppeteer/ffmpeg render needed. node --test test/timing.test.js runs offline against the worktree source."
        evidence_paths:
        - test/timing.test.js
        - src/timing.js
        - src/renderer.js
        expected_outcome: "estimateScene() for an N-item grid `cards` scene equals the renderer's true frame total: one cards_item_<i> reveal per card, each holding TIMING['cards_item_'+i] ?? 20 frames — the same generic fallback the renderer uses for items beyond cards_item_5."
        involved_components:
        - name: timing.estimateScene
          reason: "src/timing.js:330 sums per-item reveal frames as T[`cards_item_${i}`] ?? 30 for grid variants, with n = (scene.cards||[]).length (unbounded). The table only defines cards_item_0..cards_item_5, so items 6+ fall to the 30 fallback."
        - name: renderer.setState
          reason: "src/renderer.js:129 holds frames = TIMING[stepName] ?? 20 for each reveal step. cards_item_6+ are not in the table, so the renderer holds 20 — not 30. The estimator and renderer must stay in lock-step (timing.js's own NOTE)."
        - name: cards scene
          reason: "src/scenes/cards.js:77 iterates itemCount(scene) reveals; for grid variants that is the full (unbounded) card count, so a deck with a 7+ item grid triggers the drift."
        steps:
        - cd .worktrees/bf-slidey-128
        - 'Add a regression test asserting estimateScene matches the renderer per-item hold for an 8-item grid.'
        - 'Run: node --test test/timing.test.js'
        - Observe the new test fails with "484 == 464" — the estimator overcounts by 20 frames (10 per item beyond cards_item_5).
        summary_markdown: "## Bug Verified: slidey-128 — grid `cards` scenes with >6 items desync narration\n\n### What is broken\n\nThe frame estimator (`estimateScene` in `src/timing.js`) and the real renderer (`src/renderer.js`) must produce the **same** frame total per scene — `timing.js`'s own NOTE says they must stay in lock-step, because narration audio is laid against the estimated boundaries.\n\nFor a grid `cards` scene the estimator sums `T['cards_item_'+i] ?? 30` over every card (`src/timing.js:330`). The TIMING table only defines `cards_item_0` … `cards_item_5`. So for the 7th card onward the estimator uses the **30**-frame fallback.\n\nThe renderer, however, holds `TIMING[stepName] ?? 20` per reveal step (`src/renderer.js:129`) — a **20**-frame generic fallback. For every card beyond `cards_item_5` the estimate is **10 frames too long**, so a deck with an 8-item grid drifts 20 frames (~0.67 s @ 30 fps) and the narration slips out of sync.\n\n### Root cause location\n\n`src/timing.js`, line 330:\n\n```js\nfor (let i = 0; i < n; i++) f += T[`cards_item_${i}`] ?? 30;\n```\n\nThe `?? 30` fallback disagrees with the renderer's `?? 20`.\n\n### How it was reproduced\n\nA deterministic unit test was added to `test/timing.test.js` that computes the renderer-true total (one `cards_item_<i>` reveal per card, each `TIMING['cards_item_'+i] ?? 20`) for an 8-item grid and asserts `estimateScene` equals it. It fails:\n\n```\nnot ok 11 - cards grid item reveals match the renderer per-item hold beyond the table\n  expected: 464\n  actual:   484\n```\n\nThe 20-frame gap is exactly the two over-counted cards (`cards_item_6`, `cards_item_7`) at 10 frames each.\n"
        summary_title: 'slidey-128 CONFIRMED: grid cards estimator over-counts items beyond cards_item_5 by 10 frames each'
      task_trace_id: a1f07e13-7076-4ee0-8192-62bea54f0001
- id: implement_host_agent_task_7
  match:
    handler: host.agent.task
  response:
    data:
      files_changed:
      - src/timing.js
      - test/timing.test.js
      final_diff: "diff --git a/src/timing.js b/src/timing.js\nindex 484455b..9be168b 100644\n--- a/src/timing.js\n+++ b/src/timing.js\n@@ -327,7 +327,11 @@ function estimateScene(scene, opts = {}) {\n       const n = (v === 'qa' || twoCol) ? 2 : (scene.cards || []).length;\n       let f = 0;\n       if (scene.title) f += T.cards_title;\n-      for (let i = 0; i < n; i++) f += T[`cards_item_${i}`] ?? 30;\n+      // Items beyond cards_item_5 have no table key; the renderer's setState\n+      // holds the generic fallback (20 frames, see renderer.js), so the estimate\n+      // must use the same 20 to stay in lock-step with the real reveal sequence\n+      // for >6-item grids (otherwise narration desyncs by 10f per extra card).\n+      for (let i = 0; i < n; i++) f += T[`cards_item_${i}`] ?? 20;\n       if (scene.caption) f += T.cards_caption;\n       f += scene.hold ?? T.cards_hold ?? T.thread_hold;\n       f += T.inter_scene;\ndiff --git a/test/timing.test.js b/test/timing.test.js\nindex 5363cc8..79dc093 100644\n--- a/test/timing.test.js\n+++ b/test/timing.test.js\n@@ -91,6 +91,22 @@ test('cards grid variant reveals one item per card', () => {\n     + TIMING.cards_hold + TIMING.inter_scene);\n });\n \n+test('cards grid item reveals match the renderer per-item hold beyond the table', () => {\n+  const eight = [{}, {}, {}, {}, {}, {}, {}, {}];\n+  const f = estimateScene({ type: 'cards', cards: eight });\n+  let reveal = 0;\n+  for (let i = 0; i < eight.length; i++) reveal += TIMING[`cards_item_${i}`] ?? 20;\n+  assert.equal(f, reveal + TIMING.cards_hold + TIMING.inter_scene);\n+});\n+\n test('table clamps revealed rows to MAX_ROWS (8)', () => {\n"
      replay_mode: file_diff
      submitted:
        applied: true
        files_changed:
        - src/timing.js
        - test/timing.test.js
        notes: "Single-line behavioural change plus the guarding regression test. The in-table cards (0..5) are unaffected — only the overflow fallback changes from 30 to 20 to match the renderer."
        summary_markdown: "## Changes applied\n\n### 1. `src/timing.js` — align the grid-cards overflow fallback (line 330)\n\nChanged the estimator's per-item fallback from `?? 30` to `?? 20` so items beyond `cards_item_5` are estimated with the **same** 20-frame generic hold the renderer's `setState` uses (`src/renderer.js:129`). A comment documents the lock-step contract.\n\n### 2. `test/timing.test.js` — regression test\n\nAdded `cards grid item reveals match the renderer per-item hold beyond the table`: for an 8-item grid it computes the renderer-true total and asserts `estimateScene` equals it. RED before the fix (484 vs 464), GREEN after.\n\nThe minimal fix touches exactly the one disagreeing fallback; in-table grids (≤6 cards) and all other scene types are untouched."
        summary_title: 'slidey-128: align grid cards estimator fallback (30→20) with the renderer per-item hold'
      task_trace_id: b2d6e73e-6fea-41f0-ab98-399f8b9a0002
