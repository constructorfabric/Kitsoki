# decomposition — `cpt plan --task <PRD>` reduces the PRD into a phase
# plan under .plans/<slug>/phase-NN-*.md.  Produces the
# `decomposition_artifact`: { plan_path, phase_count }.  feature_count is
# extracted from the artifact so the feature room knows when to stop.
#
# This room is shorter than the artifact rooms because cpt plan does not
# have a separate semantic-validate step today — the plan files ARE the
# output and the LLM-judge prompt reads the phase listing as its
# verdict input.
#
# Views flattened from extends:"base" + blocks because choice-widget
# proposal §4.5 / §8 forbids `choice:` inside blocks.

states:

  decomposition_executing:
    description: "Decomposing the PRD via cpt plan."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.feature_slug|default:"(no feature)" }} ({{ world.feature_index }}/{{ world.feature_count }})  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "{{ state.description }}"
      - kv:
          pairs:
            "Parent PRD":  '{{ world.prd_artifact.id|default:"(unknown)" }}'
            "Plan path":   '{{ world.decomposition_artifact.plan_path|default:"(pending)" }}'
            "Phase count": '{{ world.decomposition_artifact.phase_count|default:0 }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "proceed"
              hint:   "deliver the plan to the checkpoint"
              intent: proceed
            - label:  "refine"
              hint:   "re-run cpt plan with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
                required:    false
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              intent: look
    relevant_world: [prd_artifact, decomposition_artifact, feature_count, cycle]
    on_enter:
      # once: skips re-running cpt plan on /reload or self re-entry once
      # the decomposition_artifact OBJECT is set.  The object is the real
      # gate: feature_count is an int (a real 0 reads as "set", so it can
      # never gate on its own), but allBindTargetsSet requires EVERY bind
      # target set — and the object defaults to {} (unset) on first entry,
      # so the whole invoke runs.  refine clears the object to force a re-run.
      - invoke: iface.artifact.decompose
        once: true
        with:
          id:      "{{ world.prd_artifact.id }}"
          workdir: "{{ world.workdir }}"
        bind:
          decomposition_artifact: artifact
          # Also bind the scalar phase_count so the feature room's
          # `when:` predicate can compare feature_index < feature_count
          # without indexing back into the artifact object.  Wave 1's
          # bind: lands at orchestrator-dispatch time, post-bind, so
          # downstream effects in the same on_enter still see the prior
          # world; binding to a scalar slot here is the simplest fix.
          feature_count: phase_count
        on_error: design_awaiting_reply
    on:
      proceed:
        - target: decomposition_awaiting_reply
      refine:
        - target: decomposition_executing
          effects:
            - set:
                refine_feedback:        "{{ slots.feedback }}"
                cycle:                  "{{ world.cycle + 1 }}"
                # Clear the once: cache (the OBJECT gate) to re-run cpt plan.
                decomposition_artifact: {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  decomposition_awaiting_reply:
    description: "Decomposition plan posted; awaiting verdict."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.feature_slug|default:"(no feature)" }} ({{ world.feature_index }}/{{ world.feature_count }})  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "{{ state.description }}"
      - kv:
          pairs:
            Ticket:        "{{ world.ticket_id }}"
            "Plan path":   '{{ world.decomposition_artifact.plan_path|default:"(none)" }}'
            "Phase count": "{{ world.feature_count }}"
      - when: "(world.llm_verdict.verdict ?? '') != ''"
        kv:
          pairs:
            Verdict:       '{{ world.llm_verdict.verdict }}'
            Confidence:    '{{ world.llm_verdict.confidence|floatformat:2 }}'
            Reason:        '{{ world.llm_verdict.reason }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "advance to the first feature"
              intent: accept
            - label:  "refine"
              hint:   "bounce back to decomposition_executing with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
                required:    false
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              intent: look
    relevant_world: [judge_mode, ticket_id, decomposition_artifact, feature_count, llm_verdict, cycle]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:   "{{ world.thread }}"
          title:    "Decomposition: {{ world.ticket_id }}"
          body:     "Plan path: {{ world.decomposition_artifact.plan_path }}\nPhase count: {{ world.feature_count }}"
          phase_id: "decomposition_{{ world.ticket_id }}_{{ world.cycle }}"
      - invoke: host.inbox.add
        with:
          kind:   checkpoint
          title:  "Decomposition: {{ world.ticket_id }}"
          thread: "{{ world.thread }}"
          state:  decomposition_awaiting_reply
          body:   "Plan path: {{ world.decomposition_artifact.plan_path }}, {{ world.feature_count }} phases."
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        with:
          agent: judge
          prompt: prompts/judge_decomposition.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:    "{{ world.ticket_id }}"
            plan_path:    "{{ world.decomposition_artifact.plan_path }}"
            phase_count:  "{{ world.feature_count }}"
        bind:
          llm_verdict: submitted
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        - target: feature_executing
          effects:
            - set:
                feature_index:     0
                refine_feedback:   ""
                cycle:             0
                last_reply_author: "{{ slots.author ?? 'human' }}"
      refine:
        - target: decomposition_executing
          effects:
            - set:
                refine_feedback:        "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:                  "{{ world.cycle + 1 }}"
                # Clear the once: cache (the OBJECT gate) to re-run cpt plan.
                decomposition_artifact: {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
