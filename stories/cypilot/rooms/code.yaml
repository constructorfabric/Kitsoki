# code — per-feature implementation pass.  Produces the `code_artifact`,
# which carries pr_title / pr_body fields for the pr-refinement handoff.
#
# Per proposal §3 the code room is one room per feature; in v1 we run it
# once at the end of the feature chain (the LLM agent's actual code-write
# work happens via iface.artifact.create + host.run rather than per-phase).
# That's a simplification — v2 may parallelise.
#
# Views flattened from extends:"base" + blocks because choice-widget
# proposal §4.5 / §8 forbids `choice:` inside blocks.

states:

  code_executing:
    description: "Generating code for {{ world.feature_slug }}."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.feature_slug|default:"(no feature)" }} ({{ world.feature_index }}/{{ world.feature_count }})  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "{{ state.description }}"
      - kv:
          pairs:
            Ticket:          "{{ world.ticket_id }} — {{ world.ticket_title }}"
            "Feature slug":  "{{ world.feature_slug }}"
            Workdir:         '{{ world.workdir|default:"(none)" }}'
            "Code artifact": '{{ world.code_artifact.summary_title|default:"(pending)" }}'
            "Tests passed":  '{{ world.code_artifact.tests_passed|default:0 }}'
            "Tests failed":  '{{ world.code_artifact.tests_failed|default:0 }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "proceed"
              hint:   "deliver the patch to the final checkpoint"
              intent: proceed
            - label:  "refine"
              hint:   "re-run cpt generate with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
                required:    false
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              intent: look
    relevant_world: [ticket_id, ticket_title, feature_slug, workdir, code_artifact, cycle]
    on_enter:
      # once: skips the (expensive) code generation on /reload or self
      # re-entry once code_artifact is set; refine clears it to regenerate.
      - invoke: iface.artifact.create
        once: true
        with:
          kind:      "code"
          title:     "Code for {{ world.ticket_title }}"
          slug:      "{{ world.feature_slug }}"
          parent_id: "{{ world.feature_artifact.id }}"
          workdir:   "{{ world.workdir }}"
        bind:
          code_artifact: artifact
        on_error: feature_awaiting_reply
      # Run a local test pass against the generated patch.  Left WITHOUT
      # once: deliberately — re-running tests is cheap/read-ish and we want
      # a fresh pass on every re-entry.  Non-zero exit
      # is NOT fatal — the judge prompt at the checkpoint reads
      # world.code_artifact.tests_failed and decides whether to refine.
      - invoke: iface.ci.run_tests
        with:
          workdir: "{{ world.workdir }}"
          target:  "default"
        bind:
          validate_ok:     ok
          validate_report: log
    on:
      proceed:
        - target: code_awaiting_reply
      refine:
        - target: code_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback }}"
                cycle:           "{{ world.cycle + 1 }}"
                # Clear the once: cache so re-entry regenerates the code
                # artifact (ci.run_tests is not once:, so it re-runs anyway).
                code_artifact:   {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  code_awaiting_reply:
    description: "Code artifact posted; awaiting final verdict."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.feature_slug|default:"(no feature)" }} ({{ world.feature_index }}/{{ world.feature_count }})  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "{{ state.description }}"
      - kv:
          pairs:
            Ticket:         "{{ world.ticket_id }}"
            "Tests passed": '{{ world.code_artifact.tests_passed|default:0 }}'
            "Tests failed": '{{ world.code_artifact.tests_failed|default:0 }}'
      - when: "(world.llm_verdict.verdict ?? '') != ''"
        kv:
          pairs:
            Verdict:        '{{ world.llm_verdict.verdict }}'
            Confidence:     '{{ world.llm_verdict.confidence|floatformat:2 }}'
            Reason:         '{{ world.llm_verdict.reason }}'
      - heading: "Artifact"
      - code: '{{ world.code_artifact.summary_markdown|default:"(artifact pending)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "hand off to pr-refinement"
              intent: accept
            - label:  "refine"
              hint:   "bounce back to code_executing with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
                required:    false
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              intent: look
    relevant_world: [judge_mode, ticket_id, code_artifact, validate_ok, validate_report, llm_verdict, cycle]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:   "{{ world.thread }}"
          title:    "Code ready: {{ world.ticket_id }}"
          body:     "{{ world.code_artifact.summary_markdown }}"
          phase_id: "code_{{ world.ticket_id }}_{{ world.cycle }}"
      - invoke: host.inbox.add
        with:
          kind:   checkpoint
          title:  "Code ready: {{ world.ticket_id }}"
          thread: "{{ world.thread }}"
          state:  code_awaiting_reply
          body:   "{{ world.code_artifact.summary_markdown }}"
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        with:
          agent: judge
          prompt: prompts/judge_code.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_id:     "{{ world.code_artifact.id }}"
            artifact_title:  "{{ world.code_artifact.summary_title }}"
            tests_failed:    "{{ world.code_artifact.tests_failed ?? 0 }}"
            validate_report: "{{ world.validate_report }}"
        bind:
          llm_verdict: submitted
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        # @exit:code_ready.requires: [code_artifact] — enforced at load.
        # Project pr_title / pr_body from the code artifact for the
        # parent story's pr-refinement handoff.
        - target: "@exit:code_ready"
          effects:
            - set:
                status:       "shipped"
                code_artifact: "{{ world.code_artifact }}"
                pr_title:     "{{ world.code_artifact.pr_title }}"
                pr_body:      "{{ world.code_artifact.pr_body }}"
      refine:
        - target: code_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:           "{{ world.cycle + 1 }}"
                # Clear the once: cache so re-entry regenerates the code
                # artifact (ci.run_tests is not once:, so it re-runs anyway).
                code_artifact:   {}
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
