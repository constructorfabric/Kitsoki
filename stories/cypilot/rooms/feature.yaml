# feature — one feature artifact per decomposed phase.  Walked N times for
# N phases.  The `feature_index` counter advances each accept loop; when
# feature_index == feature_count - 1 the accept transitions to
# code_executing for the final implementation pass.
#
# The room is structurally one room — both interactive operator and
# autonomous-mode walk the same `_executing` → `_awaiting_reply` cycle for
# each phase.  This is the cleanest mapping of proposal §3's "one room,
# walked N times for N features."
#
# Views flattened from extends:"base" + blocks because choice-widget
# proposal §4.5 / §8 forbids `choice:` inside blocks.

states:

  feature_executing:
    description: "Producing feature artifact for phase {{ world.feature_index }}."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.feature_slug|default:"(no feature)" }} ({{ world.feature_index }}/{{ world.feature_count }})  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "{{ state.description }}"
      - kv:
          pairs:
            Ticket:         "{{ world.ticket_id }}"
            "Feature slug": "{{ world.feature_slug }}"
            Phase:          "{{ world.feature_index }}/{{ world.feature_count }}"
            "Feature id":   '{{ world.feature_artifact.id|default:"(pending)" }}'
            "Validate ok":  "{{ world.validate_ok }}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "proceed"
              hint:   "deliver the feature to the checkpoint"
              intent: proceed
            - label:  "refine"
              hint:   "re-run cpt generate with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
                required:    false
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              intent: look
    relevant_world: [ticket_id, feature_slug, feature_index, feature_count, feature_artifact, validate_ok, validate_report, cycle]
    on_enter:
      # once: skips re-create once feature_artifact is set.  This room is
      # walked N times (feature_index++); BOTH the refine arc AND the
      # next_feature/accept-with-more-phases arc clear feature_artifact so
      # feature N+1 generates its own artifact rather than skipping and
      # rendering feature N's.
      - invoke: iface.artifact.create
        once: true
        with:
          kind:      "feature"
          # Templates render once per `{{ ... }}` block; the runtime
          # interpolates them as substrings of the surrounding literal
          # text.  Multiple blocks in one string just concatenate.
          title:     "Feature {{ world.feature_index }} for {{ world.ticket_title }}"
          slug:      "{{ world.feature_slug }}"
          parent_id: "{{ world.prd_artifact.id }}"
          workdir:   "{{ world.workdir }}"
        bind:
          feature_artifact: artifact
        on_error: decomposition_awaiting_reply
      # once: keyed off the string validate_report (validate_ok is a bool —
      # unsafe cache key); the same clears that reset feature_artifact also
      # reset validate_report so the next feature re-validates.
      - invoke: iface.artifact.validate
        once: true
        with:
          id:      "{{ world.feature_artifact.id }}"
          mode:    "semantic"
          workdir: "{{ world.workdir }}"
        bind:
          validate_report: report
          validate_ok:     ok
    on:
      proceed:
        - target: feature_awaiting_reply
      refine:
        - target: feature_executing
          effects:
            - set:
                refine_feedback:  "{{ slots.feedback }}"
                cycle:            "{{ world.cycle + 1 }}"
                # Clear the once: caches so re-entry regenerates + re-validates.
                feature_artifact: {}
                validate_report:  ""
                validate_ok:      false
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  feature_awaiting_reply:
    description: "Feature artifact posted; awaiting verdict."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.feature_slug|default:"(no feature)" }} ({{ world.feature_index }}/{{ world.feature_count }})  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "{{ state.description }}"
      - kv:
          pairs:
            Phase:         "{{ world.feature_index }}/{{ world.feature_count }}"
            Feature:       '{{ world.feature_artifact.summary_title|default:world.feature_artifact.id|default:"(unknown)" }}'
            "Validate ok": "{{ world.validate_ok }}"
      - when: "(world.llm_verdict.verdict ?? '') != ''"
        kv:
          pairs:
            Verdict:       '{{ world.llm_verdict.verdict }}'
            Confidence:    '{{ world.llm_verdict.confidence|floatformat:2 }}'
            Reason:        '{{ world.llm_verdict.reason }}'
      - heading: "Report"
      - code: '{{ world.validate_report|default:"(no report)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "advance to the next feature, or to CODE on the last phase"
              intent: accept
            - label:  "next_feature"
              hint:   "explicit alias of accept"
              intent: next_feature
            - label:  "refine"
              hint:   "bounce back to feature_executing with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
                required:    false
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              intent: look
    relevant_world: [judge_mode, ticket_id, feature_artifact, feature_index, feature_count, validate_ok, validate_report, llm_verdict, cycle]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:   "{{ world.thread }}"
          title:    "Feature {{ world.feature_index }}/{{ world.feature_count }}: {{ world.ticket_id }}"
          body:     "{{ world.feature_artifact.summary_markdown ?? world.validate_report }}"
          phase_id: "feature_{{ world.ticket_id }}_{{ world.feature_index }}_{{ world.cycle }}"
      - invoke: host.inbox.add
        with:
          kind:   checkpoint
          title:  "Feature {{ world.feature_index }}/{{ world.feature_count }}: {{ world.ticket_id }}"
          thread: "{{ world.thread }}"
          state:  feature_awaiting_reply
          body:   "{{ world.feature_artifact.summary_markdown ?? world.validate_report }}"
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        with:
          agent: judge
          prompt: prompts/judge_feature.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_id:     "{{ world.feature_artifact.id }}"
            phase:           "{{ world.feature_index }}"
            validate_ok:     "{{ world.validate_ok }}"
            validate_report: "{{ world.validate_report }}"
        bind:
          llm_verdict: submitted
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      # Accept arc — branches on whether more features remain.  When
      # feature_index + 1 < feature_count we cycle back to
      # feature_executing with feature_index incremented.  When it's the
      # last phase we transition straight into code_executing.
      accept:
        - when: "(world.feature_index + 1) < world.feature_count"
          target: feature_executing
          effects:
            - set:
                feature_index:     "{{ world.feature_index + 1 }}"
                refine_feedback:   ""
                cycle:             0
                last_reply_author: "{{ slots.author ?? 'human' }}"
                # CRITICAL non-refine clear: feature_executing's create +
                # validate are once:.  Without clearing these, feature N+1
                # would skip generation and render feature N's artifact.
                feature_artifact:  {}
                validate_report:   ""
                validate_ok:       false
        - target: code_executing
          effects:
            - set:
                refine_feedback:   ""
                cycle:             0
                last_reply_author: "{{ slots.author ?? 'human' }}"
      next_feature:
        - when: "(world.feature_index + 1) < world.feature_count"
          target: feature_executing
          effects:
            - set:
                feature_index:     "{{ world.feature_index + 1 }}"
                refine_feedback:   ""
                cycle:             0
                # CRITICAL non-refine clear: see accept arc above — feature
                # N+1 must regenerate, not inherit feature N's once: cache.
                feature_artifact:  {}
                validate_report:   ""
                validate_ok:       false
        - target: code_executing
          effects:
            - set:
                refine_feedback:   ""
                cycle:             0
      refine:
        - target: feature_executing
          effects:
            - set:
                refine_feedback:  "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:            "{{ world.cycle + 1 }}"
                # Clear the once: caches so re-entry regenerates + re-validates.
                feature_artifact: {}
                validate_report:  ""
                validate_ok:      false
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
