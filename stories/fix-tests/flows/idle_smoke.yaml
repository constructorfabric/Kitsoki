# idle_smoke — verify the fix-tests app loads and the idle room responds.
#
# The pipeline rooms use background jobs (host.run, host.agent.task) which
# require advance_clock to drain. This fixture tests only the idle state —
# the entry point before a `start` kick — to verify the app structure is
# valid without needing a background-job rig.

test_kind: flow
app: ../app.yaml
initial_state: idle

turns:
  - intent: { name: look, slots: {} }
    expect_state: idle

expect_no_errors: true
