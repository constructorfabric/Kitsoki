# mining.profile.yaml — scope config for mining fix-tests coverage from real
# Claude Code transcripts. Co-located so the story self-describes its mine.
#
# SCOPE CONFIGURATION, not an auto-classifier. It tells coverage_prep.py
# (1) which sessions to distill (the grep prefilter), (2) which mined intents are
# in-scope (the action tags), and (3) which rooms are CANDIDATE owners of each
# action tag — a STARTING POINT for the human/LLM map in coverage.md, never an
# assertion. The verdict (CONFORMS / DIVERGES / FIXTURE-GAP / COVERAGE-GAP /
# OUT-OF-SCOPE) is assigned by reading the room bash + the recovered outcome, not
# mechanically. See docs/stories/story-coverage-mining.md.

story: fix-tests

scope:
  # prep.py --grep words. RECALL-ONLY prefilter: a substring scan over the whole
  # raw jsonl, so it over-matches prose. It widens the net; the real scoping is
  # the human read in the map. The story is the run → fix → re-run test loop.
  grep: ["failing test", "test failure", "tests are red", "make test", "go test", "fix the test", "re-run the test", "test suite", "FAIL", "assertion"]
  sample: recency          # mine how we fix failing tests *now*
  max: 25

  # post-filter to these action tags (vocab/tags.yaml). The single pipeline room
  # runs the suite, has the fixer apply the minimal fix, re-runs to confirm, then
  # writes a report — so these three tags cover its whole surface.
  action_tags: [fix-failing-tests, verify-by-running, write-docs]

# Candidate rooms per action tag — a starting point for the human map, joined into
# the coverage.md "candidate room" column by coverage_prep.py. Room ids are the
# files under stories/fix-tests/rooms/ (this story has a single pipeline room).
owns:
  fix-failing-tests:  [pipeline]
  verify-by-running:  [pipeline]
  write-docs:         [pipeline]

# v1 non-goals (stories/fix-tests/README.md). The fixer is forbidden from
# weakening tests, touching git, or making network calls; it stops and ASKS on a
# real product/architecture decision rather than guessing. It is not importable
# and is not a general bug-fix pipeline. A matching intent is OUT-OF-SCOPE.
non_goals: [weaken-or-delete-tests, git-commit-or-push, network-calls, product-architecture-decision, fix-non-test-bug]

# Marker substrings coverage_prep.py scans the verbatim user_text for to HINT that
# an in-scope-by-tag intent is actually an OUT-OF-SCOPE non_goal. A hint that
# routes the human's attention — never an automatic verdict.
non_goal_markers: ["delete the test", "remove the test", "skip the test", "weaken the test", "git commit", "git push", "commit the fix", "open a pr", "needs a decision", "design decision", "architecture decision"]
