app:
  id: fix-tests
  version: 0.1.0
  title: "Auto-fix failing tests"
  author: "kitsoki"
  license: "CC0"

# A self-driving, operator-facing maintenance pipeline:
#
#   idle --start--> running --(red)--> fixing --> verifying --(red, retry)--> fixing
#                      |                                |
#                   (green)                          (green)
#                      v                                v
#                  done_clean <------------------- done_clean
#
#   fixing --(fixer needs a human decision)--> blocked
#   verifying --(still red after max_cycles)--> done_exhausted
#
# Every room auto-advances via a synthetic `route` intent emitted from
# on_enter (post-bind), so `kitsoki session continue --intent start`
# walks the whole pipeline to a terminal state in one turn — no human in
# the loop. The fixer is an agentic `host.oracle.task` pinned to
# claude-sonnet-4-6 (which execs `claude -p --model sonnet`).
#
# Depth note: the synthetic emit_intent chain is depth-capped at 8. The
# worst path (max_cycles=3, always-red) emits `route` 7 times, so the
# default max_cycles MUST stay <= 3. Raising it requires raising the
# engine cap.

hosts:
  - host.run
  - host.oracle.task
  - host.inbox.add

# The fixer persona. Agentic write surface (Edit/Write) plus a bounded
# bash allowlist so it can run the test/build commands to check its own
# work. Model is sonnet — the verb at the call site is `task` because it
# mutates files. external_side_effect:false — no network / no git push.
agents:
  fixer:
    system_prompt: "You are a senior software engineer whose sole job is to make a project's failing tests pass with the minimal, correct change. You read the failure output, locate the root cause, and apply a focused fix to the source or the test. You never weaken or delete a test to make it pass, and you never invent behaviour the codebase doesn't have. When a fix would require a product/architecture decision you cannot make safely on your own, you stop and surface the question instead of guessing."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Edit, Write, Bash]
    bash_profile:
      commands: [go, make]
    external_side_effect: false

# Typed world. Every key read in a view, effect, or guard is declared here.
world:
  # Configuration (defaults wired for this repo; overridable via the
  # `start` intent's slots).
  test_cmd:       { type: string, default: "make test" }
  workdir:        { type: string, default: "." }
  max_cycles:     { type: int,    default: 3 }

  # Run state.
  cycle:          { type: int,    default: 0 }
  tests_passed:   { type: bool,   default: false }
  run_exit_code:  { type: int,    default: 0 }
  run_stdout:     { type: string, default: "" }
  first_failures: { type: string, default: "" }
  last_failures:  { type: string, default: "" }
  refine_feedback:{ type: string, default: "" }

  # Fixer output (schemas/fix_artifact.json).
  fix_artifact:   { type: object, default: {} }

  # Outcome.
  outcome:        { type: string, default: "" }
  report_path:    { type: string, default: "" }

intents:
  start:
    description: "Run the test suite and auto-fix any failures."
    examples: ["start", "fix the tests", "make tests pass", "go"]
    priority: 90
    slots:
      test_cmd:   { type: string, required: false }
      max_cycles: { type: int,    required: false }
  route:
    description: "Internal: advance the pipeline based on the latest result."
    examples: []
    priority: 10
  look:
    description: "Re-render the current room."
    examples: ["look", "status"]
    priority: 5

root: idle

include:
  - rooms/*.yaml
