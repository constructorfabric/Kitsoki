# once_reload_safe — on_enter is idempotent: a room whose `once:`-guarded
# result is already present does NOT re-run its agent call.
#
# This is the reload-safety contract for the `once: true` invokes added to
# review_pr_executing / comment_executing / decide_executing. /reload (and the
# `look` self-loop) re-fires on_enter; `once: true` makes the expensive agent
# call a no-op when its bind target is already in world. We prove it without a
# real reload: enter review_pr_executing with review_summary_artifact ALREADY
# set to a distinctive preset. The agent stub returns a DIFFERENT value — so
# if the once: guard failed and the reviewer re-ran, the preset would be
# overwritten. A `look` self-loop re-enters the room (re-firing on_enter);
# asserting the preset survives proves the reviewer was skipped.
#
# Note the contrast with the cheap iface.vcs reads (diff / pr_status): those
# are intentionally left UNGUARDED and DO re-fetch on every entry — only the
# expensive agent.decide is once:-gated.

test_kind: flow
app: ../app.yaml
initial_state: review_pr_executing
initial_world:
  pr_id:        "PR-99"
  pr_title:     "feat: reload-safety"
  pr_author:    "carol"
  thread:       "PR-99"
  judge_mode:   "human"
  judge_confidence_threshold: 0.8
  # Reviewer already ran — the preset the once: guard must preserve.
  review_summary_artifact:
    summary_title:    "PRESET-SURVIVED"
    summary_markdown: "Reviewer already ran; this must not be overwritten."
    confidence:       0.95

host_handlers:
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git:
    data:
      ok:       true
      diff:     "diff --git a/x.go b/x.go"
      comments: ""
  # If the once: guard failed, this would fire and clobber the preset.
  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "SHOULD-NOT-RUN"
        summary_markdown: "Stub reviewer output — must not appear."
        confidence:       0.1

turns:
  # `look` re-enters review_pr_executing, re-firing on_enter. review_summary_
  # artifact is already set ⇒ the once:-guarded agent.decide is SKIPPED, so
  # the preset survives verbatim (summary_title still PRESET-SURVIVED), not the
  # stub's SHOULD-NOT-RUN output.
  - intent: { name: look, slots: {} }
    expect_state: review_pr_executing
    expect_world:
      review_summary_artifact:
        summary_title:    "PRESET-SURVIVED"
        summary_markdown: "Reviewer already ran; this must not be overwritten."
        confidence:       0.95

expect_no_errors: true
