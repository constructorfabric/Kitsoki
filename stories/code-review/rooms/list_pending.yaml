# list_pending — fetch the list of PRs awaiting your review via
# iface.vcs.pr_status (with a filter for "needs my review"). For the
# inbox-trigger path, pr_id is already seeded in world from the
# notification payload; the operator may type `pick_pr` directly to
# jump to review_pr_executing.

states:

  list_pending:
    description: "Listing PRs awaiting your review."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Count:   "{{ world.pending_count }}"
                Pending: '{{ world.pending_prs|default:"(none)" }}'
                Picked:  '{{ world.pr_id|default:"(none)" }} {{ world.pr_title }}'
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "pick_pr id=<PR>"
                  hint:  "select a PR and start reviewing"
                - label: "proceed"
                  hint:  "advance with the already-picked PR"
                  when:  "world.pr_id != ''"
                - label: "✗ proceed — pick a PR first"
                  when:  "world.pr_id == ''"
                - label: "dismiss"
                  hint:  "drop the review request (wrong reviewer)"
                - label: "quit"
                  hint:  "abandon the review"
                - label: "look"
    relevant_world: [pending_count, pending_prs, pr_id, pr_title]
    on_enter:
      # Fetch the list. The default host.git binding doesn't actually
      # filter (Wave 3 host handler is stubbed); cyber-repo's parent
      # rebinds iface.vcs.pr_status to a real GitHub list query.
      - invoke: iface.vcs.pr_status
        with:
          pr_id: "*"
        bind:
          pending_prs: comments
        on_error: idle
    on:
      pick_pr:
        - target: review_pr_executing
          effects:
            - set:
                pr_id:  "{{ slots.id }}"
                thread: "{{ slots.id }}"
      # If pr_id is already set (inbox-trigger flow), the operator can
      # advance straight to review_pr_executing.
      proceed:
        - when: "world.pr_id != ''"
          target: review_pr_executing
        - default: true
          target: list_pending
          guard_hint: "Pick a PR first via `pick_pr id=<PR>`."
      dismiss:
        - target: "@exit:dismissed"
          effects:
            - set:
                status: "dismissed"
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
