# idle — entry room. Standalone runs (or warp-basis tests) enter here;
# parent stories that route via the inbox notification can also enter
# here (the inbox-trigger flow seeds pr_id directly in world).

states:

  idle:
    description: "Code-review pipeline parked. Waiting for start."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                "Pending PRs": "{{ world.pending_count }}"
                Picked:        '{{ world.pr_id|default:"(none)" }} {{ world.pr_title }}'
                Judge:         "{{ world.judge_mode }}"
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "start"
                  hint:  "list PRs awaiting your review"
                - label: "quit"
                  hint:  "abandon the review"
                - label: "look"
    relevant_world: [pending_count, pr_id, pr_title, judge_mode]
    on:
      start:
        # If the inbox-trigger flow seeded a pr_id directly, the user
        # may want to skip the list_pending step. The default arc
        # always walks list_pending first so the operator confirms
        # the PR they're reviewing.
        - target: list_pending
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
