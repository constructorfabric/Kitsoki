# quit_mid_loop — quit from fixing mid-loop → @exit:abandoned; partial fixed preserved.

test_kind: flow
app: ../app.yaml
initial_state: fixing
initial_world:
  severity_floor: "warn"
  media_format:   "slideshow"
  group_budget:   5
  cursor: 1
  group_cycle: 0
  groups:
    items:
      - { id: "g1", title: "Group 1", pattern: "P1", root_cause: "C1", severity: "error", member_ids: ["fp1"], surfaces: ["s1"], viewports: ["mobile"], before_frames: ["f1.png"], recommendation: "R1" }
      - { id: "g2", title: "Group 2", pattern: "P2", root_cause: "C2", severity: "warn",  member_ids: ["fp2"], surfaces: ["s2"], viewports: ["desktop"], before_frames: ["f2.png"], recommendation: "R2" }
  current:
    id: "g2"
    title: "Group 2"
    pattern: "P2"
    root_cause: "C2"
    severity: "warn"
    member_ids: ["fp2"]
    surfaces: ["s2"]
    viewports: ["desktop"]
    before_frames: ["f2.png"]
    recommendation: "R2"
  fix_result: {}
  fixed:
    items:
      - { group: { id: "g1", title: "Group 1" }, media_handle: "ui-fix-g1#1", reason: "fixed" }
  skipped: { items: [] }

starlark_http_cassette: ../testdata/empty.http.yaml

host_handlers:
  host.oracle.task:
    data:
      submitted:
        applied: true
        files: ["src/Comp.vue"]
        summary: "Fixed."
        diff_excerpt: "+  fix"
        notes: ""
  host.starlark.run:
    data:
      item: {}
      groups: { items: [] }
      bucket: { items: [] }

turns:
  - intent: { name: quit, slots: {} }
    expect_state: __exit__abandoned
    expect_world:
      abandon_reason: "quit_at_fixing"

expect_terminal: true
expect_no_errors: true
