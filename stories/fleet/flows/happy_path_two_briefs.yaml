# happy_path_two_briefs — two briefs, both ship → @exit:done, shipped_count=2.
#
# load parses the 2-brief decomposition → board picks brief-one → dispatch holds
# the lock + enters ship-it → the brief's ship-it delivers (integrate clean,
# re-verify green, cleanup) → @exit:shipped projects back to board, folding
# brief-one shipped + releasing the lock → board picks brief-two → same → board
# sees no pending → summary → @exit:done. shipped_count=2, parked_count=0.
#
# fleet_load / fleet_board run REAL python in production; flows block real
# host.run (no accidental shell-out), so they are stubbed here per recompute
# pass (fleet_board-0/-1/-2, keyed by shipped+parked count — the cherny
# gate-{{ iteration }} pattern). The recompute LOGIC itself is unit-proven by
# running the scripts directly (see README).

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  decomposition_path: "stories/fleet/testdata/two_briefs.yaml"
  base_branch:        main
  main_worktree_path: "."

host_handlers:
  host.run:
    by_call:
      fleet_load:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            fleet_briefs:
              - { id: brief-one, brief: "Implement slice one", gate_command: "go test ./internal/one/", status: pending, last_error: "" }
              - { id: brief-two, brief: "Implement slice two", gate_command: "go test ./internal/two/", status: pending, last_error: "" }
            fleet_state_path: "/tmp/fleet-two.json"
            error: ""
      # Board pass 0: nothing delivered yet → pick brief-one (2 pending).
      fleet_board-0:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            fleet_briefs:  []
            next_brief:    { id: brief-one, brief: "Implement slice one", gate_command: "go test ./internal/one/", status: pending, last_error: "" }
            has_pending:   true
            route:         dispatch
            shipped_count: 0
            parked_count:  0
            pending_count: 2
      # Board pass 1: brief-one shipped → pick brief-two (1 shipped, 1 pending).
      fleet_board-1:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            fleet_briefs:  []
            next_brief:    { id: brief-two, brief: "Implement slice two", gate_command: "go test ./internal/two/", status: pending, last_error: "" }
            has_pending:   true
            route:         dispatch
            shipped_count: 1
            parked_count:  0
            pending_count: 1
      # Board pass 2: both shipped → no pending → summary.
      fleet_board-2:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            fleet_briefs:  []
            next_brief:    {}
            has_pending:   false
            route:         done
            shipped_count: 2
            parked_count:  0
            pending_count: 0
      # Each brief's ship-it delivery half (shared call ids per brief).
      integrate_exec:
        data: { ok: true, exit_code: 0, stdout_json: { outcome: integrated, integrated_sha: "deadbee", last_op_ok: true, last_error: "" } }
      verify-rerun: { data: { ok: true, exit_code: 0, stdout: "ok" } }
      cleanup_exec:
        data: { ok: true, exit_code: 0, stdout_json: { outcome: cleaned, last_op_ok: true, last_error: "" } }

turns:
  # begin enters load (on_enter parses the decomposition → fleet_briefs).
  - intent: { name: begin, slots: {} }
    expect_state: load

  # start: board pass 0 picks brief-one → dispatch (lock held) → ship-it entry.
  - intent: { name: start, slots: {} }
    expect_state: ship.configure
    expect_world:
      merge_lock_held: true

  # Drive brief-one's ship-it → @exit:shipped → board pass 1 folds shipped +
  # releases the lock + picks brief-two → dispatch → ship-it entry.
  - intent: { name: ship__integrate_existing, slots: {} }
    expect_state: ship.configure
    expect_world:
      shipped_count: 1
      merge_lock_held: true

  # Drive brief-two → @exit:shipped → board pass 2 → no pending → summary → done.
  - intent: { name: ship__integrate_existing, slots: {} }
    expect_state: __exit__done
    expect_world:
      shipped_count: 2
      parked_count:  0

expect_terminal: true
expect_no_errors: true
