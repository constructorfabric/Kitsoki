states:
  reporting:
    description: "Preparing evaluation report artifacts."
    relevant_world: [question, apply_mode, override_path, target_story, target_call, output_root, markdown_path, deck_path, slidey_spec_path, case_study_path, summary_path, live_policy, refine_feedback, report_artifact, status]
    view:
      - banner:
          text: "REPORTING"
          subtitle: "The reporter is collecting local evidence, ranking configured options, and applying the requested override."
          color: "#2563EB"
      - kv:
          pairs:
            Question: "{{ world.question }}"
            Apply mode: "{{ world.apply_mode }}"
            Override: "{{ world.report_artifact.override.path|default:world.override_path }}"
            Fastest: '{{ world.report_artifact.recommendations.fastest.profile|default:"(pending)" }} / {{ world.report_artifact.recommendations.fastest.model|default:"" }}'
            Cheapest: '{{ world.report_artifact.recommendations.cheapest.profile|default:"(pending)" }} / {{ world.report_artifact.recommendations.cheapest.model|default:"" }}'
            Best: '{{ world.report_artifact.recommendations.best.profile|default:"(pending)" }} / {{ world.report_artifact.recommendations.best.model|default:"" }}'
            Selected: '{{ world.report_artifact.recommendations.selected.profile|default:"(pending)" }} / {{ world.report_artifact.recommendations.selected.model|default:"" }}'
            Applied: '{{ world.report_artifact.override.applied|default:false }}'
            Markdown: '{{ world.report_artifact.markdown_path|default:world.markdown_path }}'
            Deck: '{{ world.report_artifact.deck_path|default:world.deck_path }}'
            Slidey spec: '{{ world.report_artifact.slidey_spec_path|default:world.slidey_spec_path }}'
            Case study: '{{ world.report_artifact.case_study_path|default:world.case_study_path }}'
            Summary: '{{ world.report_artifact.summary_path|default:world.summary_path }}'
            Live policy: "{{ world.live_policy }}"
            Status: '{{ world.report_artifact.status|default:"pending" }}'
      - heading: "Summary"
      - code: '{{ world.report_artifact.summary_markdown|default:"(pending - reporter has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "accept"
              hint: "move to the final artifact view"
              intent: accept
            - label: "refine feedback=..."
              hint: "regenerate with feedback"
              intent: refine
              param: { slot: feedback, type: string, placeholder: "what should change?", required: true }
            - label: "quit"
              intent: quit
            - label: "look"
              intent: look
    on_enter:
      - invoke: host.agent.task
        id: prepare_reports
        once: true
        with:
          agent: reporter
          working_dir: "{{ world.workdir }}"
          acceptance:
            schema: schemas/report_artifact.json
            max_retries: 2
          context:
            prompt: prompts/prepare_reports.md
            args:
              question: "{{ world.question }}"
              refine_feedback: "{{ world.refine_feedback }}"
              apply_mode: "{{ world.apply_mode }}"
              override_path: "{{ world.override_path }}"
              target_story: "{{ world.target_story }}"
              target_call: "{{ world.target_call }}"
              output_root: "{{ world.output_root }}"
              markdown_path: "{{ world.markdown_path }}"
              deck_path: "{{ world.deck_path }}"
              slidey_spec_path: "{{ world.slidey_spec_path }}"
              case_study_path: "{{ world.case_study_path }}"
              summary_path: "{{ world.summary_path }}"
              live_policy: "{{ world.live_policy }}"
        bind:
          report_artifact: submitted
        on_error: idle
      - set: { status: "ready" }
    on:
      accept:
        - target: done
          effects:
            - set: { status: "done" }
            - say: "Report artifacts ready."
      refine:
        - target: reporting
          effects:
            - set:
                refine_feedback: "{{ slots.feedback }}"
                report_artifact: {}
                status: "running"
      quit:
        - target: idle
          effects:
            - set: { status: "abandoned" }
      look:
        - target: .
