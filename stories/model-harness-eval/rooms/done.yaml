states:
  done:
    description: "Evaluation report artifacts are ready."
    relevant_world: [question, apply_mode, override_path, report_artifact, status]
    view:
      - banner:
          text: "DONE"
          subtitle: "Proposal artifacts are ready and the requested override result is recorded."
          color: "#16A34A"
      - kv:
          pairs:
            Question: "{{ world.question }}"
            Selected: '{{ world.report_artifact.recommendations.selected.profile|default:"(missing)" }} / {{ world.report_artifact.recommendations.selected.model|default:"" }}'
            Override: '{{ world.report_artifact.override.path|default:world.override_path }}'
            Applied: '{{ world.report_artifact.override.applied|default:false }}'
            Markdown: '{{ world.report_artifact.markdown_path|default:"(missing)" }}'
            Deck: '{{ world.report_artifact.deck_path|default:"(missing)" }}'
            Slidey spec: '{{ world.report_artifact.slidey_spec_path|default:"(missing)" }}'
            Case study: '{{ world.report_artifact.case_study_path|default:"(missing)" }}'
            Summary: '{{ world.report_artifact.summary_path|default:"(missing)" }}'
            Status: '{{ world.report_artifact.status|default:world.status }}'
      - heading: "Result"
      - code: '{{ world.report_artifact.summary_markdown|default:"(no summary returned)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "restart question=..."
              hint: "ask a different evaluation question"
              intent: restart
              param: { slot: question, type: string, placeholder: "new question", required: false }
            - label: "look"
              intent: look
    on:
      restart:
        - target: reporting
          effects:
            - set:
                question: "{{ slots.question ?? world.question }}"
                refine_feedback: ""
                report_artifact: {}
                status: "running"
      look:
        - target: .
