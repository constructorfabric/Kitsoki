states:
  idle:
    description: "Waiting for an evaluation question."
    relevant_world: [question, output_root, markdown_path, deck_path, summary_path, status]
    view:
      - banner:
          text: "MODEL HARNESS EVAL"
          subtitle: "Ask a broad question; the reporter prepares Markdown, deck, and JSON artifacts."
          color: "#0F766E"
      - prose: "Provide an overall question about model/harness effectiveness, speed, cost, readiness, or coverage."
      - kv:
          pairs:
            Markdown: "{{ world.markdown_path }}"
            Deck: "{{ world.deck_path }}"
            Summary: "{{ world.summary_path }}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "start question=..."
              hint: "prepare report artifacts for the question"
              intent: start
              param: { slot: question, type: string, placeholder: "what should this eval answer?", required: true }
            - label: "look"
              intent: look
    on:
      start:
        - target: reporting
          effects:
            - set:
                question: "{{ slots.question }}"
                refine_feedback: ""
                report_artifact: {}
                status: "running"
      restart:
        - target: idle
          effects:
            - set:
                question: "{{ slots.question ?? '' }}"
                refine_feedback: ""
                report_artifact: {}
                status: "idle"
      look:
        - target: .

