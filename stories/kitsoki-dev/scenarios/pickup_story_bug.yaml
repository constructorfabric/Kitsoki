# Warp basis: lands at `core.main` primed to pick up a story-bug from
# `stories/oregon-trail/issues/bugs/`. Demonstrates the multi-glob
# `ticket_globs:` covering BOTH kitsoki-self bugs and per-story bugs.
# Same dogfood pipeline; only the file path is different.
#
# Usage (from kitsoki repo root):
#
#   kitsoki run stories/kitsoki-dev/app.yaml \
#       --warp scenarios/pickup_story_bug.yaml
#
# Then type `bugfix` to dispatch into the bf import. The bf pipeline
# walks identically; the only thing the binding-level provider sees
# differently is the file path — which is what "devstory oversees
# kitsoki AND its stories" means in practice (proposal §5.4).

name:        "story-bug — oregon-trail scenarios README warp-flag doc nit"
description: "Primed to pick up stories/oregon-trail/issues/bugs/2026-05-14T120000Z-scenarios-readme-warp-flag-misnamed.md and walk the supervised bugfix."

state: core.main

