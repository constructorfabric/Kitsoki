# restart_from_each_stage — port of cyber-repo's
# stories/bugfix/flows/restart_from_each_stage.yaml.
#
# The done room's restart_from arc has a when:-ladder across each
# well-known prior stage:
#
#   reproducing   → reproducing
#   proposing     → proposing
#   implementing  → implementing
#   testing       → testing
#   validating    → validating
#
# Each scenario probes a single stage from done (the latest checkpoint,
# where every prior stage is reachable). Each also asserts
# restart_from_stage was set and the relevant <phase>_cycle counter was
# reset to 0 — a regression that drops the reset must fail.

test_kind: flow
app: ../app.yaml
initial_state: done
initial_world:
  ticket_id:           "TKT-200"
  thread:              "TKT-200"
  judge_mode:          "human"
  reproducing_cycle:   2

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "" }
  host.git:
    data: { ok: true, sha: "abc", diff: "" }
  host.local:
    data: { ok: true, log: "PASS", passed: 1, failed: 0 }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]

  host.agent.ask:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]

  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]

turns:
  - intent: { name: restart_from, slots: { stage: "reproducing" } }
    expect_state: reproducing
    expect_world:
      restart_from_stage: "reproducing"
      reproducing_cycle:  0
      cycle:              0

expect_no_errors: true

