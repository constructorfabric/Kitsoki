# refine_at_each_stage — port of cyber-repo's refine.yaml.
#
# At each merged checkpoint room, `refine: <feedback>` self-transitions
# back into the same room with refine_feedback set and the per-phase
# cycle counter incremented. The self-transition does NOT re-run
# on_enter (the engine's "newly entered" gate skips self-transitions),
# but the effects chain still fires — which is what the regression
# property tests.
#
# A regression that drops the `set: { refine_feedback }` effect or
# fails to increment the right counter must fail this flow.
#
# Coverage: reproducing, proposing, testing, validating, done.

test_kind: flow
app: ../app.yaml
initial_state: reproducing
initial_world:
  ticket_id:  "TKT-700"
  thread:     "TKT-700"
  judge_mode: "human"

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "" } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.agent.task:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

  host.agent.ask:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

  host.agent.decide:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

turns:
  - intent: { name: refine, slots: { feedback: "please also check the /bc route" } }
    expect_state: reproducing
    expect_world:
      refine_feedback:   "please also check the /bc route"
      reproducing_cycle: 1
      cycle:             1

expect_no_errors: true

