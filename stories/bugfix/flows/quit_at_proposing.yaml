# quit_at_proposing — judge_mode=human, operator quits at the proposing
# checkpoint. Proves the quit arc routes through @exit:abandoned for
# every merged checkpoint room (not just done).

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  ticket_id:   "TKT-006"
  thread:      "TKT-006"
  judge_mode:  "human"

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "" }
  host.git:
    data: { ok: true, sha: "abc123", diff: "" }
  host.local:
    data: { ok: true, log: "" }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description: "Some sufficiently detailed description of the fix's expected behavior."
        root_cause:      "Something obscure and out of scope for this run."
        affected_files:  ["x.go"]
        confidence:      0.5
        reasoning:       "We're going to quit at this checkpoint; the proposal is informational only."

  host.agent.ask:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description: "Some sufficiently detailed description of the fix's expected behavior."
        root_cause:      "Something obscure and out of scope for this run."
        affected_files:  ["x.go"]
        confidence:      0.5
        reasoning:       "We're going to quit at this checkpoint; the proposal is informational only."

  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description: "Some sufficiently detailed description of the fix's expected behavior."
        root_cause:      "Something obscure and out of scope for this run."
        affected_files:  ["x.go"]
        confidence:      0.5
        reasoning:       "We're going to quit at this checkpoint; the proposal is informational only."

turns:
  - intent: { name: start, slots: {} }
    expect_state: reproducing
  - intent: { name: accept, slots: {} }
    expect_state: proposing
  - intent: { name: quit, slots: {} }
    expect_state: __exit__abandoned

expect_terminal: true
expect_no_errors: true
