# quit_at_validating — operator quits late in the pipeline, after
# validating's artifact landed but before close-out. Proves the quit
# arc fires correctly even after several phases' worth of world
# mutation.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  bugfix_exit: "open-PR"   # legacy PR-handoff tail (slice 4 default is direct-ship)
  ticket_id:   "TKT-009"
  thread:      "TKT-009"
  judge_mode:  "human"

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "" }
  host.git:
    data: { ok: true, sha: "abc", diff: "" }
  host.local:
    data: { ok: true, log: "PASS", passed: 1, failed: 0 }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description: "Fix the thing in a sufficiently detailed way."
        root_cause:      "Off-by-one somewhere fascinating."
        affected_files:  ["x.go"]
        confidence:      0.9
        reasoning:       "Looks straightforward; quitting before close-out for testing reasons."
        status:          "passed"
        tests_run:       { passed: 1, failed: 0, log: "PASS" }
        outcome:         "pass"
        lessons:
          - { category: "stub", description: "Walk through the whole pipeline to validating then quit.", severity: "low" }

  host.agent.ask:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description: "Fix the thing in a sufficiently detailed way."
        root_cause:      "Off-by-one somewhere fascinating."
        affected_files:  ["x.go"]
        confidence:      0.9
        reasoning:       "Looks straightforward; quitting before close-out for testing reasons."
        status:          "passed"
        tests_run:       { passed: 1, failed: 0, log: "PASS" }
        outcome:         "pass"
        lessons:
          - { category: "stub", description: "Walk through the whole pipeline to validating then quit.", severity: "low" }

  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "Stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description: "Fix the thing in a sufficiently detailed way."
        root_cause:      "Off-by-one somewhere fascinating."
        affected_files:  ["x.go"]
        confidence:      0.9
        reasoning:       "Looks straightforward; quitting before close-out for testing reasons."
        status:          "passed"
        tests_run:       { passed: 1, failed: 0, log: "PASS" }
        outcome:         "pass"
        lessons:
          - { category: "stub", description: "Walk through the whole pipeline to validating then quit.", severity: "low" }

turns:
  - intent: { name: start, slots: {} }
    expect_state: reproducing
  - intent: { name: accept, slots: {} }
    expect_state: proposing
  - intent: { name: accept, slots: {} }
    expect_state: implementing
  - intent: { name: accept, slots: {} }
    expect_state: testing
  - intent: { name: accept, slots: {} }
    expect_state: reviewing
  - intent: { name: accept, slots: {} }
    expect_state: validating
  - intent: { name: quit, slots: {} }
    expect_state: __exit__abandoned

expect_terminal: true
expect_no_errors: true
