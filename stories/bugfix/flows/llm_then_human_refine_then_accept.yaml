# llm_then_human_refine_then_accept — judge_mode=llm_then_human with an
# LLM verdict that says `refine` (insufficient artifact). The runtime
# auto-fires `refine` via emit_intent from reproducing.on_enter, which
# self-transitions back to reproducing and increments the cycle counter.
#
# Original two-state behaviour (Wave 1): proceed → _awaiting_reply →
# judge → emit refine → back to _executing → on_enter re-fires → judge
# returns refine again → loops until budget. The runtime's cascade made
# this look like one user turn that produced multiple cycles.
#
# Merged-state behaviour (now): refine is a self-transition (target:
# reproducing from reproducing). The engine deliberately does NOT
# re-fire on_enter on self-transitions (see machine.go's "newly
# entered" gate), so the autonomous cascade lands a single cycle per
# operator turn. That's the property tested here: emit_intent fires
# refine once, cycle becomes 1.
#
# The cycle-budget bound is still enforced (refine_budget_exhaust_*.yaml
# and budget_exhaust_llm_then_human.yaml cover that). Here we just
# verify that the emit_intent → refine arc completes a single round-trip.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  ticket_id:                  "TKT-500"
  thread:                     "TKT-500"
  judge_mode:                 "llm_then_human"
  judge_confidence_threshold: 0.8

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "" } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        verdict:    "refine"
        intent:     "refine"
        reason:     "Need a deterministic reproducer rather than a shell trace."
        confidence: 0.9

  host.agent.ask:
    data:
      ok: true
      submitted:
        summary_title:    "stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        verdict:    "refine"
        intent:     "refine"
        reason:     "Need a deterministic reproducer rather than a shell trace."
        confidence: 0.9

  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        verdict:    "refine"
        intent:     "refine"
        reason:     "Need a deterministic reproducer rather than a shell trace."
        confidence: 0.9

turns:
  # start enters reproducing; on_enter runs the artifact agent, then
  # the judge agent (binds llm_verdict={verdict:refine,...}), then
  # emit_intent fires `refine`. The refine arc self-transitions, sets
  # refine_feedback, and increments reproducing_cycle. Net landing:
  # reproducing with cycle=1.
  - intent: { name: start, slots: {} }
    expect_state: reproducing
    expect_world:
      reproducing_cycle: 1
      refine_feedback:   "Need a deterministic reproducer rather than a shell trace."

expect_no_errors: true
