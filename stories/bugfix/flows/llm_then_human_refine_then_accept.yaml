# llm_then_human_refine_then_accept — judge_mode=llm_then_human with an
# LLM verdict that says `refine` (insufficient artifact).
#
# Regression for GitHub #27: the merged reproducing room originally handled
# `refine` as a same-state transition. The effects cleared
# reproduction_artifact, but on_enter did not re-fire, leaving the room with a
# pending artifact and no running host.agent.task.
#
# Expected behaviour now: refine exits through idle with auto-start re-armed,
# so reproducing.on_enter runs again. With the judge stubbed to keep returning
# refine, the autonomous cascade performs real reproducer reruns until the
# reproducing budget is exhausted, then exits abandoned for human review.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  ticket_id:                  "TKT-500"
  thread:                     "TKT-500"
  judge_mode:                 "llm_then_human"
  judge_confidence_threshold: 0.8

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "" } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        verdict:    "refine"
        intent:     "refine"
        reason:     "Need a deterministic reproducer rather than a shell trace."
        confidence: 0.9

  host.agent.ask:
    data:
      ok: true
      submitted:
        summary_title:    "stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        verdict:    "refine"
        intent:     "refine"
        reason:     "Need a deterministic reproducer rather than a shell trace."
        confidence: 0.9

  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "stub"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        verdict:    "refine"
        intent:     "refine"
        reason:     "Need a deterministic reproducer rather than a shell trace."
        confidence: 0.9

turns:
  # start enters reproducing; on_enter runs the artifact agent, then the judge
  # agent (binds llm_verdict={verdict:refine,...}), then emit_intent fires
  # `refine`. Each refine must re-enter and dispatch a fresh reproducer task.
  # With the current budget guard, the fourth reproducer run happens before the
  # fourth refine verdict sees reproducing_cycle == reproducing_budget and parks
  # at the human-review/abandoned exit.
  - intent: { name: start, slots: {} }
    expect_state: __exit__abandoned
    expect_host_calls:
      - handler: host.agent.task
        times: 4
    expect_world:
      reproducing_cycle: 3
      refine_feedback:   "Need a deterministic reproducer rather than a shell trace."
      abandon_reason:    "reproducing_cycle_budget_exhausted"
      status:            "abandoned"

expect_terminal: true
expect_no_errors: true
