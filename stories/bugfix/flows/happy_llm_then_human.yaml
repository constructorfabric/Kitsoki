# happy_llm_then_human — judge_mode=llm_then_human, LLM-judge fires
# at every checkpoint with a confident verdict. Same as happy_llm with
# the mode flipped — proves the `when:` guard accepts both
# llm_then_human and llm at the LLM-judge invoke site AND that
# emit_intent's gate (`world.judge_mode != 'human'`) also accepts both.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  bugfix_exit: "open-PR"   # legacy PR-handoff tail (slice 4 default is direct-ship)
  ticket_id:        "TKT-003"
  ticket_title:    "Inbox count off by one"
  thread:          "TKT-003"
  workspace_id:    "ws-tkt-003"
  workdir:         ".worktrees/tkt-003"
  base_branch:     "main"
  feature_branch:  "fix/tkt-003-inbox-count"
  bugfix_mode:     "full"
  judge_mode:      "llm_then_human"
  judge_confidence_threshold: 0.8

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "synced" }
  host.git:
    data: { ok: true, sha: "abc123", diff: "" }
  host.local:
    data: { ok: true, log: "PASS", passed: 1, failed: 0 }
  # done room's lost-work clean-tree check (host.run done_clean_tree_check):
  # report a clean worktree so accept reaches @exit:done. A dirty tree would
  # route to @exit:needs-human — see flows/done_refuses_dirty_tree.yaml.
  host.run:
    data: { ok: true, exit_code: 0, stdout_json: { dirty: false, files: "" } }
  host.agent.task:
    data:
      stdout: ""
      ok: true
      submitted:
        summary_title:    "OK"
        summary_markdown: "All checks pass; the LLM is confident."
        bug_verified:     true
        involved_components: [{ name: "inbox" }]
        fix_description:  "Increment unread before the broadcast, not after, so the listener observes the count when it wakes."
        root_cause:       "Counter increments after broadcast; listeners woken before the increment see the stale count."
        affected_files:   ["internal/inbox/store.go"]
        confidence:       0.9
        reasoning:        "Trace shows the broadcast happens before the SQL UPDATE commits; flipping the order is mechanical."
        status:           "passed"
        tests_run:        { passed: 1, failed: 0, log: "PASS" }
        outcome:          "pass"
        lessons:
          - { category: "race-conditions", description: "Broadcast-then-mutate is always wrong when the listener reads the mutation; lint for this pattern.", severity: "medium" }
        verdict:    "pass"
        intent:     "accept"
        reason:     "Looks good."

  host.agent.ask:
    data:
      stdout: ""
      ok: true
      submitted:
        summary_title:    "OK"
        summary_markdown: "All checks pass; the LLM is confident."
        bug_verified:     true
        involved_components: [{ name: "inbox" }]
        fix_description:  "Increment unread before the broadcast, not after, so the listener observes the count when it wakes."
        root_cause:       "Counter increments after broadcast; listeners woken before the increment see the stale count."
        affected_files:   ["internal/inbox/store.go"]
        confidence:       0.9
        reasoning:        "Trace shows the broadcast happens before the SQL UPDATE commits; flipping the order is mechanical."
        status:           "passed"
        tests_run:        { passed: 1, failed: 0, log: "PASS" }
        outcome:          "pass"
        lessons:
          - { category: "race-conditions", description: "Broadcast-then-mutate is always wrong when the listener reads the mutation; lint for this pattern.", severity: "medium" }
        verdict:    "pass"
        intent:     "accept"
        reason:     "Looks good."

  host.agent.decide:
    data:
      stdout: ""
      ok: true
      submitted:
        summary_title:    "OK"
        summary_markdown: "All checks pass; the LLM is confident."
        bug_verified:     true
        involved_components: [{ name: "inbox" }]
        fix_description:  "Increment unread before the broadcast, not after, so the listener observes the count when it wakes."
        root_cause:       "Counter increments after broadcast; listeners woken before the increment see the stale count."
        affected_files:   ["internal/inbox/store.go"]
        confidence:       0.9
        reasoning:        "Trace shows the broadcast happens before the SQL UPDATE commits; flipping the order is mechanical."
        status:           "passed"
        tests_run:        { passed: 1, failed: 0, log: "PASS" }
        outcome:          "pass"
        lessons:
          - { category: "race-conditions", description: "Broadcast-then-mutate is always wrong when the listener reads the mutation; lint for this pattern.", severity: "medium" }
        verdict:    "pass"
        intent:     "accept"
        reason:     "Looks good."

turns:
  # See happy_llm for the cascade explanation. start lands at
  # implementing (cascade through reproducing → proposing → STOP),
  # accept lands at reviewing (testing → STOP), accept lands at
  # @exit:done (validating → done → @exit:done).
  - intent: { name: start, slots: {} }
    expect_state: implementing
  - intent: { name: accept, slots: {} }
    expect_state: reviewing
  - intent: { name: accept, slots: {} }
    expect_state: __exit__done
    expect_world: { status: "fixed" }

expect_terminal: true
expect_no_errors: true
