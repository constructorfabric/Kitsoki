# happy_llm — judge_mode=llm, LLM-judge fires on every checkpoint's
# on_enter and returns a confident verdict. The runtime's emit_intent
# effect auto-advances each checkpoint by dispatching the verdict's
# intent (contract §6 step 4). End-to-end this proves:
#   - the `when:` guard on the judge invoke (it fires in llm mode)
#   - the binding of llm_verdict (post host.agent.decide)
#   - the post-bind emit_intent dispatch (DispatchPostBindEmits)
#     auto-fires `accept` in the SAME turn as the artifact agent,
#     because the judge now runs in the merged room's on_enter.
#
# Cascade behaviour: each `accept` lands at the next room, whose
# on_enter fires the judge and emits accept again — collapsing
# consecutive autonomous checkpoints into one user-fired turn.
# The cascade ends at the first room with no judge in on_enter
# (implementing, reviewing) where the auto-emit cannot fire.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  bugfix_exit: "open-PR"   # legacy PR-handoff tail (slice 4 default is direct-ship)
  ticket_id:        "TKT-002"
  ticket_title:    "Foyer banner truncated"
  thread:          "TKT-002"
  workspace_id:    "ws-tkt-002"
  workdir:         ".worktrees/tkt-002"
  base_branch:     "main"
  feature_branch:  "fix/tkt-002-foyer-banner"
  bugfix_mode:     "full"
  judge_mode:      "llm"
  judge_confidence_threshold: 0.8

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "synced" }
  host.git:
    data: { ok: true, sha: "abc123", diff: "diff --git a/x b/x\n", files: [] }
  host.local:
    data: { ok: true, log: "PASS: 12 tests", passed: 12, failed: 0 }
  # done room's lost-work clean-tree check (host.run done_clean_tree_check):
  # report a clean worktree so accept reaches @exit:done. A dirty tree would
  # route to @exit:needs-human — see flows/done_refuses_dirty_tree.yaml.
  host.run:
    data: { ok: true, exit_code: 0, stdout_json: { dirty: false, files: "" } }

  # In `llm` mode every merged room ALSO fires host.agent.decide
  # via the `judge_<phase>.md` prompt from on_enter. The runtime can't
  # branch the stub response on prompt (it returns the SAME Data for
  # every call). So our stub returns a submitted: payload that
  # satisfies BOTH the artifact schema AND the judge_verdict schema
  # (verdict/intent/reason/confidence are additional fields the artifact
  # schema ignores via additionalProperties: true).
  host.agent.task:
    data:
      stdout: ""
      ok: true
      submitted:
        # Artifact fields
        summary_title:    "Confident artifact"
        summary_markdown: "An artifact body sufficient for state-machine testing."
        bug_verified:     true
        involved_components: [{ name: "tui", reason: "the foyer renders here" }]
        fix_description:     "Render the banner with `truncate=false` so the title isn't clipped at small widths."
        root_cause:          "The foyer's renderWidth() returns terminal-width-2 instead of terminal-width, which clips one-character titles."
        affected_files:      ["internal/tui/foyer.go"]
        confidence:          0.9
        reasoning:           "Resize trace shows the off-by-one on terminal-width-2; the fix is well-established in similar renderer code in this repo."
        status:              "passed"
        tests_run:           { passed: 4, failed: 0, log: "PASS 4 tests" }
        outcome:             "pass"
        evidence:            { build: "ok", api: "n/a", ui: "ok" }
        lessons:
          - { category: "renderer-bugs", description: "Off-by-one rendering bugs need at least one regression test asserting on the exact width.", severity: "medium" }
        # Judge fields (additionalProperties: true on artifact schemas
        # tolerates these; the orchestrator doesn't validate either way
        # because flow fixtures don't run the validator subprocess).
        verdict:    "pass"
        intent:     "accept"
        reason:     "Artifact looks complete and the confidence is high enough to advance."

  host.agent.ask:
    data:
      stdout: ""
      ok: true
      submitted:
        # Artifact fields
        summary_title:    "Confident artifact"
        summary_markdown: "An artifact body sufficient for state-machine testing."
        bug_verified:     true
        involved_components: [{ name: "tui", reason: "the foyer renders here" }]
        fix_description:     "Render the banner with `truncate=false` so the title isn't clipped at small widths."
        root_cause:          "The foyer's renderWidth() returns terminal-width-2 instead of terminal-width, which clips one-character titles."
        affected_files:      ["internal/tui/foyer.go"]
        confidence:          0.9
        reasoning:           "Resize trace shows the off-by-one on terminal-width-2; the fix is well-established in similar renderer code in this repo."
        status:              "passed"
        tests_run:           { passed: 4, failed: 0, log: "PASS 4 tests" }
        outcome:             "pass"
        evidence:            { build: "ok", api: "n/a", ui: "ok" }
        lessons:
          - { category: "renderer-bugs", description: "Off-by-one rendering bugs need at least one regression test asserting on the exact width.", severity: "medium" }
        # Judge fields (additionalProperties: true on artifact schemas
        # tolerates these; the orchestrator doesn't validate either way
        # because flow fixtures don't run the validator subprocess).
        verdict:    "pass"
        intent:     "accept"
        reason:     "Artifact looks complete and the confidence is high enough to advance."

  host.agent.decide:
    data:
      stdout: ""
      ok: true
      submitted:
        # Artifact fields
        summary_title:    "Confident artifact"
        summary_markdown: "An artifact body sufficient for state-machine testing."
        bug_verified:     true
        involved_components: [{ name: "tui", reason: "the foyer renders here" }]
        fix_description:     "Render the banner with `truncate=false` so the title isn't clipped at small widths."
        root_cause:          "The foyer's renderWidth() returns terminal-width-2 instead of terminal-width, which clips one-character titles."
        affected_files:      ["internal/tui/foyer.go"]
        confidence:          0.9
        reasoning:           "Resize trace shows the off-by-one on terminal-width-2; the fix is well-established in similar renderer code in this repo."
        status:              "passed"
        tests_run:           { passed: 4, failed: 0, log: "PASS 4 tests" }
        outcome:             "pass"
        evidence:            { build: "ok", api: "n/a", ui: "ok" }
        lessons:
          - { category: "renderer-bugs", description: "Off-by-one rendering bugs need at least one regression test asserting on the exact width.", severity: "medium" }
        # Judge fields (additionalProperties: true on artifact schemas
        # tolerates these; the orchestrator doesn't validate either way
        # because flow fixtures don't run the validator subprocess).
        verdict:    "pass"
        intent:     "accept"
        reason:     "Artifact looks complete and the confidence is high enough to advance."

turns:
  # start fires idle → reproducing. reproducing.on_enter binds the
  # artifact, fires the judge, and emit_intent accept. That cascades:
  #   accept → proposing → on_enter → judge → emit accept →
  #   implementing → on_enter (no judge, no emit) → STOP.
  # Net: one user turn lands at implementing.
  - intent: { name: start, slots: {} }
    expect_state: implementing

  # accept advances implementing → testing → on_enter → judge →
  # emit accept → reviewing → on_enter (no judge) → STOP.
  - intent: { name: accept, slots: {} }
    expect_state: reviewing

  # accept advances reviewing → validating → judge → emit accept →
  # done → judge → emit accept → @exit:done.
  - intent: { name: accept, slots: {} }
    expect_state: __exit__done
    expect_world:
      status: "fixed"

expect_terminal: true
expect_no_errors: true
