# refine_budget_exhaust_validating — validating_cycle hits validating_budget;
# next refine routes to @exit:abandoned. This is the late-pipeline budget
# bail; mirrors cyber-repo's phase_9_7 cycle-budget arcs.

test_kind: flow
app: ../app.yaml
initial_state: validating
initial_world:
  ticket_id:           "TKT-130"
  thread:              "TKT-130"
  judge_mode:          "human"
  validating_budget:   3

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "" }
  host.git:
    data: { ok: true, sha: "abc", diff: "" }
  host.local:
    data: { ok: true, log: "PASS", passed: 1, failed: 0 }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "Stub validation"
        summary_markdown: "stub"
        outcome:          "pass"
        evidence:         { build: "ok", api: "n/a", ui: "n/a" }

  host.agent.ask:
    data:
      ok: true
      submitted:
        summary_title:    "Stub validation"
        summary_markdown: "stub"
        outcome:          "pass"
        evidence:         { build: "ok", api: "n/a", ui: "n/a" }

  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "Stub validation"
        summary_markdown: "stub"
        outcome:          "pass"
        evidence:         { build: "ok", api: "n/a", ui: "n/a" }

turns:
  - intent: { name: refine, slots: { feedback: "exhaust check" } }
    world_override:
      validating_cycle: 3
    expect_state: __exit__abandoned
    expect_world:
      abandon_reason: "validating_cycle_budget_exhausted"

expect_terminal: true
expect_no_errors: true
