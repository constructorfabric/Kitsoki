# jump_to_each_target — port of cyber-repo's
# stories/bugfix/flows/jump_to.yaml (provider-neutral).
#
# Per-phase jump_to ladders advance the pipeline forward to a later
# room. Each scenario asserts:
#   - the target state matches the slot alias
#   - world.jump_to was set to the slot value
#   - world.unsafe_jumps_made was incremented (audit)
#
# Coverage:
#   1. reproducing → testing (alias `test`)
#   2. reproducing → validating
#   3. reproducing → done (alias `pr`)
#   4. proposing  → testing
#   5. proposing  → validating (alias `validate`)
#   6. testing    → validating
#   7. testing    → done (alias `pr`)
#   8. validating → done
#   9. unknown stage from reproducing → @exit:abandoned with reason set
#
# A regression that drops or reorders an arm must fail this flow.

test_kind: flow
app: ../app.yaml
initial_state: reproducing
initial_world:
  ticket_id:  "TKT-300"
  thread:     "TKT-300"
  judge_mode: "human"

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "" } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.agent.task:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

  host.agent.ask:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

  host.agent.decide:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

turns:
  - intent: { name: jump_to, slots: { stage: "test" } }
    expect_state: testing
    expect_world:
      jump_to:           "test"
      unsafe_jumps_made: 1

expect_no_errors: true

