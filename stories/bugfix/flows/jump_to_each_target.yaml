# Unknown jump_to target — falls through to @exit:abandoned with the
# structured reason. This is the controlled fallback for an invalid
# slot value (a regression that drops the default arm must fail this).

test_kind: flow
app: ../app.yaml
initial_state: reproducing
initial_world:
  ticket_id:  "TKT-308"
  thread:     "TKT-308"
  judge_mode: "human"

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "" } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.agent.task:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

  host.agent.ask:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

  host.agent.decide:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

turns:
  - intent: { name: jump_to, slots: { stage: "atlantis" } }
    expect_state: __exit__abandoned
    expect_world:
      abandon_reason: "jump_to_unknown_stage"
      status:         "abandoned"

expect_terminal: true
expect_no_errors: true
