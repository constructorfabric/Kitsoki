# review_diff_difftool_viewonly — no IDE attached, so host.diff.open falls back
# to a view-only system difftool: reviewed=true but verdict=null. emit_intent
# routes `review_inconclusive` → back to reviewing, where the operator's
# continue/restart choice is the recorded decision (the host call deliberately
# produces NO verdict for a view-only surface — never fabricated).

test_kind: flow
app: ../app.yaml
initial_state: reviewing
initial_world:
  ticket_id:       "TKT-882"
  ticket_title:    "review-diff view-only path"
  thread:          "TKT-882"
  workspace_id:    "ws-tkt-882"
  workdir:         ".worktrees/tkt-882"
  base_branch:     "main"
  feature_branch:  "fix/tkt-882"
  bugfix_mode:     "full"
  judge_mode:      "human"

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "@@ -1 +1 @@", files: ["internal/foo.go"] } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.diff.open:      { data: { verdict: null, reviewed: true, surface: "difftool:git" } }
  host.agent.task:
    data: { ok: true, submitted: { summary_title: "stub", summary_markdown: "stub", verdict: "continue", intent: "accept", confidence: 0.95 } }
  host.agent.ask:
    data: { ok: true, submitted: { summary_title: "stub", summary_markdown: "stub", verdict: "continue", intent: "accept", confidence: 0.95 } }
  host.agent.decide:
    data: { ok: true, submitted: { summary_title: "stub", summary_markdown: "stub", verdict: "continue", intent: "accept", confidence: 0.95 } }

turns:
  # view-only difftool: no verdict → emit_intent review_inconclusive → reviewing.
  - intent: { name: review_externally, slots: {} }
    expect_state: reviewing
    expect_world:
      review_surface:  "difftool:git"
      review_reviewed: true

expect_terminal: false
expect_no_errors: true
