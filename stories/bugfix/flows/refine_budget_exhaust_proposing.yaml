# refine_budget_exhaust_proposing — proposing_cycle hits proposing_budget
# and the next refine routes to @exit:abandoned with the structured
# reason set.

test_kind: flow
app: ../app.yaml
initial_state: proposing
initial_world:
  ticket_id:         "TKT-110"
  thread:            "TKT-110"
  judge_mode:        "human"
  proposing_budget:  2

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "" }
  host.git:
    data: { ok: true, sha: "abc", diff: "" }
  host.local:
    data: { ok: true, log: "PASS", passed: 1, failed: 0 }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "Stub proposal"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description:  "Sufficiently detailed fix description for the schemas."
        root_cause:       "off-by-one"
        affected_files:   ["x.go"]
        confidence:       0.85
        reasoning:        "Trace shows the off-by-one in the obvious place."

  host.agent.ask:
    data:
      ok: true
      submitted:
        summary_title:    "Stub proposal"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description:  "Sufficiently detailed fix description for the schemas."
        root_cause:       "off-by-one"
        affected_files:   ["x.go"]
        confidence:       0.85
        reasoning:        "Trace shows the off-by-one in the obvious place."

  host.agent.decide:
    data:
      ok: true
      submitted:
        summary_title:    "Stub proposal"
        summary_markdown: "stub"
        bug_verified:     true
        involved_components: [{ name: "x" }]
        fix_description:  "Sufficiently detailed fix description for the schemas."
        root_cause:       "off-by-one"
        affected_files:   ["x.go"]
        confidence:       0.85
        reasoning:        "Trace shows the off-by-one in the obvious place."

turns:
  # Walk to budget (2): two refines bring proposing_cycle 0 → 1 → 2.
  # Self-transitions; no on_enter re-fire.
  - intent: { name: refine, slots: { feedback: "first" } }
    expect_state: proposing
    expect_world: { proposing_cycle: 1 }
  - intent: { name: refine, slots: { feedback: "second" } }
    expect_state: proposing
    expect_world: { proposing_cycle: 2 }

  # Third refine fires the gate.
  - intent: { name: refine, slots: { feedback: "one too many" } }
    expect_state: __exit__abandoned
    expect_world:
      abandon_reason: "proposing_cycle_budget_exhausted"

expect_terminal: true
expect_no_errors: true
