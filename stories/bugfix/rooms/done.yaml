# done — phase 7 of the bugfix pipeline (close-out artifact + handoff).
#
# Produces the `done_artifact` (schemas/done_artifact.json): postmortem-
# style summary carried into pr-refinement by parent stories. The
# @exit:done.requires: [done_artifact] is enforced at load time —
# the accept arc here must set done_artifact via effects.
#
# Single merged state — see rooms/reproducing.yaml for the design.

states:

  done:
    description: "Build the run's close-out artifact; accept to hand off to pr-refinement."
    # Flattened view (no extends/blocks chrome) — `choice:` cannot live
    # inside a `blocks:` map. The base.pongo status line is inlined.
    view:
      - banner:
          text:     "DONE"
          subtitle: "Phase 7 / 7  ·  close-out artifact, hand off to pr-refinement"
          color:    "#10B981"   # emerald — success
      - prose: "{{ world.ticket_id|default:'(no ticket)' }} · cycle {{ world.cycle }} · {{ world.bugfix_mode }} bugfix · judge {{ world.judge_mode }}"
      - kv:
          pairs:
            Ticket:  "{{ world.ticket_id }} — {{ world.ticket_title }}"
            Summary: '{{ world.done_artifact.summary_title|default:"(pending)" }}'
      - heading: "Artifact"
      - code: '{{ world.done_artifact.summary_markdown|default:"(pending — agent has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "post and hand off to pr-refinement"
              intent: accept
            - label:  "refine"
              hint:   "re-draft the close-out with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to redo"
                required:    false
            - label:  "restart from reproducing"
              hint:   "bounce back to phase 1 (resets cycle)"
              intent: restart_from
              slots:  { stage: reproducing }
            - label:  "restart from proposing"
              hint:   "bounce back to phase 2 (resets cycle)"
              intent: restart_from
              slots:  { stage: proposing }
            - label:  "restart from implementing"
              hint:   "bounce back to phase 3 (resets cycle)"
              intent: restart_from
              slots:  { stage: implementing }
            - label:  "restart from testing"
              hint:   "bounce back to phase 4 (resets cycle)"
              intent: restart_from
              slots:  { stage: testing }
            - label:  "restart from validating"
              hint:   "bounce back to phase 6 (resets cycle)"
              intent: restart_from
              slots:  { stage: validating }
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [judge_mode, judge_confidence_threshold, ticket_id, ticket_title, thread, workdir, done_artifact, validate_artifact, fixed_in_commit, llm_verdict, refine_feedback, cycle]
    on_enter:
      # `working_dir` pins the agent to the bugfix worktree even though
      # done's postmortem agent mostly reads upstream artifact text —
      # consistency across rooms means an operator never has to remember
      # which agent calls see which tree.
      # `once: true` for reload-safety: keyed off its own bind
      # (done_artifact), so /reload (or self/on_error re-entry) re-renders
      # the stored close-out without re-running the agent. The refine arm
      # clears done_artifact to re-arm a fresh run. The accept arc
      # RE-PINS done_artifact for the @exit:done requires: check — that is
      # intentional and left intact.
      - invoke: host.agent.decide
        once: true
        with:
          agent: proposer
          prompt_path: prompts/done_executing.md
          schema: schemas/done_artifact.json
          working_dir: "{{ world.workdir }}"
          args:
            ticket_id:        "{{ world.ticket_id }}"
            ticket_title:     "{{ world.ticket_title }}"
            workdir:          "{{ world.workdir }}"
            validate_summary: "{{ world.validate_artifact.summary_markdown }}"
            cycle:            "{{ world.cycle }}"
            refine_feedback:  "{{ world.refine_feedback }}"
        bind:
          done_artifact: submitted
        on_error: idle

      # ── Lost-work guard: the open-PR clean-tree invariant ──────────────
      # Re-read the maker worktree's git status. The accept arc below refuses
      # to fire @exit:done if anything is uncommitted/untracked — the open-PR
      # analogue of the direct-ship integrate room's guard
      # (delivery-tail/rooms/integrate.yaml). Without this, a room that
      # mutated the worktree without committing (the test_author lost-work
      # split) would hand off a broken/partial committed tip while the dirty
      # working tree looked green. Runs AFTER the done agent so an agent that
      # itself wrote files is caught too. Guarded on a worktree existing so
      # narrative-only dogfood walks (no isolated worktree) skip it.
      - when: "world.workdir != ''"
        invoke: host.run
        id: done_clean_tree_check
        with:
          cmd: bash
          args:
            - "-c"
            - |
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              WT="{{ world.workdir }}"
              # `git -C` targets the worktree; NO cwd: is set so a missing/odd
              # worktree dir can't make exec fail to start (which would bounce
              # via on_error). A worktree that doesn't exist → git errors →
              # 2>/dev/null → DIRTY="" → reported clean (nothing to lose).
              DIRTY=$(git -C "$WT" status --porcelain 2>/dev/null || echo "")
              if [ -n "$DIRTY" ]; then
                jq -n --arg files "$DIRTY" '{dirty:true,files:$files}'
              else
                jq -n '{dirty:false,files:""}'
              fi
        bind:
          worktree_dirty:       "stdout_json.dirty"
          worktree_dirty_files: "stdout_json.files"
        # NO on_error: this check is a non-critical backstop whose only output
        # is binding worktree_dirty for the accept guard below. If git/host.run
        # can't run, worktree_dirty stays at its default (false) and the close-
        # out proceeds — degrade to "assume clean" rather than bounce the whole
        # room to idle (which would strand the done artifact). The PRIMARY
        # lost-work fix is the testing room's stage_all commit; this guard only
        # hardens the open-PR handoff when git IS readable.

      # Capture the committed tip that the issue is about to be closed against.
      # This is the direct-main equivalent of a PR merge link: the close-out arc
      # posts it in a stable, parseable `kitsoki-fixed-in` issue comment before
      # resolving the ticket.
      - when: "world.workdir != ''"
        invoke: host.run
        id: done_fixed_in_commit
        with:
          cmd: bash
          args:
            - "-c"
            - |
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              WT="{{ world.workdir }}"
              SHA=$(git -C "$WT" rev-parse --short=12 HEAD 2>/dev/null || true)
              jq -n --arg commit "$SHA" '{commit:$commit}'
        bind:
          fixed_in_commit: "stdout_json.commit"

      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        with:
          agent: judge
          prompt: prompts/judge_done.md
          schema: schemas/judge_verdict.json
          working_dir: "{{ world.workdir }}"
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_title:  "{{ world.done_artifact.summary_title }}"
            artifact_body:   "{{ world.done_artifact.summary_markdown }}"
        bind:
          llm_verdict: submitted

      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      # accept fires @exit:done. @exit:done.requires: [done_artifact]
      # is checked statically against the effects on this arc — we
      # re-pin done_artifact (it was bound on_enter) so the requires
      # gate sees an explicit set.
      accept:
        # LOST-WORK GUARD (open-PR): refuse to hand off if the maker worktree
        # has uncommitted/untracked work. The committed tip is what a parent's
        # pr-refinement / merge will carry — shipping it with the real fix or
        # a new test stranded in the working tree is the exact bug this guards
        # against. Fail loud to @exit:needs-human (mirrors the direct-ship
        # integrate guard) rather than silently shipping a partial tip.
        - when: "world.worktree_dirty"
          target: "@exit:needs-human"
          effects:
            - set:
                last_error: "refusing to hand off: the maker worktree has uncommitted work — it was never committed, so the committed tip is broken or partial while the working tree looks green. Commit it on the branch first:\n{{ world.worktree_dirty_files }}"
                status:     "needs-human"
        # Close out: post the artifact to the transport, transition the
        # upstream ticket to resolved, then fire @exit:done.
        # @exit:done.requires: [done_artifact] is checked statically
        # against the effects on this arc — done_artifact is re-pinned
        # below so the requires gate sees an explicit set.
        - target: "@exit:done"
          effects:
            - invoke: iface.transport.post
              with:
                thread:   "{{ world.thread }}"
                title:    "Bug-fix done: {{ world.ticket_id }}"
                body:     "{{ world.done_artifact.summary_markdown }}"
                phase_id: "done_{{ world.ticket_id }}"
            - invoke: iface.ticket.comment
              with:
                id: "{{ world.ticket_id }}"
                thread: "{{ world.thread }}"
                body: |
                  Fixed in:

                  - `{{ world.fixed_in_commit != '' ? world.fixed_in_commit : "unknown" }}` {{ (world.done_artifact.summary_title ?? '') != '' ? world.done_artifact.summary_title : "Bug-fix close-out" }}

                  Verification:

                  - {{ (world.validate_artifact.summary_title ?? '') != '' ? world.validate_artifact.summary_title : "Validation completed" }}

                  <!-- kitsoki-fixed-in
                  commits:
                    - {{ world.fixed_in_commit != '' ? world.fixed_in_commit : "unknown" }}
                  branch: {{ world.base_branch != '' ? world.base_branch : "main" }}
                  workdir: {{ world.workdir }}
                  verified:
                    - {{ (world.validate_artifact.summary_title ?? '') != '' ? world.validate_artifact.summary_title : "Validation completed" }}
                  -->
            - invoke: iface.ticket.transition
              with:
                id: "{{ world.ticket_id }}"
                to: "resolved"
            - set:
                status:        "fixed"
                done_artifact: "{{ world.done_artifact }}"

      refine:
        - when: "world.done_cycle >= world.done_budget"
          target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "done_cycle_budget_exhausted"
                status:         "abandoned"
        - target: done
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                done_cycle:      "{{ world.done_cycle + 1 }}"
                cycle:           "{{ world.cycle + 1 }}"
                # Clear the once: bind so on_enter re-runs the agent.
                done_artifact:   {}

      restart_from:
        - when: "slots.stage == 'reproducing'"
          target: reproducing
          effects:
            - set:
                restart_from_stage:    "reproducing"
                refine_feedback:       ""
                reproducing_cycle:     0
                cycle:                 0
                # Clear reproducing's once: bind so it re-runs fresh.
                reproduction_artifact: {}
        - when: "slots.stage == 'proposing' || slots.stage == 'propose_fix'"
          target: proposing
          effects:
            - set:
                restart_from_stage:   "{{ slots.stage }}"
                refine_feedback:      ""
                proposing_cycle:      0
                cycle:                0
                # Clear proposing's once: bind so it re-runs fresh.
                propose_fix_artifact: {}
        - when: "slots.stage == 'implementing' || slots.stage == 'implement_review'"
          target: implementing
          effects:
            - set:
                restart_from_stage:  "{{ slots.stage }}"
                refine_feedback:     ""
                implementing_cycle:  0
                cycle:               0
                # Clear implementing's once: bind so it re-applies fresh.
                implement_artifact:  {}
        - when: "slots.stage == 'testing' || slots.stage == 'test'"
          target: testing
          effects:
            - set:
                restart_from_stage:        "{{ slots.stage }}"
                refine_feedback:           ""
                testing_cycle:             0
                cycle:                     0
                # Clear testing's once: bind so it re-runs fresh.
                implement_review_artifact: {}
        - when: "slots.stage == 'validating' || slots.stage == 'validate'"
          target: validating
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                validating_cycle:   0
                cycle:              0
                # Clear validating's once: bind so it re-runs fresh.
                validate_artifact:  {}
        - target: validating
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'validating' }}"
                refine_feedback:    ""
                validating_cycle:   0
                cycle:              0
                # Clear validating's once: bind so it re-runs fresh.
                validate_artifact:  {}

      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
