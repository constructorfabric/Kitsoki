# done — phase 7 of the bugfix pipeline (close-out artifact + handoff).
#
# Produces the `done_artifact` (schemas/done_artifact.json): postmortem-
# style summary carried into pr-refinement by parent stories. The
# @exit:done.requires: [done_artifact] is enforced at load time —
# the accept arc here must set done_artifact via effects.
#
# Single merged state — see rooms/reproducing.yaml for the design.

states:

  done:
    description: "Build the run's close-out artifact; accept to exit:done (hands off to pr-refinement)."
    view: |
      Wrapping up {{ world.ticket_id }} — {{ world.ticket_title }}

      Summary: {{ world.done_artifact.summary_title|default:"(pending)" }}

      {{ world.done_artifact.summary_markdown|default:"(artifact pending — oracle has not returned yet)" }}

      Reply: `continue` (post + exit done, hand off to pr-refinement) · `refine` · `quit`
    relevant_world: [judge_mode, judge_confidence_threshold, ticket_id, ticket_title, thread, done_artifact, validate_artifact, llm_verdict, refine_feedback, cycle]
    on_enter:
      - invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/done_executing.md
          schema: schemas/done_artifact.json
          args:
            ticket_id:        "{{ world.ticket_id }}"
            ticket_title:     "{{ world.ticket_title }}"
            validate_summary: "{{ world.validate_artifact.summary_markdown }}"
            cycle:            "{{ world.cycle }}"
        bind:
          done_artifact: submitted
        on_error: idle

      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/judge_done.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_title:  "{{ world.done_artifact.summary_title }}"
            artifact_body:   "{{ world.done_artifact.summary_markdown }}"
        bind:
          llm_verdict: submitted

      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      # accept fires @exit:done. @exit:done.requires: [done_artifact]
      # is checked statically against the effects on this arc — we
      # re-pin done_artifact (it was bound on_enter) so the requires
      # gate sees an explicit set.
      accept:
        # Close out: post the artifact to the transport, transition the
        # upstream ticket to resolved, then fire @exit:done.
        # @exit:done.requires: [done_artifact] is checked statically
        # against the effects on this arc — done_artifact is re-pinned
        # below so the requires gate sees an explicit set.
        - target: "@exit:done"
          effects:
            - invoke: iface.transport.post
              with:
                thread:   "{{ world.thread }}"
                title:    "Bug-fix done: {{ world.ticket_id }}"
                body:     "{{ world.done_artifact.summary_markdown }}"
                phase_id: "done_{{ world.ticket_id }}"
            - invoke: iface.ticket.transition
              with:
                id: "{{ world.ticket_id }}"
                to: "resolved"
            - set:
                status:        "fixed"
                done_artifact: "{{ world.done_artifact }}"

      refine:
        - when: "world.done_cycle >= world.done_budget"
          target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "done_cycle_budget_exhausted"
                status:         "abandoned"
        - target: done
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                done_cycle:      "{{ world.done_cycle + 1 }}"
                cycle:           "{{ world.cycle + 1 }}"

      restart_from:
        - when: "slots.stage == 'reproducing'"
          target: reproducing
          effects:
            - set:
                restart_from_stage: "reproducing"
                refine_feedback:    ""
                reproducing_cycle:  0
                cycle:              0
        - when: "slots.stage == 'proposing' || slots.stage == 'propose_fix'"
          target: proposing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0
        - when: "slots.stage == 'implementing' || slots.stage == 'implement_review'"
          target: implementing
          effects:
            - set:
                restart_from_stage:  "{{ slots.stage }}"
                refine_feedback:     ""
                implementing_cycle:  0
                cycle:               0
        - when: "slots.stage == 'testing' || slots.stage == 'test'"
          target: testing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                testing_cycle:      0
                cycle:              0
        - when: "slots.stage == 'validating' || slots.stage == 'validate'"
          target: validating
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                validating_cycle:   0
                cycle:              0
        - target: validating
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'validating' }}"
                refine_feedback:    ""
                validating_cycle:   0
                cycle:              0

      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
