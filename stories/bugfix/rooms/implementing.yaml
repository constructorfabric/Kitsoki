# implementing — phase 3 of the bugfix pipeline (apply the proposed fix).
#
# Runs an agent that reads the propose_fix_artifact and APPLIES the
# edits to the worktree, then commits whatever's dirty. `continue`
# advances to testing for the run-and-review pass.
#
# Pre-2026-05-19 this room did NOT invoke an agent — it ran
# workspace.sync + vcs.commit + a misleading `say "Fix applied"` and
# advanced. The actual edits were never made; testing.on_enter then
# ran the repro tests against unchanged code and reported "Fix not
# applied" every time. The user-visible symptom was a happy pipeline
# that produced zero diff. The agent invocation below is the missing
# piece that makes implementing do its job.

states:

  implementing:
    description: "Apply the proposed fix to the workspace; advance to testing."
    # Flattened view (no extends/blocks chrome) — `choice:` cannot live
    # inside a `blocks:` map. The base.pongo status line is inlined.
    view:
      - banner:
          text:     "IMPLEMENTING"
          subtitle: "Phase 3 / 7  ·  apply the proposed fix to the workspace"
          color:    "#8B5CF6"   # violet — doing the work
      - prose: "{{ world.ticket_id|default:'(no ticket)' }} · cycle {{ world.cycle }} · {{ world.bugfix_mode }} bugfix · judge {{ world.judge_mode }}"
      - kv:
          pairs:
            Ticket:           "{{ world.ticket_id }} — {{ world.ticket_title }}"
            Workspace:        '{{ world.workspace_id|default:"—" }}{% if world.workdir %}  ·  {{ world.workdir }}{% endif %}'
            "Feature branch": '{{ world.feature_branch|default:"—" }}'
            Applied:          '{{ world.implement_artifact.summary_title|default:"(pending — agent has not returned yet)" }}'
            Status:           '{% if world.implement_artifact.applied == false %}blocked{% elif world.implement_artifact.summary_title %}applied{% else %}(pending){% endif %}'
            Files:            '{{ world.implement_artifact.files_changed|join:", "|default:"(none recorded)" }}'
      - heading: "Artifact"
      - code: '{{ world.implement_artifact.summary_markdown|default:"(no implementation body — agent pending or failed)" }}'
      - heading: "Blockers"
        when:  "world.implement_artifact.blockers"
      - code: |
          {% for b in world.implement_artifact.blockers %}- {{ b }}
          {% endfor %}
        when: "world.implement_artifact.blockers"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "advance to testing"
              intent: accept
            - label:  "restart from reproducing"
              hint:   "bounce back to phase 1 (resets cycle)"
              intent: restart_from
              slots:  { stage: reproducing }
            - label:  "restart from proposing"
              hint:   "bounce back to phase 2 (resets cycle)"
              intent: restart_from
              slots:  { stage: proposing }
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [ticket_id, ticket_title, workspace_id, workdir, feature_branch, propose_fix_artifact, implement_artifact, reproduction_artifact, gate_command, landing_gate, repro_committed, test_cmd, repro_gate_ran, repro_gate_ok, repro_baseline_green, repro_test_red, repro_gate_summary]
    on_enter:
      # Self-heal the workspace before we touch it. bf.idle's auto-
      # create only runs when `!bf_autostart_attempted`, so once that
      # flag is pinned (which it is after the first attempt regardless
      # of outcome), any session whose worktree dir later goes missing
      # — process restart, manual `rm -rf`, a prior aborted create —
      # would fail at sync below with `on_error: idle` and silently
      # bounce. iface.workspace.create is idempotent (returns ok when
      # the worktree is already registered at our path with our
      # branch; reattaches an orphaned branch when the dir was
      # deleted), so calling it here costs nothing in the happy case
      # and rescues the bounce case.
      # Idempotent re-create: same cut-point precedence as the idle autostart
      # (explicit base_commit, else base_branch) so a bounce-recovery rebuild
      # lands on the same baseline the reproducer used.
      - when: "world.workspace_id != '' && world.feature_branch != ''"
        invoke: iface.workspace.create
        with:
          id:   "{{ world.workspace_id }}"
          name: "{{ world.feature_branch }}"
          base: "{{ world.base_commit != '' ? world.base_commit : world.base_branch }}"
        on_error: idle
      # The iface.workspace.sync + iface.vcs.commit are the workspace-
      # side write seams (instance bindings: host.git_worktree / host.git
      # in kitsoki-dev). Guarded on non-empty ids so dogfood walks
      # without an isolated worktree degrade to a narrative-only beat
      # instead of bouncing to idle via on_error.
      - when: "world.workspace_id != ''"
        invoke: iface.workspace.sync
        with:
          id: "{{ world.workspace_id }}"
        on_error: idle

      # ── SYNTHESISE the regression gate (autonomous from a bare bug report) ──
      # When the ticket carried NO repro_command (gate_command empty), the
      # reproducer authored a RED test (a prior phase) and emitted a structured
      # repro_command + repro_test_paths. DERIVE the gate from it here, then commit
      # the test as a discrete pre-fix commit (commit_repro_test below) and run the
      # deterministic GREEN→RED gate — all BEFORE the implementer agent. This is now
      # safe because host.agent.task carries a DURABILITY BARRIER
      # (internal/host/agent_task.go waitForAgentWorktreeWrites) that blocks the
      # reproducer call until the maker backend's file writes have synced back to
      # the worktree, so the reproducer's RED test is provably on disk by the time
      # this room runs. (Historically the writes synced back at an UNBOUNDED later
      # moment, so the commit had to wait for the implementer or hand-roll a poll —
      # the barrier removes that race.) Guarded on gate_command=='' so a
      # ticket-supplied repro_command is untouched; latched (one-shot). The latch
      # is unconditional: if the test never becomes a discrete pre-fix commit,
      # testing's HEAD~1 gate finds it GREEN → @exit:needs-human — never a false
      # ship. That deterministic gate is the backstop.
      - when: |
          world.gate_command == '' && !world.repro_committed &&
          (world.reproduction_artifact.repro_command ?? '') != '' &&
          len(world.reproduction_artifact.repro_test_paths ?? []) > 0
        set:
          gate_command:    "{{ world.reproduction_artifact.repro_command }}"
          landing_gate:    "{{ world.reproduction_artifact.repro_command }}"
          repro_committed: true

      # Commit the reproducer's RED test as the DISCRETE pre-fix commit — BEFORE
      # the implementer applies the fix, so the only dirty change is the test and
      # `git add -A` captures it whatever path the reproducer actually wrote (the
      # reproducer's reported repro_test_paths proved unreliable — a path-specific
      # `git add` silently no-op'd while the file WAS on disk). We stage ALL (minus
      # the .kitsoki-owner sentinel), safe because nothing else is dirty yet (the
      # implementer hasn't run).
      # NOTE: the old per-call poll loop (POLL git status up to ~12s for the maker
      # backend's unbounded file flush) is GONE — host.agent.task now carries a
      # DURABILITY BARRIER (internal/host/agent_task.go waitForAgentWorktreeWrites)
      # that blocks the reproducer call until its writes are durable on disk before
      # reproducing/on_enter returns, so by here the test file is provably present.
      # Synthesis path only (repro_committed latched above). A stray no-commit is
      # caught by testing's HEAD~1 gate (GREEN → needs-human) — never a false ship.
      - when: "world.repro_committed && world.workdir != ''"
        invoke: host.run
        id: commit_repro_test
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set +e
              export GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              WT="{{ world.workdir }}"
              cd "$WT" || { printf '{"sha":"","committed":false}\n'; exit 0; }
              git add -A
              git reset -q -- .kitsoki-owner 2>/dev/null
              if git diff --cached --quiet; then
                printf '{"sha":"","committed":false}\n'
              else
                git commit -q -m "test(repro): RED reproducer for {{ world.ticket_id }}" >/dev/null 2>&1
                printf '{"sha":"%s","committed":true}\n' "$(git -C "$WT" rev-parse HEAD)"
              fi
          cwd: "{{ world.workdir }}"
        on_error: idle

      # DETERMINISTIC GREEN→RED gate (synthesis path). Runs AFTER the reproducer's
      # RED test is committed as the discrete pre-fix tip (commit_repro_test above)
      # and BEFORE the implementer spends any maker budget. Proves the first two
      # legs of the GREEN→RED→GREEN lifecycle mechanically, off the project
      # test_cmd + the synthesised repro_command — no pre-supplied oracle, so it
      # is leak-safe in a bake-off:
      #   GREEN (baseline): test_cmd on a HEAD~1 scratch worktree (the branch
      #                     BEFORE the repro test) must exit 0 — the branch was
      #                     clean, so the failure we induce is genuinely NEW.
      #   RED   (reproducer): repro_command on the current tree (repro test present,
      #                     fix not yet applied) must exit non-zero — the bug
      #                     actually reproduces.
      # repro_gate_ok = baseline_green && test_red. The GREEN(fix) leg is proven in
      # `testing` (HEAD~1 RED→GREEN regression gate). !ok ⇒ restart_from reproducing
      # with the verdict as feedback, BEFORE the implementer runs. Empty test_cmd ⇒
      # skipped (LLM-only fallback). Scoped to repro_committed (synthesis path); a
      # ticket-supplied repro_command keeps reproducing's pre-agent RED gate.
      # Reuses testing's HEAD~1 scratch-worktree technique. See
      # .context/green-red-green-repro-gate.md + flows/bugfix_green_red_green_gate.yaml.
      - when: "world.repro_committed && world.test_cmd != '' && world.workdir != '' && !world.repro_gate_ran"
        invoke: host.run
        id: repro_det_gate
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set +e
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              WT="{{ world.workdir }}"
              cd "$WT" || { jq -n '{ran:false,baseline_green:false,test_red:false,ok:false,summary:"gate skipped: workdir unavailable",log:""}'; exit 0; }
              TESTCMD='{{ world.test_cmd }}'
              REPRO='{{ world.gate_command }}'
              # RED leg: the reproducer's command on the current tip (repro test
              # present, no fix yet) must FAIL.
              RED_EXIT=0; RED_OUT=$( bash -c "$REPRO" 2>&1 ) || RED_EXIT=$?
              # GREEN baseline: the branch BEFORE the repro test (HEAD~1) must pass
              # the suite. Materialise it in a detached scratch worktree.
              PREFIX_SHA=$( git rev-parse 'HEAD~1' 2>/dev/null || echo "" )
              BASE_EXIT=0; BASE_OUT=""
              if [ -z "$PREFIX_SHA" ]; then
                BASE_EXIT=99; BASE_OUT="no pre-test snapshot (HEAD~1 missing)"
              else
                SCRATCH="$WT-baseline-gate"
                if git worktree add --detach "$SCRATCH" "$PREFIX_SHA" >/dev/null 2>&1; then
                  BASE_OUT=$( (cd "$SCRATCH" && bash -c "$TESTCMD") 2>&1 ) || BASE_EXIT=$?
                  git worktree remove --force "$SCRATCH" >/dev/null 2>&1 || true
                else
                  BASE_EXIT=98; BASE_OUT="could not materialise HEAD~1 scratch worktree"
                fi
              fi
              RED=false;   [ "$RED_EXIT"  -ne 0 ] && RED=true
              GREEN=false; [ "$BASE_EXIT" -eq 0 ] && GREEN=true
              OK=false; { [ "$RED" = true ] && [ "$GREEN" = true ]; } && OK=true
              if   [ "$OK" = true ];     then SUM="✅ GREEN→RED proven · baseline GREEN (test_cmd exit 0 on HEAD~1) → reproducer RED (repro_command exit $RED_EXIT)"
              elif [ "$GREEN" != true ]; then SUM="❌ baseline NOT green — branch already failing (test_cmd exit $BASE_EXIT on HEAD~1) without the reproducer test; gate cannot trust this branch"
              else                            SUM="❌ reproducer test did NOT fail (repro_command exit 0) — bug not reproduced"
              fi
              RED_TAIL=$( printf '%s' "$RED_OUT"  | tail -c 1500 )
              BASE_TAIL=$( printf '%s' "$BASE_OUT" | tail -c 1500 )
              LOG=$( printf 'baseline(GREEN) test_cmd exit=%s on HEAD~1 | reproducer(RED) repro_command exit=%s\n[reproducer/RED tail]\n%s\n[baseline/GREEN tail]\n%s' "$BASE_EXIT" "$RED_EXIT" "$RED_TAIL" "$BASE_TAIL" )
              jq -n --arg sum "$SUM" --arg log "$LOG" --argjson green $GREEN --argjson red $RED --argjson ok $OK \
                '{ran:true,baseline_green:$green,test_red:$red,ok:$ok,summary:$sum,log:$log}'
          cwd: "{{ world.workdir }}"
        bind:
          repro_gate_ran:       "stdout_json.ran"
          repro_baseline_green: "stdout_json.baseline_green"
          repro_test_red:       "stdout_json.test_red"
          repro_gate_ok:        "stdout_json.ok"
          repro_gate_summary:   "stdout_json.summary"
          repro_gate_log:       "stdout_json.log"
        on_error: idle

      # Post the deterministic verdict so it is legible in the trace + thread the
      # moment the gate runs.
      - when: "world.repro_gate_ran && world.repro_gate_summary != ''"
        invoke: iface.transport.post
        with:
          thread:   "{{ world.thread }}"
          title:    "Repro gate (GREEN→RED): {{ world.ticket_id }}"
          body:     "{{ world.repro_gate_summary }}\n\n{{ world.repro_gate_log }}"
          phase_id: "repro_gate_{{ world.ticket_id }}_{{ world.cycle }}"

      # Deterministic bounce: the GREEN→RED proof FAILED (baseline not green, or
      # the reproducer's test didn't fail). Restart from reproducing with the
      # verdict as feedback BEFORE the implementer runs — never spend maker budget
      # on an untrustworthy reproducer. The agent step below is skipped this turn.
      - when: "world.repro_gate_ran && !world.repro_gate_ok"
        emit_intent: restart_from
        slots:
          stage:    reproducing
          feedback: "{{ world.repro_gate_summary }}"

      # Apply the proposed fix. The agent runs with cwd=workdir
      # (the bugfix worktree), reads the proposal artifact, and uses
      # Edit/Write to make the actual code changes. Without this
      # step the room is a no-op and testing observes "fix not
      # applied". See the file header above for the regression
      # history.
      # `once: true` for reload-safety: keyed off its own bind
      # (implement_artifact). This agent MUTATES FILES, so re-running it
      # on every /reload / self-transition / on_error re-entry would
      # re-apply edits against an already-patched tree. Skipping when the
      # artifact is already bound makes the apply idempotent. Every arc
      # that re-enters implementing for a FRESH apply — testing's
      # failed/blocked accept arms, validating's fail_short arm, and the
      # restart_from-to-implementing arms — clears implement_artifact to
      # re-arm the apply.
      - when: "world.workdir != ''"
        invoke: host.agent.task
        once: true
        with:
          agent: implementer
          working_dir: "{{ world.workdir }}"
          acceptance:
            schema: schemas/implementing_artifact.json
          context:
            prompt: prompts/implementing_executing.md
            args:
              ticket_id:        "{{ world.ticket_id }}"
              ticket_title:     "{{ world.ticket_title }}"
              workdir:          "{{ world.workdir }}"
              fix_description:  "{{ world.propose_fix_artifact.fix_description }}"
              root_cause:       "{{ world.propose_fix_artifact.root_cause }}"
              # join the list into a readable string — args are expr-lang
              # (not pongo2), so use join(arr, glue); `?? []` keeps it
              # nil-safe when no proposal artifact has bound yet (raw
              # interpolation stringified the []interface{} as a Go type dump).
              affected_files:   '{{ join(world.propose_fix_artifact.affected_files ?? [], ", ") }}'
              refine_feedback:  "{{ world.refine_feedback }}"
              cycle:            "{{ world.cycle }}"
        bind:
          implement_artifact: submitted
        on_error: idle

      - when: "world.workdir != ''"
        invoke: iface.vcs.commit
        with:
          workdir: "{{ world.workdir }}"
          message: "{{ world.propose_fix_artifact.summary_title }}"
          # Stage the agent's files explicitly. `git commit -a`
          # picks up modifications to tracked files but does NOT
          # stage new files — so a `Write`-based edit (agent
          # creating a helper) would silently vanish without this
          # explicit add. files_changed comes from the
          # implementing artifact and is the agent's record of
          # everything it touched.
          files: "{{ world.implement_artifact.files_changed }}"
        on_error: idle

      # Guard on a title being bound: during the autonomous auto-advance
      # cascade this say fires before either artifact binds, which would emit a
      # bare "Fix applied — " with a dangling em-dash. Truthiness skips nil/empty.
      - when: "(world.implement_artifact.summary_title ?? '') != '' || (world.propose_fix_artifact.summary_title ?? '') != ''"
        say: "Fix applied — {{ world.implement_artifact.summary_title|default:world.propose_fix_artifact.summary_title }}"
    on:
      accept:
        - target: testing

      restart_from:
        - when: "slots.stage == 'reproducing'"
          target: reproducing
          effects:
            - set:
                restart_from_stage:    "reproducing"
                # Carry any feedback (e.g. the deterministic GREEN→RED gate's
                # verdict when it bounced an untrustworthy reproducer) so the
                # re-authored reproduction addresses it.
                refine_feedback:       "{{ slots.feedback ?? '' }}"
                reproducing_cycle:     0
                cycle:                 0
                # Clear reproducing's once: bind so it re-runs fresh.
                reproduction_artifact: {}
                # Re-arm the synthesis + deterministic GREEN→RED gate so a fresh
                # reproducer test is re-committed and re-checked from scratch.
                repro_committed:       false
                gate_command:          ""
                repro_gate_ran:        false
                repro_gate_ok:         false
                repro_gate_summary:    ""
        - when: "slots.stage == 'proposing' || slots.stage == 'propose_fix'"
          target: proposing
          effects:
            - set:
                restart_from_stage:   "{{ slots.stage }}"
                refine_feedback:      ""
                proposing_cycle:      0
                cycle:                0
                # Clear proposing's once: bind so it re-runs fresh.
                propose_fix_artifact: {}
        - target: proposing
          effects:
            - set:
                restart_from_stage:   "{{ slots.stage ?? 'proposing' }}"
                refine_feedback:      ""
                proposing_cycle:      0
                cycle:                0
                # Clear proposing's once: bind so it re-runs fresh.
                propose_fix_artifact: {}

      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
