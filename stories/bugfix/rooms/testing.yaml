# testing — phase 4 of the bugfix pipeline (test review + tests added).
#
# Produces the `implement_review_artifact` (schemas/testing_artifact.json):
# review of the implementation plus added tests, with pass/blocked verdict.
#
# Single merged state — see rooms/reproducing.yaml for the design.
#
# # The accept arc is status-aware
#
# Pre-2026-05-19 the accept arc unconditionally posted the artifact and
# advanced to reviewing (or to done in quick mode), regardless of the
# artifact's `status`. So a `failed` or `blocked` verdict was broadcast
# as a successful test-review and progress carried on past a broken
# implementation. Same shape as the validating room's pre-fix bug; see
# rooms/validating.yaml for the full history.
#
# Post-fix the arc branches on `world.implement_review_artifact.status`:
#
#   passed  → post + advance to reviewing (or to done in quick mode)
#   failed  → return to implementing — patch the fix (no post)
#   blocked → return to implementing — the suite couldn't decide (no post)
#
# Each non-pass arm bumps `implementing_cycle` so the existing
# `implementing_budget` guard bails the session out if the operator keeps
# cycling. The `continue` hint renders per status.

states:

  testing:
    description: "Run + review tests for the applied fix; advance to reviewing (or done in quick mode)."
    # Flattened view (no extends/blocks chrome) — `choice:` cannot live
    # inside a `blocks:` map. The base.pongo status line is inlined.
    view:
      - banner:
          text:     "TESTING"
          subtitle: "Phase 4 / 7  ·  run + review tests against the applied fix"
          color:    "#F59E0B"   # amber — caution
      - prose: "{{ world.ticket_id|default:'(no ticket)' }} · cycle {{ world.cycle }} · {{ world.bugfix_mode }} bugfix · judge {{ world.judge_mode }}"
      - kv:
          pairs:
            Ticket:  "{{ world.ticket_id }} — {{ world.ticket_title }}"
            Summary: '{{ world.implement_review_artifact.summary_title|default:"(pending)" }}'
            Status:  '{{ world.implement_review_artifact.status|default:"(pending)" }}'
      - heading: "Artifact"
      - code: '{{ world.implement_review_artifact.summary_markdown|default:"(pending — oracle has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "post and advance to reviewing (or done in quick mode)"
              intent: accept
            - label:  "refine"
              hint:   "re-run tests with feedback"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "what to redo"
                required:    false
            - label:  "restart from reproducing"
              hint:   "bounce back to phase 1 (resets cycle)"
              intent: restart_from
              slots:  { stage: reproducing }
            - label:  "restart from proposing"
              hint:   "bounce back to phase 2 (resets cycle)"
              intent: restart_from
              slots:  { stage: proposing }
            - label:  "restart from implementing"
              hint:   "bounce back to phase 3 (resets cycle)"
              intent: restart_from
              slots:  { stage: implementing }
            - label:  "jump to validating"
              hint:   "skip ahead (audited)"
              intent: jump_to
              slots:  { stage: validating }
            - label:  "jump to done"
              hint:   "skip to close-out (audited)"
              intent: jump_to
              slots:  { stage: done }
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [judge_mode, judge_confidence_threshold, ticket_id, ticket_title, thread, workdir, implement_review_artifact, propose_fix_artifact, ci_log, llm_verdict, refine_feedback, cycle, bugfix_mode]
    on_enter:
      # Run tests against the change. iface.ci.run_tests is wired by
      # the instance binding (host.local in kitsoki-dev). The log is
      # bound to ci_log so the next invoke can read it. No `target:`
      # — the local-CI handler forwards target verbatim as the last
      # `go test` arg (package path / `-run` pattern). Passing the
      # proposal's summary_title made `go test` choke on `:` /
      # whitespace and surface a pseudo-failure
      # ("malformed import path") that masked real test outcomes.
      - invoke: iface.ci.run_tests
        with:
          workdir: "{{ world.workdir }}"
        bind:
          ci_log: log
        on_error: idle

      # Produce the structured testing artifact from the run output.
      # `working_dir` pins the oracle (and its MCP filesystem tools) to
      # the bugfix worktree — without it, any grep/read the oracle runs
      # to verify the fix lands on the wrong tree (kitsoki's cwd = main,
      # where the fix never lives).
      - invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/testing_executing.md
          schema: schemas/testing_artifact.json
          working_dir: "{{ world.workdir }}"
          args:
            ticket_id:       "{{ world.ticket_id }}"
            ticket_title:    "{{ world.ticket_title }}"
            workdir:         "{{ world.workdir }}"
            fix_summary:     "{{ world.propose_fix_artifact.summary_markdown }}"
            ci_log:          "{{ world.ci_log }}"
            refine_feedback: "{{ world.refine_feedback }}"
            cycle:           "{{ world.cycle }}"
        bind:
          implement_review_artifact: submitted
        on_error: idle

      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/judge_testing.md
          schema: schemas/judge_verdict.json
          working_dir: "{{ world.workdir }}"
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_title:  "{{ world.implement_review_artifact.summary_title }}"
            artifact_body:   "{{ world.implement_review_artifact.summary_markdown }}"
        bind:
          llm_verdict: submitted

      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      # accept routes by implement_review_artifact.status (failed/blocked
      # → implementing; passed → reviewing or done-in-quick). The
      # bugfix_mode=quick branch collapses past reviewing on pass. See
      # file header for the full history.
      accept:
        # failed / blocked — fix needs another pass; check budget.
        - when: |
            (world.implement_review_artifact.status == 'failed' ||
             world.implement_review_artifact.status == 'blocked') &&
            world.implementing_cycle >= world.implementing_budget
          target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "implementing_cycle_budget_exhausted_after_testing"
                status:         "abandoned"
        - when: |
            world.implement_review_artifact.status == 'failed' ||
            world.implement_review_artifact.status == 'blocked'
          target: implementing
          effects:
            - set:
                refine_feedback:    "{{ world.implement_review_artifact.summary_markdown }}"
                implementing_cycle: "{{ world.implementing_cycle + 1 }}"
                cycle:              "{{ world.cycle + 1 }}"

        # passed (or legacy/missing status) — post and advance. The
        # bugfix_mode=quick path skips reviewing + validating and lands
        # at done directly.
        - when: "world.bugfix_mode == 'quick'"
          target: done
          effects:
            - invoke: iface.transport.post
              with:
                thread:   "{{ world.thread }}"
                title:    "Test review: {{ world.ticket_id }}"
                body:     "{{ world.implement_review_artifact.summary_markdown }}"
                phase_id: "testing_{{ world.ticket_id }}_{{ world.cycle }}"
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0
        - target: reviewing
          effects:
            - invoke: iface.transport.post
              with:
                thread:   "{{ world.thread }}"
                title:    "Test review: {{ world.ticket_id }}"
                body:     "{{ world.implement_review_artifact.summary_markdown }}"
                phase_id: "testing_{{ world.ticket_id }}_{{ world.cycle }}"
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0

      refine:
        - when: "world.testing_cycle >= world.testing_budget"
          target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "testing_cycle_budget_exhausted"
                status:         "abandoned"
        - target: testing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                testing_cycle:   "{{ world.testing_cycle + 1 }}"
                cycle:           "{{ world.cycle + 1 }}"

      restart_from:
        - when: "slots.stage == 'reproducing'"
          target: reproducing
          effects:
            - set:
                restart_from_stage: "reproducing"
                refine_feedback:    ""
                reproducing_cycle:  0
                cycle:              0
        - when: "slots.stage == 'proposing' || slots.stage == 'propose_fix'"
          target: proposing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0
        - when: "slots.stage == 'implementing' || slots.stage == 'implement'"
          target: implementing
          effects:
            - set:
                restart_from_stage:  "{{ slots.stage }}"
                refine_feedback:     ""
                implementing_cycle:  0
                cycle:               0
        - target: proposing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'proposing' }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0

      jump_to:
        - when: "slots.stage == 'validating' || slots.stage == 'validate'"
          target: validating
          effects:
            - set:
                jump_to:           "{{ slots.stage }}"
                unsafe_jumps_made: "{{ world.unsafe_jumps_made + 1 }}"
        - when: "slots.stage == 'done' || slots.stage == 'pr'"
          target: done
          effects:
            - set:
                jump_to:           "{{ slots.stage }}"
                unsafe_jumps_made: "{{ world.unsafe_jumps_made + 1 }}"
        - target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "jump_to_unknown_stage"
                status:         "abandoned"

      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
