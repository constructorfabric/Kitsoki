# testing — phase 7 + 7.5 of the cyber-repo pipeline (test review + impl).
#
# Produces the `implement_review_artifact` (schemas/testing_artifact.json):
# review of the implementation plus added tests, with a pass/blocked verdict.

states:

  testing_executing:
    description: "Reviewing and adding tests for the applied fix."
    view: |
      Testing {{ world.ticket_id }} — {{ world.ticket_title }}

      Summary: {{ world.implement_review_artifact.summary_title|default:"(pending)" }}
      Status:  {{ world.implement_review_artifact.status|default:"(pending)" }}

      {{ world.implement_review_artifact.summary_markdown|default:"(artifact pending — oracle has not returned yet)" }}

      Type `proceed` to deliver the artifact, `restart_from` to back up.
    relevant_world: [ticket_id, ticket_title, workdir, implement_review_artifact, propose_fix_artifact, ci_log, cycle]
    on_enter:
      # Run tests against the changes (iface.ci.run_tests is wired by Slice β
      # to host.local — Wave 1 returns canned ok and the log goes into
      # world.ci_log for the oracle call below). We bind into a scratch key
      # so the structured-artifact bind below doesn't overwrite itself.
      - invoke: iface.ci.run_tests
        with:
          workdir: "{{ world.workdir }}"
          target:  "{{ world.propose_fix_artifact.summary_title }}"
        bind:
          ci_log: log
        on_error: idle
      # Produce the structured testing artifact from the run output.
      - invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/testing_executing.md
          schema: schemas/testing_artifact.json
          args:
            ticket_id:    "{{ world.ticket_id }}"
            ticket_title: "{{ world.ticket_title }}"
            fix_summary:  "{{ world.propose_fix_artifact.summary_markdown }}"
            ci_log:       "{{ world.ci_log }}"
        bind:
          implement_review_artifact: submitted
        on_error: idle
    on:
      proceed:
        - target: testing_awaiting_reply
      restart_from:
        - when: "slots.stage == 'reproducing'"
          target: reproducing_executing
          effects:
            - set:
                restart_from_stage: "reproducing"
                refine_feedback:    ""
                reproducing_cycle:  0
                cycle:              0
        - when: "slots.stage == 'proposing' || slots.stage == 'propose_fix'"
          target: proposing_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0
        - target: proposing_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'proposing' }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  testing_awaiting_reply:
    description: "Test review posted; awaiting verdict."
    view: |
      ✓ Test review posted to transport + inbox.

      Summary: {{ world.implement_review_artifact.summary_title|default:"(none)" }}
      Status: {{ world.implement_review_artifact.status|default:"(none)" }}
      LLM verdict: {{ world.llm_verdict.verdict|default:"(skipped — human mode)" }}{% if world.llm_verdict.confidence %}  (confidence {{ world.llm_verdict.confidence }}){% endif %}{% if world.llm_verdict.reason %}
      Reason: {{ world.llm_verdict.reason }}{% endif %}

      Reply: `accept` (advance to reviewing/validating per bugfix_mode) · `refine feedback=...` · `restart_from stage=...` · `quit`
    relevant_world: [judge_mode, judge_confidence_threshold, ticket_id, thread, implement_review_artifact, llm_verdict, cycle]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:    "{{ world.thread }}"
          title:     "Test review: {{ world.ticket_id }}"
          body:      "{{ world.implement_review_artifact.summary_markdown }}"
          phase_id:  "testing_{{ world.ticket_id }}_{{ world.cycle }}"
      - invoke: host.inbox.add
        with:
          kind:    checkpoint
          title:   "Test review: {{ world.ticket_id }}"
          thread:  "{{ world.thread }}"
          state:   testing_awaiting_reply
          body:    "{{ world.implement_review_artifact.summary_markdown }}"
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.oracle.ask_with_mcp
        with:
          prompt: prompts/judge_testing.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_title:  "{{ world.implement_review_artifact.summary_title }}"
            artifact_body:   "{{ world.implement_review_artifact.summary_markdown }}"
        bind:
          llm_verdict: submitted
      # Step 4: auto-fire the LLM's verdict above the confidence floor.
      # Same shape across every checkpoint (see contract §6 / rooms/reproducing.yaml).
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      # bugfix_mode=quick collapses the pipeline by jumping straight from
      # testing to done (skipping reviewing + validating). The first arm
      # gates on world.bugfix_mode; full mode falls through to the default
      # reviewing_executing arc.
      accept:
        - when: "world.bugfix_mode == 'quick'"
          target: done_executing
          effects:
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0
        - target: reviewing_executing
          effects:
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0
      # L2 cycle-budget gate on refine — see rooms/reproducing.yaml.
      refine:
        - when: "world.testing_cycle >= world.testing_budget"
          target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "testing_cycle_budget_exhausted"
                status:         "abandoned"
        - target: testing_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                testing_cycle:   "{{ world.testing_cycle + 1 }}"
                cycle:           "{{ world.cycle + 1 }}"
      restart_from:
        - when: "slots.stage == 'reproducing'"
          target: reproducing_executing
          effects:
            - set:
                restart_from_stage: "reproducing"
                refine_feedback:    ""
                reproducing_cycle:  0
                cycle:              0
        - when: "slots.stage == 'proposing' || slots.stage == 'propose_fix'"
          target: proposing_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0
        - when: "slots.stage == 'implementing' || slots.stage == 'implement'"
          target: implementing_executing
          effects:
            - set:
                restart_from_stage:  "{{ slots.stage }}"
                refine_feedback:     ""
                implementing_cycle:  0
                cycle:               0
        - target: proposing_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'proposing' }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0
      jump_to:
        - when: "slots.stage == 'validating' || slots.stage == 'validate'"
          target: validating_executing
          effects:
            - set:
                jump_to:           "{{ slots.stage }}"
                unsafe_jumps_made: "{{ world.unsafe_jumps_made + 1 }}"
        - when: "slots.stage == 'done' || slots.stage == 'pr'"
          target: done_executing
          effects:
            - set:
                jump_to:           "{{ slots.stage }}"
                unsafe_jumps_made: "{{ world.unsafe_jumps_made + 1 }}"
        - target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "jump_to_unknown_stage"
                status:         "abandoned"
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
