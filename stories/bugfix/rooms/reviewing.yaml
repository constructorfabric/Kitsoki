# reviewing — phase 5 of the bugfix pipeline (self code + security review).
# No artifact-producing oracle. The reviewing pass is a synchronous
# narrative beat: read the diff, say something, advance to validating.

states:

  reviewing:
    description: "Starting reviewing — self-review the diff (code + security); advance to validating."
    view:
      extends: "base"
      blocks:
        body:
          - banner:
              text:     "REVIEWING"
              subtitle: "Phase 5 / 7  ·  self-review the diff (code + security)"
              color:    "#F43F5E"   # rose — review under scrutiny
          - kv:
              pairs:
                Ticket:  "{{ world.ticket_id }} — {{ world.ticket_title }}"
                Summary: '{{ world.implement_review_artifact.summary_title|default:"(pending)" }}'
                Status:  '{{ world.implement_review_artifact.status|default:"(pending)" }}'
          - heading: "Artifact"
          - code: '{{ world.implement_review_artifact.summary_markdown|default:"(pending — oracle has not returned yet)" }}'
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "continue"
                  hint:  "advance to validating"
                - label: "restart_from stage=…"
                  hint:  "bounce back to an earlier room"
                - label: "quit"
                  hint:  "abandon the pipeline"
                - label: "look"
    relevant_world: [ticket_id, ticket_title, workdir, implement_review_artifact]
    on_enter:
      - invoke: iface.vcs.diff
        with:
          workdir: "{{ world.workdir }}"
        bind:
          ci_log: diff
        on_error: idle
      - say: "Review pass complete — diff {{ world.implement_review_artifact.status|default:'pending' }}."
    on:
      accept:
        - target: validating

      restart_from:
        - when: "slots.stage == 'reproducing'"
          target: reproducing
          effects:
            - set:
                restart_from_stage: "reproducing"
                refine_feedback:    ""
                reproducing_cycle:  0
                cycle:              0
        - when: "slots.stage == 'proposing' || slots.stage == 'propose_fix'"
          target: proposing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0
        - when: "slots.stage == 'implementing' || slots.stage == 'implement_review'"
          target: implementing
          effects:
            - set:
                restart_from_stage:  "{{ slots.stage }}"
                refine_feedback:     ""
                implementing_cycle:  0
                cycle:               0
        - when: "slots.stage == 'testing' || slots.stage == 'test'"
          target: testing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage }}"
                refine_feedback:    ""
                testing_cycle:      0
                cycle:              0
        - target: proposing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'proposing' }}"
                refine_feedback:    ""
                proposing_cycle:    0
                cycle:              0

      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
