# bugfix — general-purpose, provider-neutral bug-fix pipeline.
#
# Wave 1 / Slice α (see docs/proposals/notes/dev-story-implementation-contract.md):
# the 7 visible rooms (idle → reproducing → proposing → implementing → testing
# → reviewing → validating → done) collapse the cyber-repo's 14-phase pipeline
# into one state machine. Each room has an `_executing` substate that drives
# the LLM call producing the artifact, and (for checkpointed rooms) an
# `_awaiting_reply` substate that posts the artifact, mirrors it to the local
# inbox, optionally runs an LLM-judge, and waits for accept / refine /
# restart_from / quit.
#
# # One YAML, three modes — judge polymorphism
#
# A single `world.judge_mode` flag selects who answers at every checkpoint:
#
#   human          — wait for an explicit human reply intent (no LLM call)
#   llm            — run the LLM-judge; if confident, the LLM's reply is
#                    captured into world.llm_verdict for an operator-driven
#                    follow-up; if not confident, the state holds (operator
#                    sweep). [strict mode for batch overnight runs]
#   llm_then_human — run the LLM-judge; if confident, capture verdict; if not
#                    confident, fall through to the human reply path.
#                    [recommended autonomous default]
#
# The same YAML drives all three. Only one host call is gated by `when:` per
# checkpoint — no fork in the state graph.
#
# # What is NOT here (Wave 2):
#   - the pr-refinement tail import (the `@exit:done` hands off to a parent
#     story that imports pr-refinement; standalone Wave 1 terminates here)
#   - cycle budgets, `restart_from_stage` plumbing, `quick_fix` / `skip_to_pr`
#     shortcut intents
#   - actual provider implementations for ticket / vcs / ci / workspace —
#     Slice β ships the handlers; this story references them by name only
#   - automatic intent emission from a confident LLM verdict (the contract's
#     `emit_intent:` effect is not yet supported by the runtime — see the
#     final report; for now an authorised human / operator types the verdict's
#     intent. The verdict text lives in world.llm_verdict.reason for review.)

app:
  id: bugfix
  version: 0.1.0
  title: "Bug-fix pipeline"
  author: "Kitsoki"
  license: "CC0"

# Host allow-list. The six iface defaults below register implicitly through
# resolveAllInterfaces — every `iface.<name>.<op>` site is union'd into hosts
# as `<binding>.<op>` at load time. Bare `host.inbox.add` and
# `host.oracle.ask_with_mcp` calls are listed explicitly because they are not
# wrapped by an iface.
hosts:
  - host.inbox.add
  - host.oracle.ask_with_mcp

# Six host_interfaces — the provider-neutral surfaces every parent story
# binds to a concrete handler at import time. Operation names + I/O shapes
# are fixed by the contract; only the `default:` may be rebound.
host_interfaces:

  # 2.1 ticket — issue tracker (file / GitHub Issues / Jira).
  ticket:
    description: "Issue tracker abstraction (file / GitHub Issues / Jira)."
    operations:
      search:
        input:  { query: string, limit: int }
        output: { tickets: list }
      get:
        input:  { id: string }
        output: { id: string, title: string, body: string, status: string,
                  priority: string, assignee: string, url: string, comments: list }
      comment:
        input:  { id: string, body: string, thread: string }
        output: { ok: bool, comment_id: string }
      transition:
        input:  { id: string, to: string }
        output: { ok: bool }
      list_mine:
        input:  { filter: string }
        output: { tickets: list }
    default: host.local_files.ticket

  # 2.2 vcs — version control + PR host (git / GitHub / Bitbucket).
  vcs:
    description: "Branch / commit / PR abstraction (git / GitHub / Bitbucket)."
    operations:
      branch:
        input:  { workdir: string, name: string, base: string }
        output: { ok: bool, branch: string }
      diff:
        input:  { workdir: string }
        output: { diff: string, files: list }
      commit:
        input:  { workdir: string, message: string, files: list }
        output: { ok: bool, sha: string }
      push:
        input:  { workdir: string, remote: string }
        output: { ok: bool, url: string }
      open_pr:
        input:  { workdir: string, title: string, body: string, base: string }
        output: { ok: bool, url: string, pr_id: string }
      pr_status:
        input:  { pr_id: string }
        output: { state: string, checks: list, comments: list }
      pr_comment:
        input:  { pr_id: string, body: string }
        output: { ok: bool }
    default: host.git

  # 2.3 ci — build & test runner (local make / go test, GitHub Actions, Jenkins).
  ci:
    description: "Build/test runner (local make/go test, GitHub Actions, Jenkins)."
    operations:
      run_tests:
        input:  { workdir: string, target: string }
        output: { ok: bool, passed: int, failed: int, log: string, junit: string }
      build:
        input:  { workdir: string, target: string }
        output: { ok: bool, log: string }
      remote_status:
        input:  { pr_id: string }
        output: { state: string, checks: list }
    default: host.local

  # 2.4 workspace — per-task working tree (git worktree by default).
  workspace:
    description: "Working-copy manager. Local: git worktree."
    operations:
      list:
        input:  {}
        output: { workspaces: list }
      get:
        input:  { id: string }
        output: { id: string, path: string, branch: string, dirty: bool }
      create:
        input:  { name: string, ticket_id: string, base: string }
        output: { ok: bool, path: string }
      sync:
        input:  { id: string }
        output: { ok: bool, log: string }
    default: host.git_worktree

  # 2.5 transport — out-of-band channel for checkpoint artifacts. For
  # kitsoki-dev this is `host.append_to_file` (appends a comment block to the
  # local bug file); cyber-repo's parent story will rebind to
  # `host.jira_comment`. host.stdout (no-op) is available for tests that
  # don't care about the side effect.
  transport:
    description: "Out-of-band channel for posting proposals, checkpoints, status."
    operations:
      post:
        input:  { thread: string, body: string }
        output: { ok: bool, message_id: string }
    default: host.append_to_file

# World — Wave 1 keys (contract §4). Provider handlers populate these via
# `bind:` projections inside rooms; checkpoint judges read them via
# `relevant_world:`.
world:
  # ── Identity / ticket ──────────────────────────────────────────────────
  ticket_id:        { type: string, default: "" }
  ticket_title:     { type: string, default: "" }
  ticket_status:    { type: string, default: "" }
  ticket_url:       { type: string, default: "" }
  thread:           { type: string, default: "" }
  allowed_authors:  { type: string, default: "" }   # CSV — list not yet a first-class scalar type

  # ── Workspace ─────────────────────────────────────────────────────────
  workspace_id:     { type: string, default: "" }
  workdir:          { type: string, default: "" }
  base_branch:      { type: string, default: "" }
  feature_branch:   { type: string, default: "" }

  # ── Pipeline control ──────────────────────────────────────────────────
  bugfix_mode:      { type: string, default: "full" }            # full | quick
  judge_mode:       { type: string, default: "human" }           # human | llm | llm_then_human
  judge_confidence_threshold: { type: float, default: 0.8 }

  # Global cycle counter — tracks total refinements across the run. Per-phase
  # counters (below) drive the L2 budget gates; this scalar is a coarse
  # convenience for views / audit.
  cycle:            { type: int,    default: 0 }

  # ── L2 cycle budgets — per-checkpoint refine counters + budgets ──────
  #
  # Wave 3 / Phase 4 — port of the cyber-repo bugfix's L2 cycle-budget
  # pattern (HALLY-MIGRATION §2.6). Each checkpointed room maintains its
  # own `<phase>_cycle` counter; when `refine` fires the counter increments
  # and the room re-executes. When the counter hits `<phase>_budget` the
  # refine arc redirects to `@exit:abandoned` with `abandon_reason:
  # <phase>_cycle_budget_exhausted` — the operator gets one bail-out
  # instead of an infinite loop.
  #
  # Budgets default to 3 (matches cyber-repo's L2 retry caps); operators
  # can override per-session by setting `<phase>_budget` in initial_world.
  # `cycle_budget` is the documented global default — kept here for parity
  # with the proposal §4.2 vocabulary but not currently used directly by
  # any arc (each phase reads its own `_budget` key).
  reproducing_cycle:    { type: int, default: 0 }
  proposing_cycle:      { type: int, default: 0 }
  implementing_cycle:   { type: int, default: 0 }
  testing_cycle:        { type: int, default: 0 }
  reviewing_cycle:      { type: int, default: 0 }
  validating_cycle:     { type: int, default: 0 }
  done_cycle:           { type: int, default: 0 }
  cycle_budget:         { type: int, default: 3 }   # documented global default
  reproducing_budget:   { type: int, default: 3 }
  proposing_budget:     { type: int, default: 3 }
  implementing_budget:  { type: int, default: 3 }
  testing_budget:       { type: int, default: 3 }
  reviewing_budget:     { type: int, default: 3 }
  validating_budget:    { type: int, default: 3 }
  done_budget:          { type: int, default: 3 }

  # Audit counter — incremented every time a `jump_to` arc fires. A non-zero
  # value at @exit:done means the pipeline skipped phases; parent stories /
  # post-mortems read this to know that, e.g., the testing phase didn't run.
  unsafe_jumps_made:   { type: int, default: 0 }

  last_reply_author:   { type: string, default: "" }
  refine_feedback:     { type: string, default: "" }
  jump_to:             { type: string, default: "" }
  restart_from_stage:  { type: string, default: "" }
  abandon_reason:      { type: string, default: "" }

  # ── Per-room artifacts (objects; each holds {summary_title, summary_markdown, …}) ─
  reproduction_artifact:     { type: object, default: {} }
  propose_fix_artifact:      { type: object, default: {} }
  implement_review_artifact: { type: object, default: {} }
  validate_artifact:         { type: object, default: {} }
  done_artifact:             { type: object, default: {} }

  # ── Judge state ───────────────────────────────────────────────────────
  llm_verdict:      { type: object, default: {} }   # { intent, reason, confidence, verdict }

  # ── PR (populated by pr-refinement in Wave 2; held here for round-trip) ─
  pr_id:            { type: string, default: "" }
  pr_url:           { type: string, default: "" }
  ci_state:         { type: string, default: "" }
  ci_log:           { type: string, default: "" }  # last CI run log; scratch

  # ── Story-level "done" sink for standalone runs ──────────────────────
  status:           { type: string, default: "open" }

# Intent vocabulary. Per-room arcs use these names. Slot shapes:
#   refine.feedback          — operator note explaining what to redo
#   restart_from.stage       — name of a prior room to re-enter
#   quit                     — no slots
intents:
  start:
    description: "Begin the pipeline from idle."
    examples: [start, "begin", "kick off"]
    priority: 90
  proceed:
    description: "Advance from an _executing room to its _awaiting_reply checkpoint."
    examples: [proceed, "next", "deliver"]
    priority: 85
  accept:
    description: "Accept the current checkpoint artifact; advance."
    examples: [accept, "approve", "lgtm", "ship it"]
    priority: 80
  refine:
    description: "Refine the current checkpoint; re-execute with feedback."
    examples: [refine, "rework", "redo"]
    priority: 70
    slots:
      feedback: { type: string, required: false }
  restart_from:
    description: "Restart from a named prior stage (resets that phase's cycle counter)."
    examples: [restart_from, "restart"]
    priority: 60
    slots:
      stage: { type: string, required: false }
  jump_to:
    description: "Jump forward to a later phase, skipping intermediate work. Increments world.unsafe_jumps_made."
    examples: [jump_to, "jump"]
    priority: 55
    slots:
      stage: { type: string, required: false }
  # ── Interactive shortcuts (proposal §4.2). The three modes set
  # world.bugfix_mode then advance directly into the appropriate _executing
  # state. quick_fix collapses the pipeline to reproducing → proposing →
  # implementing → testing → done (reviewing + validating skipped).
  # skip_to_pr jumps straight into validating with restart_from_stage set
  # so a parent (or post-validate review) can later wire back. ─────────
  quick_fix:
    description: "Shortcut from idle: walk reproducing → proposing → implementing → testing → done (skip reviewing + validating)."
    examples: [quick_fix, "quick", "one shot"]
    priority: 75
  skip_to_pr:
    description: "Shortcut from idle: skip reproducing/proposing/implementing/testing/reviewing, jump straight into validating."
    examples: [skip_to_pr, "to pr", "skip ahead"]
    priority: 75
  full_pipeline:
    description: "Default — walk all phases. Set bugfix_mode=full and start from reproducing."
    examples: [full_pipeline, "full", "all phases"]
    priority: 75
  quit:
    description: "Abandon the pipeline."
    examples: [quit, "abort", "bail"]
    priority: 50
  look:
    description: "Re-render the current view."
    examples: [look, "what now?"]
    priority: 10

# Intents exposed to importing parent stories. Wave 2 (dev-story hub)
# `intents.import: [start, proceed, accept, refine, restart_from, quit]`
# lifts these into the parent's bare intent table so an operator can
# drive the imported pipeline without typing the `bf__` prefix.
exports:
  intents: [start, proceed, accept, refine, restart_from, jump_to, quick_fix, skip_to_pr, full_pipeline, quit, look]

# Named return points. A parent story (dev-story / kitsoki-dev / cyber-devstory)
# maps each to one of its own states. Standalone load synthesises
# `__exit__done` and `__exit__abandoned` terminals.
exits:
  done:
    description: "Pipeline succeeded; ready to hand off to pr-refinement."
    requires: [done_artifact]
  abandoned:
    description: "User or LLM bailed."

# Root state — the operator-controlled entry point. Children fold this into
# `bf` (or similar alias) and `entry: idle` enters here.
root: idle

# Rooms live in rooms/*.yaml. One file per visible room.
include:
  - rooms/*.yaml
