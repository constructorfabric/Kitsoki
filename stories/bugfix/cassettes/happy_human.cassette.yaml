      prompt: "# Reviewing tests & implementation — produce the testing artifact\n\nYou are reviewing the implementation of the fix for **TKT-001** —\n*TUI hangs on ESC*.\n\nThe proposed fix was:\n\n> ## Bug\n\nWhen a user presses **ESC while an LLM turn is in flight** (`ModeAwaitingLLM`, spinner active), the keypress is silently discarded. No system menu opens, no transcript hint is shown, and the in-flight turn is not cancelled. The TUI appears completely frozen.\n\n## Root Cause\n\n`routeKey()` in `internal/tui/tui.go:1251` gates the ESC→menu transition on `ModeOnPath | ModeOffPath` only:\n\n```go\nif msg.Type == tea.KeyEsc {\n    if m.mode == ModeOnPath || m.mode == ModeOffPath {\n        m.mode = ModeMenu\n        m.menuSystem.Open()\n        return m, nil\n    }\n}\n```\n\nWhen `m.mode == ModeAwaitingLLM` the guard is not entered, the key falls through to `m.prompt.Update(msg)` (the `charmbracelet/bubbles/textarea` widget), which has no ESC binding and silently drops it.\n\nCtrl+C is handled correctly at line 1187 — it calls `m.inFlightCancel()` and returns — but ESC has no equivalent branch for this mode.\n\n## Fix\n\nAdd a `ModeAwaitingLLM` case immediately inside the existing ESC block at `tui.go:1252`. The branch should (a) call `m.inFlightCancel()` if non-nil, (b) transition to `ModeMenu`, and (c) call `m.menuSystem.Open()`. This mirrors what Ctrl+C does for cancellation, and what the existing ESC branch does for menu entry:\n\n```go\nif msg.Type == tea.KeyEsc {\n    if m.mode == ModeOnPath || m.mode == ModeOffPath {\n        m.mode = ModeMenu\n        m.menuSystem.Open()\n        return m, nil\n    }\n    // NEW: ESC during an in-flight turn cancels the turn and opens the menu.\n    if m.mode == ModeAwaitingLLM {\n        if m.inFlightCancel != nil {\n            m.inFlightCancel()\n        }\n        m.mode = ModeMenu\n        m.menuSystem.Open()\n        return m, nil\n    }\n}\n```\n\nThe comment on the existing guard (\"It deliberately does not fire during ModeAwaitingLLM — Ctrl+C cancels the turn first\") should be removed or updated, as this constraint is lifted by the fix.\n\n## Files\n\n- `internal/tui/tui.go` — the only change site (lines 1247–1257)\n\n## Verification\n\nThe existing reproduction test at `internal/tui/tkt001_esc_repro_test.go` fully covers the fix. After the patch, `TestTKT001_EscSilentlySwallowedDuringInFlight`'s three `assert.*` calls will all fail (proving correct behaviour), while the positive-control test `TestTKT001_ControlEscFromOnPathOpensMenu` must continue to pass.\n\n## Confidence: 0.95\n\nThe ESC guard condition is the sole code path involved; the fix is a direct extension of the existing guard pattern. The only uncertainty is how `turnOutcomeMsg` arrives while `ModeMenu` is active — but the menu mode is already exercised by the positive-control test and by normal interactive use, so no new edge case is introduced.\n\nThe CI / test run produced:\n\n```\nPASS: 12 tests\n```\n\n\n\n## Constraints\n\n- `status` must be `passed` only if the tests actually ran and the bug\n  reproduction now produces the expected outcome. `blocked` is for\n  unrunnable suites (compile error, missing dependency); `failed` is for\n  ran-but-broken.\n- `tests_added` must list new / modified test files. Reuse existing tests\n  where possible; only add fresh ones if no existing test covers the bug.\n- `blockers` are review-grade objections that must be fixed before the\n  PR can advance.\n\n## Output\n\nSubmit an `implement_review_artifact` (see `schemas/testing_artifact.json`).\nThe `summary_markdown` should walk the reviewer through tests-added,\ntests-run results, and any blockers in plain prose.\n"
      response: "{\"text\":\"Artifact submitted. Here's what the review found:\\n\\n**Status: `failed`** — 3 blockers.\\n\\n### What the tests actually show\\n\\nThe reproduction test (`TestTKT001_EscBannerDismiss_BlocksEventLoop`) ran and **passed** — meaning it confirmed the bug is present. But this test is structured as a bug-reproduction test: it asserts `elapsed \\u003e= 150ms`, which is true only *while the bug exists*. After a correct fix the assertion would flip to a failure.\\n\\n### Why the proposal is wrong in three ways\\n\\n1. **Fix not applied.** `tui.go:1251` still reads `ModeOnPath || ModeOffPath` — the `ModeAwaitingLLM` case from the proposal was never committed.\\n\\n2. **Wrong fix for the actual bug.** The actual bug is at `tui.go:1324`: `m.jobStore.MarkNotificationRead(ctx, n.ID)` is called **synchronously inside `Update()`**, blocking the event loop for the full SQLite write duration. The proposed guard change at line 1251 would make ESC return early before reaching the banner handler — hiding the blocking call as a side effect, but never fixing the root cause. The correct fix is to move the `MarkNotificationRead` call into a `tea.Cmd` closure, matching `handleInboxItemSelected` at line 1080-1085.\\n\\n3. **Wrong bug description and test names.** The proposal describes \\\"ESC silently discarded, no menu opens\\\" and cites two tests that don't exist (`TestTKT001_EscSilentlySwallowedDuringInFlight`, `TestTKT001_ControlEscFromOnPathOpensMenu`). The actual bug is the event-loop block; the actual test is `TestTKT001_EscBannerDismiss_BlocksEventLoop`.\"}"
      call_id: b5c8f4783037e788

