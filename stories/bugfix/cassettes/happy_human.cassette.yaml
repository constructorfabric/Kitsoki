ug is present, not that the fix is applied.\n\n## What the reproduction test actually covers (vs. the proposal)\n\nThe proposal describes TKT-001 as *\"ESC silently discarded during `ModeAwaitingLLM` — no menu opens, no in-flight turn is cancelled.\"* The proposed fix is to add a `ModeAwaitingLLM` guard inside the ESC block at `tui.go:1251-1257` that calls `inFlightCancel()` and opens the system menu.\n\nThe actual test file documents a **different bug**: when ESC is pressed to dismiss an `action_required` notification banner while `ModeAwaitingLLM` is active, the handler at `tui.go:1316-1330` calls `m.jobStore.MarkNotificationRead(ctx, n.ID)` **synchronously inside `Update()`**, blocking the Bubble Tea event loop for the full duration of the SQLite write. The proposed guard change at line 1251 would cause ESC to return early before reaching the banner handler — silently hiding the banner ESC behaviour rather than fixing the blocking call. The correct fix is to move the `MarkNotificationRead` call into a `tea.Cmd` closure at line 1324, matching the async pattern already used in `handleInboxItemSelected` at `tui.go:1080-1085`.\n\nAdditionally, the test names cited in the proposal (`TestTKT001_EscSilentlySwallowedDuringInFlight`, `TestTKT001_ControlEscFromOnPathOpensMenu`) do not exist in the codebase. Only `TestTKT001_EscBannerDismiss_BlocksEventLoop` is present.\n\n## Blockers\n\nThree review-grade objections must be addressed before this PR can advance.\n\nBefore submitting:\n\n1. Walk the feedback statement-by-statement and confirm the new\n   review addresses each point. If the feedback says \"do not X\",\n   the review must NOT do X — including in `summary_markdown`,\n   `status`, `tests_added`, and `blockers`.\n2. If you genuinely cannot honour a statement (schema-incompatible,\n   factually impossible), say so in `summary_markdown` and explain\n   why. Silent non-compliance is the failure mode this directive\n   guards against.\n3. If the feedback contradicts 