      system_prompt: You are a bug reproduction analyst. Read the codebase, reproduce the reported bug, identify the affected components, and produce a structured reproduction artifact.
      prompt: "# Reproducing a bug — produce the reproduction artifact\n\nYou are reproducing bug **TKT-001** — *TUI hangs on ESC* against\nthe working tree at `.worktrees/tkt-001`.\n\nYour job is to produce evidence — a deterministic reproduction (a test, a\nscript, a recorded sequence) — that the bug is real, plus the components /\nmodules / services implicated.\n\n\n\n## Constraints\n\n- Do not fabricate evidence. `bug_verified` is `true` only when a\n  deterministic reproduction artifact was actually produced (test file on\n  disk, recorded shell session, screen capture).\n- `involved_components[*].name` must be a real component / module / service\n  in the codebase; phantom components corrupt downstream context.\n- `summary_markdown` is what a human reviewer will read in the checkpoint\n  inbox — write it for them, not for yourself.\n\n## Output\n\nSubmit a `reproduction_artifact` (see `schemas/reproducing_artifact.json`):\n\n- `summary_title` — one line, the bug title with verification status.\n- `summary_markdown` — markdown reviewers see; at minimum: what is broken,\n  how you reproduced it, where the evidence lives, what services are\n  implicated.\n- `bug_verified` — true only with an actual reproduction artifact.\n- `steps` — ordered, executable.\n- `expected_outcome`, `actual_outcome` — concise factual statements.\n- `evidence_paths` — files written this turn.\n- `involved_components` — at least one `{ name, reason }`.\n"
      response: "{\"text\":\"Bug verified and artifact submitted. Here's the summary:\\n\\n**TKT-001: ESC silently swallowed during in-flight LLM turn** — confirmed.\\n\\n**Root cause:** `routeKey()` in `internal/tui/tui.go:1251` guards the ESC→menu transition to `ModeOnPath | ModeOffPath` only. When `mode == ModeAwaitingLLM`, ESC falls through to `m.prompt.Update(msg)`, and the `bubbles/textarea` widget has no ESC binding, so the key is dropped without any feedback.\\n\\n**Evidence:** `internal/tui/tkt001_esc_repro_test.go` — both tests pass. The reproduction test (`TestTKT001_EscSilentlySwallowedDuringInFlight`) confirms all three bug conditions: mode stays `ModeAwaitingLLM`, transcript is unchanged, and `inFlightCancel` is never called. The positive control (`TestTKT001_ControlEscFromOnPathOpensMenu`) verifies ESC still works correctly from `ModeOnPath`.\\n\\n**Fix direction:** Add a `ModeAwaitingLLM` branch to the ESC handler — either call `inFlightCancel` directly and emit a hint, or open the system menu (consistent with the existing Ctrl+C cancel path).\"}"
      call_id: 4f933c38df706535

