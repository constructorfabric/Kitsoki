      name: score
    expect_state: scoring
    expect_world:
      score_status: passed
      report_json: .artifacts/model-task-engineering/glm52/deliver-decompose-glm52-report.json
      report_markdown: .artifacts/model-task-engineering/glm52/deliver-decompose-glm52-report.md
