# narrated_smoke — proposal §14 (Phase H), end-to-end exercise of the
# narrated-mode round-trip.
#
# Drives a short trail segment with `narration: true`, stubbing the
# three agent hosts so CI runs at zero cost. Every event substate and
# the landmark arrival now have a `when: world.narration` invoke arm
# in their on_enter that calls a Claude prompt — this fixture proves
# all of them light up and bind their results into world.
#
# Stubs returned
# --------------
#   host.agent.ask            stdout="Heavy rain fell upon the wagon
#                              till the canvas dripped through..."
#                              (used for the four non-illness events +
#                              landmark arrival; the same body is
#                              returned for every call — the assertion
#                              is on presence-in-the-right-world-key,
#                              not on content.)
#
#   host.agent.decide         submitted: { illness: cholera,
#                                            severity: 3,
#                                            treatment: fluids }
#                              (used for event_disease.on_enter,
#                              already proven by disease_with_mcp.yaml;
#                              this fixture exercises it in the same
#                              session as the new prose arms.)
#
#   host.run                   stdout="73"  (the rng host; OT only
#                              calls it from a deferred phase, but
#                              we declare it for completeness since
#                              its allow-list entry exists.)
#
# Why no world_override
# ---------------------
# The orchestrator path implements world_override by appending
# EffectApplied events with Turn=0 (see internal/testrunner/flows.go
# injectWorldOverride); this collides on the (session, turn, seq)
# UNIQUE constraint with the seed events we already wrote in
# seedInitialState.  Fixtures that combine host_handlers and
# world_override therefore hit a runtime UNIQUE failure on the second
# world_override.  The simplest workaround — and the one that
# preserves "no engine changes" for Phase H — is to chain real
# `continue` turns to advance miles/rng instead.  The initial seed
# below picks a starting miles + rng pair that drives the desired
# event arm on T1, and the rest of the chain falls out arithmetically.
#
# Initial seed math
# -----------------
#   T1 roll = (miles + rng_counter) % 100
#           = (86 + 74) % 100 = 60  → [60, 75) = disease arm
#
#   After T1 (disease arm of traveling.continue):
#     miles  += 14 (steady pace)        → 100
#     rng    += 1                        → 75
#
#   After T2 (wait_out default arm; health_avg above 30 threshold):
#     day    += 1                        (no miles/rng/food change)
#     event_kind, illness_kind cleared
#
#   T3 arrival guard wins (100 + 14 >= 102), so this turn routes to
#     leg_a_awaiting_reply regardless of the rng roll.  miles becomes
#     114 in the arrival arm; the awaiting_reply.continue arm in T4
#     resets it to 0 and bumps current_landmark.
#
#   T4 continue from awaiting_reply:
#     - resets miles to 0
#     - clears event/illness/breakdown world keys
#     - lands in leg_b_executing.traveling
#
#   T5 roll = (0 + 75) % 100 = 75  → [75, 85) = breakdown arm
#     - miles  → 14
#     - rng    → 76
#     - breakdown_part = wheel  (rng_last % 3 = 0)
#
# Turn checklist
# --------------
#   T1: world.illness_kind         set from MCP submitted JSON
#   T3: world.last_landmark_prose  set from host.agent.ask stdout
#   T5: world.last_event_prose     set from host.agent.ask stdout
#
# Final state: leg_b_executing.event_breakdown.

test_kind: flow
app: ../app.yaml
initial_state: leg_a_executing.traveling
initial_world:
  party_names:   "John,Sarah,Tom,Mary,Anne"
  profession:    farmer
  month:         june
  year:          1848
  money:         400
  oxen:          4
  food_lbs:      500
  bullets:       200
  clothing_sets: 2
  spare_wheels:  1
  spare_axles:   1
  spare_tongues: 1
  pace:          steady
  rations:       filling
  party_alive:   5
  health_avg:    90
  # ── Narrated mode: routes every event substate's on_enter (and the
  # awaiting_reply on_enter) through the agent handlers instead of
  # the deterministic fallbacks.
  narration:     true
  current_landmark: "Independence"
  # See the math block above.  miles_traveled=86, rng_counter=74
  # makes the T1 roll land on the disease arm (60 ∈ [60, 75)) WITHOUT
  # tripping the arrival guard (86 + 14 = 100 < 102).
  miles_traveled: 86
  rng_counter:   74
  event_kind:    ""
  current_event_attempts: 0
  day:           1

host_handlers:

  host.run:
    data:
      stdout:    "73"
      exit_code: 0
      ok:        true
    delay: "0s"

  host.agent.ask:
    data:
      stdout:    "Heavy rain fell upon the wagon till the canvas dripped through. The wheel split at the felloe in a slough of mud — we'll be a day in the wet patching it."
      exit_code: 0
      ok:        true
    delay: "0s"

  host.agent.decide:
    data:
      stdout:    "diagnosed: cholera (severity 3, treatment fluids)"
      exit_code: 0
      ok:        true
      submitted:
        illness:   cholera
        severity:  3
        treatment: fluids
    delay: "0s"

turns:

  # ── T1: continue from leg_a_executing.traveling. ────────────────
  # Roll = (86 + 74) % 100 = 60 → disease arm.  86 + 14 = 100 < 102
  # so the arrival guard does NOT fire on this turn.
  # event_disease.on_enter:
  #   1. shared baseline: health -= 10, current_event_attempts := 0
  #   2. when: not narration   SKIPPED (narration is true)
  #   3. when: narration       invokes host.agent.decide;
  #                             bind populates illness_* from submitted.*.
  - intent: { name: continue, slots: {} }
    expect_state: leg_a_executing.event_disease
    expect_world:
      event_kind:        "disease"
      rng_last:          60
      illness_kind:      "cholera"
      illness_severity:  3
      illness_treatment: "fluids"
      health_avg:        80              # 90 - 10 shared baseline
      rng_counter:       75
      miles_traveled:    100

  # ── T2: wait_out the disease. ───────────────────────────────────
  # health_avg=80 > 30 → default (recovery) arm: +1 day, clear event,
  # return to traveling.  This arm doesn't touch last_event_prose,
  # which is fine: event_disease never writes that key (its narration
  # goes through MCP into illness_* instead).
  - intent: { name: wait_out, slots: {} }
    expect_state: leg_a_executing.traveling
    expect_world:
      event_kind:    ""
      illness_kind:  ""

  # ── T3: continue → arrival. ─────────────────────────────────────
  # miles_traveled (100) + step (14) >= distance_mi (102), so the
  # arrival guard wins over the rng roll.  Routes to
  # leg_a_awaiting_reply, whose on_enter:
  #   1. clears last_landmark_prose (Phase G post-then-clear)
  #   2. host.transport.post the trail-diary entry
  #   3. when: narration → invoke host.agent.ask; bind stdout into
  #      world.last_landmark_prose.
  - intent: { name: continue, slots: {} }
    expect_state: leg_a_awaiting_reply
    expect_world:
      # current_landmark is updated by the awaiting_reply.continue
      # arm in T4, not by the arrival arm here.  At arrival the
      # landmark is still the previous leg's from_landmark
      # (Independence) — which is fine for the prose generator since
      # the prompt passes args.landmark from tpl.to_landmark.
      current_landmark:    "Independence"
      miles_traveled:      114        # 100 + 14 from the arrival arm
      last_landmark_prose: "Heavy rain fell upon the wagon till the canvas dripped through. The wheel split at the felloe in a slough of mud — we'll be a day in the wet patching it."

  # ── T4: continue from awaiting_reply → leg_b_executing.traveling.
  # Resets miles to 0 and clears event/illness/breakdown keys.  The
  # landmark prose is intentionally NOT cleared here — the next
  # awaiting_reply.on_enter will clear it at the top of its block.
  - intent: { name: continue, slots: {} }
    expect_state: leg_b_executing.traveling
    expect_world:
      current_landmark: "Kansas River Crossing"
      miles_traveled:   0

  # ── T5: continue from leg_b traveling. ──────────────────────────
  # Roll = (0 + 75) % 100 = 75 → breakdown arm.
  # event_breakdown.on_enter:
  #   1. set baseline: zero attempts, pick part, clear prose
  #   2. when: narration → invoke host.agent.ask, bind stdout into
  #      world.last_event_prose.
  - intent: { name: continue, slots: {} }
    expect_state: leg_b_executing.event_breakdown
    expect_world:
      event_kind:       "breakdown"
      rng_last:         75
      breakdown_part:   "wheel"          # rng_last % 3 == 0 → wheel
      last_event_prose: "Heavy rain fell upon the wagon till the canvas dripped through. The wheel split at the felloe in a slough of mud — we'll be a day in the wet patching it."

expect_no_errors: true
