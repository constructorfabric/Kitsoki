# host_failure_recovery — exercises the on_error: arc in the event-roll chain.
#
# Phase C/H wired the narrated branch of event_disease.on_enter to use
# host.agent.decide with `on_error: {{ tpl.id }}_error` (per
# proposal §6.2.1 / §9.6). When the host call fails with an infra
# error, the orchestrator's on_error redirect lands us in the leg's
# `_error` state instead of the disease substate.
#
# The fixture stubs host.agent.decide with `infra_error:` so the
# handler returns (Result{}, error). The orchestrator's host-call
# dispatcher catches the error and walks the on_error: target, emitting
# a TransitionApplied with intent: "on_error".
#
# What this proves:
#   1. The on_error: target is wired through the phase expander.
#      `{{ tpl.id }}_error` resolves to `leg_d_error` for the disease
#      event triggered from leg_d_executing.
#   2. Infra errors do NOT crash the runner — they land in a recoverable
#      state. The `retry` intent on _error returns to the leg's executing.
#   3. The post-redirect world reflects the partial on_enter chain:
#      the shared-baseline `current_event_attempts: 0` + `health_avg -= 10`
#      ran (these are not gated on world.narration), and the deterministic
#      `not narration` branch was skipped (narration is true). Only the
#      narrated host invoke failed.
#
# Same RNG / world setup as disease_with_mcp.yaml so the comparison is
# apples-to-apples: rng = (0 + 62) % 100 = 62 → disease arm.

test_kind: flow
app: ../app.yaml
initial_state: leg_d_executing.traveling
initial_world:
  party_names:   "John,Sarah,Tom,Mary,Anne"
  profession:    banker
  month:         june
  money:         200
  oxen:          4
  food_lbs:      500
  clothing_sets: 2
  pace:          steady
  rations:       filling
  party_alive:   5
  health_avg:    80
  narration:     true
  miles_traveled: 0
  rng_counter:   62
  event_kind:    ""
  current_landmark: "Chimney Rock"
  current_event_attempts: 0

host_handlers:
  # Simulate an infrastructure failure (e.g. Claude unreachable, validator
  # process crash). The orchestrator surfaces this as an on_error redirect
  # to the leg's _error state.
  host.agent.decide:
    infra_error: "transient infra failure — validator unreachable"

turns:

  # Turn 1: continue. The traveling.continue arm rolls into ../event_disease;
  # event_disease.on_enter starts the narrated host call which fails; the
  # on_error redirect lands us in leg_d_error instead of event_disease.
  - intent: { name: continue, slots: {} }
    expect_state: leg_d_error
    expect_world:
      # The traveling.continue arm's effects ran first (mileage / food
      # advance, rng_last/rng_counter set, event_kind: "disease").
      event_kind:   "disease"
      rng_last:     62
      rng_counter:  63
      # Shared baseline from event_disease.on_enter (not gated on
      # narration) — current_event_attempts zeroed, health_avg -= 10.
      current_event_attempts: 0
      health_avg:             70
      # The bind: payloads never landed — illness_kind / severity /
      # treatment retain their defaults.
      illness_kind:      ""
      illness_severity:  0
      illness_treatment: ""

  # Turn 2: retry from _error returns to the leg's _executing root. The
  # compound state's resolveInitial brings us back to traveling.
  - intent: { name: retry, slots: {} }
    expect_state: leg_d_executing.traveling
    expect_world:
      event_kind: ""

expect_no_errors: true
