# general_store — phase D refactor. Hosts the buy_supplies proposal
# (declared in proposals.yaml) by reproducing the drafting → reviewing
# → done lifecycle declaratively as a compound state.
#
# # Why hand-rolled?
#
# internal/proposal compiles the ProposalKind / ProposalExecute /
# ProposalPolicy schema and validates them at load time, but the
# orchestrator does not drive the lifecycle (proposal/executor.go is
# only used by proposal_test.go today). Matching testdata/apps/
# proposal_smoke, we reproduce the lifecycle here with substates and
# `set:` effects. The proposal_smoke pattern.
#
# # Substates
#
#   idle       — pre-draft, "I want to buy stuff" entry point. Also
#                where the wagon is loaded enough to leave.
#   reviewing  — a draft exists; show it, await accept/refine/cancel.
#                For draft.total_cost < 5 we skip this state (policy
#                auto_accept_if).
#   done       — purchase applied. From here the player can repeat
#                (back to idle) or leave the store.
#
# # World mutation
#
# The draft (proposal_items, proposal_total_cost, plus per-item slot
# counts captured into proposal_oxen / proposal_food / proposal_bullets /
# proposal_clothing / proposal_wheels / proposal_axles / proposal_tongues)
# is applied on accept_purchase from `reviewing` (or directly from `idle`
# when the auto_accept_if branch fires). Money is debited; each inventory
# key is credited from its proposal_* counter. The router (Phase H prompt
# + propose_purchase's slot schema) is responsible for emitting per-item
# counts; the room never tries to parse the freeform `items` string.
#
# Local price multiplier (world.local_price_pct) is 100 at the
# Independence general store; forts override it on entry (fort.yaml).

states:
  general_store:
    type: compound
    initial: idle
    description: "Matt's General Store, Independence — outfit the wagon before leaving."
    relevant_world: [money, oxen, food_lbs, bullets, clothing_sets, spare_wheels, spare_axles, spare_tongues, local_price_pct, proposal_items, proposal_total_cost, proposal_refine_count]
    on_enter:
      # Independence pricing.
      - set:
          local_price_pct: 100
    states:

      # ── idle: pre-draft. propose_purchase drafts; leave_store departs.
      idle:
        description: "At Matt's counter — propose a purchase or leave."
        # Proposal §5.4 — stock readout via the shared partial. The
        # inventory.pongo include is the canonical "what's in the
        # wagon" table used here AND in forts (proposal §6 — re-use
        # mentioned). Authoring the table once and including it twice
        # means a price/column tweak touches one file.
        view:
          extends: "base"
          blocks:
            body:
              - prose: >
                  Matt's General Store. Stock up before you head out — once
                  you leave Independence there's no road back, only forts
                  with markup.
              - code: "{% include \"partials/inventory.pongo\" %}"
            choices:
              - heading: "Actions"
              - list:
                  items:
                    - label: "propose_purchase items=… total_cost=…"
                      hint:  "auto-accepts when total_cost < $5; otherwise review/refine"
                    - label: "leave the store"
                      hint:  "requires ≥ 2 oxen and ≥ 200 lbs food"
        on:
          propose_purchase:
            # Auto-accept tiny baskets straight to done, per policy
            # buy_supplies.auto_accept_if: $proposal.total_cost < 5.
            - when: "int(slots.total_cost) < 5 && world.money >= int(slots.total_cost)"
              target: ../done
              effects:
                - set:
                    proposal_items: "{{ slots.items }}"
                    proposal_total_cost: "{{ int(slots.total_cost) }}"
                    proposal_refine_count: 0
                    # Per-item counts (?? 0 lets callers omit items they
                    # aren't buying — a $1 hardtack basket sends just
                    # food: 1, not zeros for every other key).
                    proposal_oxen:     "{{ int(slots.oxen ?? 0) }}"
                    proposal_food:     "{{ int(slots.food ?? 0) }}"
                    proposal_bullets:  "{{ int(slots.bullets ?? 0) }}"
                    proposal_clothing: "{{ int(slots.clothing ?? 0) }}"
                    proposal_wheels:   "{{ int(slots.wheels ?? 0) }}"
                    proposal_axles:    "{{ int(slots.axles ?? 0) }}"
                    proposal_tongues:  "{{ int(slots.tongues ?? 0) }}"
                    money: "{{ world.money - int(slots.total_cost) }}"
                    oxen:          "{{ world.oxen + int(slots.oxen ?? 0) }}"
                    food_lbs:      "{{ world.food_lbs + int(slots.food ?? 0) }}"
                    bullets:       "{{ world.bullets + int(slots.bullets ?? 0) }}"
                    clothing_sets: "{{ world.clothing_sets + int(slots.clothing ?? 0) }}"
                    spare_wheels:  "{{ world.spare_wheels + int(slots.wheels ?? 0) }}"
                    spare_axles:   "{{ world.spare_axles + int(slots.axles ?? 0) }}"
                    spare_tongues: "{{ world.spare_tongues + int(slots.tongues ?? 0) }}"
                - say: "Matt rings it up without a word — {{ slots.items }}, ${{ slots.total_cost }}. Hands it across the counter."
            # Standard path: draft goes to review.
            - when: "world.money >= int(slots.total_cost)"
              target: ../reviewing
              effects:
                - set:
                    proposal_items: "{{ slots.items }}"
                    proposal_total_cost: "{{ int(slots.total_cost) }}"
                    proposal_refine_count: 0
                    proposal_oxen:     "{{ int(slots.oxen ?? 0) }}"
                    proposal_food:     "{{ int(slots.food ?? 0) }}"
                    proposal_bullets:  "{{ int(slots.bullets ?? 0) }}"
                    proposal_clothing: "{{ int(slots.clothing ?? 0) }}"
                    proposal_wheels:   "{{ int(slots.wheels ?? 0) }}"
                    proposal_axles:    "{{ int(slots.axles ?? 0) }}"
                    proposal_tongues:  "{{ int(slots.tongues ?? 0) }}"
                - say: "Matt licks his pencil and writes it down. 'So that's {{ slots.items }} — comes to ${{ slots.total_cost }}. Speak up if I've got it wrong.'"
            - default: true
              target: .
              guard_hint: "Not enough cash for that basket."
              effects:
                - say: "Matt shakes his head. 'You haven't got the money for that, friend.'"

          leave_store:
            - when: "world.oxen >= 2 && world.food_lbs >= 200"
              target: leg_a_executing
              effects:
                - set:
                    proposal_items: ""
                    proposal_total_cost: 0
                    proposal_refine_count: 0
                    proposal_oxen: 0
                    proposal_food: 0
                    proposal_bullets: 0
                    proposal_clothing: 0
                    proposal_wheels: 0
                    proposal_axles: 0
                    proposal_tongues: 0
                - say: "Matt walks out from behind the counter, claps the lead ox on the shoulder, and waves the wagon onto the road west. 'Mind the river bottoms.'"
            - default: true
              target: .
              guard_hint: "Need at least 2 oxen and 200 lbs of food before leaving."
              effects:
                - say: "Matt eyes your wagon. 'You won't make it to Kansas with that load — at least 2 oxen and 200 lbs of food.'"

          look:
            - target: .

      # ── reviewing: a draft is in hand. accept / refine / cancel.
      reviewing:
        description: "Matt reads back the order."
        view:
          extends: "base"
          blocks:
            body:
              - prose: "Matt sets the slate on the counter, thumbs down the column, looks up."
              - prose: >
                  "Let's see now — {{ world.proposal_items }}.
                  {{ world.proposal_total_cost }} dollars even. You'd have
                  ${{ world.money - world.proposal_total_cost }} left in
                  your pouch. That right?"
            choices:
              - heading: "Actions"
              - list:
                  items:
                    - label: "accept_purchase"
                      hint:  "take it"
                    - label: "refine_purchase"
                      hint:  "change a line"
                    - label: "cancel_purchase"
                      hint:  "walk it back"
                    - label: "look"
                      hint:  "read the slate again"
        relevant_world: [proposal_items, proposal_total_cost, money, proposal_refine_count]
        on:
          accept_purchase:
            - target: ../done
              effects:
                - set:
                    money:         "{{ world.money - world.proposal_total_cost }}"
                    oxen:          "{{ world.oxen + world.proposal_oxen }}"
                    food_lbs:      "{{ world.food_lbs + world.proposal_food }}"
                    bullets:       "{{ world.bullets + world.proposal_bullets }}"
                    clothing_sets: "{{ world.clothing_sets + world.proposal_clothing }}"
                    spare_wheels:  "{{ world.spare_wheels + world.proposal_wheels }}"
                    spare_axles:   "{{ world.spare_axles + world.proposal_axles }}"
                    spare_tongues: "{{ world.spare_tongues + world.proposal_tongues }}"
                - say: "Matt totals the slate and dusts his hands on his apron. 'Obliged for the ${{ world.proposal_total_cost }}. {{ world.proposal_items }} — all yours.' He nudges the parcel across."
          refine_purchase:
            # Self-stay in reviewing — the player sees the updated draft
            # rendered by reviewing.view on the next render. Any per-item
            # slot they supplied replaces that field; omitted slots keep
            # their existing proposal_* value via `?? world.proposal_<x>`.
            # items / total_cost work the same way at the string / int
            # level. refine_count is informational.
            - target: ../reviewing
              effects:
                - set:
                    proposal_items:        "{{ slots.items ?? world.proposal_items }}"
                    proposal_total_cost:   "{{ int(slots.total_cost ?? world.proposal_total_cost) }}"
                    proposal_oxen:         "{{ int(slots.oxen     ?? world.proposal_oxen) }}"
                    proposal_food:         "{{ int(slots.food     ?? world.proposal_food) }}"
                    proposal_bullets:      "{{ int(slots.bullets  ?? world.proposal_bullets) }}"
                    proposal_clothing:     "{{ int(slots.clothing ?? world.proposal_clothing) }}"
                    proposal_wheels:       "{{ int(slots.wheels   ?? world.proposal_wheels) }}"
                    proposal_axles:        "{{ int(slots.axles    ?? world.proposal_axles) }}"
                    proposal_tongues:      "{{ int(slots.tongues  ?? world.proposal_tongues) }}"
                    proposal_refine_count: "{{ world.proposal_refine_count + 1 }}"
                - say: "Matt licks his pencil, scratches out the line, writes the new one. 'Reckon that better suits you?' (revision {{ world.proposal_refine_count }})"
          cancel_purchase:
            - target: ../idle
              effects:
                - set:
                    proposal_items: ""
                    proposal_total_cost: 0
                    proposal_refine_count: 0
                    proposal_oxen: 0
                    proposal_food: 0
                    proposal_bullets: 0
                    proposal_clothing: 0
                    proposal_wheels: 0
                    proposal_axles: 0
                    proposal_tongues: 0
                - say: "Matt nods, drops the slate under the counter, and goes back to sorting nails. 'Take your time.'"
          look:
            - target: .

      # ── done: purchase applied. repeat or leave.
      done:
        description: "Purchase complete."
        # Phase G: post a "wagon loaded" trail-diary entry on every
        # successful purchase. phase_id includes the basket so distinct
        # purchases get distinct posts (single-purchase de-dups cleanly).
        on_enter:
          - invoke: host.transport.post
            with:
              transport: tui
              thread:    "{{ run.id }}"
              phase_id:  "general_store_done_{{ world.proposal_items }}_{{ world.proposal_total_cost }}"
              title:     "Wagon loaded at Independence"
              body:      "Bought {{ world.proposal_items }} for ${{ world.proposal_total_cost }} at Matt's. ${{ world.money }} cash on hand, {{ world.oxen }} oxen yoked, {{ world.food_lbs }} lbs of food in the wagon."
        view:
          extends: "base"
          blocks:
            body:
              - prose: >
                  Matt slides the parcel across the boards and looks up
                  over his spectacles. "{{ world.proposal_items }}.
                  That'll do you. ${{ world.money }} left in your pouch."
            choices:
              - heading: "Actions"
              - list:
                  items:
                    - label: "repeat_purchase"
                      hint:  "ask Matt for something else off the shelves"
                    - label: "leave_store"
                      hint:  "head out onto the road west"
                    - label: "look"
                      hint:  "read the counter again"
        relevant_world: [proposal_items, proposal_total_cost, money, oxen, food_lbs]
        on:
          repeat_purchase:
            - target: ../idle
              effects:
                - set:
                    proposal_items: ""
                    proposal_total_cost: 0
                    proposal_refine_count: 0
                    proposal_oxen: 0
                    proposal_food: 0
                    proposal_bullets: 0
                    proposal_clothing: 0
                    proposal_wheels: 0
                    proposal_axles: 0
                    proposal_tongues: 0
                - say: "Matt pulls a fresh leaf of paper off the spike. 'Right then — what else are we writing down?'"
          leave_store:
            - when: "world.oxen >= 2 && world.food_lbs >= 200"
              target: leg_a_executing
              effects:
                - set:
                    proposal_items: ""
                    proposal_total_cost: 0
                    proposal_refine_count: 0
                    proposal_oxen: 0
                    proposal_food: 0
                    proposal_bullets: 0
                    proposal_clothing: 0
                    proposal_wheels: 0
                    proposal_axles: 0
                    proposal_tongues: 0
                - say: "Matt walks out from behind the counter, claps the lead ox on the shoulder, and waves the wagon onto the road west. 'Mind the river bottoms.'"
            - default: true
              target: ../idle
              guard_hint: "Still need 2 oxen and 200 lbs food before leaving."
              effects:
                - say: "Matt eyes your wagon. 'Need more before you go.'"
          look:
            - target: .
