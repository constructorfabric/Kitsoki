# Routing Playground — a teaching story for kitsoki's command router.
#
# It does ONE thing: show, hands-on, how a typed command becomes an intent.
# The router runs four tiers in order (first hit wins); each lesson room
# isolates one so you can feel the difference. There are no host.agent.*
# `invoke:` calls in this story — the only model use is the router's own LLM
# tier (extract_llm_on_no_match), which is engine wiring, not a story effect.

app:
  id: routing-demo
  version: 0.1.0
  title: "Routing Playground"
  author: "kitsoki"
  license: "CC0"

# A cheap, offline local model used ONLY as the router's LLM tier. Zero-touch:
# first use fetches + caches the binary + weights under ~/.cache/kitsoki. If you
# have no model and no network, set `extract_llm_on_no_match: false` below and
# the deterministic lessons still work fully.
agent_plugins:
  agent.local:
    plugin: builtin.local_llm
    model: qwen2.5-1.5b-instruct
    grammar: true

# THE SUBJECT OF THIS STORY. The router resolves a command in four tiers:
#   1. synonyms / examples — exact, bare-synonym, and menu-example matches.
#   2. slot_template       — patterns like "budget {amount}" that also fill slots.
#      (1 and 2 are the DETERMINISTIC tiers: instant, offline, no model.)
#   3. semantic bands      — a hit's confidence decides the action:
#         >= semantic_high_bar (0.80) → route directly
#         >= semantic_mid_bar  (0.65) → ask a clarification first
#         == 0.50 (a tie across 2+ intents) → show a disambiguation card
#   4. extract_llm_on_no_match — ONLY when the deterministic tiers miss: ask the
#      local model (extract_llm_agent) to classify the command into one of the
#      room's allowed intents. A confident verdict routes; "none" or a
#      low-confidence verdict falls through to the main-turn LLM.
routing:
  enabled: true
  semantic_high_bar: 0.80
  semantic_mid_bar: 0.65
  extract_llm_on_no_match: true
  extract_llm_agent: agent.local

world:
  lamp:        { type: bool,   default: false }
  budget:      { type: string, default: "(not set)" }
  last_action: { type: string, default: "(none yet)" }

intents:
  # ── navigation: hub → lessons and lessons → hub. The navigation itself is
  #    routed, so paraphrases of these work too (via tier 4). ──
  goto_deterministic:
    title: "Open the deterministic-tier lesson"
    description: "Go to the synonyms / slot_template lesson."
    examples: ["deterministic", "synonyms", "tier one", "1"]
    priority: 70
  goto_local:
    title: "Open the local-model lesson"
    description: "Go to the local-model (no_match) routing lesson."
    examples: ["local model", "llm tier", "paraphrases", "3"]
    priority: 70
  goto_ambiguous:
    title: "Open the ambiguity lesson"
    description: "Go to the tie / disambiguation lesson."
    examples: ["ambiguous", "disambiguation", "ties", "4"]
    priority: 70
  back:
    title: "Back to the hub"
    examples: ["back", "hub", "menu", "home"]
    priority: 60
  look:
    title: "Look"
    examples: ["look", "where am i"]
    priority: 10
  quit:
    title: "Quit"
    examples: ["quit", "exit"]
    priority: 10

  # ── lesson 1+2: deterministic. Synonyms + examples (a switch) and a
  #    slot_template (a budget). ──
  lamp_on:
    title: "Turn the lamp on"
    description: "Switch the lamp on."
    examples: ["turn on the lamp", "lamp on"]
    synonyms: ["illuminate", "lights on"]
    priority: 90
  lamp_off:
    title: "Turn the lamp off"
    description: "Switch the lamp off."
    examples: ["turn off the lamp", "lamp off"]
    synonyms: ["darken", "lights off"]
    priority: 90
  set_budget:
    title: "Set a budget"
    description: "Record a budget — the amount fills from a slot_template."
    examples: ["budget 200"]
    synonyms: ["budget {amount}", "spend {amount}", "set budget to {amount}"]
    priority: 88
    slots:
      amount:
        type: string
        required: false
        description: "The budget amount."
        examples: ["200", "350"]

  # ── lesson 4: local model. NARROW examples on purpose, so a natural
  #    paraphrase misses the deterministic tiers and the model has to classify. ──
  check_weather:
    title: "Check the weather"
    examples: ["weather forecast", "is it sunny"]
    priority: 80
  play_music:
    title: "Play music"
    examples: ["play a song", "start the playlist"]
    priority: 80
  read_email:
    title: "Read email"
    examples: ["read my inbox", "check email"]
    priority: 80

  # ── lesson 3: ambiguity. Both intents accept a "save {x}" template at equal
  #    priority, so a generic "save <something>" matches BOTH with the same fill
  #    count → a tie. An exact example phrase (a whole-synonym match, 0.90)
  #    outranks the template (0.80) and resolves to one intent. (Identical *bare*
  #    synonyms would just collapse to the first intent — the tie needs two
  #    distinct templates that both match; see internal/semroute template tests.)
  save_doc:
    title: "Save the document"
    description: "Save the working document."
    synonyms: ["save {document}"]
    slots:
      document: { type: string, required: false, description: "What to save." }
  save_game:
    title: "Save the game"
    description: "Save game progress."
    synonyms: ["save {game}"]
    slots:
      game: { type: string, required: false, description: "What to save." }

root: hub

include:
  - rooms/*.yaml
