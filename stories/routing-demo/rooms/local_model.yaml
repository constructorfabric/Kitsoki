states:
  local_model:
    description: "Lesson 4 — local-model routing on no_match"
    relevant_world: [last_action]
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Each intent here has only a couple of narrow examples, so a natural paraphrase won't match the deterministic tiers. On that miss the router asks oracle.local (a small local model) to pick the best-fitting intent from the ones allowed in this room. A confident verdict routes directly; if the model answers 'none' or with low confidence, the turn falls through to the main-turn LLM. (The model classifies the intent — it does not fill slots; that stays a deterministic-tier job.)"
          - heading: "Allowed intents — and their ONLY examples"
          - kv:
              pairs:
                check_weather: '"weather forecast", "is it sunny"'
                play_music:    '"play a song", "start the playlist"'
                read_email:    '"read my inbox", "check email"'
          - heading: "Type a paraphrase — none of these match an example above"
          - list:
              items:
                - label: "should I bring an umbrella today"
                  hint: "→ check_weather (decided by oracle.local)"
                - label: "put on some tunes"
                  hint: "→ play_music"
                - label: "did anyone write to me"
                  hint: "→ read_email"
                - label: "asdf qwer zxcv"
                  hint: "→ no fit → 'none' → falls through to the main-turn LLM"
          - heading: "Result"
          - kv:
              pairs:
                Last routed: "{{ world.last_action }}"
        choices:
          - list:
              items:
                - label: "back"
                  hint: "return to the hub"
                - label: "look"
    on:
      check_weather:
        - target: .
          effects:
            - set: { last_action: "check_weather (via local model)" }
      play_music:
        - target: .
          effects:
            - set: { last_action: "play_music (via local model)" }
      read_email:
        - target: .
          effects:
            - set: { last_action: "read_email (via local model)" }
      back:
        - target: hub
      look:
        - target: .
