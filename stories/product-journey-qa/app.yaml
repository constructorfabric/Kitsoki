  rollup_missing_assignment_count: { type: int, default: 0 }
  rollup_present_evidence_count: { type: int, default: 0 }
  rollup_required_evidence_count: { type: int, default: 0 }
  rollup_persona_outcomes: { type: int, default: 0 }
  rollup_scenario_outcomes: { type: int, default: 0 }
  rollup_driver_journal_rows: { type: int, default: 0 }
  rollup_driver_journal_events: { type: int, default: 0 }
  rollup_driver_journal_evidence_refs: { type: int, default: 0 }
  rollup_driver_journal_blocked_events: { type: int, default: 0 }
  rollup_quality_gate_satisfied_runs: { type: int, default: 0 }
  rollup_quality_gate_total_runs: { type: int, default: 0 }
  rollup_quality_gate_proof_minimum_evidence_count: { type: int, default: 0 }
  rollup_quality_gate_minimum_evidence_count: { type: int, default: 0 }
  rollup_missing_proof_evidence_rows: { type: int, default: 0 }
  rollup_quality_gate_missing_proof_evidence_count: { type: int, default: 0 }
  rollup_missing_proof_handoff_summary: { type: string, default: "" }
  dogfood_id:    { type: string, default: "" }
  dogfood_dir:   { type: string, default: "" }
  dogfood_report_path: { type: string, default: "" }
  dogfood_deck_path: { type: string, default: "" }
  dogfood_matrix_deck_path: { type: string, default: "" }
  dogfood_run_deck_path: { type: string, default: "" }
  dogfood_rollup_deck_path: { type: string, default: "" }
