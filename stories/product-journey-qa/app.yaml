app:
  id: product-journey-qa
  version: 0.1.0
  title: "Product journey QA"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.run

world:
  project:        { type: string, default: "gears-rust" }
  persona:        { type: string, default: "core-maintainer" }
  seed:           { type: string, default: "default" }
  matrix_id:      { type: string, default: "" }
  matrix_dir:     { type: string, default: "" }
  matrix_personas: { type: string, default: "primary" }
  rollup_run_dir: { type: string, default: "" }
  rollup_path:    { type: string, default: "" }
  rollup_deck_path: { type: string, default: "" }
  rollup_markdown_path: { type: string, default: "" }
  rollup_summary: { type: object, default: {} }
  run_id:         { type: string, default: "" }
  run_dir:        { type: string, default: "" }
  deck_path:      { type: string, default: "" }
  execution_plan_path: { type: string, default: "" }
  agent_brief_path: { type: string, default: "" }
  scenario:       { type: string, default: "" }
  evidence_kind:  { type: string, default: "" }
  evidence_path:  { type: string, default: "" }
  notes:          { type: string, default: "" }
  finding_kind:   { type: string, default: "" }
  finding_title:  { type: string, default: "" }
  finding_summary: { type: string, default: "" }
  finding_severity: { type: string, default: "" }
  review_status:  { type: string, default: "" }
  review_summary: { type: string, default: "" }
  last_result:    { type: object, default: {} }
  status:         { type: string, default: "idle" }

intents:
  start:
    description: "Create a deterministic product-journey QA run bundle."
    examples: ["start", "create a product journey run", "begin qa run"]
    priority: 90
    slots:
      project: { type: string, required: false }
      persona: { type: string, required: false }
      seed: { type: string, required: false }
  matrix:
    description: "Create a deterministic 10-repo GitHub product-journey matrix."
    examples: ["create github matrix", "plan ten repo sweep", "emit matrix"]
    priority: 88
    slots:
      seed: { type: string, required: false }
      matrix_personas: { type: string, required: false }
  rollup:
    description: "Create or refresh the matrix rollup deck."
    examples: ["rollup", "create rollup", "refresh matrix rollup"]
    priority: 86
    slots:
      rollup_run_dir: { type: string, required: false }
  attach:
    description: "Attach captured evidence to the current product-journey run."
    examples: ["attach evidence", "add bugfix video", "record trace evidence"]
    priority: 85
    slots:
      scenario: { type: string, required: true }
      evidence_kind: { type: string, required: true }
      evidence_path: { type: string, required: true }
      notes: { type: string, required: false }
  record:
    description: "Record a strength, weakness, issue, or fix for the run summary deck."
    examples: ["record finding", "note a weakness", "record a fix", "add strength"]
    priority: 82
    slots:
      finding_kind: { type: string, required: true }
      title: { type: string, required: true }
      summary: { type: string, required: true }
      scenario: { type: string, required: false }
      severity: { type: string, required: false }
      evidence_path: { type: string, required: false }
  seed_demo:
    description: "Attach deterministic demo evidence and findings to the current run."
    examples: ["seed demo evidence", "dogfood the demo bundle", "populate demo"]
    priority: 78
  review:
    description: "Review the current product-journey bundle for readiness."
    examples: ["review run", "check readiness", "is this bundle reviewable"]
    priority: 76
  accept:
    description: "Accept the current report bundle and finish."
    examples: ["accept", "done", "looks good"]
    priority: 70
  quit:
    description: "Abandon the product-journey QA wrapper."
    examples: ["quit", "abort", "stop"]
    priority: 40
  look:
    description: "Re-render the current view."
    examples: ["look", "status", "show me"]
    priority: 10

exports:
  intents: [start, matrix, rollup, attach, record, seed_demo, review, accept, quit, look]

root: idle

include:
  - rooms/*.yaml
