test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      dogfood_product_journey_smoke:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: passed
            dogfood_id: dogfood-123
            dogfood_dir: .artifacts/product-journey/dogfood/dogfood-123
            report_path: .artifacts/product-journey/dogfood/dogfood-123/dogfood.json
            summary_path: .artifacts/product-journey/dogfood/dogfood-123/dogfood.md
            deck_path: .artifacts/product-journey/dogfood/dogfood-123/deck.slidey.json
            matrix_dir: .artifacts/product-journey/matrices/matrix-123
            matrix_deck_path: .artifacts/product-journey/matrices/matrix-123/deck.slidey.json
            run_dir: .artifacts/product-journey/run-123
            run_deck_path: .artifacts/product-journey/run-123/deck.slidey.json
            rollup_deck_path: .artifacts/product-journey/matrices/matrix-123/rollup.slidey.json
            corpus_validation_status: valid
            corpus_validation_errors: 0
            corpus_validation_warnings: 0
            review_status: needs_evidence
            review_summary: "needs_evidence: 15/19 checks passed, 3 warnings, 1 failures"
            review_passed: 15
            review_total: 19
            review_warnings: 3
            review_failed: 1
            review_backlog_summary: "fail: quality-gates (product-discovery (5/5), project-onboarding (5/5), bugfix (5/5), prd-design (5/5), feature-implementation (5/5), evidence-backed-product-bug (5/5)); warn: non-demo-evidence (proof=0, demo=30); warn: observed-findings (observed=0, seeded=4, proof=0)"
            run_validation_status: valid
            run_validation_warnings: 1
            run_validation_issue_summary: "warn: artifact-ref-exists (artifacts/bugfix.mp4)"
            matrix_validation_status: valid
            matrix_validation_warnings: 1
            matrix_validation_issue_summary: "warn: matrix-target-proof (vscode, kubernetes)"

turns:
  - intent:
      name: dogfood_smoke
      slots:
        seed: story-smoke
    expect_state: dogfood_created
    expect_world:
      status: dogfood_smoke_created
      seed: story-smoke
      dogfood_id: dogfood-123
      dogfood_dir: .artifacts/product-journey/dogfood/dogfood-123
      dogfood_report_path: .artifacts/product-journey/dogfood/dogfood-123/dogfood.json
      dogfood_deck_path: .artifacts/product-journey/dogfood/dogfood-123/deck.slidey.json
      dogfood_matrix_deck_path: .artifacts/product-journey/matrices/matrix-123/deck.slidey.json
      dogfood_run_deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      dogfood_rollup_deck_path: .artifacts/product-journey/matrices/matrix-123/rollup.slidey.json
      corpus_validation_status: valid
      corpus_validation_errors: 0
      corpus_validation_warnings: 0
      matrix_dir: .artifacts/product-journey/matrices/matrix-123
      run_dir: .artifacts/product-journey/run-123
      deck_path: .artifacts/product-journey/dogfood/dogfood-123/deck.slidey.json
      review_status: needs_evidence
      review_summary: "needs_evidence: 15/19 checks passed, 3 warnings, 1 failures"
      dogfood_review_passed: 15
      dogfood_review_total: 19
      dogfood_review_warnings: 3
      dogfood_review_failed: 1
      dogfood_review_backlog_summary: "fail: quality-gates (product-discovery (5/5), project-onboarding (5/5), bugfix (5/5), prd-design (5/5), feature-implementation (5/5), evidence-backed-product-bug (5/5)); warn: non-demo-evidence (proof=0, demo=30); warn: observed-findings (observed=0, seeded=4, proof=0)"
      validation_status: valid
      validation_warnings: 1
      validation_issue_summary: "warn: artifact-ref-exists (artifacts/bugfix.mp4)"
      dogfood_run_validation_warnings: 1
      dogfood_matrix_validation_warnings: 1
      dogfood_run_validation_issue_summary: "warn: artifact-ref-exists (artifacts/bugfix.mp4)"
      dogfood_matrix_validation_issue_summary: "warn: matrix-target-proof (vscode, kubernetes)"
    expect_host_calls:
      - handler: host.run
        args: { call: dogfood_product_journey_smoke }
    expect_view_matches: "Review checks[\\s\\S]*15 / 19 passed; 1 failed; 3 warnings[\\s\\S]*Run validation issues[\\s\\S]*artifact-ref-exists[\\s\\S]*Matrix validation issues[\\s\\S]*matrix-target-proof[\\s\\S]*fail: quality-gates[\\s\\S]*warn: non-demo-evidence"

  - intent: { name: look, slots: {} }
    expect_state: dogfood_created
    expect_world:
      status: dogfood_smoke_created
      dogfood_id: dogfood-123

  - intent: { name: accept, slots: {} }
    expect_state: done
    expect_world:
      status: done
      dogfood_id: dogfood-123
      dogfood_report_path: .artifacts/product-journey/dogfood/dogfood-123/dogfood.json
      dogfood_deck_path: .artifacts/product-journey/dogfood/dogfood-123/deck.slidey.json

expect_no_errors: true
