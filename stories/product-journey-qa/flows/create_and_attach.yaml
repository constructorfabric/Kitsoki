turns:
  - intent:
      name: refresh_targets
      slots:
        seed: flow
    expect_state: idle
    expect_world:
      status: targets_refreshed
      seed: flow
      target_proof_id: proof-123
      target_proof_dir: .artifacts/product-journey/target-proofs/proof-123
      target_proof_file: .artifacts/product-journey/target-proofs/proof-123/target-proof.json
    expect_host_calls:
      - handler: host.run
        args: { call: refresh_product_journey_targets }

  - intent:
      name: matrix
      slots:
        seed: flow
        matrix_personas: primary
        target_proof_file: .artifacts/product-journey/target-proofs/proof-123/target-proof.json
    expect_state: matrix_created
    expect_world:
      status: matrix_created
      seed: flow
      matrix_personas: primary
      target_proof_file: .artifacts/product-journey/target-proofs/proof-123/target-proof.json
      matrix_id: matrix-123
      matrix_dir: .artifacts/product-journey/matrices/matrix-123
      deck_path: .artifacts/product-journey/matrices/matrix-123/deck.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: emit_product_journey_matrix }

  - intent:
      name: rollup
      slots:
        rollup_run_dir: .artifacts/product-journey/run-123
    expect_state: matrix_created
    expect_world:
      status: rollup_created
      rollup_run_dir: .artifacts/product-journey/run-123
      rollup_path: .artifacts/product-journey/matrices/matrix-123/rollup.json
      rollup_deck_path: .artifacts/product-journey/matrices/matrix-123/rollup.slidey.json
      rollup_markdown_path: .artifacts/product-journey/matrices/matrix-123/rollup.md
      deck_path: .artifacts/product-journey/matrices/matrix-123/rollup.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: rollup_product_journey_matrix }

  - intent: { name: validate_matrix, slots: {} }
    expect_state: matrix_created
    expect_world:
      status: matrix_validated
      validation_status: valid
      validation_errors: 0
      validation_warnings: 0
    expect_host_calls:
      - handler: host.run
        args: { call: validate_product_journey_matrix }

  - intent:
      name: start
      slots:
        project: vscode
        persona: docs-minded-contributor
        seed: flow-01-docs-minded-contributor
    expect_state: run_created
    expect_world:
      status: run_created
      project: vscode
      persona: docs-minded-contributor
      seed: flow-01-docs-minded-contributor
      run_id: run-123
      run_dir: .artifacts/product-journey/run-123
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      execution_plan_path: .artifacts/product-journey/run-123/execution-plan.md
      driver_plan_path: .artifacts/product-journey/run-123/driver-plan.md
      agent_brief_path: .artifacts/product-journey/run-123/agent-brief.md
      media_manifest_path: .artifacts/product-journey/run-123/media-manifest.json
      scenario_outcomes_path: .artifacts/product-journey/run-123/scenario-outcomes.md
    expect_host_calls:
      - handler: host.run
        args: { call: emit_product_journey_run }

  - intent:
      name: attach
      slots:
        scenario: bugfix
        evidence_kind: key_interaction_video
        evidence_path: media/bugfix.mp4
        notes: visual MCP capture placeholder
    expect_state: run_created
    expect_world:
      status: evidence_attached
      scenario: bugfix
      evidence_kind: key_interaction_video
      evidence_path: media/bugfix.mp4
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      execution_plan_path: .artifacts/product-journey/run-123/execution-plan.md
      driver_plan_path: .artifacts/product-journey/run-123/driver-plan.md
      agent_brief_path: .artifacts/product-journey/run-123/agent-brief.md
      media_manifest_path: .artifacts/product-journey/run-123/media-manifest.json
      scenario_outcomes_path: .artifacts/product-journey/run-123/scenario-outcomes.md
    expect_host_calls:
      - handler: host.run
        args: { call: attach_product_journey_evidence }

  - intent:
      name: record
      slots:
        finding_kind: weakness
        title: Onboarding hid next command
        summary: The persona could not tell which Kitsoki story to launch after config generation.
        scenario: project-onboarding
        severity: medium
        evidence_path: traces/onboarding.jsonl
    expect_state: run_created
    expect_world:
      status: finding_recorded
      finding_kind: weakness
      finding_title: Onboarding hid next command
      finding_summary: The persona could not tell which Kitsoki story to launch after config generation.
      scenario: project-onboarding
      evidence_path: traces/onboarding.jsonl
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      execution_plan_path: .artifacts/product-journey/run-123/execution-plan.md
      driver_plan_path: .artifacts/product-journey/run-123/driver-plan.md
      agent_brief_path: .artifacts/product-journey/run-123/agent-brief.md
      media_manifest_path: .artifacts/product-journey/run-123/media-manifest.json
      scenario_outcomes_path: .artifacts/product-journey/run-123/scenario-outcomes.md
    expect_host_calls:
      - handler: host.run
        args: { call: record_product_journey_finding }

  - intent:
      name: blocker
      slots:
        scenario: prd-design
        title: Design surface needed live model authorization
        summary: The PRD/design scenario could not run under no-LLM automation without a cassette.
        evidence_path: traces/prd-design-blocker.jsonl
    expect_state: run_created
    expect_world:
      status: blocker_recorded
      finding_kind: issue
      finding_title: Design surface needed live model authorization
      finding_summary: The PRD/design scenario could not run under no-LLM automation without a cassette.
      scenario: prd-design
      evidence_path: traces/prd-design-blocker.jsonl
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      execution_plan_path: .artifacts/product-journey/run-123/execution-plan.md
      driver_plan_path: .artifacts/product-journey/run-123/driver-plan.md
      agent_brief_path: .artifacts/product-journey/run-123/agent-brief.md
      media_manifest_path: .artifacts/product-journey/run-123/media-manifest.json
      scenario_outcomes_path: .artifacts/product-journey/run-123/scenario-outcomes.md
    expect_host_calls:
      - handler: host.run
        args: { call: record_product_journey_blocker }

  - intent: { name: seed_demo, slots: {} }
    expect_state: run_created
    expect_world:
      status: demo_seeded
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      execution_plan_path: .artifacts/product-journey/run-123/execution-plan.md
      driver_plan_path: .artifacts/product-journey/run-123/driver-plan.md
      agent_brief_path: .artifacts/product-journey/run-123/agent-brief.md
      media_manifest_path: .artifacts/product-journey/run-123/media-manifest.json
      scenario_outcomes_path: .artifacts/product-journey/run-123/scenario-outcomes.md
    expect_host_calls:
      - handler: host.run
        args: { call: seed_product_journey_demo }

  - intent: { name: review, slots: {} }
    expect_state: run_created
    expect_world:
      status: reviewed
      review_status: ready
      review_summary: "ready: 11/11 checks passed, 0 warnings, 0 failures"
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      execution_plan_path: .artifacts/product-journey/run-123/execution-plan.md
      driver_plan_path: .artifacts/product-journey/run-123/driver-plan.md
      agent_brief_path: .artifacts/product-journey/run-123/agent-brief.md
      media_manifest_path: .artifacts/product-journey/run-123/media-manifest.json
      scenario_outcomes_path: .artifacts/product-journey/run-123/scenario-outcomes.md
    expect_host_calls:
      - handler: host.run
        args: { call: review_product_journey_run }

  - intent: { name: validate, slots: {} }
    expect_state: run_created
    expect_world:
      status: validated
      validation_status: valid
      validation_errors: 0
      validation_warnings: 0
    expect_host_calls:
      - handler: host.run
        args: { call: validate_product_journey_run }

  - intent: { name: accept, slots: {} }
    expect_state: done
    expect_world:
      status: done
      execution_plan_path: .artifacts/product-journey/run-123/execution-plan.md
      driver_plan_path: .artifacts/product-journey/run-123/driver-plan.md
      agent_brief_path: .artifacts/product-journey/run-123/agent-brief.md
      media_manifest_path: .artifacts/product-journey/run-123/media-manifest.json
      scenario_outcomes_path: .artifacts/product-journey/run-123/scenario-outcomes.md

expect_no_errors: true
