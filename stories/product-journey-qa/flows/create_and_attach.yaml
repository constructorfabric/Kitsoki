test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      emit_product_journey_run:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: created
            run_id: run-123
            run_dir: .artifacts/product-journey/run-123
            deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      emit_product_journey_matrix:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: matrix_created
            matrix_id: matrix-123
            matrix_dir: .artifacts/product-journey/matrices/matrix-123
            deck_path: .artifacts/product-journey/matrices/matrix-123/deck.slidey.json
            target_count: 10
            assignment_count: 10
            scenario_count: 6
            persona_mode: primary
      attach_product_journey_evidence:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: attached
            run_dir: .artifacts/product-journey/run-123
            scenario: bugfix
            evidence_kind: key_interaction_video
            evidence_path: media/bugfix.mp4
            deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      record_product_journey_finding:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: recorded
            run_dir: .artifacts/product-journey/run-123
            finding_kind: weakness
            title: Onboarding hid next command
            scenario: project-onboarding
            deck_path: .artifacts/product-journey/run-123/deck.slidey.json
      seed_product_journey_demo:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: seeded
            run_dir: .artifacts/product-journey/run-123
            deck_path: .artifacts/product-journey/run-123/deck.slidey.json
            evidence_added: 6
            findings_added: 4
            present_evidence_count: 7
            findings_count: 5
      review_product_journey_run:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: reviewed
            review_status: ready
            summary: "ready: 8/8 checks passed, 0 warnings, 0 failures"
            run_dir: .artifacts/product-journey/run-123
            review_path: .artifacts/product-journey/run-123/review.json
            deck_path: .artifacts/product-journey/run-123/deck.slidey.json
            passed: 8
            warnings: 0
            failed: 0
            total: 8

turns:
  - intent:
      name: matrix
      slots:
        seed: flow
        matrix_personas: primary
    expect_state: matrix_created
    expect_world:
      status: matrix_created
      seed: flow
      matrix_personas: primary
      matrix_id: matrix-123
      matrix_dir: .artifacts/product-journey/matrices/matrix-123
      deck_path: .artifacts/product-journey/matrices/matrix-123/deck.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: emit_product_journey_matrix }

  - intent:
      name: start
      slots:
        project: gears-rust
        persona: core-maintainer
        seed: flow
    expect_state: run_created
    expect_world:
      status: run_created
      run_id: run-123
      run_dir: .artifacts/product-journey/run-123
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: emit_product_journey_run }

  - intent:
      name: attach
      slots:
        scenario: bugfix
        evidence_kind: key_interaction_video
        evidence_path: media/bugfix.mp4
        notes: visual MCP capture placeholder
    expect_state: run_created
    expect_world:
      status: evidence_attached
      scenario: bugfix
      evidence_kind: key_interaction_video
      evidence_path: media/bugfix.mp4
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: attach_product_journey_evidence }

  - intent:
      name: record
      slots:
        finding_kind: weakness
        title: Onboarding hid next command
        summary: The persona could not tell which Kitsoki story to launch after config generation.
        scenario: project-onboarding
        severity: medium
        evidence_path: traces/onboarding.jsonl
    expect_state: run_created
    expect_world:
      status: finding_recorded
      finding_kind: weakness
      finding_title: Onboarding hid next command
      finding_summary: The persona could not tell which Kitsoki story to launch after config generation.
      scenario: project-onboarding
      evidence_path: traces/onboarding.jsonl
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: record_product_journey_finding }

  - intent: { name: seed_demo, slots: {} }
    expect_state: run_created
    expect_world:
      status: demo_seeded
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: seed_product_journey_demo }

  - intent: { name: review, slots: {} }
    expect_state: run_created
    expect_world:
      status: reviewed
      review_status: ready
      review_summary: "ready: 8/8 checks passed, 0 warnings, 0 failures"
      deck_path: .artifacts/product-journey/run-123/deck.slidey.json
    expect_host_calls:
      - handler: host.run
        args: { call: review_product_journey_run }

  - intent: { name: accept, slots: {} }
    expect_state: done
    expect_world:
      status: done

expect_no_errors: true
