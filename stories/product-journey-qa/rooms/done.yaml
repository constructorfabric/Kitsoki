states:
  done:
    description: "The product-journey QA bundle has passed its final validation gate."
    relevant_world: [dogfood_id, dogfood_dir, dogfood_report_path, dogfood_deck_path, matrix_id, matrix_dir, rollup_deck_path, run_id, run_dir, deck_path, execution_plan_path, driver_plan_path, driver_journal_path, agent_brief_path, driver_handoff_path, media_manifest_path, scenario_outcomes_path, validation_status, validation_errors, validation_warnings, validation_issue_summary, status]
    view:
      - banner:
          text: "PRODUCT JOURNEY QA READY"
          subtitle: "Review the validated bundle and Slidey deck."
          color: "#059669"
      - kv:
          pairs:
            Run: "{{ world.run_id }}"
            Run dir: "{{ world.run_dir }}"
            Dogfood smoke: "{{ world.dogfood_id }}"
            Dogfood dir: "{{ world.dogfood_dir }}"
            Dogfood report: "{{ world.dogfood_report_path }}"
            Dogfood deck: "{{ world.dogfood_deck_path }}"
            Matrix: "{{ world.matrix_id }}"
            Matrix dir: "{{ world.matrix_dir }}"
            Matrix rollup: "{{ world.rollup_deck_path }}"
            Deck: "{{ world.deck_path }}"
            Execution plan: "{{ world.execution_plan_path }}"
            Driver plan: "{{ world.driver_plan_path }}"
            Driver journal: "{{ world.driver_journal_path }}"
            Agent brief: "{{ world.agent_brief_path }}"
            Driver handoff: "{{ world.driver_handoff_path }}"
            Media manifest: "{{ world.media_manifest_path }}"
            Scenario outcomes: "{{ world.scenario_outcomes_path }}"
            Validation: "{{ world.validation_status }}"
            Validation errors: "{{ world.validation_errors }}"
            Validation warnings: "{{ world.validation_warnings }}"
            Validation issues: '{{ world.validation_issue_summary|default:"(none)" }}'
            Status: "{{ world.status }}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "look"
              intent: look
    on:
      look:
        - target: .

  abandoned:
    description: "The product-journey QA wrapper was abandoned."
    relevant_world: [status]
    view:
      - banner:
          text: "PRODUCT JOURNEY QA ABANDONED"
          subtitle: "No further action will be taken."
          color: "#B45309"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "look"
              intent: look
    on:
      look:
        - target: .
