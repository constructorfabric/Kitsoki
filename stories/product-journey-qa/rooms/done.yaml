states:
  done:
    description: "The product-journey QA bundle is ready for review."
    relevant_world: [matrix_id, matrix_dir, rollup_deck_path, run_id, run_dir, deck_path, execution_plan_path, agent_brief_path, status]
    view:
      - banner:
          text: "PRODUCT JOURNEY QA READY"
          subtitle: "Review the run bundle and Slidey deck."
          color: "#059669"
      - kv:
          pairs:
            Run: "{{ world.run_id }}"
            Run dir: "{{ world.run_dir }}"
            Matrix: "{{ world.matrix_id }}"
            Matrix dir: "{{ world.matrix_dir }}"
            Matrix rollup: "{{ world.rollup_deck_path }}"
            Deck: "{{ world.deck_path }}"
            Execution plan: "{{ world.execution_plan_path }}"
            Agent brief: "{{ world.agent_brief_path }}"
            Status: "{{ world.status }}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "look"
              intent: look
    on:
      look:
        - target: .

  abandoned:
    description: "The product-journey QA wrapper was abandoned."
    relevant_world: [status]
    view:
      - banner:
          text: "PRODUCT JOURNEY QA ABANDONED"
          subtitle: "No further action will be taken."
          color: "#B45309"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "look"
              intent: look
    on:
      look:
        - target: .
