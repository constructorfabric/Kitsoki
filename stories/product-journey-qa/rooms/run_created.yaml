states:
  run_created:
    description: "A product-journey QA run bundle exists; waiting for captured evidence."
    relevant_world: [project, persona, seed, run_id, run_dir, deck_path, execution_plan_path, agent_brief_path, scenario, evidence_kind, evidence_path, finding_kind, finding_title, review_status, review_summary, status]
    view:
      - banner:
          text: "RUN CREATED"
          subtitle: "Attach evidence from visual MCP, studio MCP, oracle checks, or generated artifacts."
          color: "#2563EB"
      - kv:
          pairs:
            Run: '{{ world.run_id|default:"(pending)" }}'
            Project: "{{ world.project }}"
            Persona: "{{ world.persona }}"
            Run dir: '{{ world.run_dir|default:"(pending)" }}'
            Deck: '{{ world.deck_path|default:"(pending)" }}'
            Execution plan: '{{ world.execution_plan_path|default:"(pending)" }}'
            Agent brief: '{{ world.agent_brief_path|default:"(pending)" }}'
            Last evidence: '{{ world.scenario|default:"(none)" }} / {{ world.evidence_kind|default:"" }}'
            Last finding: '{{ world.finding_kind|default:"(none)" }} / {{ world.finding_title|default:"" }}'
            Review: '{{ world.review_status|default:"(not reviewed)" }}'
            Status: "{{ world.status }}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "attach scenario=... evidence_kind=... evidence_path=..."
              hint: "mark one scenario evidence slot captured and regenerate the deck"
              intent: attach
            - label: "record finding_kind=... title=... summary=..."
              hint: "record a strength, weakness, issue, or fix for the review deck"
              intent: record
            - label: "seed_demo"
              hint: "populate representative evidence and findings for deck review"
              intent: seed_demo
            - label: "review"
              hint: "score whether the bundle is ready for human review"
              intent: review
            - label: "accept"
              hint: "finish with the current run bundle"
              intent: accept
            - label: "quit"
              intent: quit
            - label: "look"
              intent: look
    on:
      attach:
        - target: run_created
          guard_hint: "create a run before attaching evidence"
          effects:
            - set:
                scenario: "{{ slots.scenario }}"
                evidence_kind: "{{ slots.evidence_kind }}"
                evidence_path: "{{ slots.evidence_path }}"
                notes: "{{ slots.notes ?? '' }}"
                status: "attaching"
            - invoke: host.run
              id: attach_product_journey_evidence
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --attach-evidence
                  - --json-output
                  - --run-dir
                  - "{{ world.run_dir }}"
                  - --scenario
                  - "{{ slots.scenario }}"
                  - --evidence-kind
                  - "{{ slots.evidence_kind }}"
                  - --evidence-path
                  - "{{ slots.evidence_path }}"
                  - --notes
                  - "{{ slots.notes ?? '' }}"
                cwd: "."
              bind:
                last_result: stdout_json
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
                agent_brief_path: "stdout_json.agent_brief_path"
              on_error: run_created
            - set:
                status: "evidence_attached"
      record:
        - target: run_created
          effects:
            - set:
                finding_kind: "{{ slots.finding_kind }}"
                finding_title: "{{ slots.title }}"
                finding_summary: "{{ slots.summary }}"
                finding_severity: "{{ slots.severity ?? 'medium' }}"
                scenario: "{{ slots.scenario ?? world.scenario }}"
                evidence_path: "{{ slots.evidence_path ?? '' }}"
                status: "recording_finding"
            - invoke: host.run
              id: record_product_journey_finding
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --record-finding
                  - --json-output
                  - --run-dir
                  - "{{ world.run_dir }}"
                  - --finding-kind
                  - "{{ slots.finding_kind }}"
                  - --title
                  - "{{ slots.title }}"
                  - --summary
                  - "{{ slots.summary }}"
                  - --scenario
                  - "{{ slots.scenario ?? '' }}"
                  - --severity
                  - "{{ slots.severity ?? 'medium' }}"
                  - --evidence-path
                  - "{{ slots.evidence_path ?? '' }}"
                cwd: "."
              bind:
                last_result: stdout_json
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
                agent_brief_path: "stdout_json.agent_brief_path"
              on_error: run_created
            - set:
                status: "finding_recorded"
      seed_demo:
        - target: run_created
          effects:
            - set:
                status: "seeding_demo"
            - invoke: host.run
              id: seed_product_journey_demo
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --seed-demo-evidence
                  - --json-output
                  - --run-dir
                  - "{{ world.run_dir }}"
                cwd: "."
              bind:
                last_result: stdout_json
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
                agent_brief_path: "stdout_json.agent_brief_path"
              on_error: run_created
            - set:
                status: "demo_seeded"
      review:
        - target: run_created
          effects:
            - set:
                status: "reviewing"
            - invoke: host.run
              id: review_product_journey_run
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --review-run
                  - --json-output
                  - --run-dir
                  - "{{ world.run_dir }}"
                cwd: "."
              bind:
                last_result: stdout_json
                review_status: "stdout_json.review_status"
                review_summary: "stdout_json.summary"
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
                agent_brief_path: "stdout_json.agent_brief_path"
              on_error: run_created
            - set:
                status: "reviewed"
      accept:
        - target: done
          effects:
            - set: { status: "done" }
      quit:
        - target: abandoned
          effects:
            - set: { status: "abandoned" }
      look:
        - target: .
