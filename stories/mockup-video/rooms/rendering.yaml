# rendering — DETERMINISTIC render (no LLM). Branch on medium.
#
#   deck → host.slidey.render {spec_path: source.spec_path, format: mp4}
#   tour → host.run scripts/record_tour.sh over source.paths + the manifest
#
# Both produce <out>.mp4 + <out>.chapters.json (the slice-1 chapter sidecar).
# Then host.artifacts_dir media-emits the mp4 → video_handle and the sidecar
# → chapters_handle. Same producer-agnostic chapter shape regardless of medium
# (epic shared decision 1).
#
# `once: true` per invoke (keyed on the relevant bind). A rerender / refine
# pass clears video_handle (and the path binds) so the render re-runs fresh.

states:

  rendering:
    description: "Rendering the walkthrough video (deterministic)."
    relevant_world: [medium, source, video_handle, chapters_handle, video_path, chapters_path, cycle]
    view:
      - heading: "Mockup video studio · rendering"
      - kv:
          pairs:
            Medium:   "{{ world.medium }}"
            Source:   '{{ world.source.kind|default:"(pending)" }}'
            Video:    '{{ world.video_handle|default:"(rendering…)" }}'
            Chapters: '{{ world.chapters_handle|default:"(rendering…)" }}'
            Cycle:    "{{ world.cycle }}"
      - prose: "Rendering is deterministic — this room produces the video then routes to review."
    on_enter:
      # Deck path: slidey renders the JSON spec to mp4 + chapters sidecar.
      - when: "world.medium == 'deck'"
        invoke: host.slidey.render
        id: render_deck
        once: true
        with:
          spec_path: "{{ world.source.spec_path }}"
          format:    mp4
        bind:
          video_path:    path
          chapters_path: chapters_path
        on_error: review

      # Tour path: record_tour.sh wraps the kitsoki-ui-demo Playwright recorder.
      - when: "world.medium == 'tour'"
        invoke: host.run
        id: render_tour
        once: true
        with:
          argv:
            - "stories/mockup-video/scripts/record_tour.sh"
            - "{{ world.workspace }}"
            - "{{ world.source.spec_path }}"
        bind:
          video_path:    stdout_json.path
          chapters_path: stdout_json.chapters_path
        on_error: review

      # Emit the rendered mp4 to artifacts_dir for a stable handle.
      - invoke: host.artifacts_dir
        id: emit_video
        once: true
        with:
          thread:   "mockup-video"
          src_path: "{{ world.video_path }}"
          kind:     video
          label:    "{{ world.brief.feature }} — walkthrough (cycle {{ world.cycle }})"
        bind:
          # host.artifacts_dir returns handle as a {id,kind,mime,label} object
          # (internal/host/artifacts_dir_transport.go) — bind the stable id, the
          # opaque handle the ArtifactResolver / /artifact/{id} / /review resolve.
          video_handle: handle.id
        on_error: review

      # Emit the chapter sidecar (slice 1) as its own artifact.
      - invoke: host.artifacts_dir
        id: emit_chapters
        once: true
        with:
          thread:   "mockup-video"
          src_path: "{{ world.chapters_path }}"
          kind:     data
          label:    "chapter sidecar"
        bind:
          chapters_handle: handle.id
        on_error: review

      - when: "world.video_handle != ''"
        emit_intent: accept
    on:
      # accept is the synthetic auto-advance once the video handle is bound.
      accept:
        - target: review
      look:
        - target: .
