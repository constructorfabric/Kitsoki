states:
  report:
    description: "Write the punch-list report."
    relevant_world: [report_path, report_summary, punch_results]
    view:
      - heading: "Punch-list · report"
      - kv:
          pairs:
            Report: '{{ world.report_path|default:"(pending)" }}'
            Summary: '{{ world.report_summary|default:"(pending)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "done", intent: report }
            - { label: "look", intent: look }
    on_enter:
      - invoke: host.run
        id: punch_report
        once: true
        with:
          cmd: python3
          args:
            - "stories/punch-list/scripts/punch_report.py"
            - "{{ world.state_path }}"
        bind:
          report_path: "stdout_json.report_path"
          report_summary: "stdout_json.summary"
        on_error: needs_human
    on:
      report:
        - target: done
      look:
        - target: .
      quit:
        - target: "@exit:abandoned"
