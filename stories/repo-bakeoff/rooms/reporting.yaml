# reporting — DETERMINISTIC (no LLM). Assemble the comparison report from the
# summary rollup and build a standardized slidey deck spec from the authoritative
# external bench summary. `once: true` keyed on report_markdown → reload-safe.
states:
  reporting:
    description: "Assembling the comparison report + selecting the deck spec (deterministic)."
    relevant_world: [summary, deck, report_markdown]
    view:
      - heading: "Bake-off · reporting"
      - kv:
          pairs:
            Deck:     '{{ world.deck.spec_path }}'
            Headline: '{{ world.deck.summary }}'
      - prose: "The by-candidate rollup is rendered to a comparison report + a slidey deck spec. Accept to render the deck to a static-HTML report."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "render the deck (host.slidey.render)"
              intent: accept
            - label:  "quit"
              hint:   "abandon"
              intent: quit
    on_enter:
      - invoke: host.run
        id: build_report
        once: true
        with:
          cmd: python3
          args:
            - "../../report-deck/deterministic_deck.py"
            - "--kind"
            - "external-summary"
            - "--input"
            - "results/summary.json"
            - "--job"
            - "repo-bakeoff-{{ world.project }}"
            - "--run-id"
            - "{{ world.generated_at ?? 'latest' }}"
            - "--artifact-root"
            - "../../../.artifacts"
          cwd: "{{ world.harness_dir }}"
        bind:
          report_markdown: stdout_json.markdown_path
          deck:            stdout_json
        on_error: scoring
    on:
      accept:
        - target: slideshow
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
