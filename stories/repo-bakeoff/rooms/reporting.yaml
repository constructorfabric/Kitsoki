# reporting — DETERMINISTIC (no LLM). Present the comparison report generated by
# scoring from the completion verdict + summary rollup. The deck spec and
# markdown live under .artifacts/ by default; slideshow renders the generated
# deck spec.
states:
  reporting:
    description: "Assembling the comparison report + selecting the deck spec (deterministic)."
    relevant_world: [completion_status, completion_markdown, summary, deck, report_markdown]
    view:
      - heading: "Bake-off · reporting"
      - kv:
          pairs:
            Completion: '{{ world.completion_status|default:"(unknown)" }}'
            Completion report: '{{ world.completion_markdown|default:"(not generated)" }}'
            Deck:     '{{ world.deck.spec_path }}'
            Headline: '{{ world.deck.summary }}'
            Markdown: '{{ world.report_markdown|default:"(not generated)" }}'
      - prose: "The completion verdict says whether this is live-scored, pending-only, or still ready-to-drive. The by-candidate rollup is rendered to a comparison report + a slidey deck spec. Accept to render the deck to a static-HTML report."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "render the deck (host.slidey.render)"
              intent: accept
            - label:  "quit"
              hint:   "abandon"
              intent: quit
    on_enter:
      - when: "world.report_markdown == ''"
        set:
          report_markdown: "External-repo bake-off · project {{ world.project }} · {{ len(world.summary.cells) }} cells rolled up by candidate."
    on:
      accept:
        - target: slideshow
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
