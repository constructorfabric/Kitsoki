# reporting — DETERMINISTIC (no LLM). Assemble the comparison report from the
# summary rollup and point at the slidey deck spec the slideshow room renders. The
# baked baked/deck.json is a REAL slidey deck (the query-string study), used as the
# no-LLM stand-in; a live run with a richer deck-builder would bind deck.spec_path
# to its output. `once: true` keyed on report_markdown → reload-safe.
states:
  reporting:
    description: "Assembling the comparison report + selecting the deck spec (deterministic)."
    relevant_world: [summary, deck, report_markdown]
    view:
      - heading: "Bake-off · reporting"
      - kv:
          pairs:
            Deck:     '{{ world.deck.spec_path }}'
            Headline: '{{ world.deck.summary }}'
      - prose: "The by-candidate rollup is rendered to a comparison report + a slidey deck spec. Accept to render the deck to a static-HTML report."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "render the deck (host.slidey.render)"
              intent: accept
            - label:  "quit"
              hint:   "abandon"
              intent: quit
    on_enter:
      - set:
          report_markdown: "External-repo bake-off · project {{ world.project }} · {{ len(world.summary.cells) }} cells rolled up by candidate."
    on:
      accept:
        - target: slideshow
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
