# scoring — DETERMINISTIC (no LLM). First run `bench.py completion` so the
# operator sees whether the matrix is ready-to-drive, complete-with-pending, or
# live-scored. The completion command now returns a machine flag (`completed`).
# If `completed` is true, scoring then rolls the per-cell verdicts into a summary.
#
# If `completed` is false, the story loops deterministically:
#   - repairable issue set -> repair state (free preflight/verify/handoff prep retries),
#   - non-repairable set -> running (manual cell drives required).
states:
  scoring:
    description: "Checking completion evidence and rolling cell verdicts into a summary."
    relevant_world: [completion, completion_done, completion_repairable, completion_requires_drive, completion_diagnostics, completion_status, completion_markdown, completion_repair_log, summary, summary_path, harness_dir, results_dir, report_dir, deck]
    view:
      - heading: "Bake-off · scoring"
      - kv:
          pairs:
            Completion: '{{ world.completion.status|default:world.completion_status|default:"(checking…)" }}'
            Completed: '{{ world.completion_done|default:false }}'
            Completion report: '{{ world.completion_markdown|default:"(not generated)" }}'
            Repair needed: '{{ world.completion_requires_drive|default:false }}'
            Repairable: '{{ world.completion_repairable|default:false }}'
            Summary: '{{ world.summary_path|default:"(summarizing…)" }}'
            Results: '{{ world.results_dir }}'
            Report:  '{{ world.report_dir }}'
            Cells:   "{{ world.summary.cells|length }}"
      - prose: "bench.py completion records whether this matrix has complete evidence and whether it's pending-only or live-scored. If the completion report is incomplete but repairable, the story executes a free repair loop (`preflight` + `verify` + `prepare_handoffs`). If manual drives are still needed, scoring routes back to running to drive cells before rechecking completion."
    on_enter:
      - when: "world.repo_dir == ''"
        invoke: host.run
        id: completion
        with:
          cmd: python3
          args:
            - "bench.py"
            - "completion"
            - "--project"
            - "{{ world.project }}"
            - "--bug"
            - "{{ join(world.bugs, ',') }}"
            - "--candidate"
            - "{{ join(world.candidates, ',') }}"
            - "--results"
            - "{{ world.results_dir }}"
            - "--armed"
            - "--markdown"
            - "{{ world.report_dir }}/completion.md"
          cwd: "{{ world.harness_dir }}"
        bind:
          completion: stdout_json
          completion_status: stdout_json.status
          completion_markdown: stdout_json.markdown
          completion_done: stdout_json.completed
          completion_repairable: stdout_json.repairable
          completion_requires_drive: stdout_json.requires_drive
          completion_diagnostics: ""
        on_error: running
      - when: "world.repo_dir != ''"
        invoke: host.run
        id: completion_local
        with:
          cmd: python3
          args:
            - "bench.py"
            - "completion"
            - "--project"
            - "{{ world.project }}"
            - "--bug"
            - "{{ join(world.bugs, ',') }}"
            - "--candidate"
            - "{{ join(world.candidates, ',') }}"
            - "--repo-dir"
            - "{{ world.repo_dir }}"
            - "--results"
            - "{{ world.results_dir }}"
            - "--armed"
            - "--markdown"
            - "{{ world.report_dir }}/completion.md"
          cwd: "{{ world.harness_dir }}"
        bind:
          completion: stdout_json
          completion_status: stdout_json.status
          completion_markdown: stdout_json.markdown
          completion_done: stdout_json.completed
          completion_repairable: stdout_json.repairable
          completion_requires_drive: stdout_json.requires_drive
          completion_diagnostics: ""
        on_error: running
      - when: "world.completion.completed == true"
        invoke: host.run
        id: summarize
        with:
          cmd: python3
          args:
            - "bench.py"
            - "summarize"
            - "--project"
            - "{{ world.project }}"
            - "--results"
            - "{{ world.results_dir }}"
            - "--deck"
            - "{{ world.report_dir }}/deck.slidey.json"
            - "--markdown"
            - "{{ world.report_dir }}/report.md"
          cwd: "{{ world.harness_dir }}"
        bind:
          summary:      stdout_json
          summary_path: stdout_json.summary_path
          deck:         stdout_json.deck
          report_markdown: stdout_json.markdown
        on_error: running
      - when: "world.completion.completed == true"
        set:
          completion_repair_log: "completion complete; final rollup generated"
      - when: "world.completion.completed == true"
        emit_intent: accept
      - when: "world.completion.completed == false && world.completion_repairable == true && world.completion_requires_drive == false"
        emit_intent: repair
      - when: "world.completion.completed == false && (world.completion_requires_drive == true || world.completion_repairable == false)"
        emit_intent: run_more
    on:
      repair:
        - target: repair
      run_more:
        - target: running
      accept:
        - target: reporting
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
