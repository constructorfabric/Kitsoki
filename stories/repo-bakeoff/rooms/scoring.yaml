# scoring — DETERMINISTIC (no LLM). Roll up the per-cell verdicts the harness
# wrote (world.results_dir/cells/*.json) into a by-candidate summary via host.run →
# `bench.py summarize` (free). It fails when no scored cell JSON exists, routing
# back to running instead of producing a misleading 0-cell report. We call the
# script; we never reimplement scoring. `once: true` keyed on summary →
# reload-safe.
states:
  scoring:
    description: "Rolling up the cell verdicts into a summary (host.run → bench.py summarize)."
    relevant_world: [summary, summary_path, harness_dir, results_dir, report_dir, deck]
    view:
      - heading: "Bake-off · scoring"
      - kv:
          pairs:
            Summary: '{{ world.summary_path|default:"(summarizing…)" }}'
            Results: '{{ world.results_dir }}'
            Report:  '{{ world.report_dir }}'
            Cells:   "{{ world.summary.cells|length }}"
      - prose: "bench.py summarize rolls the per-cell verdicts from the live-driver artifact directory up by candidate and writes a project-specific Markdown report plus Slidey deck spec. If no scored cell JSON exists yet, scoring returns to running so the report cannot claim a 0-cell result. Deterministic — no LLM."
    on_enter:
      - invoke: host.run
        id: summarize
        once: true
        with:
          cmd: python3
          args:
            - "bench.py"
            - "summarize"
            - "--project"
            - "{{ world.project }}"
            - "--results"
            - "{{ world.results_dir }}"
            - "--deck"
            - "{{ world.report_dir }}/deck.slidey.json"
            - "--markdown"
            - "{{ world.report_dir }}/report.md"
          cwd: "{{ world.harness_dir }}"
        bind:
          summary:      stdout_json
          summary_path: stdout_json.summary_path
          deck:         stdout_json.deck
          report_markdown: stdout_json.markdown
        on_error: running
      - when: "world.summary.rollup != nil"
        emit_intent: accept
    on:
      accept:
        - target: reporting
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
