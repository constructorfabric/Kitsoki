states:
  # baseline — prove the gate FAILS before spending a cent on the maker loop.
  #
  # Red-before-green discipline: a gate that already passes on the unchanged
  # artifact can't tell you the loop achieved anything (the goal is already met,
  # or — more often — the gate is too weak to encode the goal). So we run the
  # configured checker ONCE here, on-camera, and branch:
  #   gate FAILS (RED)  → the gate works and there's real work to do → `proceed`.
  #   gate PASSES (green) → the gate proves nothing yet → `reconfigure` / `accept`.
  #
  # The maker (host.agent.task) is NEVER called in this room — the baseline is
  # the cheap check that gates the expensive loop.
  baseline:
    description: "Baseline — proving the gate fails first"
    relevant_world: [gate_mode, gate_command, gate_ok, script_gate_ok, agent_gate_ok, gate_exit_code, gate_stdout, gate_reason, gate_prompt_focus, goal_text, goal_artifact, worktree_path, workspace_branch]
    on_enter:
      # Worktree first — before any gate or maker spend. The maker is an agent
      # that EDITS the repo, so it must write into an isolated worktree, never
      # the operator's checkout. Mint it here (idempotent — re-launch / restart
      # reuses the same branch) and pin every downstream gate + maker call to its
      # cwd via cwd/working_dir. Reads still see the whole repo; writes are
      # confined to .worktrees/<workspace_id>. A failed mint routes to
      # workspace_error rather than letting the loop spend in the wrong tree.
      - invoke: iface.workspace.create
        id: "worktree"
        with:
          id:   "{{ world.workspace_id }}"
          name: "{{ world.workspace_branch }}"
          base: "{{ world.workspace_base }}"
        bind:
          worktree_path: path
        on_error: workspace_error
      # Reset last turn's verdict, then run the checker on the UNCHANGED artifact
      # INSIDE the worktree (identical to HEAD on a fresh branch, so a RED
      # baseline still holds — and it proves RED in the exact tree the maker edits).
      - set: { gate_ok: "", script_gate_ok: "", agent_gate_ok: "", gate_exit_code: 0, gate_stdout: "", gate_reason: "" }
      - invoke: host.run
        id: "gate-0"   # the baseline run, addressable distinctly from the loop gates
        when: "world.gate_mode == 'script' || world.gate_mode == 'hybrid'"
        with:
          cmd: "{{ world.gate_command }}"
          cwd: "{{ world.worktree_path }}"
          fail_on_error: false
        bind:
          gate_ok:        ok
          script_gate_ok: ok
          gate_exit_code: exit_code
          gate_stdout:    stdout
      - invoke: host.agent.decide
        id: "gate-0"   # the baseline review, addressable distinctly from loop gates
        when: "world.gate_mode == 'agent' || world.gate_mode == 'hybrid'"
        with:
          prompt: prompts/gate_review.md
          schema: schemas/gate_verdict.json
          agent: gate_reviewer
          working_dir: "{{ world.worktree_path }}"
          args:
            goal:          "{{ world.goal_text }}"
            goal_artifact: "{{ world.goal_artifact }}"
            prompt_focus:  "{{ world.gate_prompt_focus }}"
            script_ok:     "{{ world.script_gate_ok }}"
            script_output: "{{ world.gate_stdout }}"
        bind:
          gate_ok:       submitted.pass
          agent_gate_ok: submitted.pass
          gate_reason:   submitted.reason
      - set: { baseline_checked: true }
      # RED (gate fails) → the gate works and there's real work to do, so kick off
      # the autonomous loop with no operator prod. GREEN → no emit; rest here so
      # the operator decides (the gate proves nothing). Guard reads gate_ok, which
      # forces the bind to settle before routing (decision-emit discipline).
      - when: "(world.gate_mode != 'hybrid' && world.gate_ok == false) || (world.gate_mode == 'hybrid' && world.script_gate_ok != '' && world.agent_gate_ok != '' && (world.script_gate_ok == false || world.agent_gate_ok == false))"
        emit_intent: proceed
    view:
      extends: "base"
      blocks:
        body:
          # RED — the gate fails as it should. Safe to spend budget.
          - banner:
              text:     "GATE VERIFIED · RED"
              subtitle: "The planned gate fails on the unchanged artifact — there is real work to do"
              color:    "#F59E0B"
            when: "world.gate_ok == false"
          - prose: "✗ The gate **fails today** — exactly what we want before iterating. The loop now has a goal it can actually prove it reached."
            when:  "(world.gate_mode != 'hybrid' && world.gate_ok == false) || (world.gate_mode == 'hybrid' && world.script_gate_ok != '' && world.agent_gate_ok != '' && (world.script_gate_ok == false || world.agent_gate_ok == false))"
          # GREEN — the gate passes before any change. It proves nothing.
          - banner:
              text:     "GATE UNPROVEN"
              subtitle: "The gate already passes — it can't prove the loop achieved anything"
              color:    "#EF4444"
            when: "(world.gate_mode != 'hybrid' && world.gate_ok == true) || (world.gate_mode == 'hybrid' && world.script_gate_ok == true && world.agent_gate_ok == true)"
          - prose: "⚠ The gate **passes on the unchanged artifact**. Either the goal is already met, or the gate is too weak to encode it. Don't spend budget on a gate that can't fail — strengthen it (`reconfigure`), or `accept` that the goal is genuinely already met."
            when:  "(world.gate_mode != 'hybrid' && world.gate_ok == true) || (world.gate_mode == 'hybrid' && world.script_gate_ok == true && world.agent_gate_ok == true)"
          - heading: "What ran"
          - kv:
              pairs:
                Planned gate: "{{ world.gate_mode }}"
                Reason:       '{{ world.gate_plan_reason|default:"(configured explicitly)" }}'
                Focus:        '{{ world.gate_prompt_focus|default:"(goal as written)" }}'
            when: "world.gate_plan_reason != ''"
          - code: '{{ world.gate_command|default:"(agent reviewer — no shell command)" }}'
            when: "world.gate_mode == 'script' || world.gate_mode == 'hybrid'"
          - kv:
              pairs:
                Gate:      "{{ world.gate_mode }}"
                Exit code: "{{ world.gate_exit_code }}"
                Script:    "{{ world.script_gate_ok }}"
                Review:    "{{ world.agent_gate_ok }}"
            when: "world.gate_mode == 'script' || world.gate_mode == 'hybrid'"
          - heading: "Gate output"
          - code: '{{ world.gate_stdout|default:"(no output)" }}'
            when: "world.gate_mode == 'script' || world.gate_mode == 'hybrid'"
          - code: '{{ world.gate_reason|default:"(no rationale)" }}'
            when: "world.gate_mode == 'agent' || world.gate_mode == 'hybrid'"
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "proceed"
                  hint:  "baseline is RED — run the first maker iteration"
                  when:  "(world.gate_mode != 'hybrid' && world.gate_ok == false) || (world.gate_mode == 'hybrid' && world.script_gate_ok != '' && world.agent_gate_ok != '' && (world.script_gate_ok == false || world.agent_gate_ok == false))"
                - label: "accept"
                  hint:  "the goal is genuinely already met"
                  when:  "(world.gate_mode != 'hybrid' && world.gate_ok == true) || (world.gate_mode == 'hybrid' && world.script_gate_ok == true && world.agent_gate_ok == true)"
                - label: "reconfigure"
                  hint:  "edit the goal, gate, or budgets"
                - label: "abort"
                  hint:  "abandon the loop"
                - label: "look"
    on:
      proceed:
        - when: "(world.gate_mode != 'hybrid' && world.gate_ok == false) || (world.gate_mode == 'hybrid' && world.script_gate_ok != '' && world.agent_gate_ok != '' && (world.script_gate_ok == false || world.agent_gate_ok == false))"
          target: iterating
          # Hand the baseline failure to the first maker turn — the loop starts
          # already pointed at the gap, not blind.
          effects:
            - set:
                last_gate_failure: "{{ world.gate_stdout }}{{ world.gate_reason }}"
        - default: true
          target: .
          guard_hint: "The gate passes — there is nothing to iterate toward."
          effects:
            - say: "The gate already passes. `reconfigure` to strengthen it, or `accept`."
      accept:
        - when: "(world.gate_mode != 'hybrid' && world.gate_ok == true) || (world.gate_mode == 'hybrid' && world.script_gate_ok == true && world.agent_gate_ok == true)"
          target: report
          effects:
            - set: { goal_achieved: true, terminal_reason: "already_met" }
        - default: true
          target: .
          effects:
            - say: "The gate is RED — `proceed` to iterate, don't accept."
      reconfigure:
        - target: configuring
      abort:
        - target: report
          effects:
            - set: { terminal_reason: "aborted" }
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Use `proceed`, `reconfigure`, `accept`, or `abort`."

  # workspace_error — minting the worktree failed (e.g. the branch is checked
  # out by another worktree, or git is unavailable). The loop REFUSES to run the
  # maker outside an isolated worktree, so it rests here rather than spending in
  # the operator's checkout. `reconfigure` lets the operator pick a different
  # workspace_branch / workspace_id; `retry` re-attempts the mint.
  workspace_error:
    description: "Workspace error — could not mint the worktree"
    relevant_world: [last_error, workspace_branch, workspace_id]
    view:
      extends: "base"
      blocks:
        body:
          - banner:
              text:     "WORKSPACE ERROR"
              subtitle: "The maker only runs in an isolated worktree — none could be minted"
              color:    "#EF4444"
          - prose: "Could not create the worktree for branch `{{ world.workspace_branch }}` (id `{{ world.workspace_id }}`). The loop will not run the maker in your checkout."
          - code: '{{ world.last_error|default:"(no error detail)" }}'
          - prose: "Common cause: the branch is already checked out by another worktree. Pick a different `workspace_branch` / `workspace_id` and `reconfigure`, or `retry`."
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "retry"
                  hint:  "re-attempt the worktree mint"
                - label: "reconfigure"
                  hint:  "choose a different branch/id"
                - label: "abort"
                - label: "look"
    on:
      retry:
        - target: baseline
      reconfigure:
        - target: configuring
      abort:
        - target: report
          effects:
            - set: { terminal_reason: "aborted" }
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Type `retry`, `reconfigure`, or `abort`."
