states:
  configuring:
    description: "Configure the loop"
    # Free-text-first: a FLAT view (no extends) with a `choice` action widget, so
    # the web InputBar renders the action buttons AND a free-text "floor" that
    # routes a typed message via the semantic router — a real harness live, the
    # replay recording in the no-LLM demo — to `configure`. The operator's "first
    # message" is the goal in their own words. (Flat, not extends/base: a `choice`
    # element isn't allowed inside an extends/blocks view, and the base status
    # line — iter/budget/cost — is noise before the loop has launched anyway.)
    relevant_world: [goal_text, goal_artifact, gate_mode, gate_command, gate_plan_reason, gate_prompt_focus, iteration_budget, cost_budget_usd]
    view:
      - banner:
          text:     "CONFIGURE"
          subtitle: "Say what you want — then launch"
          color:    "#6366F1"
      - prose: "A Cherny loop iterates an agent toward a goal until a gate proves it met — or a budget stops it. **Say what you want in your own words.** When you describe ad hoc work, the gate planner chooses a script gate, an agent-review gate, or a hybrid of both based on what would actually prove the work is done."
      - prose: "⚠ {{ world.last_error }}"
        when:  "world.last_error != ''"
      - heading: "Goal"
      - prose: '{{ world.goal_text|default:"_(not yet chosen — say what you want, or `configure goal=…`)_" }}'
      - kv:
          pairs:
            Artifact under test: '{{ world.goal_artifact|default:"(none — the maker works from the repo)" }}'
      - heading: "The gate"
      - prose: "**planner** — no gate is locked in yet. Send a goal in your own words and the planner will choose whether this should be verified by a script, a prompt, or both."
        when:  "world.gate_mode == ''"
      # The gate is the whole point — render the actual command/checker the
      # operator can read and inspect, not a one-line kv value.
      - prose: '**script** — the gate is this command; it passes iff it exits 0:'
        when:  "world.gate_mode == 'script'"
      - code: '{{ world.gate_command|default:"# (none yet)" }}'
        when:  "world.gate_mode == 'script'"
      - prose: '**agent** — an adversarial reviewer judges the artifact against the goal (for goals no test can encode).'
        when:  "world.gate_mode == 'agent'"
      - prose: '**hybrid** — the script must pass and the adversarial reviewer must pass.'
        when:  "world.gate_mode == 'hybrid'"
      - code: '{{ world.gate_command|default:"# (planner has not chosen a command yet)" }}'
        when:  "world.gate_mode == 'hybrid'"
      - kv:
          pairs:
            Planner reason: '{{ world.gate_plan_reason|default:"(not planned yet)" }}'
            Review focus:   '{{ world.gate_prompt_focus|default:"(goal as written)" }}'
        when: "world.gate_mode == 'agent' || world.gate_mode == 'hybrid'"
      - heading: "Budgets"
      - kv:
          pairs:
            Iteration cap: "{{ world.iteration_budget }}"
            Cost cap:      '{% if world.cost_budget_usd > 0 %}${{ world.cost_budget_usd }}{% else %}(disabled){% endif %}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "launch"
              hint:   "prove the gate is RED, then run to completion"
              intent: launch
              when:   "world.goal_text != '' && (world.gate_mode == '' || world.gate_mode == 'agent' || world.gate_command != '')"
            - label:  "✗ launch — say what you want first"
              intent: look
              when:   "world.goal_text == ''"
            - label:  "✗ launch — script mode needs a gate command"
              intent: look
              when:   "world.goal_text != '' && (world.gate_mode == 'script' || world.gate_mode == 'hybrid') && world.gate_command == ''"
            - label:  "abort"
              hint:   "abandon the loop"
              intent: abort
            - label:  "look"
              intent: look
    on:
      configure:
        - target: .
          effects:
            - set:
                goal_text:        "{{ slots.goal ?? world.goal_text }}"
                goal_artifact:    "{{ slots.artifact ?? world.goal_artifact }}"
                # Normalize natural synonyms ("command"/"cmd"/"shell"/"test") to the
                # canonical "script" mode so a reasonable-sounding token can't strand
                # the loop on a gate_mode none of the rooms recognize.
                # Treat gate_command as explicit only when the operator also chose
                # a gate mode. Free-form router guesses can otherwise lock in a
                # weak command and skip the planner.
                gate_mode:        "{{ slots.gate_mode == nil ? (world.gate_command != '' ? world.gate_mode : '') : (slots.gate_mode == 'command' || slots.gate_mode == 'cmd' || slots.gate_mode == 'shell' || slots.gate_mode == 'test' ? 'script' : slots.gate_mode) }}"
                gate_command:     "{{ slots.gate_mode == nil ? world.gate_command : (slots.gate_command ?? world.gate_command) }}"
                gate_plan_reason:  "{{ slots.gate_mode != nil ? 'configured explicitly by the operator' : '' }}"
                gate_prompt_focus: "{{ slots.gate_mode == 'agent' || slots.gate_mode == 'hybrid' ? world.gate_prompt_focus : '' }}"
                iteration_budget: "{{ int(slots.iteration_budget ?? world.iteration_budget) }}"
                cost_budget_usd:  "{{ slots.cost_budget ?? world.cost_budget_usd }}"
                workspace_branch: "{{ slots.workspace_branch ?? world.workspace_branch }}"
                workspace_id:     "{{ slots.workspace_id ?? world.workspace_id }}"
            - invoke: host.agent.decide
              id: "gate-plan"
              when: "slots.gate_mode == nil && (slots.goal ?? '') != '' && world.gate_command == ''"
              with:
                prompt: prompts/gate_plan.md
                schema: schemas/gate_plan.json
                agent: gate_planner
                args:
                  goal:          "{{ slots.goal }}"
                  goal_artifact: "{{ slots.artifact ?? world.goal_artifact }}"
              bind:
                gate_mode:         submitted.gate_mode
                gate_command:      submitted.gate_command
                goal_artifact:     submitted.artifact
                gate_prompt_focus: submitted.prompt_focus
                gate_plan_reason:  submitted.reason
              on_error: configuring
      launch:
        - when: "world.goal_text == ''"
          target: .
          effects:
            - say: "Set a goal first: `configure goal=…`."
        - when: "(world.gate_mode == 'script' || world.gate_mode == 'hybrid') && world.gate_command == ''"
          target: .
          effects:
            - say: "Script mode needs a gate: `configure gate_command=…`."
        - when: "world.gate_mode == ''"
          target: .
          effects:
            - say: "The gate is not planned yet. Send the goal with `configure goal=…` or type it in your own words."
        # Refuse any mode the rooms don't recognize, rather than letting it strand
        # the loop in `baseline` with a gate that never runs.
        - when: "world.gate_mode != 'script' && world.gate_mode != 'agent' && world.gate_mode != 'hybrid'"
          target: .
          effects:
            - say: "Unknown gate mode `{{ world.gate_mode }}`. Use `script`, `agent`, or `hybrid` — or just describe the goal and let the planner choose."
        # Don't go straight to iterating — prove the gate is RED first.
        - target: baseline
      abort:
        - target: "@exit:abandoned"
          effects:
            - set: { terminal_reason: "aborted" }
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Use `configure`, `launch`, or `abort`."
