# The exact path the web tour demo drives (kitsoki web --flow), and a Mode-2
# proof that it is real and every host call along it is stubbed. Lands directly
# in configuring (the root — no idle/begin ceremony), configures a script-gated
# loop with a small budget, verifies the gate is RED (baseline), then iterates
# until the gate-fail loop hits the iteration ceiling.
#
# Realistic, CONVERGING scenario: fix a token-bucket rate limiter so
# `go test ./internal/ratelimit` passes. Each gate run surfaces a DIFFERENT,
# progressively-deeper failure (burst → refill → data race → deadlock →
# off-by-one) and each maker iteration fixes the one the gate just named — so the
# loop is visibly converging, not blindly retrying. It runs out of budget one
# assertion short, which is exactly why the budget guard exists.
#
# Per-call stubbing: the maker (host.oracle.task) and gate (host.run) call sites
# carry a templated `id:` (maker-{{iteration}} / gate-{{iteration}}; gate-0 is the
# baseline), threaded into args.call, so `by_call:` returns a distinct response
# per iteration.
test_kind: flow
app: ../app.yaml
initial_state: configuring

host_handlers:
  host.run:
    by_call:
      gate-0:
        data:
          ok: false
          exit_code: 1
          stdout: |-
            --- FAIL: TestAllow_Burst (0.00s)
                limiter_test.go:34: burst of 5 rejected at request #4 (want all 5 allowed)
            FAIL	kitsoki/internal/ratelimit	0.012s
      gate-1:
        data:
          ok: false
          exit_code: 1
          stdout: |-
            --- FAIL: TestAllow_Refill (0.00s)
                limiter_test.go:52: after 1s, 0 tokens refilled (want 10 at rate 10/s)
            FAIL	kitsoki/internal/ratelimit	0.011s
      gate-2:
        data:
          ok: false
          exit_code: 1
          stdout: |-
            --- FAIL: TestAllow_Concurrent (0.02s)
                limiter_test.go:68: data race: 12/100 goroutines double-spent a token
            FAIL	kitsoki/internal/ratelimit	0.024s
      gate-3:
        data:
          ok: false
          exit_code: 1
          stdout: |-
            --- FAIL: TestAllow_Concurrent (1.20s)
                limiter_test.go:68: timeout: Allow held the lock across time.Sleep (deadlock)
            FAIL	kitsoki/internal/ratelimit	1.231s
      gate-4:
        data:
          ok: false
          exit_code: 1
          stdout: |-
            --- FAIL: TestAllow_Concurrent (0.03s)
                limiter_test.go:71: off-by-one: 1/100 goroutines slipped past the limit under contention
            FAIL	kitsoki/internal/ratelimit	0.031s
  host.oracle.task:
    by_call:
      maker-1: { data: { submitted: { summary: "Initialize the bucket with tokens=burst so a cold limiter allows a full burst" } } }
      maker-2: { data: { submitted: { summary: "Refill tokens by elapsed×rate on each Allow, capped at the burst size" } } }
      maker-3: { data: { submitted: { summary: "Guard the token read-modify-write with a mutex to kill the double-spend race" } } }
      maker-4: { data: { submitted: { summary: "Compute the wait, release the lock, then sleep — never sleep while holding the mutex" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent:
      name: configure
      slots:
        goal:             "Get `go test ./internal/ratelimit` green"
        artifact:         "internal/ratelimit/limiter.go"
        gate_command:     "go test ./internal/ratelimit/"
        gate_mode:        "script"
        iteration_budget: 4
    expect_state: configuring
    expect_world:
      goal_text:        "Get `go test ./internal/ratelimit` green"
      goal_artifact:    "internal/ratelimit/limiter.go"
      iteration_budget: 4
  # launch verifies the gate is RED first — the baseline run (gate-0) fails, so
  # the gate is proven to fail before any maker spend.
  - intent: { name: launch, slots: {} }
    expect_state: baseline
    expect_world:
      baseline_checked: true
  - intent: { name: proceed, slots: {} }
    expect_state: iterating
    expect_world:
      iteration:     1
      maker_summary: "Initialize the bucket with tokens=burst so a cold limiter allows a full burst"
  - intent: { name: evaluate, slots: {} }
    expect_state: iterating
    expect_world:
      iteration:     2
      maker_summary: "Refill tokens by elapsed×rate on each Allow, capped at the burst size"
  - intent: { name: evaluate, slots: {} }
    expect_state: iterating
    expect_world:
      iteration:     3
      maker_summary: "Guard the token read-modify-write with a mutex to kill the double-spend race"
  - intent: { name: evaluate, slots: {} }
    expect_state: iterating
    expect_world:
      iteration:     4
      maker_summary: "Compute the wait, release the lock, then sleep — never sleep while holding the mutex"
  - intent: { name: evaluate, slots: {} }
    expect_state: __exit__exhausted
    expect_world: { terminal_reason: "iteration_budget" }

expect_terminal: true
