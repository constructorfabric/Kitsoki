# The feedback edge: each gate's failure becomes the NEXT maker's feedback, so
# the loop converges on distinct, deeper failures. launch runs autonomously:
# baseline (gate-0) and iteration 1 (gate-1) fail on different things, iteration 2
# fixes it (gate-2 passes) → achieved. The final world proves iteration 2 ran
# (maker-2) carrying iteration 1's failure forward (last_gate_failure).
test_kind: flow
app: ../app.yaml
initial_state: configuring

host_handlers:
  host.run:
    by_call:
      gate-0: { data: { ok: false, exit_code: 1, stdout: "FAIL: TestAllow_Burst — burst rejected at #4" } }
      gate-1: { data: { ok: false, exit_code: 1, stdout: "FAIL: TestAllow_Refill — 0 tokens refilled" } }
      gate-2: { data: { ok: true,  exit_code: 0, stdout: "ok  kitsoki/internal/ratelimit  0.011s" } }
  host.agent.task:
    by_call:
      maker-1: { data: { submitted: { summary: "Size the bucket to the burst" } } }
      maker-2: { data: { submitted: { summary: "Refill tokens by elapsed×rate" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent:
      name: configure
      slots:
        goal:         "Get `go test ./internal/ratelimit` green"
        gate_command: "go test ./internal/ratelimit/"
        gate_mode:    "script"
    expect_state: configuring
  - intent: { name: launch, slots: {} }
    expect_state: __exit__achieved
    expect_world:
      terminal_reason:   "achieved"
      iteration:         2
      maker_summary:     "Refill tokens by elapsed×rate"
      last_gate_failure: "FAIL: TestAllow_Refill — 0 tokens refilled"

expect_terminal: true
