# Baseline gate is RED → the loop is safe to start. `launch` runs the gate once
# on the unchanged artifact (host.run fails, exit 1), proving the gate fails
# today; `proceed` then runs the first maker iteration with the baseline failure
# carried in as feedback. The red-before-green discipline: no maker spend until
# the gate is proven able to fail.
test_kind: flow
app: ../app.yaml
initial_state: configuring

host_handlers:
  host.run:           { data: { ok: false, exit_code: 1, stdout: "FAIL: 2 tests failing" } }
  host.oracle.task:   { data: { submitted: { summary: "made the smallest change toward the goal" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent:
      name: configure
      slots:
        goal:         "Make the unit tests pass"
        gate_command: "go test ./..."
        gate_mode:    "script"
    expect_state: configuring
  - intent: { name: launch, slots: {} }
    expect_state: baseline
    expect_world:
      baseline_checked: true
  - intent: { name: proceed, slots: {} }
    expect_state: iterating
    expect_world:
      iteration:         1
      last_gate_failure: "FAIL: 2 tests failing"

expect_terminal: false
