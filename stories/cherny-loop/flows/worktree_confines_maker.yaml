# Worktree confinement — `launch` mints a worktree (iface.workspace.create →
# host.git_worktree) BEFORE the baseline gate, and every maker + gate call runs
# with its cwd pinned to that worktree. This fixture asserts the host-call
# contract that makes confinement real: the worktree is created once, the maker
# runs with working_dir = the worktree path, and the gate runs with cwd = the
# worktree path. Same convergence as achieved_via_loop, but proving WHERE the
# work happened.
test_kind: flow
app: ../app.yaml
initial_state: configuring

host_handlers:
  host.git_worktree: { data: { ok: true, path: ".worktrees/cherny-loop" } }
  host.run:
    by_call:
      gate-0: { data: { ok: false, exit_code: 1, stdout: "--- FAIL: TestAllow_Burst" } }
      gate-1: { data: { ok: true,  exit_code: 0, stdout: "ok  kitsoki/internal/ratelimit  0.012s" } }
      cherny-report:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            report_path: ".artifacts/cherny-loop/test/report.md"
            summary_path: ".artifacts/cherny-loop/test/summary.json"
            deck_path: ".artifacts/cherny-loop/test/deck.slidey.json"
  host.agent.task:
    by_call:
      maker-1: { data: { submitted: { summary: "Initialize the bucket with tokens=burst" } } }
  host.artifacts_dir: { data: { ok: true } }
  # iface.vcs.commit → host.git: commit the maker's work before @exit:achieved.
  host.git: { data: { ok: true, sha: "abc1234" } }

turns:
  - intent:
      name: configure
      slots:
        goal:         "Get `go test ./internal/ratelimit` green"
        gate_command: "go test ./internal/ratelimit/"
        gate_mode:    "script"
    expect_state: configuring
  - intent: { name: launch, slots: {} }
    expect_state: __exit__achieved
    expect_world:
      goal_achieved:   true
      terminal_reason: "achieved"
      worktree_path:   ".worktrees/cherny-loop"
      deck_path:       ".artifacts/cherny-loop/test/deck.slidey.json"
    expect_host_calls:
      # Worktree minted exactly once, on the configured branch. The iface invoke
      # is rewritten at load to <binding>.<op>, so the recorded namespace is
      # host.git_worktree.create (prefix-fallback resolves the stub).
      - handler: host.git_worktree.create
        args: { name: "cherny-loop/run" }
        times: 1
      # Baseline gate ran INSIDE the worktree.
      - handler: host.run
        args: { call: gate-0, cwd: ".worktrees/cherny-loop" }
        times: 1
      # The maker wrote INSIDE the worktree (working_dir pinned).
      - handler: host.agent.task
        args: { call: maker-1, working_dir: ".worktrees/cherny-loop" }
        times: 1
      # Loop gate ran INSIDE the worktree.
      - handler: host.run
        args: { call: gate-1, cwd: ".worktrees/cherny-loop" }
        times: 1
      # Commit ran INSIDE the worktree (workdir pinned to worktree_path).
      - handler: host.git.commit
        args: { workdir: ".worktrees/cherny-loop" }
        times: 1

expect_terminal: true
expect_no_errors: true
