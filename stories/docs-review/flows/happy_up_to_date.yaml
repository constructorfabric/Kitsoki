# happy_up_to_date — agent says docs are in sync; verdict landed
# under a different sha. Walks idle → reviewing → reviewed → quit.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world: {}

host_cassette: cassettes/up_to_date.cassette.yaml

turns:
  - intent: { name: start, slots: {} }
    expect_state: reviewed
    expect_world:
      commit_sha:    "facefeeddeadbeef"
      artifact_path: "/tmp/.artifacts/docs-review-facefeeddeadbeef.md"
      deck_path:     ".artifacts/docs-review/facefeeddeadbeef/deck.slidey.json"

  # Run it again — same cassette, replay: any. Lands back in reviewed.
  - intent: { name: review_again, slots: {} }
    expect_state: reviewed
    expect_world:
      commit_sha:    "facefeeddeadbeef"
      deck_path:     ".artifacts/docs-review/facefeeddeadbeef/deck.slidey.json"

  - intent: { name: quit, slots: {} }
    expect_state: __exit__done

expect_terminal: true
expect_no_errors: true
