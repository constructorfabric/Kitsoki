# mining.profile.yaml — scope config for mining docs-review coverage from real
# Claude Code transcripts. Co-located so the story self-describes its mine.
#
# This is SCOPE CONFIGURATION, not an auto-classifier. It tells coverage_prep.py
# (1) which sessions to distill (the grep prefilter), (2) which mined intents are
# in-scope (the action tags), and (3) which rooms are CANDIDATE owners of each
# action tag — a STARTING POINT for the human/LLM map in coverage.md, never an
# assertion. The verdict (CONFORMS / DIVERGES / FIXTURE-GAP / COVERAGE-GAP /
# OUT-OF-SCOPE) is assigned by reading the room bash + the recovered outcome, not
# mechanically. See docs/stories/story-coverage-mining.md.

story: docs-review

scope:
  # prep.py --grep words. RECALL-ONLY prefilter: a substring scan over the whole
  # raw jsonl, so it over-matches prose ("update the readme", "docs are stale").
  # It widens the net; the real scoping is the human read in the map.
  grep: ["docs in sync", "stale docs", "update the docs", "out of date", readme, "docs review", "doc drift", "bring the docs"]
  sample: recency          # mine how we work *now*
  max: 25

  # post-filter to these action tags (vocab/tags.yaml). The story walks
  # reviewing → reviewed/review_failed → fixing → fixed: an Opus reviewer audits
  # whether docs track recent code, then a writer applies targeted doc edits.
  # The in-scope tags are the review verdict and the doc-writing fix.
  action_tags: [review-feedback, write-docs, explore-codebase]

# Candidate rooms per action tag — a starting point for the human map, joined into
# the coverage.md "candidate room" column by coverage_prep.py. Room ids are the
# files under stories/docs-review/rooms/.
owns:
  review-feedback:    [reviewing, reviewed, review_failed]
  write-docs:         [fixing, fixed]
  explore-codebase:   [reviewing]

# Non-goals. A matching intent is OUT-OF-SCOPE, not a gap. Matched against the
# verbatim user_text, since the action tags above are too coarse to separate
# these from in-scope work. The story OWNS NO WORKSPACE PLUMBING: doc fixes are
# left uncommitted for the operator (no auto-commit, no branch, no PR). It also
# does not author NEW docs from scratch, generate code, or review code quality —
# only whether existing docs are in sync with recent changes.
non_goals: [auto-commit-doc-fixes, branch-or-pr-creation, author-new-docs, code-review, generate-code]

# Marker substrings coverage_prep.py scans the verbatim user_text for to HINT that
# an in-scope-by-tag intent is actually an OUT-OF-SCOPE non_goal. A hint that
# routes the human's attention — never an automatic verdict.
non_goal_markers: ["commit the docs", "commit these changes", "create a branch", "open a pr", "create a pr", "pull request", "write a new doc", "new readme", "review the code", "code review", "write the code"]
