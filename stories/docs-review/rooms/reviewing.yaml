# reviewing — does all the work on_enter, then auto-advances via
# emit_intent: done.
#
# on_enter chain (order matters; each effect sees the world snapshot
# built by the preceding ones):
#
#   1. host.run preflight: emit a JSON envelope with the current HEAD
#      sha, last 20 commit subjects, and a `git diff --stat HEAD~20..HEAD`
#      summary. The handler's stdout_json parser binds these into world.
#
#   2. host.agent.decide: hand the metadata to an Opus agent with
#      read-only tools (Read/Grep/Glob/Bash[read-only]). Schema-pinned
#      verdict with `decision` ∈ {needs_update, up_to_date}.
#
#   3. host.artifacts_dir: write the verdict map (auto-pretty-printed
#      as JSON because the handler coerces map bodies) to
#      .artifacts/docs-review-<sha>.md.
#
#   4. emit_intent: done — bounces into the `reviewed` state.

states:

  reviewing:
    description: "Capturing the diff and asking the docs reviewer."
    view:
      - prose: "Running the audit. The reviewer is reading docs/ against the selected scope."
      - kv:
          pairs:
            "Commit":   '{{ world.commit_sha|default:"(probing…)" }}'
            "Verdict":  '{{ world.verdict.decision|default:"(pending — agent has not returned)" }}'
      - heading: "Recent log"
      - code: '{{ world.recent_log|default:"(pending)" }}'
      # Action menu is unconditional (skill §6). The state usually
      # transits in one turn via emit_intent:done, but if the agent
      # is slow the user still needs an escape.
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "quit"
              hint:   "abandon the run"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [commit_sha, recent_log, verdict]
    on_enter:
      # 1. Capture HEAD + recent activity in a single JSON envelope so
      # stdout_json binds them in one shot.
      - invoke: host.run
        id: docs-preflight
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -e
              sha=$(git rev-parse HEAD)
              count=$(git rev-list --count HEAD 2>/dev/null || echo 1)
              mode="{{ world.review_mode }}"
              if [ "$mode" = "baseline" ]; then
                # Baseline mode: ignore commit range. Enumerate doc roots
                # and code surfaces so the agent has a structural picture
                # to audit, then leave recent/diff empty as a signal that
                # this is the full-repo path, not a delta.
                recent=""
                diff=""
                wt=""
                doc_inventory=$(
                  {
                    [ -f README.md ]  && echo "README.md"
                    [ -f CLAUDE.md ]  && echo "CLAUDE.md"
                    find docs -type f \( -name "*.md" -o -name "*.json" \) 2>/dev/null
                    find stories -maxdepth 2 -name "README.md" 2>/dev/null
                  } | sort -u | head -200
                )
                code_inventory=$(
                  {
                    find cmd -type d -mindepth 1 -maxdepth 2 2>/dev/null
                    find internal -type d -mindepth 1 -maxdepth 2 2>/dev/null
                  } | sort -u | head -200
                )
              else
                # Recent mode: original delta-focused capture.
                doc_inventory=""
                code_inventory=""
                if [ "$count" -gt 1 ]; then
                  n=$count
                  if [ "$n" -gt 21 ]; then n=21; fi
                  base="HEAD~$((n - 1))"
                  recent=$(git log --oneline -n "$n" 2>/dev/null || true)
                  diff=$(git diff --stat "$base..HEAD" 2>/dev/null || true)
                else
                  recent=$(git log --oneline -n 1 2>/dev/null || true)
                  diff=$(git show --stat --format= HEAD 2>/dev/null || true)
                fi
                wt=$(git diff --stat HEAD 2>/dev/null || true)
              fi
              jq -nc \
                --arg sha    "$sha" \
                --arg count  "$count" \
                --arg mode   "$mode" \
                --arg recent "$recent" \
                --arg diff   "$diff" \
                --arg wt     "$wt" \
                --arg docs   "$doc_inventory" \
                --arg code   "$code_inventory" \
                '{sha:$sha, commit_count:$count, review_mode:$mode, recent_log:$recent, recent_changes:$diff, working_tree_diff:$wt, doc_inventory:$docs, code_inventory:$code}'
        bind:
          commit_sha:        "stdout_json.sha"
          commit_count:      "stdout_json.commit_count"
          recent_log:        "stdout_json.recent_log"
          recent_changes:    "stdout_json.recent_changes"
          working_tree_diff: "stdout_json.working_tree_diff"
          doc_inventory:     "stdout_json.doc_inventory"
          code_inventory:    "stdout_json.code_inventory"
        on_error: review_failed

      # 2. Ask Opus.
      - invoke: host.agent.decide
        id: docs-reviewer
        with:
          prompt: prompts/decide.md
          schema: schemas/docs_review_verdict.json
          agent:  docs_reviewer
          args:
            commit_sha:        "{{ world.commit_sha }}"
            commit_count:      "{{ world.commit_count }}"
            review_mode:       "{{ world.review_mode }}"
            recent_log:        "{{ world.recent_log }}"
            recent_changes:    "{{ world.recent_changes }}"
            working_tree_diff: "{{ world.working_tree_diff }}"
            doc_inventory:     "{{ world.doc_inventory }}"
            code_inventory:    "{{ world.code_inventory }}"
        bind:
          # Bind both the full verdict and a scalar sentinel so the
          # transition guard below can detect "submit succeeded" without
          # walking into world.verdict.decision (which expr-lang reads
          # through differently depending on how the value lands in the
          # world map). The sentinel is an explicit promise the schema
          # makes: decision must be set on every successful submit.
          verdict:          submitted
          verdict_decision: submitted.decision
        on_error: review_failed

      # 3. Drop the verdict into .artifacts/ as a **pure JSON file**.
      # host.artifacts_dir's renderArtifact wraps the body in a markdown
      # header (`### …`) and footer (`_phase: …_`) when `title:` and/or
      # `phase_id:` are set — that produced a JSON-inside-markdown blob
      # that downstream tooling couldn't parse. By:
      #   - giving thread a `.json` extension (handler honours the
      #     trailing extension as-is and skips `.md` auto-append)
      #   - omitting title and phase_id
      # we get just the body bytes on disk. `body: "{{ world.verdict }}"`
      # is a single-expression template that RenderValue passes through
      # as a typed map; bodyArg then json.MarshalIndent's it. Net result:
      # a valid, schema-conforming JSON file readable by jq / Python /
      # downstream pipelines.
      #
      # The thread name carries the mode so baseline and recent runs at
      # the same SHA don't clobber each other.
      - invoke: host.artifacts_dir
        id: docs-verdict-artifact
        with:
          thread:    "docs-review-{{ world.review_mode }}-{{ world.commit_sha }}.json"
          mode:      "replace"
          body:      "{{ world.verdict }}"
        bind:
          artifact_path: path
        on_error: review_failed

      # 4. Hand off. Two conditional emits, guarded against world keys
      #    that only become non-empty AFTER the preceding host calls'
      #    binds have settled:
      #
      #    - Pre-bind (machine.Turn applies on_enter effects before the
      #      orchestrator dispatches host.* invokes), every binding above
      #      is still at its world-schema default (""), so BOTH guards
      #      are false and nothing emits. The machine returns at
      #      `reviewing` with the host calls queued.
      #    - Post-bind, the orchestrator's settlePostBindEmits re-walks
      #      these `emit_intent:` entries against the post-bind world.
      #      `verdict_decision` is set iff agent.decide successfully
      #      submitted a schema-conforming verdict. The matching emit
      #      fires.
      #
      #    Without the conditional guard, the unconditional emit fired
      #    pre-bind would route to `reviewed` before the verdict landed,
      #    producing the "Decision: (missing)" garbage state.
      - emit_intent: done
        when: "world.verdict_decision != ''"
      - emit_intent: no_submit
        when: "world.commit_sha != '' && world.verdict_decision == ''"
    on:
      # Defensive guard: agent.decide can technically return ok with an
      # empty `submitted` (e.g. validator misconfiguration). Bounce to
      # review_failed in that case rather than rendering a fake-good
      # verdict in `reviewed`. The `decision` field is required by the
      # schema, so its presence is a sufficient signature for "real submit".
      done:
        - target: reviewed
      no_submit:
        - target: review_failed
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
