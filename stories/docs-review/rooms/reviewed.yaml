# reviewed — terminal display state. Shows the verdict and the path
# to the artifact. From here the operator can review again (e.g. after
# a new commit) or quit.

states:

  reviewed:
    description: "Docs review complete."
    view:
      - kv:
          pairs:
            "Commit":     "{{ world.commit_sha }}"
            "Mode":       '{{ world.review_mode|default:"recent" }}'
            "Decision":   '{{ world.verdict.decision|default:"(missing)" }}'
            "Confidence": '{{ world.verdict.confidence|default:"(n/a)" }}'
            "Artifact":   '{{ world.artifact_path|default:"(not written)" }}'
      - heading: "Summary"
      - prose: '{{ world.verdict.summary|default:"(no summary)" }}'
      - heading: "Commits in scope"
      - code: |
          {% for c in world.verdict.commits %}- {{ c.sha }} — {{ c.subject }}
            change: {{ c.change }}
          {% empty %}(none — structural audit){% endfor %}
      - heading: "Stale docs (path : lines)"
        when: 'world.verdict.decision == "needs_update"'
      - code: |
          {% for d in world.verdict.stale_docs %}{{ d.path }} : {{ d.lines }}{% if d.anchor %}  ({{ d.anchor }}){% endif %}
          {% for inv in d.invalidations %}    [{{ inv.commit }}{% if inv.source %} · {{ inv.source }}{% endif %}] {{ inv.change }}
              → {{ inv.reason }}
          {% endfor %}{% empty %}(none cited){% endfor %}
        when: 'world.verdict.decision == "needs_update"'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            # In staged mode the engine stops here (reviewed is a decision
            # gate — review_again is an operator-only forward intent) and the
            # fix_docs auto-advance is suppressed, so the operator needs an
            # explicit way to apply the fixes. Shown only when the verdict
            # flagged stale docs; in one-shot mode the on_enter emit fires and
            # this room never renders. See
            # docs/proposals/execution-modes-and-gate-deciders.md.
            - label:  "fix_docs"
              hint:   "apply the documentation fixes the verdict described"
              intent: fix_docs
              when:   'world.verdict.decision == "needs_update"'
            - label:  "review_again"
              hint:   "re-run against the current HEAD"
              intent: review_again
            - label:  "quit"
              hint:   "exit"
              intent: quit
            - label:  "look"
              hint:   "re-render the scene"
              intent: look
    relevant_world: [commit_sha, verdict, artifact_path]
    on_enter:
      # Live progress breadcrumb — streamed per-room as the one-shot chain
      # passes through (and shown above the verdict when staged stops here).
      # See docs/proposals/execution-modes-and-gate-deciders.md.
      - say: 'Review complete — verdict: {{ world.verdict.decision }}{% if world.verdict.decision == "needs_update" %} ({{ world.verdict.stale_docs|length }} stale doc(s) cited){% endif %}.'
      # This is an operator gate. A needs_update verdict exposes the
      # `fix_docs` action but does not auto-edit the working tree; the
      # write-capable docs_writer runs only after an explicit operator pick.
    on:
      fix_docs:
        - target: fixing
      review_again:
        - target: reviewing
      quit:
        - target: "@exit:done"
      look:
        - target: .
