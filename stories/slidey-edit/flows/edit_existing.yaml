# edit_existing — idle hands an existing slidey JSON spec STRAIGHT to rendering,
# then review. The existing deck already works in the web viewer, so loading it
# renders it IN PLACE (its own dir is the workspace) and lands in the
# spatial-oracle review with NO authoring agent and no accept/go/continue step.
#
# resolve_deck promotes the resolved spec into `deck` and sets `workspace` to the
# deck's own directory. host.agent.task is intentionally NOT registered: the
# existing-deck path must never invoke it.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  workspace: "stories/slidey-edit/baked"
  deck: { spec_path: "stories/slidey-edit/baked/deck.json", summary: "Spatial-annotation explainer deck (3 scenes)." }
  addressed: { items: [] }
  refine_budget: 6

host_handlers:
  # host.agent.task intentionally ABSENT — the existing-deck path runs no agent.

  host.slidey.render:
    by_call:
      render_deck:
        data:
          ok: true
          path: "stories/slidey-edit/baked/deck.html"
          semantic_path: "stories/slidey-edit/baked/deck.semantic.json"

  host.starlark.run:
    by_call:
      resolve_deck:
        data:
          source_deck:
            spec_path: "stories/slidey-edit/baked/deck.json"
            summary: "Spatial-annotation explainer deck (3 scenes)."
          deck:
            spec_path: "stories/slidey-edit/baked/deck.json"
            summary: "Spatial-annotation explainer deck (3 scenes)."
          workspace: "stories/slidey-edit/baked"
      seed_annotation:
        data:
          annotation:
            anchor:
              kind: "semantic_element"
              semantic_element: { plugin: "slidey", ref: "1/card_0", bbox: [140, 518, 535, 114] }
              label: "Scene 1 · card 0"
            instruction: "Make the semantic_element card stand out and add a one-line example beneath it."
            frame_handle: "slidey-edit#1"

  host.artifacts_dir:
    by_call:
      emit_deck:
        data: { ok: true, handle: { id: "slidey-edit#1", kind: "slideshow", mime: "text/html" }, path: "stories/slidey-edit/baked/deck.html", kind: "slideshow", mime: "text/html" }
      emit_semantic:
        data: { ok: true, handle: { id: "slidey-semantic#1", kind: "data", mime: "application/json" }, path: "stories/slidey-edit/baked/deck.semantic.json", kind: "data", mime: "application/json" }

turns:
  - intent:
      name: edit_existing
      slots:
        spec_path: "stories/slidey-edit/baked/deck.json"
        summary: "Spatial-annotation explainer deck (3 scenes)."
    # Existing deck → rendering → reviewing in one turn, NO agent task.
    expect_state: reviewing
    expect_world:
      source_deck:
        spec_path: "stories/slidey-edit/baked/deck.json"
        summary: "Spatial-annotation explainer deck (3 scenes)."
      deck:
        spec_path: "stories/slidey-edit/baked/deck.json"
        summary: "Spatial-annotation explainer deck (3 scenes)."
      workspace: "stories/slidey-edit/baked"
      deck_handle: "slidey-edit#1"
    expect_host_calls:
      - handler: host.slidey.render
        args: { call: "render_deck" }
      - handler: host.artifacts_dir
        args: { call: "emit_deck" }

expect_terminal: false
expect_no_errors: true
