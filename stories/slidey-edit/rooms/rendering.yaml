# rendering — DETERMINISTIC (no LLM). host.slidey.render bundles the deck JSON
# to a self-contained static HTML deck AND emits the .semantic.json sidecar (the
# named-element → region map slice 3 produces; slice 4 overlays). Both are
# emitted to artifacts_dir for stable handles the media view / annotation
# surface resolve. (The annotation surface floats its SemanticOverlay over the
# poster still beside the deck, so the location-tied mechanism is independent of
# the rendered format — html or mp4.)
#
# `once: true` per invoke (keyed on the relevant bind). A rerender / refine pass
# clears deck_handle (+ the path binds) so the render re-runs fresh.

states:

  rendering:
    description: "Rendering the deck to a static HTML deck + semantic sidecar (deterministic)."
    relevant_world: [deck, deck_handle, semantic_handle, deck_path, semantic_path, cycle]
    view:
      - heading: "Slidey deck editor · rendering"
      - kv:
          pairs:
            Deck:     '{{ world.deck.spec_path|default:"(pending)" }}'
            HTML:     '{{ world.deck_handle|default:"(rendering…)" }}'
            Semantic: '{{ world.semantic_handle|default:"(rendering…)" }}'
            Cycle:    "{{ world.cycle }}"
      - prose: "Rendering is deterministic — it produces the static HTML deck plus a semantic sidecar, then routes to review."
    on_enter:
      # Render the deck spec → static HTML deck + .semantic.json sidecar.
      - invoke: host.slidey.render
        id: render_deck
        once: true
        with:
          spec_path: "{{ world.deck.spec_path }}"
          format:    html
        bind:
          deck_path:     path
          semantic_path: semantic_path
        # A render failure auto-repairs the deck spec and retries (bounded by
        # render_retry_budget) before falling through to reviewing.
        on_error: fixing_render

      # Emit the rendered HTML deck → deck_handle. The artifact is a self-contained
      # HTML file (text/html), declared kind `slideshow`: a multi-scene deck whose
      # pixels aren't an addressable still, so the media view previews its poster
      # frame and the annotation surface floats the SemanticOverlay over that
      # poster (rather than embedding the interactive SPA in a sandboxed iframe).
      - invoke: host.artifacts_dir
        id: emit_deck
        once: true
        with:
          thread:   "slidey-edit"
          src_path: "{{ world.deck_path }}"
          kind:     slideshow
          mime:     text/html
          label:    "{{ world.deck.summary }} (cycle {{ world.cycle }})"
        bind:
          deck_handle: handle.id
        on_error: reviewing

      # Emit the semantic sidecar → semantic_handle (the annotation surface reads it).
      - invoke: host.artifacts_dir
        id: emit_semantic
        once: true
        with:
          thread:   "slidey-edit"
          src_path: "{{ world.semantic_path }}"
          kind:     data
          label:    "semantic sidecar"
        bind:
          semantic_handle: handle.id
        on_error: reviewing

      - when: "world.deck_handle != ''"
        emit_intent: accept
    on:
      accept:
        - target: reviewing
      look:
        - target: .
