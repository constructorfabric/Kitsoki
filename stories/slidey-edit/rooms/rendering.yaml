# rendering — DETERMINISTIC (no LLM). host.slidey.render renders the deck JSON
# to mp4 AND emits the .semantic.json sidecar (the named-element → region map
# slice 3 produces; slice 4 overlays). Both are emitted to artifacts_dir for
# stable handles the media view / annotation surface resolve.
#
# `once: true` per invoke (keyed on the relevant bind). A rerender / refine pass
# clears deck_handle (+ the path binds) so the render re-runs fresh.

states:

  rendering:
    description: "Rendering the deck to a video + semantic sidecar (deterministic)."
    relevant_world: [deck, deck_handle, semantic_handle, deck_path, semantic_path, cycle]
    view:
      - heading: "Slidey deck editor · rendering"
      - kv:
          pairs:
            Deck:     '{{ world.deck.spec_path|default:"(pending)" }}'
            Video:    '{{ world.deck_handle|default:"(rendering…)" }}'
            Semantic: '{{ world.semantic_handle|default:"(rendering…)" }}'
            Cycle:    "{{ world.cycle }}"
      - prose: "Rendering is deterministic — it produces the deck video plus a semantic sidecar, then routes to review."
    on_enter:
      # Render the deck spec → mp4 + .semantic.json sidecar.
      - invoke: host.slidey.render
        id: render_deck
        once: true
        with:
          spec_path: "{{ world.deck.spec_path }}"
          format:    mp4
        bind:
          deck_path:     path
          semantic_path: semantic_path
        on_error: reviewing

      # Emit the rendered mp4 → deck_handle.
      - invoke: host.artifacts_dir
        id: emit_deck
        once: true
        with:
          thread:   "slidey-edit"
          src_path: "{{ world.deck_path }}"
          kind:     video
          label:    "{{ world.deck.summary }} (cycle {{ world.cycle }})"
        bind:
          deck_handle: handle.id
        on_error: reviewing

      # Emit the semantic sidecar → semantic_handle (the annotation surface reads it).
      - invoke: host.artifacts_dir
        id: emit_semantic
        once: true
        with:
          thread:   "slidey-edit"
          src_path: "{{ world.semantic_path }}"
          kind:     data
          label:    "semantic sidecar"
        bind:
          semantic_handle: handle.id
        on_error: reviewing

      - when: "world.deck_handle != ''"
        emit_intent: accept
    on:
      accept:
        - target: reviewing
      look:
        - target: .
