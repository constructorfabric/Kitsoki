# drafting — ONE host.agent.task authors/edits the deck JSON spec (mocked in
# flows/cassette). Workspace-jailed. `once:` keyed on the bound deck so reload /
# self-entry don't re-run the author/edit pass.
#
# accept → rendering. The task binds the deck object (spec_path + summary).
# source_deck carries the existing input spec when the operator chose
# edit_existing; deck stays empty until the agent returns so once: still runs.

states:

  drafting:
    description: "Drafting the deck (interpretive — an agent writes the spec)."
    relevant_world: [deck, source_deck, draft_feedback, cycle]
    view:
      - heading: "Slidey deck editor · drafting"
      - kv:
          pairs:
            Source:   '{{ world.source_deck.spec_path|default:"(new deck)" }}'
            Deck:     '{{ world.deck.spec_path|default:"(pending)" }}'
            Summary:  '{{ world.deck.summary|default:"(pending — agent has not returned)" }}'
            Feedback: '{{ world.draft_feedback|default:"(none)" }}'
      - prose: "An agent is writing or editing the deck JSON under the workspace; it renders automatically when the spec is ready."
      - heading: "Actions"
      - list:
          items:
            - label: "quit"
              hint:  "abandon the editor"
            - label: "look"
    on_enter:
      - invoke: host.agent.task
        id: author_deck
        once: true
        with:
          agent: drafter
          working_dir: "{{ world.workspace }}"
          acceptance:
            schema: schemas/deck.json
          context:
            prompt: prompts/author_deck.md
            args:
              workspace:      "{{ world.workspace }}"
              source_deck:    "{{ world.source_deck }}"
              deck:           "{{ world.deck }}"
              draft_feedback: "{{ world.draft_feedback }}"
        bind:
          deck: submitted
        on_error: idle

      # Auto-advance to render as soon as the agent has bound a deck spec —
      # no manual accept required.
      - when: "world.deck.spec_path != ''"
        emit_intent: accept
    on:
      accept:
        - target: rendering
      quit:
        - target: "@exit:abandoned"
          effects:
            - set: { abandon_reason: "abandoned_at_drafting" }
      look:
        - target: .
