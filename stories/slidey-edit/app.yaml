# slidey-edit — author/edit a slidey deck, render it, review the media, then
# refine from a LOCATION-TIED annotation anchor on the rendered deck.
#
# This is the v2+ generalization PoC of spatial-oracle: feedback is no longer
# rrweb-only. A reviewer annotates the rendered deck (the html deck's poster
# frame) with an AnnotationAnchor — a semantic_element on a named scene element,
# a drawn region, or a point — and that anchor flows verbatim into a refine pass
# that edits the EXACT scene the anchor points at.
#
# Rooms:  idle → drafting → rendering → reviewing → refining → done
#   idle       deterministic: choose create-new or an existing deck spec to edit
#   drafting   interpretive:  ONE host.agent.task authors/edits the deck JSON (mocked)
#   rendering  deterministic: host.slidey.render → static HTML deck + .semantic.json sidecar; bind the media handle
#   reviewing  deterministic: media(deck) inline + invite an anchored annotation
#   refining   interpretive:  ONE host.agent.task consumes {{ args.visual.anchor }} + the operator
#                             instruction, edits the spec, re-renders, shows before/after
#   done       gallery of the final deck + the anchors that were addressed
#
# Deterministic + NO-LLM: flows/*.yaml stub every host call by invoke id; the
# tour/web cassette (cassettes/deck_review.cassette.yaml) matches by handler.
# Rendering/reviewing reference a BAKED pre-rendered deck under baked/ so the
# media resolves without invoking slidey live.

app:
  id: slidey-edit
  version: 0.1.0
  title: "Slidey deck editor — annotate then refine"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.agent.task
  - host.slidey.render
  - host.artifacts_dir
  - host.starlark.run

agents:
  drafter:
    system_prompt: "You author a slidey deck JSON spec using only the schema and scene contract in the task prompt. Skills and slash commands are disabled for this dispatched agent; do not inspect or mention SKILL.md, .agents/skills, or .claude/skills. Only read an existing input deck when one is provided, and only write under the given workspace directory. Keep the deck tight; one idea per scene."
    model: claude-sonnet-4-6
    tools: [Read, Write, Edit]
    external_side_effect: false
  reviser:
    system_prompt: "You edit the slidey deck behind a LOCATION-TIED annotation using only the schema and scene contract in the task prompt. Skills and slash commands are disabled for this dispatched agent; do not inspect or mention SKILL.md, .agents/skills, or .claude/skills. Resolve the anchor to the scene/element it targets and apply the instruction there. Comply with the directive; never silently drop it. Only write under the given workspace directory."
    model: claude-sonnet-4-6
    tools: [Read, Write, Edit]
    external_side_effect: false

world:
  # ── session / config ───────────────────────────────────────────────────────
  workspace:        { type: string, default: "stories/slidey-edit/baked" }
  # The project keeps all deck specs in one folder. A bare deck name on
  # edit_existing (e.g. "kitsoki-pitch") resolves to <decks_dir>/<name>.json.
  decks_dir:        { type: string, default: "docs/decks" }

  # ── deck source ─────────────────────────────────────────────────────────────
  # spec_path is baked at the pre-rendered deck so `kitsoki tour`/web can drive
  # the loop without authoring (tour-needs-baked-world lesson).
  deck:             { type: object, default: { spec_path: "stories/slidey-edit/baked/deck.json", summary: "Spatial-annotation explainer deck (3 scenes)." } }
  source_deck:      { type: object, default: {} }   # existing deck passed into drafting; deck remains the draft output/cache
  draft_feedback:   { type: string, default: "" }

  # ── render outputs ──────────────────────────────────────────────────────────
  deck_handle:      { type: string, default: "" }   # rendered HTML deck artifact handle
  semantic_handle:  { type: string, default: "" }   # legacy; semantic sidecar now resolves beside deck_handle
  deck_path:        { type: string, default: "" }
  semantic_path:    { type: string, default: "" }

  # ── render auto-fix loop ────────────────────────────────────────────────────
  # On a render failure the deck spec is auto-repaired and re-rendered, up to
  # render_retry_budget attempts, before falling through to reviewing with the
  # error surfaced. render_retries resets on any fresh attempt (start / rerender
  # / refine). render_fix_result is the once: cache for the repair pass.
  render_retries:      { type: int,    default: 0 }
  render_retry_budget: { type: int,    default: 2 }
  render_fix_result:   { type: object, default: {} }

  # ── annotation → refine loop ────────────────────────────────────────────────
  # annotation is the operator's location-tied feedback bundle. anchor mirrors
  # the AnnotationAnchor union the surface attaches as args.visual.anchor.
  annotation:       { type: object, default: {} }   # {anchor:{...}, instruction, frame_handle}
  refine_feedback:  { type: string, default: "" }   # inline instruction override (no anchor change)
  refine_result:    { type: object, default: {} }   # {edited:[...], summary}
  last_refine_summary: { type: string, default: "" } # reviser's one-line summary of the last edit (shown in reviewing)
  # ── slide targeting + gate (which slide the operator is looking at) ──────────
  current_scene:    { type: string, default: "" }   # the viewed scene the embed plugin reports (authoritative slide)
  scene_index:      { type: int,    default: -1 }    # resolved target scene (resolve_scene.star); -1 = none identified
  scene_label:      { type: string, default: "" }    # human label for the targeted slide
  scene:            { type: object, default: {} }    # the targeted scene's current JSON (fed to the reviser)
  scene_json:       { type: string, default: "" }    # same scene serialized for prompt rendering
  refine_gate:      { type: bool,   default: false } # gate verdict: edit stayed on the targeted slide
  refine_message:   { type: string, default: "" }    # gate-composed summary (reviser's on success; honest note otherwise)
  addressed:        { type: object, default: { items: [] } }  # {items:[{anchor_label, instruction, deck_handle}]}
  cycle:            { type: int,    default: 0 }
  refine_budget:    { type: int,    default: 6 }

  # ── misc ────────────────────────────────────────────────────────────────────
  abandon_reason:   { type: string, default: "" }
  last_error:       { type: string, default: "" }

intents:
  # ── idle ────────────────────────────────────────────────────────────────────
  start:
    description: "Draft (or re-draft) the deck and advance to render."
    examples: ["start", "draft the deck", "begin"]
    priority: 80
    slots:
      feedback: { type: string, required: false }
  edit_existing:
    description: "Edit an existing slidey deck — by bare deck name (resolved under decks_dir) or by full spec path — and advance to render."
    examples: ["edit kitsoki-pitch", "edit_existing spec_path=kitsoki-pitch", "edit the onboarding deck", "revise docs/decks/overview.json"]
    priority: 82
    slots:
      spec_path:
        type: string
        required: true
        description: "Deck name (e.g. 'kitsoki-pitch', resolved to <decks_dir>/<name>.json) or a full path to a slidey JSON spec."
      summary:
        type: string
        required: false
        description: "Short human summary of the deck being edited."
      feedback:
        type: string
        required: false
        description: "Initial edit direction for the drafter."

  # ── drafting / refining checkpoints ─────────────────────────────────────────
  accept:
    description: "Accept and advance."
    examples: ["accept", "continue", "lgtm", "looks right"]
    priority: 85

  # ── reviewing checkpoint ────────────────────────────────────────────────────
  revise:
    description: "Reopen the whole deck for structural edits (add/move slides, template/layout swaps, theme/format changes)."
    examples:
      - "revise add a closing summary scene"
      - "revise move scene 3 after scene 1"
      - "revise switch this deck to a table-heavy layout"
    priority: 65
    slots:
      feedback:
        type: string
        required: false
        description: "Broad deck rewrite direction. Leave blank to open draft mode with no extra direction."
  refine:
    description: "Refine the deck from a location-tied annotation on the rendered frame."
    examples: ["refine", "refine feedback=tighten the callout", "fix what I pointed at"]
    priority: 70
    slots:
      feedback: { type: string, required: false }
      current_scene:
        type: string
        required: false
        description: "The scene index the operator is viewing (reported by the embed plugin), so the edit lands on that slide."
  rerender:
    description: "Re-render the current deck without editing it."
    examples: ["rerender", "render again"]
    priority: 60

  # ── internal (emit_intent only — never user-routed) ──────────────────────────
  render_retry:
    description: "Internal: re-render after an auto-repair pass (counts against the retry budget)."
    priority: 1
  render_giveup:
    description: "Internal: render auto-fix budget exhausted — return to review with the error."
    priority: 1
  quit:
    description: "Abandon the editor."
    examples: ["quit", "abort", "bail"]
    priority: 50

  # ── shared ──────────────────────────────────────────────────────────────────
  look:
    description: "Re-render the current view."
    examples: ["look", "refresh", "?"]
    priority: 10

exits:
  done:       { requires: [deck_handle] }
  abandoned:  {}

root: idle

include:
  - rooms/*.yaml
